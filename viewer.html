용:\n- \"P.S.\" 표시\n- \"K.S.\" 표시\n- 여러 수식과 숫자들 (3000, 2400, 600 등)\n- \"[불명확](x+y) 24ore\" 같은 내용\n- 계산 과정으로 보이는 수식들\n- \"(약자)(약자)\" 표기\n\n전반적으로 가독성이 낮은 필기체로 작성됨.", "summary": "학과 방명록의 두 페이지로, 왼쪽은 음악과 감정에 관한 개인적 글귀들이, 오른쪽은 수학/과학 공식과 계산식이 기록되어 있다. 학생의 일상과 학업이 혼합되어 있는 페이지로 보인다.", "tags": ["일상", "고민", "공부", "음악"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p115.jpg", "processed_at": "2026-04-09T23:30:56.017012", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p115"}, {"date": null, "author": null, "content": "행복을 찾아서\n\n좋은 친구\n함께할 때\n참된 행복\n\n[불명확] moment\n행복 행복은 [불명확]\n\n행복하면 행복하다\n행복하려면 행복하다\n행복한 행복 / \n행복한 행복은 더욱 행복하다\n[불명확]\n\n[불명확]은 좋은 기억...\n함께 할 때 행복\n[불명확]\n\n추억은 언제나 소중하다...\n함께 한 시간들...\n\n[불명확] - 나에게...\n\n♡ on 유 (부드럽게 표현)\n\n[원형으로 그려진 낙서/드로잉]", "summary": "행복과 추억에 대한 성찰적 글. 좋은 친구와 함께 하는 순간들의 소중함과 함께 한 시간들이 어떻게 행복한 기억이 되는지를 반복적으로 표현하고 있습니다.", "tags": ["일상", "우정", "행복", "추억", "감성"], "mood": "positive", "decade": "unknown", "image_quality": "fair", "filename": "1999년_열린마음_p116.jpg", "processed_at": "2026-04-09T23:31:00.497489", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p116"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n열린마음이 뭘까요?\n열린마음이란 무엇인가? 모두의 다양한 의견을 존중하고 받아들이는 마음가짐이다. 새로운 것에 대해 거부감 없이 수용하려는 태도이며, 다른 사람의 생각과 문화를 이해하려는 노력이다. 또한 자신의 고정관념을 버리고 유연하게 생각하는 것을 의미한다.\n\n우리는 왜 열린마음이 필요한가?\n[불명확한 부분 다수]\n\n오른쪽 페이지:\n[여러 단어와 문구가 흩어져 있음]\n괜찮아?\n뭐해?\n[불명확]\n좋은 추억\n[불명확한 필기들]\n\n상단 코너에 만화 캐릭터 그림 있음", "summary": "열린마음에 대한 정의와 의미를 탐구하는 노트 페이지. 다양성을 존중하고 새로운 것을 수용하는 태도의 중요성에 대해 기록하고 있으며, 일상적인 단어들이 페이지 곳곳에 산재되어 있음.", "tags": ["고민", "일상", "철학적 사고"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "1999년_열린마음_p117.jpg", "processed_at": "2026-04-09T23:31:05.109882", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p117"}, {"date": null, "author": null, "content": "열린마음\n\n인생에서 가장 소중한 것\n\n우리가 살아가면서 가장 소중한 것이 무엇일까?\n사람들은 저마다 다른 대답을 할 것이다.\n어떤 사람은 돈이라고 하고, 어떤 사람은 사랑이라고 할 것이다.\n그리고 또 어떤 사람은 건강이라고 할 것이다.\n\n나는 인생에서 가장 소중한 것은 사람이라고 생각한다.\n왜냐하면 모든 것은 사람과의 관계 속에서 비롯되기 때문이다.\n\n돈도 사람이 있어야 의미가 있고,\n사랑도 사람과의 관계 속에서 나타나며,\n건강도 사람과 함께 할 때 진정한 가치를 가진다.\n\n따라서 우리는 주위의 사람들을 소중히 여기고,\n[불명확]을 나누며,\n함께 웃고 울며 살아가야 한다.\n\n그것이 인생을 풍요롭게 만드는 가장 좋은 방법이 아닐까?", "summary": "인생에서 가장 소중한 것은 돈이나 건강이 아닌 사람이며, 모든 것이 사람과의 관계 속에서 의미를 갖는다고 말하는 성찰적인 글.", "tags": ["일상", "철학", "인생", "관계", "성찰"], "mood": "positive", "decade": "unknown", "image_quality": "fair", "filename": "1999년_열린마음_p118.jpg", "processed_at": "2026-04-09T23:31:12.674449", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p118"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n아름다운 손글씨와 함께 다음과 같은 텍스트가 보임:\n행복에 대한 글귀와 일상의 생각들이 적혀있음\n[불명확한 부분 다수]\n\n오른쪽 페이지:\n(2) 번호가 있는 항목\n앞에 쓴 내용과 연결되는 텍스트\n마음 관련된 내용들\n\n주요 가독 텍스트:\n'행복(haeng-bok)'\n'마음'\n'생각'\n등의 단어들이 포함되어 보임\n\n[전체 텍스트가 매우 흐려서 정확한 전사가 어려움]", "summary": "1990년대~2000년대 학과 방명록 페이지로 보이며, 행복과 마음에 관한 개인적인 감정과 생각을 손글씨로 적은 것으로 보입니다. 정확한 내용 파악이 어렵습니다.", "tags": ["일상", "고민", "감정"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1999년_열린마음_p119.jpg", "processed_at": "2026-04-09T23:31:17.172434", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p119"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n아버지와 어머니가 우리를 잘 키워주셨고 많은 사랑을 주셨습니다. 우리는 그 사랑에 감사하며 살아가야 합니다. 학교에서 배운 많은 것들이 우리의 인생에 도움이 될 것입니다. [불명확] 친구들과의 추억도 소중하고 선생님들의 가르침도 [불명확]\n\n중간 페이지:\n시간이 빨리 지나가는 것 같습니다. 어제가 어제 같지 않고 오늘도 곧 어제가 될 것 같습니다. 우리는 변화하는 세상 속에서 열심히 살아가야 합니다. [불명확] 앞으로의 삶에서도 좋은 추억을 만들었으면 좋겠습니다.\n\n오른쪽 페이지:\n[불명확한 텍스트들이 작은 글씨로 적혀있음]\n여러 줄의 메모 형식의 짧은 문장들", "summary": "학교생활을 마무리하며 부모님과 선생님, 친구들에 대한 감사와 추억에 대한 글. 시간의 빠름을 느끼며 앞으로의 인생에 대한 다짐과 바람을 담고 있습니다.", "tags": ["졸업", "감사", "추억", "일상", "고민"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p120.jpg", "processed_at": "2026-04-09T23:31:22.240525", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p120"}, {"date": null, "author": null, "content": "텍스트 없음", "summary": "이 이미지는 파란 노트북 표지로 보이며, 중앙에 별 모양 장식이 있는 흰색 손 인형과 '열린마음 sweet dream'이라는 텍스트, 스티커와 바코드가 보입니다.", "tags": [], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "1999년_열린마음_cover_back.jpg", "processed_at": "2026-04-09T23:20:32.409324", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "cover_back"}]}, {"id": "2000년_사회부", "title": "2000년 사회부", "short_title": "사회부", "year": 2000, "cover": "2000년_사회부_p000.jpg", "page_count": 6, "pages": [{"date": null, "author": null, "content": "I ♥ U\n0915\n[불명확]\n[불명확]", "summary": "간단한 사랑 고백 메시지와 날짜(0915)가 적힌 페이지입니다. 손글씨로 작성되었으며 구체적인 내용은 불명확합니다.", "tags": ["연애", "고백"], "mood": "positive", "decade": "2000s", "image_quality": "fair", "filename": "2000년_사회부_p000.jpg", "processed_at": "2026-04-09T23:31:24.773387", "volume_id": "2000년_사회부", "volume_title": "2000년 사회부", "year": 2000, "page_label": "p000"}, {"date": "2000년 5월 23일", "author": null, "content": "서툰더라 종습니다\n주말 대자보 광장이라는 궁금한 장이 어떨것지요?\n5~6월, 사설 이제나 그렇지만 창 수 왔는 일이 넌 많지 않습니까?\n\n○ 6월 항쟁\n○ 봄 농촌 마련 농촌심상\n○ 5말 6초 노동자투쟁\n○ 남북정상화담 과정 남북동이 운제\n○ 최근 교조되는 미군 한미행정 문제\n○ 베트남전이 대한 4장문제\n○ 우리사회의 여성 or 성 문제\n○ 각 학생단체의 출발식은 전국한 학생운동의 역사와 단계간 비교 → \n○ 드르금, 하반제 관련해 현재까지 상황의 종과적 정리\n○ 현 정치·경제 상황이 사회적 분석\n○ 기타 등등\n\n이런거 아니더라는 된과 중 생기한 모숨이 있으면 종찰네요.\n\nP.S. 여건다음식으로 써는건자는 못든겠네요. (요청)\n2000·5·23(수)\n\n저 사회님 특독하싶니다.\n질응합니다. [서명]\n\n지우음 더지 말씀다.", "summary": "6월 항쟁, 농촌 운동, 남북 관계, 미군 문제, 여성 문제 등 다양한 사회적 이슈들에 대한 질문과 토론의 제안. 사회적 현안에 대한 깊이 있는 분석을 원하고 있습니다.", "tags": ["고민", "사회운동", "정치", "6월항쟁", "학생운동", "여성문제", "남북관계"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "2000년_사회부_p001.jpg", "processed_at": "2026-04-09T23:31:33.435651", "volume_id": "2000년_사회부", "volume_title": "2000년 사회부", "year": 2000, "page_label": "p001"}, {"date": null, "author": null, "content": "Miffy\n\n도 낮 싶어 앞뒤숲\n어떤 것들 좀 좋은 나갈?\n싶은 4맥의 3 래껴자런 까끗왠.\n것 대떴별네.\n\n'윤은 우씨 것어 훨훼. 것씨은 우씨 윤은 앟댄?'\n→ 것씨 여춍된 기현초 윤은 가가씨비떠 훨훴와 것것것엔 높을!\n\n싸따느 거 이따른 것추천 나능맡 와곡.\n\n쌓주것인 구은 것불댄 [불명확]비떠는 훨훴에\n'도때빠 뭐어어 있이나? 앟깟' 을 넘시 맏고 짜려 많은 나은 좋 것은\n윤은과.\n\n윤은 바떠리편 싸따어 것왓싸겟 것 가앞고.\n\neof\n\n[불명확]셈종그3 비 훨나-1 [불명확].\n\n윤은 정삭 기싸은 어영꾸 받아 훨가은 ?\n싸싸혼 족 깟어것싱수강?\n\n것어? 나달간 뭐떠떠끼? 높낰여?\n어떡이 난 1.\n것엉 뭘나나낭네. [불명확] 깨 29", "summary": "노트 필기로 작성된 일상의 고민과 감정을 담은 글로 보이며, 여러 질문과 반성적 내용이 포함되어 있습니다.", "tags": ["일상", "고민", "감정"], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "2000년_사회부_p002.jpg", "processed_at": "2026-04-09T23:31:42.797556", "volume_id": "2000년_사회부", "volume_title": "2000년 사회부", "year": 2000, "page_label": "p002"}, {"date": null, "author": null, "content": "돌 많은 외로움 깊숨납다.\n\n방학은 떠나는 날 '비극'처럼 떠날 '듯의 구슬을 내겨준 꽃 곁에\n수심먼 저런 듯, 11아 여름마 야심하숨습니다. 묻죽 많은 시곳들이\n괴롭하고, 꽃핸 강숨습니다. 비극처럼 위험가지 듯죽 맛고 깊매하숨습니다.\n\n덩 엘 쭉네 사별침족에서 가능 있이 있랑습니다. '깎아에서 배곣\n수려의 묻주의 조작 의심스러 가냥 걸장이 영숨습니다.\n\n더강에게 기 조즈 옳주죽 거더서 '심하 과장 하느ㅎ으?' 하된 문진\n충즉 신한강 즉힌 많은 곱찬숨습니다.\n\n남심긴기짣 나들의 보창 청납먹음 옳충산 더 넘겨강숨다. 이자먼\n보장 못 발광것이.\n\n나는 그저 걸려중 (사랑) 아입나다. 온려 쉽게 따청하고 장장\n느든것 그 시칠지데. 나는 위한 수제 뭄한합니다. 닻라한 쉽게 다-\n내께 ✱심게 숨됴른 그 시칠합니다.\n\n하기없 이 뜰 옳든 옧네서 닻강한, 다찬하고, 한가 넘나다. 이머면 강옳\n'있과 강 뜰쌈습니다. 옴는 이면 옳심각의 수려의 뭄버지조 쉽게 대자저\n뫼지요. 솔자즈, 꽃혜 숨절습니다.\n\n나는, 진지 사향이 사향중 서는 그 싯쎌 왤든 뭄페어~\n\n괜심았디 뭉되 가싶이 걸려 옳네, 그 찮아 잔저면 가능의 ⊕ 내려 싶\n신숨습니다.", "summary": "작성자가 방학, 외로움, 사랑과 관련된 감정과 깊이 있는 내용을 손으로 기록했습니다. 읽기 어려운 필체로 인해 일부 내용 해석이 불명확합니다.", "tags": ["감정", "고민", "사랑", "일상"], "mood": "negative", "decade": "unknown", "image_quality": "fair", "filename": "2000년_사회부_p003.jpg", "processed_at": "2026-04-09T23:31:59.043882", "volume_id": "2000년_사회부", "volume_title": "2000년 사회부", "year": 2000, "page_label": "p003"}, {"date": null, "author": null, "content": "좌측: 6 + [불명확] / [불명확]\n\n중앙-상단: [불명확한 다이어그램]\n- 여러 화살표와 상자로 이루어진 플로우차트\n- 라벨: 6₁, 6₂, 8, [불명확], etc.\n- 한글 텍스트: [불명확]\n\n좌측-하단: \n생일: 7월 [불명확]\n이름: [불명확]\n[불명확]\nA/C\nP.C\n[불명확]\n[불  "졸업", "인생"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "2000년_열린마음_p009.jpg", "processed_at": "2026-04-09T23:33:04.337145", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p009"}, {"date": null, "author": null, "content": "너는 목에서 뺀 따뜻한 이 느낌 못하잖아....\n모르겠어·이렇게.... 몸하다·쿨 NE... 나가·구름 못하는 마음도...\n먹하다... 잃겠네...\n\n사랑을자 근처를 가본 무죽가 다 시린것 죽는가 봐다—.\n너석은 정지성이 구걸청 사랑을 그려주하는 같지들 숨쉬인다.\n기지 야기어떻게 관계여자서 같은미 과정여서 조층된 지친을 가져\n봤다. 지금 듣 것 Deep Purple · Child in time 과 내 속음켠트\n가 비츠하다. 잠 ∞ 준대서는 꼭 흐름같다 레도정꼴의 제내수를,\n비통의 음악은 좋아하는 날도 없는지? 60-70대대의 음악들을 사랑하는\n날도 없는지? [선택됨] 어기라와 국민의 영혼을 사랑하는 사람들은\n없는지( 악더장미도 걸린 모든 순정장)? 여미떨는 최피직 같으면\n더 약한 사랑은 없는지?\n\n여심요 남쪽 현대맛에서 붙잎가 어쌌 봤잔가? 한 96.\n\n아! XX 정말 쉽 롣 왔다!\n솜아 OX 짤내가 내손 추야··\n매정 사켓 이진 짧아?\nFuck이다\n정말나뽑하다... OX 정말 싫다...", "summary": "사랑과 음악에 대한 고민과 감정을 표현한 개인적인 일상 노트. 복잡한 감정 상태와 누군가를 향한 갈등적 마음을 드러내고 있습니다.", "tags": ["일상", "고민", "연애", "음악", "감정"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "2000년_열린마음_p011.jpg", "processed_at": "2026-04-09T23:33:15.600841", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p011"}, {"date": "2000-04-12", "author": "김 상표", "content": "어른이나 괭심수의 하인인지 나 여사는 어른에게 혜야하는 것이 무섭다.\n그는 '선비'와 조새'라는 강은 '정인바'다\n그는 오더떼 어났으로, 나와 나는...\n한 번 특 과해서 어버지는 심연데...\n하삼 젯 받 심언데.\n선비가 조새 도향 때에 빠쏘촉 것들 받지 되어야도\n조새와 심새 도향 때도 한 번 걸려하게 빨아증다\n서르 ⎕⎕100 영긍 어겨채떼에 어떻지...\n\n상경이 제 공증하던\n밤 더여싶서, 또 수 더여싶서 나와 나뒤던 어버증이\n다종이 의식으로 한 강은 심병 어싶다.\n○○들에게 그것이 어떤 의미가 족혹...\n저때 한 국도 흘린네지랑 감잠연 중정도다.\n\n그000.4.12 (국정을 죽는 감잠)\n\n김 상표\n\np.s 썬 몬 : 내 강은 요청하지?\n\n4/14\n한 확번 찾아야...정별 그렇다...정광이 클 정말 광한 된 국은...\n차지면 나도 마음을 먹다.⚘ 는 것 잘 언데...\n\"나, 따는 상각이 서해도서가 어떤 ⚘ 그상'나.도 다가장 다 된...\n어젠기 되았중깐.\n정방 무 상각을 하고 새도리 보조잠는 ∞ 든...\n선비도은 마지하고 있지만 밤잠도 줄겨다.\n\n[불명확]", "summary": "일상의 고민과 인간관계에 대한 성찰을 담은 개인적인 생각과 기록. 4월 중순경 작성된 일상 노트로 보여지며, 여러 번에 걸쳐 추가 기록됨.", "tags": ["일상", "고민", "인간관계", "성찰"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "2000년_열린마음_p013.jpg", "processed_at": "2026-04-09T23:33:33.294616", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p013"}, {"date": "04/10", "author": null, "content": "잠이 안오는 곤요..\n\n물론 언제나 이시간에 잠안자고\n여기서 여기쯤 거리길 했었지만\n아침 일찍 떠나야 하는데... 잠은 안오고\n이곳에 이렇게 인사라도 하고 자렴니다.\n오랜만인것 같네요.\n\n바른 글씨체로\n욕도 안쓰며 글을 쓰는기...^^\n뭐 별것도 아닌데.. 군대답게 맑이죠..\n자녀 닫은 일을을 떠올리게 합니다.\n참 많은 사람들과 많은 일들이 있었죠.\n자녀 2년여를 뒤돌아 봅니다\n재수를 하고 학교에 처음 들어와 만났던 많은 사람들\n우리들의 정신적 지주 92우전이형\n어린 우리와 놀아주느라 고생한 93형들\n열글도 모르제 수배달하는 형의 둥특금 미련을 위해\n이 한름 먹주에 바치게 했던 94역식이형\n95학번 형들... 나처럼 핫충희 도변이나 한 악성이형..\n이제저에 군해가서 고생하는 악있는 대열이형", "summary": "작성자가 아침 일찍 떠나야 해서 잠을 못 자며, 대학 2년여 동안 만났던 많은 사람들과 선후배들에 대한 감사와 회상의 글입니다.", "tags": ["일상", "고민", "감사", "추억", "선후배"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "2000년_열린마음_p016.jpg", "processed_at": "2026-04-09T23:33:42.627857", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p016"}, {"date": null, "author": null, "content": "원점 아저씨 같은 삶은이형\n제미있고 듬직한 호식이형\n이제 학교 다녀 수 있게된 경준이 누나\n참 즐겁게 같이했던 96학번 형들\n밤의 제중, 음을한 가광드 동하이형\n맑은 밤을 함께했던 기흥이형\n죽을래 마실래 지혜누나 96날 윤이누나\n황상 후까시 언중이형 마리 무거운 독웅이형\n지빠중에서 벗이났을까? 98년도 학생회장 도경이형\n이제야 들어온 벽수형\n97학번 형들\n귀엽고 즐거운 푸웃 기방이형\n중고교 둥기 영호\n장군같인 최인씨와 영계같이 먼이형\n싸이코 원종현 종합병중 인명취\n관심사항 서영일씨 귀여운 최현경앙\n등등 많은 사람들....\n98학번 놈들\n정말 있을 수 없을 놈들....\n하나하나 맑하지 않아도\n너에겐 너무도 의지가 되어준 친구들..\n몸 큰 서로간의 같음으로 혹거켈 완적도 있지만\n뛰들아 보면 환명한명 소중한놈들...고마운놈들...\n군대같은 사람들 모두 건강했으면 좋겠어요.\n학교를 지키는 사람들은 내 방 청소 잘해 주시고\n동생들 잘 돌봐 주길 바래요\n우리 구구놈들\n모두 좋은 사람들\n외머여야 사는 것 도돈낸깐 맞겠지만\n그 시간이 찰갛은 현 합니다.\n자신과 남을 돌아 볼 수 있는 멋진 사람,멋진 청년이", "summary": "1990년대 학과 공동생활을 하며 만난 선후배, 동기 학생들에 대한 고마움과 그리움을 표현한 글. 96학번부터 98학번까지 다양한 사람들의 이름과 별명을 언급하며 각자에 대한 따뜻한 감정을 기록하고 있다.", "tags": ["일상", "동기", "선후배", "감사", "학과", "추억", "우정"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "2000년_열린마음_p017.jpg", "processed_at": "2026-04-09T23:33:59.292510", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p017"}, {"date": null, "author": "Winey", "content": "(...) 결과적으로 처음 본다 나도 몸을 떨었다. 영화 한국일이 나는 삶이 (...)열려있는 달빛 시장이 것도 너는 아팠다 한번 (...) 튀어 미술을 어려운 깗. 조중한 것같은 부유한 것이 넣인 기침. 그것에 (...) 똑같이 통 M T 그리 그 깶 영상여김. 가르찬이 깠다. 그것 숨숨에 M 방향 맞게 [불명확].\n하아 ~ 우린 좋 딱죽는 <씨>때는 !!!\n\n숨조차 좋 들언 들고 이야기? 한다는 것은 백묘 혼트 짓는다. 영원하는 에 숨조차 듣다는 것을 얻혀진다.\n\n'중하다' 한계 몸짓. '영화'라는 게 몸짓. 여자피 모든 것 들이 어떻게 '한다 했던자채자. 그래 그 했던에 대해 어떻게 상관하는간이. 또 그 했던이/ 어떤심의 의미밖을 하고 있었는데. 자하도 아주 조금은 '한다'는 것 내팔하했지 알음과. 그의 의도, 령심, 맺, 맺는 나양성, 물든; 배, 그 맛 것에서 그 사람의 상태, 강점. • 아주 가능성을 그사장 자세나처지도 몰아버지 있는다.\n나는 그것에 생각하는데. — Winey —\n\n나도 그것에 사용하지마\n사용 자주하지 않는다 상관하는데.\n목이 없다면 미웃기는 → Del\n\n그냥 강정 여든 것에 만족하고 버튼 것이 아니다.\n→ 나도로 자주하지는.", "summary": "일상 속 여러 감정과 생각들, 특히 '한다'라는 표현의 의미와 인간관계에 대한 성찰. Winey라는 필명으로 작성된 개인적 고민과 철학적 사유.", "tags": ["고민", "철학", "일상", "감정", "관계"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "2000년_열린마음_p018.jpg", "processed_at": "2026-04-09T23:34:17.723735", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p018"}, {"date": "00.04.15", "author": "null", "content": "나 기억해도 99.999 치명적은 사야말 어떤된 것 냉혜...\n\n서택과 굳샘은 창생초곱 단톡지는 것이 아딘 꺼거들...\n\n서격 왔 닦겨란 라다서-.\n\n나야 뭐 왜. 꾸럴 00이다 다 홀 촉렴메, 먹나 그게 없안다네.\n\n다자온것 기 무칙이때 다성은 미않다다.\n\neof\n\n* 기응함. 그놈이 그놈이 아닐고 메윤놈이...어떨고... 네 맘머거,하자올\n그긧 '사이'라던 씨야 한 것.\n그녀가 너찌전 사이의 옛뭔는 품말이다.\n\nhey\n\n주 MT가다 저게 생각 넘다\n\n농등 안되지는 00놓... 2종이중 겨자는 우쌋거...\nxxx.... 겨각 연격군 이배 겨추 00 겨자는 우 처칭었아너...\n4늑 홤 혹를거 맙먀... 정선겨즈.\n목찾다...\n궤즈!\n\n[서명/낙서 - 00.04.15]", "summary": "일상적인 감정과 생각들을 단편적으로 기록한 노트. MT, 인간관계, 그리고 마음의 상태에 대한 고민들이 담겨 있다.", "tags": ["일상", "고민", "MT", "인간관계", "감정"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "2000년_열린마음_p019.jpg", "processed_at": "2026-04-09T23:34:26.174336", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p019"}, {"date": "2000-04-15", "author": null, "content": "경주는 일을 저질렀다. 속됨고, 홀홀...\n지난 1년같 나와 독고혹혹련 고통자전거'을 이하즈악\n앞에 서울되고 신나게 속마디다가 깡박 얽고, 헷미 가다니...\n다시 자전기을 사아하나?\n내 자전거 눈가 달혀저 물라도 장 다됨으면 충짓다.\n자전기야 안녕히\n\nP.S; 지나응 띤 벼낫 아잣것을 래그랬 앓짜 못했나...\n아마 결어서 그렇거짓짜 안그래 99?\n\n꽃자용\n꽃자을 부혔다. 내가 족여 왔하 던 자족그어왓을 의\n도 핑미깔 우 맞은 말을 쌌다. X깜...\n그 녹자멍 나떼음이 목싱팰 우워왔데 가자마. 악짓써\n그리느 홀이핫처을 나와내 깜싻하기 자으로 뭐을 되젱관, 가싳고\n께기 떧큰을 빅고혗다. 바다종짜... 구자 워젯정 넣하데죽 바았었다.\n사과 짝자깥을 노여공 풀타. 왠이 되다광싱 없이겨 벤지 멸여이죽\n왜화은 우지을 모겟 바앗했다. 종피팍은 지 깡싯 설월...\n내못봤을 당 바아주 어 버질 죽하댜 바싶쳐. \n\n[불명확] 6.10", "summary": "자전거 분실에 대한 회한과 꽃과 관련된 일상적인 경험을 기록한 페이지. 시간 경과에 따른 감정 변화와 일상의 소소한 아쉬움을 담고 있다.", "tags": ["일상", "고민", "감상"], "mood": "negative", "decade": "2000s", "image_quality": "fair", "filename": "2000년_열린마음_p020.jpg", "processed_at": "2026-04-09T23:34:37.718763", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p020"}, {"date": "2000-04-16", "author": "Rainy", "content": "Awake! Awake again..\n\n닫혀가 18일 4명과 4분 짐자의 숨 대락 [머 정극과] 한다.\n내가 태어날 수 없던 가능성은 '1/여 이었다' 해기다.\n(물론 한 버마에 성공했지 웃겨은 테니 그 환경은 더 짛아지지 짛지만~)\n일단 그래 우서하기로 하자)\n\n여기며 내 아버지, 내 확야버지.. 등등 태여날 확실을 품혜 버켠..\n\n최소한 내가 더벗나다는 것 기쁘여다. 기쁜... 오은 시간께\n여기에서 수많은 사람 종에 너와 내가 '맺다는 것.\n우대체 몬몬한 운기지고 앎의는 헤다. 그래서 우린 우리가 완벽다는 사실을\n'거친' 불앙는 '인연'여다 복극다. 기펀은 우연이지만 인연은 팔여이니까.\n\nⅢ 의면에 아니곤 악여이 될 숨이 있다 (재소가 더덱께 없었던 생여지..)\n악여은 곰이버린가나. 인연으로 빠는 두 밤에 있다.\n인연은.. 맞 황 필요도 없겠지. 나쁘려로 소중히 간직하는 거다.\n\n제일 두려운 것 악여여 어니다.\n몸청나께 앎은 가능성이 있음에도 한필\n우린가 맺나다는 것 앞마나 다다한 의원가를 잭 보르는 것이 가장 두려 다\n앞마나 어렵게 우리는 달나다.\n\n2000, 4.16 9:00\n~ Rainy ~", "summary": "깨어나라는 다짐과 함께 인연과 가능성에 대한 성찰. 사람과의 만남이 우연이 아닌 필연적 인연이라는 깨달음과 그 관계를 소중히 지켜야 한다는 다짐.", "tags": ["철학적 사유", "인연", "관계", "성찰", "일상"], "mood": "neutral", "decade": "2000s", "image_quality": "good", "filename": "2000년_열린마음_p021.jpg", "processed_at": "2026-04-09T23:34:53.036781", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p021"}, {"date": "4/11", "author": "지은", "content": "삶 자체가 좋을 땐, 대체 뭐하오면서... Always smile 좋지만 다잠은 왜 맨터 ---\n전기가 자꾸 여전하고 내 자신에게 확 싫다. 확 싶 자꾸할 수 없다면 ---\n여전히 모니터겨랑 먹던 애정을 좋 뭐하는 를 겨우한 단숨다다...\n별거같은 겨우우를 한 곳 없는 다잠중, 다담음...\n\n과 년 어깨는 고통으로 도래것에 도망들은 소중한 다시와 다른 꼭중 시호되기다...\n어제 된다면 도망가지만 어떻하는 이 겨우...\n\n왜하! 겨우어때, 솔켜들은 비곱하 꼭겨도이 만나해라고 있는 지금...\nㅣ덥버드 닌공과는 있는 어린음 기술을 너여 몽장하야 한다.\n\n그것 반내는 좋하여 같다.\n\n우리들의 겨운을 ...\n우리들의 어겨얏 ...\n\n어깨 어디서라도 뜨옷, 대야를 지금 몽공 우리의 생심들은 다음았있게 하는 이 겨중\n겨중에 겨중하, 댓도어있는 다예음 느현 겨어다...\n\n나의 겨운..., 나의 이겨념...\n어때 나의 전마은, 될더 꼭살다.\n\n~ 경순\n\n양중천 미저나 내가~ 겨전 식음용\n사전가 같나 곡은 다 너\n\n어거 몽장한 말을 솔겨여 혼디마나요.\n결코, 깬자가 더좋어나는 느끼어나는 너기나? 기각다님~\n은거러다 느끼여나는 더좋한 어니의 담음이 있는......", "summary": "작성자 경순이 인생의 고통과 사랑, 관계에 대한 철학적 고민을 담아낸 감성적 글귀이다. 아픔과 이별 속에서도 소중한 것들을 찾으려는 마음이 드러난다.", "tags": ["고민", "감성", "철학", "사랑", "관계"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "2000년_열린마음_p040.jpg", "processed_at": "2026-04-09T23:37:28.092417", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p040"}, {"date": "null", "author": "null", "content": "조2반 졸업\n무6 2401아!\n\n까아아아아! 어렇짜자 마저 했너!\n\n꼭만 앗는거나는 이수강강하고\n사쿠다 말이다!!!!\n\n가즈 느낀데 왜 애꿀은 다쟁이고\n나저야 누? 어떻 마음야\n앗도 ! 앗중한 ~~[불명확]\n\n어머. 저어 응낸나 어떤데?\n앗도2 ㅁ. 른또?!다!0?...\n\n펴!!. 지만 버척 댓어어야?\n하또 ~~? 낟 날니...\n\n8:M 04:33\nㄱ팀8: 더데이 뭔? 기매지 맑나? ......\n기석3: 너 많이 피곤하다... 자, 쉬데다!\n\n낫 나버친 동행 놀은 [불명확]용을 안셨더네\n~~~~~~...\n\n\n사마(?) \n\n알오건지 쇄매! 지상이다 ~~~~~~", "summary": "조2반 졸업을 축하하며 쓴 글로, 다양한 감정과 일상의 순간들이 담겨있다. 친구들과의 대화와 고민, 그리고 피곤함을 표현하고 있다.", "tags": ["졸업", "일상", "친구", "고민", "감정"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "2000년_열린마음_p041.jpg", "processed_at": "2026-04-09T23:37:35.321866", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p041"}, {"date": null, "author": null, "content": "목요일인데...\n\n된 노아 왔더... 음... 사람마다 아영 아웃 왠지도\n\n되고 내가 구냥혼더... 나볼 눈이...\n\n깎이... 아빠더 아빠더!\n\n어제 쉬 콰일 뭐이 벽장이라. 내가 사강은 옮 붕이.\n묻어한다.\n[불명확]\n   중 국 어\n\n와\n\n아흰! 자기앞!\n그냥해서!\n\n궁상속여 닌더여 닌시\n사정했다.\n만이드 고샤서지고 싶 곡샤면-.\n\n그래고 궁상속 여원본 (990KS)\n그기무음) 6시에 깎서어려 못왔네. \"\n꼬 밤야-.\n\n훼응 아잖나영?\n\nOO묘 그녀 아깨비 앙앗저 ...\n\n(여기에 서명)", "summar ", "author": null, "content": "취존, 곡질, 덕이... TV 자막에서 야심찬기 내놓은 시대극(?)이다.\n'국희' 부터 곡자짜리 저문이 욕쌤이 요앙이다.\n허존 을 뼤 나머지 두 드라마는 오래만의 근현대물이다.\n50~70년대가 사설 그렇지말 너문을 안다하찮고, 가슴아픈 읽음이\n여서 외면하고 싶은 마음이 강렬하다. 그러나,\n사실 그들이 우리 부모 세대이며 그래서 마음이 편치않다.\n곡중과의 경험이 다르고 사상하기 어하하기 쉽지 않은 판제.\n'냥반격' 보단 '얍롤했던' 시대를 그야말로 돈봄으로 헤치면\n그들이기에 우리가 진 빚이 있다면 해결해내지 못한 모순들을\n다시금 도전해야 할 '어느 사명'이었지. 환경에서, 민족에서,\n여자에서, 문화에서, 우리가 불평하는 모든 부분에서.\n그래서 다시 여유하는 상이들을 끌끌다.\n모든 국히했는 중학과 되셨 ...!\n2000. 4. 25(수)오후.)\n이런 ... 끌끌 ...\n야니맞 서삯이가 ~. 나쁜 영혼한 (욕지간) 에게 있는\n얍했네마은 ... 총목 -.[불명확]\n마음 버욱 아드러면 것 서버가... 저래 혜미짖다 앎 보지\n마다... 내가 족볼래 육체. [불명확]\n너 릿이 사벼다가 가서 항홍하지거다. 넓 낭 항목 해서\n내 정자가 에서그와 너겨되. 내 생각도 종 해두다.\n것자 사처것!\n○ 마나. 서삯 서신거 (10) 日 뒬냥!\n감옥하나네\n[서명/그림]", "summary": "1950-70년대를 배경으로 한 드라마들을 감상하며, 그 시대를 살아간 부모 세대에 대한 깊은 성찰과 복잡한 감정을 표현한 글. 과거의 상처와 해결되지 않은 문제들을 다시 직면해야 할 책임에 대해 고민하고 있다.", "tags": ["고민", "일상", "드라마", "세대", "성찰", "감정"], "mood": "negative", "decade": "2000s", "image_quality": "fair", "filename": "2000년_열린마음_p048.jpg", "processed_at": "2026-04-09T23:38:44.504357", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p048"}, {"date": null, "author": null, "content": "제1\n정정하게 6시에 곡책 붕이낭고치\n\n이곳은 열려\n응\n\n[중간 부분 흐릿함]\n\n다는 4.18사건과 맞다\n게이차원이가 저여농기 좋 맞다\n서울 김성윤은 어차원의 **였던거다\n이차원이 약속한 까가성광을 약다리겨쳐\n왔보고 거다\n\n오낫씨어다도 ?", "summary": "4.18사건과 관련된 내용을 언급하며 어떤 약속이나 상황에 대해 기록하고 있는 글. 마지막에 의문형으로 끝나며 불명확한 부분이 많다.", "tags": ["고민", "일상"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "2000년_열린마음_p049.jpg", "processed_at": "2026-04-09T23:38:49.673363", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p049"}, {"date": null, "author": null, "content": "원충원 여대하다. 4·30일 부터.\n정 : 쿠카머 . 쌘혜...\n\n음.. 화됨에 않냐 않는 새에 머롤 앞의 있잖아.. 카더...\n\n[불명확]...나다 뭐하다. 꽃은 어떤 왠들어.\n\n이놈은 부끄럽네..4 같 무광 같은 업스 사건 ㅋㅋ...ㅋㅋㅋ\n\n근.. 하냐면 정붕인겟.. 정상도 무광에 \"욤 큼 앞돌..- 뮤음ㅋㅋㅋ정 꼴을 ㅋㅋ도는\n...ㅋㅋㅋ 너라는죠 ...음\n\n[밑줄 친 구간]\n넘따 오듯 앞된 궁옹향도\n·4· 육져서 넘따 앞된 ㅋ너돕다..\n·조술·오 앞정된 닌 앞된 너들이다\n궁.. 옷 date": null, "author": null, "content": "오늘 밤을\n\n혼 앞을벗겨! 내일이 어제 우리는 삶이 2\n받았기! 같은 나는 궁금했다. 다섯이.\n\n나는 받았습니다. 고로 나는 춘재합다. 쌘밤.\n\n삶은 이렇게하면 그 사상과 비웃한 점이 있어도 외치 말,\n삶은 사상하려면 그 사상과 꼬로 점이 있어야 한다. 쌘밤.\n\nDo It Yourself B\ninto.\n\n나는 숨쉴한다. 고로 나는 고통이다. 획하여\n\n나음 떠먹 하려면 그 안간과 문자가 맺지 않아야 하지면\n남을 꼬이는 것은 어붕 어떻게 읽다. 획하여.\n\nJust do me", "summary": "삶의 의미와 개인의 행동에 대한 철학적 고찰을 담은 일상적 성찰. 'Do It Yourself'라는 표현으로 자기주도적 삶의 중요성을 강조하고 있습니다.", "tags": ["고민", "철학", "일상", "자기성찰"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "2000년_열린마음_p060.jpg", "processed_at": "2026-04-09T23:40:48.902445", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p060"}, {"date": null, "author": null, "content": "떠다 마씨 켈믹 앗자 깎자? 깎자?\n[불명확] 켈믹이 떠다네?\n\"깎자 깎아 마씨 아씨 앗자?\" [불명확]\n아씨 씨씨 깎았. 머는 깎다.\n깎자 마서쌔을 깎아두 앗자 깎자.\n머 마씨쌔 → 국깎씨도 있 메씨 깎아 깎는 깎다.\n씨깎쌔과 깎자 !! - 앗씨 깎다. → 깎깎의 머씨.\n깎쌔 깎자 머씨 !! - 쌔쌔. → 깎깎 깎자 닥쌔\n앗쌔쌔 깎자 !!\n깎쌔 깎자 깎차 !! - 싸씨씨 꾸쌔. → 앗 깎깎 깎씨쌔 깎깎 깎다.\n\n- 미미 머미 .. 쌕 닭닭 증 닭깎깎\n. 깎앤떠 미미 미에 쌕닭은 닭은 깎씨 닭깎은떠....\n\n맑깎짐, 앗씨, 씨씨씨 깎씨 하면 그래야 깎다.", "summary": "읽기 어려운 손글씨로 여러 문구와 표현이 반복적으로 기록되어 있으며, 구체적인 의미를 파악하기 어렵습니다.", "tags": [], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "2000년_열린마음_p063.jpg", "processed_at": "2026-04-09T23:40:55.718074", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p063"}, {"date": "2000년 5월 1일", "author": null, "content": "우- 요 대자 새로 게으로 깎아먹나가 까다. 나돈자다.\n중서도 오 새자다. 슷는 고자는 그지 의 고자다. 배고파.\n\n우는 이 던자은 쇠느거 있었다.\n4-16 면 공 하고 너널 새봇굴 던음 께씨까던 깨씨따. 오배이 거 깟다.\n까지다 저눈의 거은 몬장 오배이거\n\n니여 나 공 톡하혜서 무자굴 새저. (벙거거 무자) 깎 벙거자가 어니저자도...\n여창다 고이누서. 만수기...\n\n- LEMONED - 2010(도')\n\n99년 감용삼정권 몬이.\n'김영삼 정권 다움저지' - 찬북 수서레 김준철 과중에 강록\n99년 10월경 IMF까지.\n\n정권 교체\n\n2000년 김대중 정권 김년제(충남기)\n'' 김대중 정권 받은내자'' - 못로씨. 구조조정. 80대 20의[사워합\n\n되짐 받상 다른 구죽가 에너의 정권이 비해 아주 뺨라진저 같다.\n사심 '잘하려' '지켜라' '가성하라' '빠드한다' 타드 /되짐 받상\n의 순으로 빼진제 가는데 어떤 사앙이 새손권 과 겸북\n된 관계로 아주 다닐해진것 같다.\n\n나중서 '타드' 까지 외칠 순 없다. 첫 정권 교체의 복단과\n'민주당'의 정정적 변화, 시민운동의 약지는 교려한다면\n웃사리 에기하지 못찬다. 물은 민중 생활 파단은 모른\n앙지마 그것은 전정권으로부터 연유되었고 IMF 극웅이 지상명제인\n현 정권의 어러움을 보다면 대충정과정에서 '그나마' 입은 같다.\n하지만 정권이 지배층의 상정인 판례를 분명한 우는 획와겠다.\n\n2000.5.1(미[불명확])", "summary": "1990년대 후반부터 2000년대 초 한국의 정치 상황 변화를 기록한 노트. 김영삼·김대중 정권의 교체, IMF 사태, 그리고 각 정권의 정책 변화에 대한 개인적 평가와 성찰을 담고 있다.", "tags": ["정치", "고민", "분석", "역사", "사회", "IMF", "정권교체"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "2000년_열린마음_p064.jpg", "processed_at": "2026-04-09T23:41:11.201862", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p064"}, {"date": null, "author": null, "content": "나도 학창시절 중요한가. 그럼 이제 (뭔가 [불명확]) 등어 내가 싸움하다도 제시...\n... 꼬리 맺혀있었는지 이건 왜 더하려 기억이 안 블로깅라다 6개깅라는 미기간!\n꼬러 로맥의 중재지 2 달마 덤침 좀은 \"매정하 이려 우씨 \"이라는주가라다.\n덤징도 싫.  런 나오이. 입정은 옷 자신없었어 땠광 거토! 쏘음이 쌍라다.\n멕 꼼량 챙로 좀 처여 듯여어라는 쯤여다 풀어라다.\n어떻게 서울 운하면 어저선 로로고 덤해 작다 (・・ 2[불명확] 꼬광 (!!)\n\n피 딩. Smooth & 미여 쓰는 껴더...\n1080쪽 는것자 아닌나? 그 featuring 탑 쌍\n(이것 [불명확]어어 아ㄴ4... 니란자지) 의 꼬라라는 꼬싯. 시민밴..\n신문 니다 닝이 ... 사정!\n\n- LEMONED -\n\n닷징 깻닷 미덕! LH 쌍웨멧 냐공가등?\n린 럭나가 쌍 니 묭격지⭕ 던 따라다!\n미텀 미텀 미텀 지!\n싸이 300기([불명확] 차져있지... 미텀 !!\n\n디텀. 쌍 중 닝머 떤징 [불명확]정 쓸래. 씰 중댈다 시던지삼\n중멓딩 싶결 멈였이 중 감겨(살더 ⚫ 주항 댐딩 시깨네.", "summary": "학창시절 추억과 감정을 중심으로 쓴 일상 노트. 여러 복잡한 생각들과 감정 변화를 기록하고 있으며, 'LEMONED'라는 표현이 특징적으로 나타남.", "tags": ["일상", "감정", "추억", "고민"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "2000년_열린마음_p065.jpg", "processed_at": "2026-04-09T23:41:26.650688", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p065"}, {"date": null, "author": "Ottama 팜미(?)로 보임", "content": "기대를 놓고 싶은 시작인데 기대를 깎게되는게 두렵다. 기대하지 않으면 할수록 깊어진다.\n\n6기대하지 않으면 실망하지 않지만 깊어짐\n6기대? 가 아니다.\n\n흐름이 여행같다.\n모둠이 좋았던 것 같아?\n모둠의 흐름에서 다른을이 사람을 가졌다.\n흐름이나 내가 변함을 할 대상은 그들이 아니었다.\n[불명확]\n다음을 다이션 잔잔하다\n\n깐깬 강 자체었 흐름 룩있었 그 시삶\n흐름이 모둠하는 룩았던 그 사람\n6물결과 창하 흐름이라는 룩에 와진된 그 시삶\n그 세 시삶의 깊임이 던, 나뭄을 뜨내지 있다.\n\n왜? 깐깬 세이가 0뭐든?\n정말 안타깝다.\n깊기들로 그렇지만\n흐름이의 깊임, 깐깬의 깊 밖음은 너무 어려운 것 같다.\n지심의 하여에 다한 깊재에서 싶더\n가이드되어에 다한 것 깊기...\n느리 흐락 피여음을 삐했된야 했은.\n\n또다시더 가속은\n찰깐게 하려 재준은 왔다.", "summary": "시작의 기대와 두려움, 그리고 변해가는 관계와 흐름에 대한 성찰. 자신과 주변 사람들의 변화 속에서 깊어지는 감정에 대해 고민하고 있다.", "tags": ["고민", "감정", "관계", "성찰"], "mood": "negative", "decade": "unknown", "image_quality": "fair", "filename": "2000년_열린마음_p066.jpg", "processed_at": "2026-04-09T23:41:36.372797", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p066"}, {"date": null, "author": null, "content": "열쇠 A. Smith는 단미 살아있는 것을 계획당 압더 증죽된 우리는 우리가 아니다 아니다 그로의 이기심 때문에 이야기았다. 그인 논쟁 저항했다. 왜솜은 폰 롭지 쏟 것\n\n다한 야 능력의 생상한 상죽 바를 못고 싶다.\n다정도 야 여정 생상한 못 잉고 싶다\n다정이요 야는 움직여 생상한 버스를 타고 한곳에 쓴\n다정것 누군가의 거절을 이 차서 왕지\n다정은 누군가의 코냥도 저를 자송을 못고 싶다.\n\n다한 소중으로 상마고 찮 것 다이고 못 다하이다마 아궁 아야기는\n생상 쌓곡의 뭘 듣는 것이 도 요정다.\n\n그 '눈의 결정', '눈의 확을 이야기하는 것에 (외나는 [불명확] 다는 수 깎자아)\n것 사람을 [불명확] ⊙ 다정 어떻게했는. 답강이 고져하지 여전 신앙 듣는\n\n사람 '질' 있곡을 사람과 '하' 것.\n\nㅇ\n\np.s. 야짱다 나빠 나쁜 젊앙 여한다.", "summary": "일상의 관계와 감정에 대한 고찰. 누군가와의 관계에서 느끼는 갈등과 외로움, 그리고 선택과 결정에 대한 개인적 생각을 기록한 페이지.", "tags": ["일상", "고민", "관계", "감정", "철학적사색"], "mood": "negative", "decade": "unknown", "image_quality": "fair", "filename": "2000년_열린마음_p067.jpg", "processed_at": "2026-04-09T23:41:45.291987", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p067"}, {"date": null, "author": null, "content": "기[따라] 다는 데다가 아니냐 기[따라곤] 살지 않다의\n그냥옛이.\n\n[여러 줄의 취소선으로 덮인 텍스트 - 불명확]\n\n무러고 소극다가 다지겠네기었다.\n여기이라니. • 그저께의 '정경들을 열데든것'\n'사랑과와 중거운돗의 '이라는 그런돗이 생각 나다 정경들의\n왜나 구 것처되면다.. 무러고 막 쏟다가 자문\n\n내자신[불명확] 을 [취소선으로 덮인 텍스트] 미안하며야 봤지\n그저지 맞아야봤지 보못겠다. 내가그려이있 맺\n한 자장이 있을가는 샘강에 다자겠네였다.\n(소소 경장서을 곡도지 못정다. 낭정쉬 아나세\n가[불명확] [점]. 닉 이렇 멈춘 자적을 같등가 인은 식의..\n정자적은 사공강 속 있다는 깏과 정자적인\n한품을 화다 겠자는 틀리다 나는 옥성\n정자적은 사공강 속 있는 인강) 되어야했고?\n강다. 사강했눈데, 그자지 여리해정 구석을 없는 것\n같\n가는, 틈버찬 느껴를 많다. [취소선]\n[불명확] 가정지정은 사곤학고, 목 않이", "summary": "개인적인 고민과 감정적 혼란을 표현한 자유로운 일상 기록. 자신의 모순된 행동과 심리 상태에 대한 자문과 성찰.", "tags": ["고민", "자기반성", "감정", "일상"], "mood": "negative", "decade": "unknown", "im 했으면 하는 것이다.\n\n[불명확] 운행법규로 주민·공유된 집집 규제는 어는 정도까지는 가능하다고 봉다 정지법까는 헌법상 국민을 보호하고 '과법' (過法)한 한 시위를 최대한 보장하고 직법한 질의 또는 시위를 최한 보장하고 직법한 질의 또는 시위로부터 국민을 보호하고·\"과고 \"과정함으로써 국민보호도 함께 배려하고 있다. 또 5조 28조은 \"집단적인 폭행 \"침해·손괴·방화 등 공공의 안녕질서에 직경협인 위협을 가할 땐에한 정의 또는 시위\"인 경우 이를 금지토록 하고 있다. 그럼에도 군이 명문규정을 둔다면 그것은 법해석을 둘러싼 시대를 없에고 홈어의 근거를 명백하게 하는 데 의미가 있을 것이다.\n다법 규제는 도심에 그것도 해야 한다. 일률적 또는 획일적인 집회·시위 제한은 현법이 명시하고 있는 '집회 및 시위의 권리보장' 정신에도 어긋남. 지나주 말 위협법을 마구 던지면 도심 처험 최근 그런 전령을 지나 단체나 조직과 그 규모로 보아 적이도 교정장에를 우발할 가능성이 큰 집회 등에 적용하면 큰 누리가 없을 것이다. 경찰의 법법시위 전단방법도 '무차별' 한 의형 게 어나라 '과정'에는 단호하게 대응하고 일별법계로써 불법시위에는 다시 불어악이 따른다는 인식을 심어줄 필요도 있다.\n\n육식에 있는 서린과 목재서 역사자.", "summary": "도심 시위의 규제 필요성에 대한 언론 기사 스크랩. 법적·사회적 관점에서 시위와 국민의 권리 보호 사이의 균형을 논의하는 내용.", "tags": ["사회", "정치", "법률", "시위", "도심"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "2000년_열린마음_p076.jpg", "processed_at": "2026-04-09T23:43:22.759204", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p076"}, {"date": null, "author": null, "content": "'미녀와 스포츠카'... 자동 상거래는 지점에 여자의 정신과 자를 다니는 것같다. 자동차에는 과도 여성 운전자긴...? 난 좋 앉는 없다. 인테리어에서 위치면 이여하는 도중은 - 여성, 심체의 상태적 기준을 장중하고 부작시키는 같은 목적인가? '소선형'을 지적하의미에서 '심리'로 굳혀진은 잊도, 또 여기 '거점인식' 하이 처상성치는. 자가오닌스 집싣화. 이런 문등등, 4여써 우선 떠옥 언장하려 자는 때 어떠가, 훼어즉 먼 기보. '상저몰법'에 대한 부적 (공식적은 비공식이든, 여여 미마법 저 것이는 '융련다즈' 의 기능! 자수함머 한다. '당열종'에 고르는 것이 어쩐 고려한 가정). '바스콘야' 는 또 무찌입가.", "summary": "자동차와 여성, 인테리어와 운전자의 관계에 대한 사회적 관찰과 고민. 고정관념과 실제의 괴리에 대해 깊이 있게 사유하는 내용.", "tags": ["고민", "사회", "일상", "페미니즘"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "2000년_열린마음_p077.jpg", "processed_at": "2026-04-09T23:43:31.708396", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p077"}, {"date": "2000-05-04", "author": null, "content": "오전에도 공부했고, 새벽도 했는데, 너무 하고싶고, 또 안되겠으로 아플뿐. 아쉽겠지 우린 아픔\n너무에서 사랑하던데? 일처저 우리는 그 정 훔고, 또는 익숨하자야? 사랑인가? 이경은\n아 '중심있음' 옛인 움직도 어산겨지. '중심있음'에 따른 운동이야 우리사회의 궁극 소속\n에 관종 된 속 하여라 찾찾중 여우어서흘은. 찾지간 바는 너무본 사랑들  "decade": "1990s", "image_quality": "fair", "filename": "2000년_열린마음_p083.jpg", "processed_at": "2026-04-09T23:44:29.740190", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p083"}, {"date": "2000-05-21(일)", "author": null, "content": "여름 찬 초운 낮씨다\n적당히 쪼리기도 했고 쌩깽환국하기도 하고\n나으신 나다나거 중은 선선한 바람몬는 여간 으흔놈이 좋다.\n그래에 흰기 - 아야은 뻔이나지 묵해 그련가 창출 하느는귀영이\n쇼판난게 이려 중은시가 았다. 특히 손이 명치는(그러바야 오더지면)\n이라은 있은 지라며 그 혓싱장은 더하지// 다나다 받인경\n어제 저녀 애기였고 곡몬과 대청소에 비싸지 았다더으 뭐인\n웨이의 지저블찾가?\n아 치원은 좋은나까 죽 어저깽하나 무견은 착쁨을 두지만\n앞여 어떻까? 깐.라면 과자 앞배 + 북싸을 잣으면 관찬하면\n궤창은 못 찾데 받이야. 어?\n\n'싣으라' 어다... 음... 어즈 올놓해.. 홍아...\n수만거지 커의도, 왼정섯 같비 깅은 쩐을올시은 다 홉지\n자으믄 혹분 몬과 옭이 아싱거려 찬, 커피 파로체.\n어가주, 부관자 깟은 깔도 홍치. 핫데이? OK!\n둡은 보호 못찬 포양스 이데러 곡돌 오리은 맞이/짓자?\n카도 드히? 중멀에 가는깃을 관찬고 국서험 포데씨출 홍...\n아! 다 벗져.\n\n[불명확] 인사등 '저러산'에도 가고 싶은건\n다다았 극댓 인을싹거 않으미. \n좋은 롯 했으면 '방'는 알러쓰시게나.\n\n대용제다\n여령영때평 대용지가 아니란 맞이다.\n그 거긍을 하고 잉여들 하고 밀킹쓰인은 스러심, 앙뭉은 하지똑길", "summary": "여름날씨에 대한 감상과 일상의 소소한 순간들, 그리고 다양한 일들에 대한 생각을 담은 일기. 친구들과의 만남, 외출 계획 등 청춘의 일상적인 고민과 즐거움이 묻어난다.", "tags": ["일상", "여름", "감성", "일기"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "2000년_열린마음_p084.jpg", "processed_at": "2026-04-09T23:44:44.944514", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p084"}, {"date": null, "author": null, "content": "정말 처음 거들먼 온 반갑...아 ~ 노 왔 창찬? 거창이 묵묵 에기 먹이 우하네 깝과 이저\n\n머싱이 최 버 음저 ~ 귀답하지 심증, 며 싱이 칠 쌍 롱 지, 깊깊원 서어 걸다.\n\n밤중 서감 반공한 영향 이른은 저성항했, 묻? ~ 몸 비어들은 하는 지 \n\n알심 앜음 찮 고로 정계한, 00 이혹은 여 영도 웃 원운은 파이너 삐이흐나? 깊으 자즁 송하야끼\n\n다긍 다짐최에서 잣신 아은 기봉지닟치는 좋자야, 새먼 긋은 00 사어어 아동아지 청응 하는 기\n\n누 귀중하자 [중요] 1강은 며해적다.\n\n사롱 강저다 의더 달혼 다를 돈하아는 낫젱이았에 늑 있 깻어 deprssed 항?? 와짐\n\n정 사논저서[1] 영닥 묻은 방심는 롭 best friendy 야는 깊앙 운중울궁 바 댓은어서\n\n돈금 였다. 중정 인읍 영여... 지싶 내여 바은 서성지야 에서 '깊곤장을 와 [중요] 최스\n\n돈걸젯도+ 응겡겻온 먼정다.. 상정에 막은 살까?\n\n~ 이 장담더 이야기 하 것\n\n을 영씨다 넓 인은 몸... ?\n\n무근치서: 명칭 아공을 싶은 긴 보 닷은 사기삐 몯응 봄머서 골.\n\n지자 반음 은즉 긿정서 이너갸아? 지은 인은찰 촉 치용울니다!\n\n2. 중정은 강점 리시릎 ~~ ^^", "summary": "작성자가 일상의 고민과 감정을 기록  닦장 놀이다 싶정합니다\n문구에 성심하다. 그렇고 앗어서 깜깜 수드 없다....\n\n홍숑 묻혹여도 더서우 굿덩 이삼서는 어기꼬\n콘스하다.\n\n나 삼장 굿덩에 띵정되서는 사칠도 없는...\n그럼 나 굿덩 덜싱여다 궁묵해따 하나?\n\n네두 여전히 문헹하늑기 추어여도되 ... 추~\n\n침는 촬 있어 있어서 뭐스겨 떼포는 ...\n\n조허하구 앗는여 봉삼다 있나는다 솬포 → 악꺼나응기저 싱공\n솬포다.\n\n- David -\n\nDavid 님 대하여여 너믹 지지 나다다.\n꼬더 수강를 넘느 야나?\n", "summary": "David이 남긴 감정적인 일상 기록으로, 혼란스러운 생각과 고민을 담고 있으며, 다른 사람에게 메시지를 남기고 있습니다.", "tags": ["일상", "고민", "감정"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "2000년_열린마음_p107.jpg", "processed_at": "2026-04-09T23:48:57.686325", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p107"}, {"date": "5/19", "author": null, "content": "##\n\n5/19 추.\n\n싸워가 싫은 생각부터가 싫은 눈물이 떨어져 되돌아가.\n여름은 곱손가 존아하는 계절 같았네...\n날은 쉽게 다 되었을 괜찮아...\n\n건 쌔워, 란 싸워가 태 이혜나?\n반하면서 반들어, 거해어 덜잡혀.\n달... 숨이 쉬었장.\n\n또은 이는 우상 CBS FM 벨플에 가겠..\n제방 비면 의 맛조..\n\n맘똥의 무섯 이장을 느낀다.\nDJ와 한 것들 찾 받되고...\n이겨왔던 서껴쨌나- 싱여겼나-\n이 좋 본 서쌤도나 등는솜 여혀져었 팍스\n\n밥 뭐! ___갈똥__ (X^^X) ___\n\n그꼼 외 과써 ---\n\n'2어든 거긴의 용자였다\n8어년, 다녀왔고, 머응은 샤삭혔다\n\n잔건작을 되어 ---\n\n곧네 그 선기물 과독쨀에 발서 아콘. 그 된에 숨길을 어우지겠다\n아당은 느갈음 파도달었나. 여량을. 그 숨취 약츠을 댈동했다. 이동의 거상용은 널했다.\n\n기니정과 -누겨하는 갈써용 꼬롱무도 다완중요. 여격길 중숨청 싱왕했다\n\n여곤 종상되겠와문...\n\n여룬은 괴인하는 옥치너어!!. 너활츠. 여. 나는 벤민. 논 팎에", "summary": "5월 19일의 감정적 기록으로, 싸움과 이별 같은 힘든 감정을 다루고 있으며, 음악 방송 청취와 일상의 순간들을 기록한 개인적인 일기 형태의 글이다.", "tags": ["일상", "감정", "연애", "음악", "고민"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "2000년_열린마음_p108.jpg", "processed_at": "2026-04-09T23:49:09.701695", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p108"}, {"date": null, "author": null, "content": "{\n  \"date\": null,\n  \"author\": null,\n  \"content\": \"따떨 쏘 자읍 쏘리 삶은은 ...\\n\\n무언가는 아프다.\\n\\n2어디쯤에 앗는쯤데 ...\\n\\n어저 창시 닫고 도 도 시러울게 선교 싶은 시야도다. 따싱도니 ...\\n\\n싸, 과도자가 싸 어떤다 —\\n\\n앞\\n\\n나여전 사정화 믿음이 묻움 가본다.\\n\\n나도 . 잔다와 잔다다.\\n동현.\\n\\n멈 넘자치다. 여우채를 그가 낭 신창하나 반다. ....\\n\\n또 가찻다. 이처 고ㅁ-오는 .. 우오. 도다자치가\\n\\n통그러 ... 나즐구 과문 맺문 ...\\n\\n쌍자다는 궁자유야다 . 거싸 ...\\n\\n욜음을 토막인지 가댄 ... 종머문 욜음을 토막인지 ...\\n\\n가하다 ... 격잘 \\'report 중 못 남다...\\n\\nㅁ3자다 ... 구중 싸다가 까욜 자자자다.\\n\\n중다예 차댕 영긴 ... 낭 비청 비앗다.\\n\\n욜은 중짓든 중자정화 있다. 어똘이 맞이 앗아깔도로다... 걸이 옇 점죠.\\n\\n과영속도 서저 무여 저자 인영비 다타고\\n\\n거매를 보까도 거삭 (?) 이 나야족응 있다...\\n\\n음... 나도 나야족게 서여족가다 ...\\n\\n도가 족 가자네다지... \\n- LEMONed -\\n\\n[서명]\\n\\n있다.어떻다 ... 내 게 있의 서여...\\n\\n우젱는 지여아... 검삼죽\",\n  \"summary\": \"개인적인 감정과 고민을 솔직하게 표현한 일상 기록. 복잡한 마음의 상태와 내적 갈등을 담고 있으며, 'LEMONed'라는 표현으로 마무리됨.\",\n  \"tags\": [\"일상\", \"고민\", \"감정\", \"개인 일기\"],\n  \"mood\": \"negative\",\n  \"decade\": \"unknown\",\n  \"image_quality\": \"fair\"\n}", "summary": "파싱 오류 - 원문 보존", "tags": ["파싱오류"], "mood": "neutral", "decade": "unknown", "image_quality": "unknown", "filename": "2000년_열린마음_p109.jpg", "processed_at": "2026-04-09T23:49:21.158383", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p109"}, {"date": null, "author": "Kiney", "content": "랩하고 랩하고\n○\n이라며 깨달았 선택 강도라고했다.\n다미 싶기만한... 영어 빠져왔다.\n느낌은 없지 놀았다...\n\nPsychedelic Violence Crime Of Visual Shock?\n\n래혼감이 쓸지 받는지 봤네. 내가봐서 왜 내욕은 풀. 가봤네\n손은 잘 지질을 기지? 축제기래 뭐야을 가져갈지 쫓아 이렇다 하네 여\n여여 쯧어떻은 재광하나? 좋은걸 있어? 가뭄을 잘 안, 다디활아악\n한 구물이 잘 왔는가? (ㅇ). 못도 나 중심이 시정한\n지설더왐 (ㅇ)중 남)더 중시를 못 죽은가? 잘 몬 !/\n지) 몬이 (ㅇ) V뜨시 쌤!! \n\n[원형 그림 2개 - 왼쪽은 비어있고, 오른쪽은 \"로디\" 표시와 선 드로잉]\n\n○ - 기년 짧침해.\n미럼 미럼 다미럼.\n저살 미럼. 미럼 중침여.\n정정. 깜깜 깜했자.\n\nKiney.", "summary": "심리 상태와 고민이 복잡하게 섞여있는 개인적 노트로, 감정 표현과 함께 추상적 그림이 포함되어 있습니다. 불안정한 감정 상태와 자기 성찰이 드러나는 일상 기록입니다.", "tags": ["고민", "자기성찰", "감정표현", "추상적사고"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "2000년_열린마음_p110.jpg", "processed_at": "2026-04-09T23:49:33.214897", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p110"}, {"date": null, "author": null, "content": "평온한 것은? 비평에 대한 비판, 입장에 대한 입장 [meta 겹임]\n태도를. 충돌에 대한 관용한 건부방증이나, 입장의 수평적,\n정, 관점들, 거리와 닫는 [불명확]\n나얀과 선택, 도 아니다, 선택이 아니라, 실화와 이메를거기에\n대해서 의심하고, 타자중심, 의원에서 비약을 슬 있게 되는 것.\n\n왜[불명확]에서는 왜? 창원[불명확]과 [불명확] ⊕\n\n창정에 타아 항 것은, 이건 것은일 거다. 다시 한번 찿죽해야\n거마고 다짓!\n\n아 어쨌든 열린마음 묻다\n애 곡지 않 되는 것?.\n\n이쨰도 닫혀대는 것이 없은 ㅁ다. 다만, 이시대의\n닫음이자는 것이 거대새에 되한 실폐이 아니라\n거대새에 대한 되괴 의심, 해체, 일생의 태도라는 것.\n그것이 과도적인 태도라는 느낌 자송 죽다 해도,\n의 이러한 해게약등은 생각하고 탐색하려는\n내것의 끝에 라면 무엇이 있죠 놀와더라고\n해도, 그 마혼과 봉아간 지금 수 있다 해도, ,,,,,\n[불명확]의 전 그런 생강응이 가자 놓미찿하고?\n특르하? 것은 나가 '이 시대'에 살고 있어서 비간손? 빅.\n인까. 아, 이쨰도 곳무하기민 나주 해, ⇨ ⊕;;\n미로속을 저대료 ⊕로며서 아닉게는 좋 는\n다했가, 나게를 있지않고 대미미는", "summary": "평온함과 비판, 입장에 대한 고민을 담은 철학적 성찰. 닫혀있음과 열린마음, 그리고 현시대에 살면서 마주하는 실존적 질문들에 대해 자문하고 있다.", "tags": ["고민", "철학", "성찰", "일상", "시대정신"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "2000년_열린마음_p111.jpg", "processed_at": "2026-04-09T23:49:46.587586", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p111"}, {"date": null, "author": null, "content": "Love of My Life\nYou hurt me\nYou broken my heart\nNow you leave me\nLove of My Life\nCan't you see\nbring it back bring it back\nDon't take it away from me\nBecause you don't know\nWhat it means Love", "summary": "영어로 작성된 사랑과 이별에 관한 감정 표현. 상대방이 자신을 떠났고 마음이 아픈 상황을 절절하게 묘사하고 있다.", "tags": ["연애", "이별", "감정", "고민"], "mood": "negative", "decade": "unknown", "image_quality": "good", "filename": "2000년_열린마음_p113.jpg", "processed_at": "2026-04-09T23:49:49.461737", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p113"}, {"date": null, "author": null, "content": "사랑은 [불명확] 약, 역사는 우리, 인생마다 소리... 자석잌 스데자는 하네석 꿈을 잃어.\n미쳤구내은 내 영혼을 하넘겠어... ★ 한 자주 롱자짜... 중열 게 짓혔 딩어자았다.\n★ 달을들... 딩좋은 맘혼 여자에 달혼따짜 놔 깼있는\n도론 사자정을 조각 이혼보이 (스혼진다!!)\n\nMarx보다 악취여좀 미지 있능다거나\nHegel보다 Marx을 떠저 있능다거나\n문제에 대한 내 생각이 몸 어느정도 깊충하지지 정여\n충지는 → 여자들 있능다거면 확식의 우자였죠.\n\n개료서 (문 Marxism 이라거나 구조력 등... )\n없은 것도 충분한가를? 사자 어떻 '이것은야살톱데\n이것 저것에 대한 [불명확] 이야기이냐가 저조를\n\n⊕ 깔깡이 있음 수 있는 말을 있어야 했다! 그런 생각을\nKRㅂㅂㅂㅂㅂㅂ 여러분 문화인것 것이 하는.\n개료서 있느 것을 됨하기는 하고, 로는엽여, 우려\n떠영떠명 떳혼석 않을 는 것을 개료서 착실이)\n있능게 나오건가. 아나면 시간이 좀 걸려도 된서\n위죽로 있능거! 나용가. Vkey\n\n시작하면 데카로 살다 충실히 물는 몸\n하는게 14", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p118"}, {"date": null, "author": null, "content": "Jeannie's diary\n\nHow does her world spin\nWithout me in her nest?\nCould there really be\nsuch happiness?\nOh, she's got a dark side,too\neven murderous\nBut I love that just like her\nI don't have a chance at\nwriting the book,\nI just wanna be a page\nin Jeannie's diary\none single page in Jeannie's diary.\n\n(AB#4 !)\n\nShe could have anything she wanted,\nso why not me?\nShe could have anything she dreamed.\nSo why not me?\n\none single page\none single page\nin Jeannie's diary.", "summary": "작성자가 'Jeannie'라는 사람에 대한 그리움과 집착을 표현한 글입니다. 책의 한 페이지가 되고 싶다는 소망과 Jeannie의 어두운 면도 사랑한다는 감정을 반복적으로 드러냅니다.", "tags": ["연애", "그리움", "집착", "감정", "일상"], "mood": "negative", "decade": "1990s", "image_quality": "good", "filename": "2000년_열린마음_p119.jpg", "processed_at": "2026-04-09T23:50:57.847797", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p119"}, {"date": null, "author": "정정주", "content": "정정주 마지막 파티\n파는 -2.2의 지년 세운산 신코파스 를 쏘고 에마을 파리고풀 마음에 '최이바 '를 쏘여 잘은 제 기기은 나찼다. 진나게 잘곡은 하고 돈 피 꽃을 처내은 찰라, 요진환 빠더(-곡찬자) 소거가 를벙지, 누가 사고 뺐나 하고 포지 빼더 나는 를다. 아 끗이 나인가? '다고라 4050 전실 뒤셔도 ' 배가 무는 잘꼿은 왜 처여바 안쌌다. 잔낭게 전셩(거창잔) 가 스하고 처셔 섯더다 그락쉬 짜리 하여바 피 칸은 빌근은 빌 하드 기턴트 있어셔 기깡 트찌기로(도주) 뺐다. bike를 타는 싸네 것인중 은 biker와 장세가 시간짜고 시뻔 그게 biker 나고 진장은 눈 기턴도 있고 해서 멀잇거(?). 도떻더 왜 칭화 숨의 각 그로도 바자 간은 이들은 훼처위 거찰을 파로리셔 놈던가! 훼처위 족민간 진처 신실 여을 놀여 처는 보니 아직도 파과롬 있씀다. 한고로 난 신스뻘빠지 키버 도떻는더 거찰 도 차를 잘 못앚다. 안도됴다 실이 신도로 진구해셔 도타샤자 그뻐 이 뺐자가 족깊신 칠병아지 하던셔 큰낭하는 깊이다. 더 왕간 나는 어진 칠과 그린 하다가 칠설으 윤 파는 깼아 또 파는 뺑차가 나를 봐 싣다. 그 족간 회단노도 신고가 바쪼썽 쎄신들이 워 여겨다. 차셔서 빠신 거안등이 나를 한다며 사간 영와 먼은 되셔 종라 우사치쳤다. 라 족 팰셔서 나는 왜 완친길까? 나것 우천데 우층했다. 더국 영아 체셔 간 누도 은 장 토께다겟. 다름은 나의 뷔빼다.\n도로공 중볍 (즈·11즈·54즈 쉐 택, 걸찬와 깅이 우구 쉬기 몽 공우런갈 빌례 철찬 그 뺑 /1(쌈의 여찬잔지 1계 쳐낫다. 빌공 안해너 즉항로인곡 한댄다. 쉐처칭 넜 힘동 체씨로 나는 장은 한국 거찰-뉴육시거 못셔 4기. -여처은 경찰이 저하던 시킬시도 완되도 깔찰다 찰다노 -빌공 페지 과먼판 먹은 우찰 낫자 - 원유", "summary": "정정주가 마지막 파티에 대한 경험 문정이 보인다.\n\n그래, 촉촉 눈는가미 맞삼짐 '어제까지 그도록 착은 몰했이\n켈려 댑어저 있을 테네? 태이나는 그 숨는터 딸항여\n서기 워해 열마다 맞은 댑어짐이 있었는가?\n\n미스코리터 데회가 있었다 공문료게 나바 젯은 여자가 져, 아빠가\n젯은 여자가 공도두, 열마다 젯은 여자가 선이 되 버렸다. 어저다 보니\n우리가종이 쎄세이 젯는 가지판에 걷었는지\n다항승령 따봉이다.\n\n• 홀넘심 · 농항 다따론 문도을 창질했다. 짝잔짝!\n(2000·5·29(목) 기ㄷ)\n\nP.S: 다 장호해도 깟봉이나 PT방에 닫베꽃을 나른 것 못했다\n재환은이 안묵 빠더려 득허, 못이 놀이있는 상데에서\n버리고 안짐은 것 뭐가? 더 쎄기 싱온다.", "summary": "작성자가 여름 방학 시간과 학과 친구들과의 관계, 그리고 개인적인 고민을 기록한 일상 노트. 누군가와의 관계 변화와 놓친 기회에 대한 반성의 모습이 드러난다.", "tags": ["일상", "고민", "우정", "시간", "추억"], "mood": "negative", "decade": "2000s", "image_quality": "fair", "filename": "2000년_열린마음_p128.jpg", "processed_at": "2026-04-09T23:52:07.341859", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p128"}, {"date": null, "author": null, "content": "DRUNKEN TIGER\nTIGER J.K\nD.J shout\nshine\n\notzh Drunken tiger?!\n\n볼거리는 너무 많이!!...\n그럼에다--\n\n이상하게, 숨을숨치(?)해야 때\n카카카\n\n[빨간색 필기: 여러 줄의 손글씨로 읽기 어려운 낙서]", "summary": "드렁큰타이거 래퍼들(타이거 J.K, D.J 등)에 대한 언급과 함께 일상의 감정과 생각을 기록한 노트. 하단에 빨간색 펜으로 낙서되어 있다.", "tags": ["음악", "힙합", "일상", "낙서"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "2000년_열린마음_p129.jpg", "processed_at": "2026-04-09T23:52:11.285349", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p129"}, {"date": null, "author": "통현", "content": "2004년 5월 30일 내가 너는 35살이다. 곧 마지막 여기다. 도담 응매석1 있었다. 여기 서울 숲 명확한 다 생각 나간. 근데 여기과 흠머한 꺼 있으메서 중 헛도왔다. 맞 는되 싶었나? 응맏마에서 물러갔다. 허드르리 어디갔나 못르깨다. 찾아가갔다. Re. 자기나다. 근데 이런마는 여젯 어떨게 되는 지 못깨감 < ? 이못 여젯 가벽잖다. 까 까 까 카. 고미봉 danny. 8시 20분이다. 10북 천에 도착하면서. 능없다고 생강하려 죽사리 먹는 가는에 듣어 놀러. 거뭍형 밤에 여윤다.좋 홀객 좋겼다. 이거 모든 깊이 사상 있됴 요기다. 중서석인데가 - 나석중을 대가 상다방 족봐에거 준등은 반든 짚이 그사가 진챤 울이한 다. 쩜쩨. 통현", "summary": "2004년 5월 30일에 작성된 일상 기록으로, 작성자가 여러 장소를 다니며 겪은 경험과 감정을 기록하고 있습니다. 다양한 상황에서의 느낌과 고민이 담긴 개인적인 메모입니다.", "tags": ["일상", "2004년", "개인기록"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "2000년_열린마음_p130.jpg", "processed_at": "2026-04-09T23:52:20.015 n'그것'은 정말 삼고무\n그러한 이여을 깊이인다.\n\n'주체냑' 이! '삼돈강' 띤 '채념약' 으\n울려하는 떠는 우해하는 떠어가저 있을까?\n\n(마마3)\n\n글이걸에가응을지 못친다...\n\n서마이! 나는그것 아나데! 어제 하다(나!)\n서거을 때쌍이야? 뭘머지다. 되머충다!티\n나 서벗 다시에 깎다야하...ㅂ옛 ~ 높결 ~\n이상난... 채상에! 그것!! 반그려더다 아~ 마어!\n가독섬여서! 사이나! 자정... 심.\n아... 전강 여요가 여우나\n나는 데이을 미결 여요가려는 심으..\n\"나\" 인누네! 자재가가 여요가타 있는처 ○", "summary": "작성자가 어떤 것에 대한 깊은 생각과 감정을 드러내고 있으며, 자신의 내면을 성찰하는 내용으로 보입니다. 마음의 정성과 도움, 그리고 어떤 대상에 대한 고민이 드러나 있습니다.", "tags": ["고민", "성찰", "감정", "일상"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "2000년_열린마음_p159.jpg", "processed_at": "2026-04-09T23:56:21.716173", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p159"}, {"date": null, "author": "K/ney", "content": "오늘이 따깡하다!!\n귀한풀 닷네!! 지선어라고 했는데 [불명확]\n오늘도 귀장이.. 고은 어떻게 꿈이다...\n여접이 쿨쿨이.. 박현머릭 ~\n뭔이야... 메청쳐멍밍응 [불명확]\n\n[낙서]\n\n누매가 깊이는 삶 숨 있음은 거야\n그 느껭이 깊이는 삶 숨 있음은 거야\n\n그냥 그런 생각이 듦이.\n\nXney\n\n[낙서]\n\nTeenage Fanclub은\nBandwagonesque ONA Guiding Star를\n뭔아.., 댈떼떼 GrandPrix 애타떼떼\n\nI don't need a guiding star in the dark란 했이.\n\n나는 Guiding Star 같은 거쁨이.\n내 인생이 복풍 내 기을 있즐욕축는 꼬이\n아니라, 거우아 내 [불명확] 인정했욱은.\n나짖 거려", "summary": "Teenage Fanclub의 음악과 가사에 대한 생각, 특히 '나는 길잡이 별 같은 존재가 되고 싶다'는 주제로 자신의 인생 철학에 대해 일상적으로 기록한 내용.", "tags": ["일상", "음악", "고민", "인생철학", "가사해석"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "2000년_열린마음_p160.jpg", "processed_at": "2026-04-09T23:56:29.228021", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p160"}, {"date": null, "author": null, "content": "4-4 폐과 오디션\n\n너를헌구 미쳤어 꼬랑하다. 강추 야구...\n꼬랑하구 아니 어서삼와드 꼬정중\n백야 나자 긱 강신 종려네\n미쳤을 잉다.\n꼬꼬좋 콜 너어야하다.\n줄곡죽하야 뭔 보아중 얍고.\n\n강찰... 전점값이 꼬꼬꾸라마다\n다나 사람중에 넣어꼬다\n\nLITTLE 씨월[불명확]\n새로 [불명확]\n꼭 ㄱ은 [불명확]\n→ 인나꾸다 ㅠㅠ!\n\n강짜 동살에 나은 도 17똑애\n요은즈 서어지야둥 나은 = 22억.\n하각 즈네 2000애. 백깐 2000애 은→ 빡짝 10000은\n흥어...\n\n5000 X 22 = 15000 = 95000애.\n.. 2900000 야것 많은온 서롱되... \n\n시공기가예는 계산에 시름에 보여 각이꼬되야해.\n서롱됨에게 얘 도을 미럽에 꼭내어 !!!\n\nRe: 똘디 좋아게 뭐은 같거에 싼겟.\n싸려고 없음? - 니가좋 아 이중좋 중\n요를 왔엄. →꼭엘 떠아았엄,\n미-어 여엠 줏물 은 엄 사엄\n좋2엉 매내 ^ 2,", "summary": "4-4 폐과 오디션에 관한 기록으로, 경제적 계산 및 고민 사항들을 담고 있는 노트 페이지. 금액 계산과 함께 뭔가 중요한 결정이나 문제에 대해 고민하고 있는 모습이 보입니다.", "tags": ["고민", "일상", "계산", "결정"], "mood": "negative", "decade": "2000s", "image_quality": "fair", "filename": "2000년_열린마음_p161.jpg", "processed_at": "2026-04-09T23:56:42.676948", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p161"}, {"date": null, "author": null, "content": "상단 필기: 다양한 음식 관련 단어들 (김밥, 우동, 카레라이스 등)\n\n주요 내용:\n01:59여 거리에서 한끼 먹음. 치킨 텐더 진짜 맛있었음. 나중에 또 먹어야겠다.\n\n여름 공고는 거들어서 여름 와서 준비를 또 어딨어. 묵묵하게 먹자.\n묵묵이 아니면 새대에 딴 개다. 아마도 내 마음 기쁘다고 여겨진다. \n근데 금액도에 [불명확] 일도 돌아 밀고 있는데.\n\n✎ 자일쁨 도는*\n자기 누가 비를거 새어졌고 도읍 어쩌 도읍 어쩌려고 도읍 어...도읍 기쁘다.\n\n1. 자피에 비를로 도읍 도다로 어쩌내 어쩌 도읍 어쩌려고 도읍 도씨도.\n2. 빠읍 같다도 어쓰 자피에 년 머별에 접합도는 로도도.\n3. 빠에 2-3도는 접금 접헬든 [불명확]고 머씨도 도도도.\n4. 자씨쁠에 자리쁨 뫼라도 (자리에 먼다 닝한도 도도도)\n   왕도 먹읍도 싸2대 서읍도 어간 싸댄다.\n5. 아내에 먹다도 [불명확].\n\n㈔ 황한 거는 황해에 싼데 강압때 여당 뭘어 외처하 —!!\n\n[하단에 3D 입체 드로잉 있음]", "summary": "일상적인 식사 경험과 감정을 기록한 페이지. 음식 메뉴와 먹은 경험, 그리고 마음의 상태를 다양한 방식으로 표현하고 있으며, 번호가 매겨진 목록 형식의 내용 포함.", "tags": ["일상", "음식", "감정", "일상기록"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "2000년_열린마음_p162.jpg", "processed_at": "2026-04-09T23:56:51.676128", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p162"}, {"date": null, "author": null, "content": "Peace snack.\nI'll ease my mind.\nI'll ease my mind.\n[불명확] and to\n\nOut of control,\nI can't remember happy things.\n\nI'll ease my mind.\n\nAliquity\n묶음 시간 잘 써요...\n\n넌 괜찮 기쁨과 새미 Repent 싶습했던.\nGood! 이갔던.\n아쁜이, 괜찮과 여유는 곱슬꿨어\nTerm paper 반 싶습했던\n책자간 잘 나옵니다.\n괜찮 또 싶습니닭", "summary": "작성자가 마음을 편하게 가지려 노력하고 있으며, 통제 불능의 상황에서 좋은 기억을 떠올리기 어려워하고 있습니다. 과제와 일상에서의 불안감을 표현하고 있습니다.", "tags": ["고민", "감정", "일상", "과제"], "mood": "negative", "decade": "unknown", "image_quality": "fair", "filename": "2000년_열린마음_p163.jpg", "processed_at": "2026-04-09T23:56:56.748542", "volume "year": 2000, "page_label": "p167"}, {"date": null, "author": null, "content": "Mayonnaise 좋아. 💛 정학 싶네\n돌아도 또 좋아.\n\nSmashing Pumpkins 2열0)\n우짜 좋아이가떠데 그럼떠면\n\n우짜 상 공연장 붕 우짜\n이게야겠다.\n\n응심정의 문바 맞대로\n\"Smashing Pumpkins 짜짝짝하다\n어째 맥백 더 언 사도 되너까\n\n도 궁궁겠지만 10억이 있어도\n궁영을 못 볼다니 아서운데\"\n\n얼뜬버... 블숨 있다도데\n안강수 얼짓아.", "summary": "마요네즈를 좋아하며 반복되는 감정을 표현하고, Smashing Pumpkins이라는 음악 그룹에 대한 감정을 담은 일상 기록입니다. 콘서트를 보고 싶은 마음이 반영되어 있습니다.", "tags": ["음악", "일상", "감정", "콘서트"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "2000년_열린마음_p169.jpg", "processed_at": "2026-04-09T23:57:22.273772", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p169"}, {"date": null, "author": null, "content": "7년 뒤 돌아올 넋살 ~ !\n\n이제 잔 좋은 것들이 삶깟 !\n\n□완버린 잔 사녀? (미)\n\n이제 cafe에는 당신 + 시험 맞춤 예니 못쓴다\n왜냐면 엄마가 중중 와기 때문이다.\n\n어제는 생강 나왔니 'WORST of wrists'는\n장돼역 + 그건 봤다. 건강중 거러옿다...\n못웃워서는 시험이다! 빠의 끝나자채앗.\n구데 끝나면 시험도 저야했는\nrepetts 나따윗다. 이쌰.\n꼭 넣려머네.\n\n장 시너고.\n그냥, 우거배바 같아.\n그냥 상아면.\n\n숩디면 못우가 쌀 거고\n다따디면 못우가 아픈 것더\n꼭 싶 때도, 눈 쌈에 울은 작은 병시에서\n올려지. 이 도시에도 옹 것이 없더로\n그것의 땀대로.", "summary": "학생의 일상적인 고민과 감정을 담은 수필 형태의 글. 7년 뒤를 돌아보며 지난 시간과 현재의 상황, 그리고 미래에 대한 불확실한 감정을 표현하고 있다.", "tags": ["일상", "고민", "감정", "시험", "학생"], "mood": "negative", "decade": "2000s", "image_quality": "fair", "filename": "2000년_열린마음_p170.jpg", "processed_at": "2026-04-09T23:57:30.723123", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p170"}, {"date": null, "author": "Kney", "content": "또 미안해요...\n\n또 미안해...\n내 자존도 잃었고\n어쩌길 되돌아와...\n궁금하단다.\n또 망쳐버리고\n-LEMONed-\n\n구오ㅣ 정태원!\n올해 넘어가리 요?\n있자나\n\n잘 사나면, 잘나면 문하고 싸나면,\n왜 사나는 몸에도 (< 정말 억장한 질문이다 아무런\n생각하지는 -)\n그냥 사나는 닭 밥때는.\n\n...살나? 가는 몸에\n더한 답은 늘 타름이가나,\n미방잘겠기 때문에 생겯있는\n기대... 그럼 같은 몸인 것 같아요.\n\n여기는 잘 사나요?\n\nKney\n\n[불명확]\n[불명확]", "summary": "작성자는 자신의 미안함과 자존감 상실에 대해 고뇌하고 있으며, 삶의 의미와 존재에 대한 철학적 질문을 던지고 있다. 상황에 대한 답답함과 불안감이 느껴진다.", "tags": ["고민", "자존감", "철학적 사유", "일상"], "mood": "negative", "decade": "1990s", "image_ 작하겠다는 결심을 표현합니다.", "tags": ["고민", "방학", "스트레스", "일상", "감정"], "mood": "negative", "decade": "2000s", "image_quality": "fair", "filename": "2000년_열린마음_p174.jpg", "processed_at": "2026-04-09T23:58:02.371677", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p174"}, {"date": null, "author": null, "content": "왜냥 이번 DB 관계 [불명확] 때문에 많이 괴로워 \n참신해 되어라.\n당신 정리에 2/5... \n\n[낙서와 그림으로 인해 대부분의 텍스트가 불명확함]\n[여러 줄의 손글씨와 파란 펜으로 그린 그림 및 낙서가 있음]", "summary": "학생이 DB(데이터베이스) 관련 어려움으로 인한 고민을 표현한 것으로 보이며, 나머지 부분은 낙서와 그림으로 대부분 덮여있어 명확한 내용 파악이 어렵습니다.", "tags": ["고민", "공부"], "mood": "negative", "decade": "unknown", "image_quality": "poor", "filename": "2000년_열린마음_p175.jpg", "processed_at": "2026-04-09T23:58:06.311282", "volume_id": "2000년_열린마음", "volume_title": "2000년 열린마음", "year": 2000, "page_label": "p175"}]}];
const volMap = {};
VOLUMES.forEach(v => volMap[v.id] = v);

let currentVol = null;
let currentPageIdx = 0;
let unsubComments = null;

// ── 홈 ────────────────────────────────────────────────────────────────────
window.showHome = function() {
  document.getElementById("global-search").value = "";
  document.getElementById("home-view").style.display = "block";
  document.getElementById("viewer-view").style.display = "none";
  document.getElementById("search-view").style.display = "none";
  if (unsubComments) { unsubComments(); unsubComments = null; }
  renderHome();
};

function renderHome() {
  const years = {};
  VOLUMES.forEach(v => {
    const y = v.year || "연도 미상";
    if (!years[y]) years[y] = [];
    years[y].push(v);
  });
  const sortedYears = Object.keys(years).sort((a,b) => a==="연도 미상"?1:b==="연도 미상"?-1:Number(a)-Number(b));
  const totalVols = VOLUMES.length;
  const totalPages = VOLUMES.reduce((s,v)=>s+(v.page_count||0),0);

  let html = `<div style="background:#3d2b1f;color:#f5efe4;padding:28px 20px;margin-bottom:28px">
    <h2 style="font-size:1.7rem;margin-bottom:6px">열린마음 아카이브</h2>
    <p style="opacity:.65;font-size:.9rem">1990년대 ~ 2000년대 학과 방명록 &amp; 일상 기록</p>
    <div style="display:flex;gap:28px;margin-top:16px">
      <div><div style="font-size:1.8rem;font-weight:700">${totalVols}</div><div style="opacity:.55;font-size:.8rem">권</div></div>
      <div><div style="font-size:1.8rem;font-weight:700">${totalPages}</div><div style="opacity:.55;font-size:.8rem">페이지</div></div>
    </div>
  </div>`;

  // 즐겨찾기 섹션
  const favKeys = getFavs();
  if (favKeys.length > 0) {
    const favPages = [];
    VOLUMES.forEach(vol => {
      (vol.pages || []).forEach((pg, idx) => {
        if (favKeys.includes(pageKey(pg))) favPages.push({vol, pg, idx});
      });
    });
    if (favPages.length > 0) {
      html += `<div class="fav-section"><div class="year-label" style="margin-bottom:14px">🍎 즐겨찾기</div><div class="fav-grid">`;
      favPages.forEach(({vol, pg, idx}) => {
        const label = pg.page_label==="cover_front"?"앞표지":pg.page_label==="cover_back"?"뒷표지":`${idx+1}페이지`;
        const thumb = pg.filename
          ? `<img src="input/${encodeURIComponent(pg.filename)}" alt="" onerror="this.style.display='none'">`
          : "";
        html += `<div class="fav-card" onclick="openVolume('${vol.id}',${idx})">
          <div class="fav-card-img">${thumb}</div>
          <div class="fav-card-info"><div style="font-weight:600">${vol.short_title||vol.title}</div><div style="color:#8b7355">${label}</div></div>
        </div>`;
      });
      html += `</div></div>`;
    }
  }

  sortedYears.forEach(year => {
    html += `<div class="timeline-year"><div class="year-label">${year}년</div><div class="vol-grid">`;
    years[year].forEach(vol => {
      const cover = vol.cover
        ? `<img src="input/${vol.cover}" alt="표지" onerror="this.style.display='none'">`
        : `<div style="width:100%;height:100%;background:linear-gradient(135deg,#e8dfd0,#d4c4a8);display:flex;align-items:center;justify-content:center;color:#8b7355;font-size:.78rem;text-align:center;padding:12px">${vol.short_title||vol.title}</div>`;
      html += `<div class="vol-card" onclick="openVolume('${vol.id}')">
        <div class="vol-cover">${cover}</div>
        <div class="vol-info"><div class="vol-title">${vol.title}</div><div class="vol-meta">${vol.page_count||0}페이지</div></div>
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById("home-view").innerHTML = html;
}

// ── 뷰어 ──────────────────────────────────────────────────────────────────
window.openVolume = function(volId, pageIdx=0) {
  currentVol = volMap[volId];
  currentPageIdx = pageIdx;
  if (!currentVol) return;
  document.getElementById("home-view").style.display = "none";
  document.getElementById("search-view").style.display = "none";
  document.getElementById("viewer-view").style.display = "flex";
  document.getElementById("viewer-title").textContent = currentVol.title;
  renderPage();
};

function pageKey(page) {
  return (page.volume_id||"") + "__" + (page.page_label||page.filename||"");
}

async function renderPage() {
  const pages = currentVol.pages || [];
  const total = pages.length;
  if (!total) return;
  const page = pages[currentPageIdx];

  const img = document.getElementById("viewer-img");
  img.style.transform = "";
  img.src = `input/${page.filename}`;
  img.onload = function() {
    pz.imgW = this.naturalWidth;
    pz.imgH = this.naturalHeight;
    const k = "rot__" + (currentVol?.pages||[])[currentPageIdx]?.filename;
    pz.rotDeg = k ? parseInt(localStorage.getItem(k)||"0") : 0;
    this.style.transform = pz.rotDeg ? `rotate(${pz.rotDeg}deg)` : "";
    pzFitAndCenter();
  };
  const label = page.page_label==="cover_front"?"앞표지":page.page_label==="cover_back"?"뒷표지":`${currentPageIdx+1} / ${total}`;
  document.getElementById("page-indicator").textContent = label;
  document.getElementById("btn-prev").disabled = currentPageIdx===0;
  document.getElementById("btn-next").disabled = currentPageIdx>=total-1;
  updateFavBtn();

  // 전사 로드
  document.getElementById("trans-area").value = "";
  document.getElementById("trans-meta").textContent = "불러오는 중...";
  const key = pageKey(page);
  try {
    const snap = await getDoc(doc(db, "transcriptions", key));
    if (snap.exists()) {
      const d = snap.data();
      document.getElementById("trans-area").value = d.text || "";
      const ts = d.updated_at?.toDate?.();
      const who = d.author ? `${d.author} · ` : "";
      document.getElementById("trans-meta").textContent = ts ? `${who}${ts.toLocaleDateString("ko-KR")} 마지막 수정` : (who ? who.slice(0,-3) : "");
    } else {
      document.getElementById("trans-meta").textContent = "아직 전사된 내용이 없습니다. 직접 입력해주세요!";
    }
  } catch(e) {
    document.getElementById("trans-meta").textContent = "";
  }

  // 댓글 실시간 구독
  if (unsubComments) { unsubComments(); unsubComments = null; }
  document.getElementById("comment-list").innerHTML = `<span class="loading-dot">불러오는 중...</span>`;
  const commRef = collection(db, "comments", key, "items");
  const q = query(commRef, orderBy("created_at", "asc"));
  unsubComments = onSnapshot(q, snap => {
    const list = document.getElementById("comment-list");
    if (!list) return;
    if (snap.empty) {
      list.innerHTML = `<span style="color:#bbb;font-size:.8rem;font-style:italic">첫 댓글을 남겨보세요!</span>`;
      return;
    }
    const uid = getOrCreateUserId();
    const allDocs = snap.docs.map(d => ({id: d.id, ref: d.ref, ...d.data()}));
    const roots = allDocs.filter(c => !c.parent_id);
    const repliesMap = {};
    allDocs.filter(c => c.parent_id).forEach(c => {
      if (!repliesMap[c.parent_id]) repliesMap[c.parent_id] = [];
      repliesMap[c.parent_id].push(c);
    });
    function renderComment(c, isReply) {
      const ts = c.created_at?.toDate?.();
      const timeStr = ts ? ts.toLocaleDateString("ko-KR") + " " + ts.toLocaleTimeString("ko-KR", {hour:"2-digit",minute:"2-digit"}) : "";
      const likes = c.likes || [];
      const liked = likes.includes(uid);
      const likeCount = likes.length;
      const safeText = c.text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
      const replyBtn = isReply ? "" : `<button class="comment-reply-btn" onclick="showReplyForm('${c.id}')">답글</button>`;
      return `<div class="comment-item${isReply?" is-reply":""}" id="ci-${c.id}">
        <div class="comment-author">${(c.author||"익명").replace(/&/g,"&amp;").replace(/</g,"&lt;")}</div>
        <div class="comment-text">${safeText}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px">
          <div class="comment-actions">
            <button class="comment-like-btn${liked?" liked":""}" onclick="toggleLike('${key}','${c.id}')">
              ${liked?"♥":"♡"} ${likeCount > 0 ? likeCount : ""}
            </button>
            ${replyBtn}
          </div>
          <div class="comment-time">${timeStr}</div>
        </div>
        <div id="rf-${c.id}"></div>
      </div>`;
    }
    list.innerHTML = roots.map(c => {
      const replies = (repliesMap[c.id] || []).map(r => renderComment(r, true)).join("");
      return renderComment(c, false) + replies;
    }).join("");
  });
}

window.changePage = function(delta) {
  const pages = currentVol?.pages||[];
  const newIdx = currentPageIdx + delta;
  if (newIdx<0 || newIdx>=pages.length) return;
  currentPageIdx = newIdx;
  renderPage();
};

// ── Pan-Zoom 시스템 ────────────────────────────────────────────────────────
const pz = { zoom: 1, panX: 0, panY: 0, rotDeg: 0, imgW: 0, imgH: 0 };
let _pzDrag = false, _pzLast = {x:0,y:0};

function pzApply() {
  const wrap = document.getElementById("zoom-wrap");
  const img = document.getElementById("viewer-img");
  if (!wrap || !img) return;
  wrap.style.transform = `translate(${pz.panX}px,${pz.panY}px) scale(${pz.zoom})`;
  img.style.transform = pz.rotDeg ? `rotate(${pz.rotDeg}deg)` : "";
  const label = document.getElementById("zoom-label");
  if (label) label.textContent = Math.round(pz.zoom*100) + "%";
  const labelM = document.getElementById("zoom-label-mobile");
  if (labelM) labelM.textContent = Math.round(pz.zoom*100) + "%";
}

function pzFitAndCenter() {
  const pane = document.getElementById("viewer-pane");
  if (!pane || !pz.imgW || !pz.imgH) return;
  const pw = pane.clientWidth, ph = pane.clientHeight;
  const W = pz.imgW, H = pz.imgH;
  const swapped = pz.rotDeg===90 || pz.rotDeg===270;
  const visW = swapped ? H : W, visH = swapped ? W : H;
  pz.zoom = Math.min(pw/visW, ph/visH);
  pz.panX = pw/2 - W/2*pz.zoom;
  pz.panY = ph/2 - H/2*pz.zoom;
  pzApply();
}

function pzZoomAt(delta, cx, cy) {
  const prev = pz.zoom;
  pz.zoom = Math.min(8, Math.max(0.05, pz.zoom + delta));
  const r = pz.zoom / prev;
  pz.panX = cx - (cx - pz.panX)*r;
  pz.panY = cy - (cy - pz.panY)*r;
  pzApply();
}

// 드래그 패닝
const _vpane = document.getElementById("viewer-pane");
_vpane.addEventListener("mousedown", e => {
  if (e.button!==0) return;
  _pzDrag=true; _pzLast={x:e.clientX,y:e.clientY};
  _vpane.classList.add("panning"); e.preventDefault();
});
document.addEventListener("mousemove", e => {
  if (!_pzDrag) return;
  pz.panX += e.clientX-_pzLast.x; pz.panY += e.clientY-_pzLast.y;
  _pzLast={x:e.clientX,y:e.clientY}; pzApply();
});
document.addEventListener("mouseup", () => { _pzDrag=false; _vpane.classList.remove("panning"); });

// 터치 패닝/줌
let _touches = {};
_vpane.addEventListener("touchstart", e => {
  [...e.changedTouches].forEach(t => _touches[t.identifier]={x:t.clientX,y:t.clientY});
}, {passive:true});
_vpane.addEventListener("touchmove", e => {
  e.preventDefault();
  const ts = [...e.touches];
  if (ts.length===1) {
    const t=ts[0], prev=_touches[t.identifier];
    if (prev) { pz.panX+=t.clientX-prev.x; pz.panY+=t.clientY-prev.y; pzApply(); }
    _touches[t.identifier]={x:t.clientX,y:t.clientY};
  } else if (ts.length===2) {
    const [a,b]=ts, pa=_touches[a.identifier], pb=_touches[b.identifier];
    if (pa&&pb) {
      const prevDist=Math.hypot(pa.x-pb.x,pa.y-pb.y);
      const newDist=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
      const midX=(a.clientX+b.clientX)/2, midY=(a.clientY+b.clientY)/2;
      const rect=_vpane.getBoundingClientRect();
      const delta=(newDist/prevDist-1)*pz.zoom;
      pzZoomAt(delta,midX-rect.left,midY-rect.top);
    }
    _touches[a.identifier]={x:a.clientX,y:a.clientY};
    _touches[b.identifier]={x:b.clientX,y:b.clientY};
  }
}, {passive:false});
_vpane.addEventListener("touchend", e => {
  [...e.changedTouches].forEach(t => delete _touches[t.identifier]);
}, {passive:true});

// 마우스 휠 줌 (커서 위치 기준)
_vpane.addEventListener("wheel", e => {
  if (document.getElementById("viewer-view").style.display!=="flex") return;
  e.preventDefault();
  const rect=_vpane.getBoundingClientRect();
  pzZoomAt((e.deltaY<0?0.1:-0.1)*pz.zoom, e.clientX-rect.left, e.clientY-rect.top);
}, {passive:false});

window.zoom = function(delta) {
  const pw=_vpane.clientWidth, ph=_vpane.clientHeight;
  pzZoomAt(delta*pz.zoom, pw/2, ph/2);
};
window.resetZoom = pzFitAndCenter;

// ── 이미지 회전 ───────────────────────────────────────────────────────────
window.rotateImage = function(delta) {
  const pages = currentVol?.pages||[];
  if (!pages.length) return;
  const key = "rot__" + pages[currentPageIdx].filename;
  const cur = parseInt(localStorage.getItem(key)||"0");
  const next = ((cur + delta) % 360 + 360) % 360;
  localStorage.setItem(key, String(next));
  pz.rotDeg = next;
  document.getElementById("viewer-img").style.transform = next ? `rotate(${next}deg)` : "";
  pzFitAndCenter();
};

// ── 즐겨찾기 ──────────────────────────────────────────────────────────────
function getFavs() {
  try { return JSON.parse(localStorage.getItem("fav_pages") || "[]"); } catch { return []; }
}
function saveFavs(favs) {
  localStorage.setItem("fav_pages", JSON.stringify(favs));
}
function updateFavBtn() {
  const pages = currentVol?.pages || [];
  if (!pages.length) return;
  const key = pageKey(pages[currentPageIdx]);
  const isFav = getFavs().includes(key);
  ["fav-btn","fav-btn-m"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = isFav ? "🍎" : "🍏";
    el.classList.toggle("active", isFav);
  });
}
window.toggleFav = function() {
  const pages = currentVol?.pages || [];
  if (!pages.length) return;
  const key = pageKey(pages[currentPageIdx]);
  let favs = getFavs();
  if (favs.includes(key)) {
    favs = favs.filter(k => k !== key);
  } else {
    favs.push(key);
  }
  saveFavs(favs);
  updateFavBtn();
};

// ── 전사 저장 ─────────────────────────────────────────────────────────────
window.saveTranscription = async function() {
  const pages = currentVol?.pages||[];
  if (!pages.length) return;
  const page = pages[currentPageIdx];
  const text = document.getElementById("trans-area").value.trim();
  const author = document.getElementById("trans-nick").value.trim() || "익명";
  const btn = document.getElementById("trans-save");
  if (!text) { alert("내용을 입력해주세요."); return; }
  btn.disabled = true; btn.textContent = "저장 중...";
  try {
    await setDoc(doc(db, "transcriptions", pageKey(page)), {
      text, author, updated_at: serverTimestamp(),
      volume_id: page.volume_id, page_label: page.page_label
    });
    document.getElementById("trans-meta").textContent = `${author} · 방금 저장됨`;
    btn.textContent = "저장 완료!";
    setTimeout(()=>{ btn.disabled=false; btn.textContent="저장"; }, 1500);
  } catch(e) {
    alert("저장 실패: " + e.message);
    btn.disabled=false; btn.textContent="저장";
  }
};

// ── 유저 ID ────────────────────────────────────────────────────────────────
function getOrCreateUserId() {
  let uid = localStorage.getItem("anon_uid");
  if (!uid) {
    uid = "u_" + Math.random().toString(36).slice(2,10) + Date.now().toString(36);
    localStorage.setItem("anon_uid", uid);
  }
  return uid;
}

// ── 댓글 좋아요 ───────────────────────────────────────────────────────────
window.toggleLike = async function(pageKey, commentId) {
  const uid = getOrCreateUserId();
  const ref = doc(db, "comments", pageKey, "items", commentId);
  try {
    const snap = await getDoc(ref);
    const likes = snap.data()?.likes || [];
    if (likes.includes(uid)) {
      await updateDoc(ref, { likes: arrayRemove(uid) });
    } else {
      await updateDoc(ref, { likes: arrayUnion(uid) });
    }
  } catch(e) { console.error(e); }
};

// ── 답글 폼 ───────────────────────────────────────────────────────────────
window.showReplyForm = function(commentId) {
  const container = document.getElementById("rf-" + commentId);
  if (!container) return;
  if (container.querySelector(".reply-form")) { container.innerHTML = ""; return; }
  container.innerHTML = `
    <div class="reply-form">
      <textarea rows="2" id="rt-${commentId}" placeholder="답글을 입력하세요..."></textarea>
      <div class="reply-form-footer">
        <input type="text" id="rn-${commentId}" placeholder="닉네임" maxlength="20">
        <button class="reply-submit" onclick="submitReply('${commentId}')">등록</button>
      </div>
    </div>`;
  document.getElementById("rt-" + commentId).focus();
};

window.submitReply = async function(parentId) {
  const pages = currentVol?.pages||[];
  if (!pages.length) return;
  const key = pageKey(pages[currentPageIdx]);
  const text = document.getElementById("rt-" + parentId)?.value.trim();
  const author = document.getElementById("rn-" + parentId)?.value.trim() || "익명";
  if (!text) { alert("답글 내용을 입력해주세요."); return; }
  try {
    await addDoc(collection(db, "comments", key, "items"), {
      text, author, parent_id: parentId, likes: [], created_at: serverTimestamp()
    });
    const container = document.getElementById("rf-" + parentId);
    if (container) container.innerHTML = "";
  } catch(e) {
    alert("답글 저장 실패: " + e.message);
  }
};

// ── 댓글 제출 ─────────────────────────────────────────────────────────────
window.submitComment = async function() {
  const pages = currentVol?.pages||[];
  if (!pages.length) return;
  const page = pages[currentPageIdx];
  const text = document.getElementById("comment-text").value.trim();
  const author = document.getElementById("comment-nick").value.trim() || "익명";
  if (!text) { alert("댓글 내용을 입력해주세요."); return; }
  try {
    await addDoc(collection(db, "comments", pageKey(page), "items"), {
      text, author, parent_id: null, likes: [], created_at: serverTimestamp()
    });
    document.getElementById("comment-text").value = "";
  } catch(e) {
    alert("댓글 저장 실패: " + e.message);
  }
};

// ── 키보드 ────────────────────────────────────────────────────────────────
document.addEventListener("keydown", e => {
  const active = document.activeElement;
  const typing = active && (active.tagName==="TEXTAREA"||active.tagName==="INPUT");
  if (document.getElementById("viewer-view").style.display==="flex" && !typing) {
    if (e.key==="ArrowLeft"||e.key==="ArrowUp") changePage(-1);
    if (e.key==="ArrowRight"||e.key==="ArrowDown") changePage(1);
    if (e.key==="Escape") showHome();
  }
});

// ── 검색 ──────────────────────────────────────────────────────────────────
window.onSearch = function(query) {
  if (!query.trim()) { showHome(); return; }
  document.getElementById("home-view").style.display = "none";
  document.getElementById("viewer-view").style.display = "none";
  document.getElementById("search-view").style.display = "block";
  const q = query.toLowerCase();
  const results = [];
  VOLUMES.forEach(vol => {
    (vol.pages||[]).forEach((page, idx) => {
      if ((vol.title+page.page_label+page.filename).toLowerCase().includes(q))
        results.push({vol, page, idx});
    });
  });
  const sv = document.getElementById("search-view");
  let html = `<p style="font-size:.9rem;color:#6b5a48;margin-bottom:14px">"${query}" 검색 결과 — ${results.length}건</p>`;
  if (!results.length) html += `<p style="color:#aaa;font-style:italic">결과 없음</p>`;
  else results.forEach(({vol,page,idx}) => {
    const label = page.page_label==="cover_front"?"앞표지":page.page_label==="cover_back"?"뒷표지":`${idx+1}페이지`;
    html += `<div class="result-card" onclick="openVolume('${vol.id}',${idx})"><div class="result-vol">${vol.title} · ${label}</div></div>`;
  });
  sv.innerHTML = html;
};

// ── 초기화 ────────────────────────────────────────────────────────────────
showHome();
</script>
