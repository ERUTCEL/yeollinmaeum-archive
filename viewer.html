: "positive", "decade": "1990s", "image_quality": "poor", "filename": "1996년_열린마음_p021.jpg", "processed_at": "2026-04-09T23:12:53.002329", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p021"}, {"date": null, "author": "MooKeuk", "content": "나의 깊은 곱하기 인생 때우은단 느껴져진 늘어난 옷\n빠져서 빠져 나왔 오거우아 ㅂ거 벤연 인연\n꽤이자 그건꼭 잘해. 할수 떠먼 버심을 못\n힘쏟에 나왔 무게위된다 여느 지요 꼭거가 굳조\n아아우테 나의 무섬할 이 다 도겨닿이 떠면 운이다\n[불명확] 잠잠거를 느어 놀아 미련하자지 않 이 서신\n하나많은 저여 놀놀 싼다.\n우리는 \"세상의 빠는 나수 여정하고 그 늘\n오짠 \"세상 저보를 맞지고 있다\"\n<하푸 누무에게 이잍이 놀아 자꾸이?>>\n91년 8월 3일 나\n느긴2거는여 끝써 꺼의 나아정 에\n\n8월 첫째 있음아.\n날짜로 잘 포든차 아마도 새벨마는 호된점 니 났피는 잔은 자서 서간자들은\n곡이하찾나 못다 쎄길 미움은 나을 roupmy 잘 사왔진다. 꼭쁜 자기장\n이긴는 샘봉이 도지면 이 이샤 서의 고민과 건선은 전혀 동지 쳐든 꼴 찐같다\n쎄길 마음이 욕드나 뼈스 쎄길 거자\n쳐버도 론이 많이 왔으며 아섯기는 처지인 아낸 샤자 꼭떠는 많은 궁샤가 잔깊 걸\n건어 그서나 욕알이다\n미지 빨은 둘아다 나는 어느 아비네 찾나 해야겨간다\n꼴은 다시 찹으로 맣아는데 미서는 [불명확] 1잔의 1장이 져처건 [불명확]의 남현이나다.\n찬구는 왓아야 민성을 언거니 찬는 우신에 소과 니있다. 찬이 맟은 건\nwi전은 찬으 대비를 찬김일 막상 닷자하는 나니 미자서이 찬점수다. 찬전은\n우습한의 기대는 저여정저 돌어서 내 소장 걸원이 찬질을 써써 요뻔는 아설어\n가도에 냈다\n찬자면 든째아나 과웃 덩신저 알짓지면 선영 여시직 찬도다는 그꼴은 찬음은\n저가찬 쎘곳은 저영 읽는다. 그리고 건음 섰같는 자존용 있았으면 롯았다\n인지 자신의 게로과 찬심문이 꼭 주인이응 순지 사인찬다.\n• 228로 T.D 에게 기억극로 전망 대송하다\n\n・MooKeuk", "summary": "1991년 8월에 작성된 일상 노트로, 작성자가 인생의 깊은 고민과 세상에 대한 성찰, 그리고 개인적인 감정과 관계에 대해 진솔하게 기록하고 있습니다. 여러 사람과의 관계, 자신의 마음의 상태, 그리고 삶의 의미에 대한 깊이 있는 사색이 담겨있습니다.", "tags": ["일상", "고민", "성찰", "감정", "관계", "1990s"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1996년_열린마음_p022.jpg", "processed_at": "2026-04-09T23:13:14.998380", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p022"}, {"date": "1996-08-06", "author": null, "content": "몽이가 중급 워프 기숨에 써 죽지 않은진 괌지지 모찼다.\n\n인위마에 침곰이 왔다. 침마처지에다 곽가롱응다 잤다. 심이네 심마에서 잤던, 미려자택 박는 성잠던 잉든를 지받이 자처가봉가 했는데 더 삽잔책 저서 동아왔다. 결론 저정하지 않져다. 사상 삭는게 다 깐고 죽꼬게 북검한 것이고, 북검한 운지도 정심이 삼다던 자처가 되는 뿐이나가.\n알조정응과 야무겨도 하처 앙났다 한심다다.\n그 함러정은 법심 산 사항들에게 히한다다.\n\n몽미의 제상도 받나되얌았다. 그 백면에서 자처 로촉는 완하는 것은 야전 같고. (자신 없다.) Demo가 지금 시험에서 소프지인걸?라는 새가치 않든다. 충실이 의미있다.", "summary": "저자가 일상적인 사건들과 인간관계, 특히 친구들과의 상호작용에 대해 기록하고 있으며, 무언가에 대한 고민과 성찰을 드러내고 있다.", "tags": ["일상", "고민", "우정", "성찰"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1996년_열린마음_p023.jpg", "processed_at": "2026-04-09T23:13:23.633696", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p023"}, {"date": "1996-08-06", "author": null, "content": "짓다는 이야기 아니다. 아주 공은장 의이를 가진다.\n하지만 내가 생각 하지에 지금에 왔서 가장중요한문종은\n살면다'의 의미 공문하지야. 멱명 후 PC 독심이 지금의\nTV 뉴스처럼 뉴나 한 우 있는 일을 될 때 우리\n계산 세련이 PC 한을 정준에게 독주다의 '인을'으로\n인등지 못하게 하는 각각을 하는 것이 공문 하다는 생각이.\n또다. (앙이 굽정 고생을 눈. 'ㅅ세 무삼겟으면 개별저 으로\n직은하지을. )\n혜시의 토래 전금이 자겨정을 걸고 있다는 느낌이\n든 때마다 [불명확] 왔진 하지암, 느껴다운. 북구요 하다\n생각을 아니다.\n나는 문임이 헣. 아주 공은 제삼을 겹더고 생각하고\n우리로 가.를 뺄 아니자 독짐 삼지 게시공에 긍 응하기를\n중거 해결할 공것다.\n\n중국 6삼.\n근도다\n\n내 오해에 이노 꽃으로 가야하는 것읍까?\n이는 사랑 있었던 가르쳐줌.\n모음 말자.....\n'조온페를 좋아해\n\n너던 지금 가자.", "summary": "1996년 8월에 작성된 글로, 작성자가 개인적인 고민과 생각을 기록하고 있습니다. PC와 뉴스, 그리고 인간관계에 대한 철학적 성찰이 담겨 있으며, 사랑과 관계에 대한 고민도 보입니다.", "tags": ["고민", "철학", "일상", "연애", "자기성찰"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1996년_열린마음_p024.jpg", "processed_at": "2026-04-09T23:13:37.251670", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p024"}, {"date": null, "author": null, "content": "자신저한 인 난 날 깨 ... 옷 에.. 사 댄.. 우리 .\n그래서 리틀 댄.\n근 10 있났 ... b=ㅁ 세시응 댄 놓 앗 댄\n.. 자잡 세시응 놓음 더곤 . [불명확]\n지흠 늙 음이 ... 앗 늙 인 댄. - \n사잡응 사자 하난. 그러나 .. 멋젠 많라.\n여럽 눈 사자 합나다. 하지만 당신응 맏징\n앗응나다.\n\n.. 근족 의족 ..\n\nQueen Car\nKung Car\n\n오른다네 자@었나 응녀댄다 댓자지 쇼사응 쳐겼다.\n\n그런저응은 서강상공에 대한 > 족하도이 처엠 콕은 시미 깎겠.\n나도 쇼찰고 다듯 고자 깻댓다.\n\n[원내 처에= 다어다 봤네응 라청에 시용이나~\n\n깻호는 조헌우고 경상한 자도 있었다.\n나런 사.고한 버 깻었다. (나 지러댓도 진래(!?))\n간시중 깻던.. 어더 깻거，나더 당단싱 사공 상응나다.\n\n돌돈\n\n콘댄. 어떻없다 내 맏은 문용.\n\"불자 한 깎을 세각!\" 야아~ 리강 화여\n과또고... 그납 사응앤# 상자 깻댓다. (논미.. 야롬나. 깻자 ~)\n", "summary": "손글씨로 기록된 다양한 일상의 생각들과 고민을 담은 노트 페이지입니다. Queen Car, Kung Car 등의 단어와 함께 여러 감정적인 표현들이 섞여 있습니다.", "tags": ["일상", "고민", "감정", "노트"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1996년_열린마음_p025.jpg", "processed_at": "2026-04-09T23:13:47.991973", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p025"}, {"date": null, "author": null, "content": "(그래), 나는 '스승의 날' 주는 선물을 받으면 안 된다.\n그런데 난 받았다 쓸데없이 '있다'.\n\n처음에 난 뭘 했었다.(혼란스럽). 나 '쌓사람'이, CK다닥 쪽쌓았다\n온 (더이상), 자작중이다 욕 샘씨(공토: 받쌓있을 거기? 뭗 것 웅정\n(대사)사 중앗)  \n\n쓰고자에\n쪽씩고, 뜻고 공드었던 고 선 뼈과 잘나 찾았는데, 며느 잔쟈, 거쓱김,\n(대쌓대 + 도)\nㅁ 거셩게2 강어야 떼았다.\n거든 나도멀에서 ... 쌓삼았 인 도 없 있었는데. 거같 못고거\n거다 쪽고. 도조을 보 도 닭닭자. 할곳, 영엄이서 종등하 지기에\n표완 니어따다.\n\n거데 거서도 뭣야 몰았 고우겠다. '난 농샤 \" 거박 본 긴 새이\"을\n동했고, 넓옥 날 롱하하는 사저도 '할했다. 핼나 엄여 [불명확] 은\n나 도기에2. (샤캐, 롱함), 새 엄이 씌 강2 있었나, 그것\n것 이거은 다여다. 씨때이 봇저... 나 멘곤 2명이나 올여겠다\n될데. 할하을 2닮다가, 나더 된쌓 을도 (난 낑는 욕 것이 아닌가!\n바톨. 뭇 명정하내 샘인들 하에도, 너부 )떤겠다.\n\n우 마써가 도 기영 마됨거?\n\n(하평 새엔에서 \"니쌓이 도역 \"일야풀 신영 했어다\" 고설다.)\n\n그러나 또 엄야 지내자 살미이 2명 올여겠다.(지때 할여!!! )\n될데. 할운은 2닮다가, 나더 도경 을도 (난 낑는 욕 것이 아닌가!\n바톨. 뭇 명정하내 샘인들 하에도, 너부 )떤겠다.", "summary": "학교에서 스승의 날 선물을 받은 것에 대한 혼란스러운 감정과 주변 사람들과의 관계에 대해 쓴 일상 기록. 복잡한 감정과 고민들이 담겨있다.", "tags": ["일상", "고민", "학교", "인간관계"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "1996년_열린마음_p026.jpg", "processed_at": "2026-04-09T23:14:02.876366", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p026"}, {"date": null, "author": "정미 (이름으로 추정)", "content": "겨울 학교에 돌다 모둥산... 해수중심대 거기자랐 것도 서어지사, 역사... 졸졸 름는 가지, 역사.... 몸뚜렇다, 역암지사 역사....... 사료 몸거거 다여 하송한다. 이랭져 쉬시중 떠 몸급른 순즉 역사지.... 그리며, 졸하다. 나가 떨줄고 어니(숨 눈 씻은 상대어 쉰긔 겟다, 여미자 . 찰 몸에이 처사몹으로 파잔가게 돌혹을 떠느 적강 혼즉이 나 빠한다.\n\n하니서 몸즉. 자도나 (어아성잇까지 다어아고, 자작몸이자, 자몸상, 몸냐.... 곡머시 몸내뮈산. 소즉 능옳이 과원다. \"기꼬 몬느르- \"\n\n하나 닌 아비 칟영본 이니다 온 앋테, 미르다 앟졸어서 D파잠에 자서지어 앟았다. 신서여, 다는 소대더 이렷도듬 떠도늘고 싣따아까시 어스생았다 그래도 다 몸선다. 자앗정다 곡(시가)에 쌍나녀 자자지 곳 하다. \n\n그런데, 그떼몸다 응의 졸하다. 앞즉 울졸이 나가지, 하녀는 자값이 벗짔다. 비자 다족 교몸잇어서 숨 쌈이긴 물기바. 한 떠 꼬더도 러너찬 어뭉이 있은 나는 여서에 D정혹것고 돌강다, 하머 비든 싸사 싸울우삶가지 저자 차려 가므지 꼬. 다몸. 하지자 다 있것다. 우그사 와다 응아, (버느렁어서 곡웅자다 으 어미 가른 어... 등...\n\n그러다, 어느 [불명확]어는 어니뭉사등 자조다가 (응즉, 시도)\n\"왔 저낸자져 무 앗과거?) 싶더나. (냥 FM어전을)\n\"저 뻐나다 무우는나. 거기 왓광 선충다\"\n혹미 더토그서", "summary": "학창시절 일상과 고민, 그리고 주변 사람들과의 관계에 대한 개인적인 생각과 감정을 기록한 일상 노트 페이지입니다. 복잡한 감정 상태와 일상의 소소한 일들이 혼재되어 있습니다.", "tags": ["일상", "고민", "감정"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1996년_열린마음_p027.jpg", "processed_at": "2026-04-09T23:14:20.893478", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p027"}, {"date": "1996.8.9", "author": null, "content": "근데 봤을 때 오빠도, \"대해?\" 와서 봤 둘이 둘인지...\n흠... 내가 서로 있어서 뭔 괜찮기 사람 괜찮아 2선 있었다. 2선에서\n여자들이 내가 대하는 사람이 없는데 기똥이 했다. 공무원 상이는 못 했어...\n\n근데, 여미 목, 나는 다시 대해야 정성든다. 너뭉나 것해중였다.\n\n나버 왜 어떤 어떻게 산돈이 봐주겠다. 하지만 내 자숨은...\n문자 기버다. 사랑했는 것 자숨마.\n\n나는 대해... 상해 대해 봐주다 되는가 [불명확] 받은건 봐도 이에써\n되사라고 했다. 다면 도봤해 것찰한 사이 내중\n< 절대한 아이 ──→ 사대스를 <→ 을\n[불명확]다가지써... 많은 것 말다.\n\n지금 서로 하 보면 2줄이는 때라 내흠들이 너옥 우겜 2굳였다\n걷 말다. 지치에 따머돈인 것 했다는.. 있것 잘 때...\n\n우는 돈겠어 그 B들 지것움써... 어마나 어둡마 사상해 2촌중증..\n\n목 어려가 걸로, \"절대마며 사건중대른 , 하는 사람 어겟을 어신다.\n다라면, 넓은게 대해 맨심마... 그 쏟에서 샘지닝 자신 것이.\n내 삶에 문이중 봉이겠이 것겠는 어제중 자사 했었다.\n\n이 어메기 넓게에써 도돈이 도했있어 좋겠다.\n\n96.8.9 녹은\n\n.X. 글씨 톡 나써 있능... 샤지판 -수 것다 하깨중을 아샤샤중\n그리는 열국한 깜도 자로군써 봤는 것이 있었다. 샤서에 얘기, 궁지들중\n이 엽켠바풍 공극한 샤뭔버들을 가꼬씨 보샤샤\n그려 공중 쌓기저꼬 대겯 혼다. 깟보ㄷ위겟다 샤사마시, 샤..\n기발 상친지 돈씨, 다허을 속 있지, 있흥해음?\n[불명확] 맨거 자 없는", "summary": "1996년 8월 9일에 작성된 개인의 감정적 고민과 관계에 대한 성찰을 담은 일상 기록. 다른 사람과의 관계에서 느끼는 복잡한 감정들과 고민이 표현되어 있다.", "tags": ["일상", "고민", "감정", "관계"], "mood": "negative", "decade": "1990s", "image_quality": "poor", "filename": "1996년_열린마음_p028.jpg", "processed_at": "2026-04-09T23:14:36.477973", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p028"}, {"date": "96년 8월 4일", "author": null, "content": "깊숨기 '산다는 것'에 자신이 없어 정다.\n쇠 고렴과?\n\n4329 8.12 4:46(PM)\n과정에 와 봣 야무 맞다. 잠하다 뼈ㅁ로\n야무 예전에 빗던 심바타 돌아오길래 인자를 했더니, 음\n'여기' 환국사학의 받아드'' ~'음 ~\n나쿠온 에기 써봤수 렳다.\n√Q.1113 '온것를 마는 사람는 누구이자?'\n받는지는 문제는 못마도 받질의 아 자기비한 삶은 하기도\n이것도 Nonsense 여 받아지처 되져 에 없다.\n나까험에 터면 자정 알상정에 관지 시성 가지정매다. 아즉 신 장근웟[불명확]하고\n자저자 거풍을 자기미 맞종.\n\n나의 처정응 지는 온 생정을 지어 없을나?\n[불명확] 자식 버내 않는 [불명확]에 지전 찬용수에이도 -관가 어유 더[불명확]가\n자지는 중의 삼[불명unclear]이 팡정내 느정메다. 탈는 자정의 온 [불명확]\n정어 깎는 지는 시아 멍을\n중첫도 중처 [불명확]까에, 그렇 중정에 나기? 중심에 아[불명확]에\n여장 온어 [불명확]\n[불명확]기 다저[불명확] 어던 좋을 중중 중심\n\"미는 삼전 시자 \"강\" 으 [불명확] 쉰못을 \"[불명확][불명확]\" 즈.\n중에 그렇 로 > 낭은 다리달미 자정이\n보야다 상은 삼전, 시자 중중되 사미을 자는 쉰못어미 정어의 피어용\n\"경니 0 [불명확]\"\n나또의 최침에[불명확] 상장, 정에 선정정.\n[불명확] \"경강\" 으로 사내도자. 버자 맺때매다.\n사자정자\n\n나거 [불명확] 중정응 것 처정에, 것 사종내,", "summary": "개인의 생각과 고민을 담은 일상 노트로, 자신의 감정 상태와 내적 갈등에 대해 성찰하고 있습니다. 여러 문장이 겹쳐 있거나 불명확하여 정확한 의미 파악이 어렵습니다.", "tags": ["고민", "일상", "자기성찰"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1996년_열린마음_p034.jpg", "processed_at": "2026-04-09T23:16:20.632172", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p034"}, {"date": null, "author": null, "content": "잠깐 깨어서 맑은 입을이 벼락처다. 14일 야심에 창밖 와서 경심이 누나머게 놀담 멀 바터 대정이다 선청네 몸을 떨렸다. 몸도 누나가 잔 맑이 웃곧 하타. 그러나 난 선청이 글흔 여쪼 사헌이자 했는 것을 진정 모르 있었기 때문이 그렇지 않은 말이 떤 것이 서도했다. 그러나 이해했다. 우리는 1장을 마음은 쫓이고 있었는 것을\n\n14일 우칙 내내 소실을 기다리다가 ├이를 받고 쫄봤겠는데 바뀐 같은 장새너나 왔 쪽 사랍이다 받켜누 뮤과 나측 씨깨 한 봉이머다 더겨 떨은 기능깊이 사다키는 버정에 서정에서 식중겟 훼해 롤하자했다. 찬은 쥐 2의 맞송논.. 2에서 찬형을 테장히면 안했다미다.... 짝룻? 이겟든 anyway, 쳬에다가 칠육 칭정이 서욕했다. 거기에는 닥뭐 칭저 씨터깨 우리을 끼다리고 있더라다(?) 미다머서 궁정봇을 쪽 못응 께하다가(솔칭) 참머버). 찬머니을 나족 때 걸된 침메미, 칠머를 인던 낸 (장독(ㅣ), 장쌕)이머운 친다) 짬칠을 마처고 받(ㅣ)등 떨었다.\n\n씨쳐을 침난데 학냥에서 징정이 앞메도 읽이왔 소머 웃었다. 거러와 기기 있던 사리돈(사수메 저원) 기붓을 이웃했다.(솔깨 봉아' 이음', 나뻐이 미계' 뚱했다') 찬이자 웃정 뵈척랍었다. 건창을 웃이러거데 받에서는 칠기 소하다 들리고 짂썽든은 '쌓지 웃지말까'한 서기버, 뭣정 술기가 피서된다. 체감이 등의 비칠했다.\n\n쪼 너눈에 사리옻 맞 차저 몬등 제머을 한이 있지 칭했다 #\n본 얌아 앗떼 뵈빅에서 출 된내니 깎붓 비였 여매 멮 '못, '멸'.... '몽' 컬철.. 터칠탓 뵈처했다. ㄱ 소리에 읽숨지저 침다가(자다)가 빠미나서 참은을 먹  웅있어지 준칠돈) 삼까 이운 유씨돔 흘하더 있었다. 수자 깨졻나, 승잔이다'칭는 유의 사리돈이 깯켜했다. 그매 사급메 웃정했다. 지렷하고 있는 것상다이 놋봉미서 진렶을 떼, 받이도 게축 끼러하면, 소으 깂미서 지완다이 못 지칭건저 멸리) 텐여바정다 칭 웃명순뭎했다. ㄱ 사랑등이 무승 침고 사수채겨거 우럭가. 이렇거지 쌍전여지 안했는 사멀에 입칠 끼미겠다.\n\n그러나 난 웃정 미충친에서 별 뭔웃 칭정 웃정다. 그러서 진수침이 묽울 웃은 되여 닷는 쌔 몬 누나와 솔기 먹섯것 웃는 도직을 되여 든 체 안능 뵈쳐겟고 완겟다. 진수침이 곤셶다. ㄱ 인렵정 젯 다시욤 뵈미서 오른", "summary": "저자가 어떤 사람과의 관계에 대해 깊이 있게 성찰하며 복잡한 감정과 깨달음을 서술한 글. 시간의 흐름 속에서의 변화와 상대방에 대한 이해의 과정을 기록하고 있습니다.", "tags": ["일상", "고민", "감정", "인간관계", "성찰"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1996년_열린마음_p035.jpg", "processed_at": "2026-04-09T23:16:48.350928", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p035"}, {"date": null, "author": null, "content": "우울해서였다. 화려했던 2학년 날씨였는 시간들의 내밀함 깊숨쉬었다. 책 하반쯤에서 취중을 자꾸 도시 화려에 맞다. 현대에서 하심받이 맞이 많았는데 72시간이 넘게 잔다. 왜인 밤 아래의 피로함을 8시간은 잔 덕기는데... 여러에서 제때로 못하도, 지치도 못하며 도와하고 없은 종지에? 내게 이렇 자려 깊은가? 기대에 깊숨쉬었다. 합페에 웃이 상골이 배여 혜바쳤다. 순숨전은 자신 하며 의식을 밤쉬었네 경상도 곡 샘새을 높이려 살았던 했다.\n\n서강에도 가정에 짜되네 시민 화성들이 시장과에서 싸놀 있었다. 나는 어려운 자음도 명성이 구슬갓설이 많은 몸같이 자신 아니게 깎음을 알았는데 몰아이 현못 없이 따랐다. 신조 알지는 제내 이를회 대번다가 촘대이 다시 못 다녀을 지비하이 다시 었데 서물강으로 지켸았다. 그러나 것같은 자신이 어려었다. 처음에는 사상대가 맺미쓸해 즉 챙아 [불명확] 한 사간 길은 바뀌다가 까쳐했다. ⊗ 빠쁨은 콜상들에게 배페을 회됨다 딨 쓰야진 회런 돈저 하생들을 롣이었다. 마디로 없는 콜상들은 구싶 롣이나다가 경직었음 와애 사심데 대명이 까께췌서 촉 다먹 되면 사랑했다. 거닝 쎗었다.\n\n나는 전정움이 잘 뒤지 그것 처음 알았다. 짜서는 현망 잔산 아머였다.\n\n좋데 알메에서 지며 존현된 썸이다 버인, 아뛬 곶을 교혀되서 깨져고 자산은 이벼였다.\n\n그냥도 롣데 사람에 께려다니? 처표 취와자 몸이 심리 까닥이 바다대해 사상여 처닉을 롣첫는데, 시누메 목식의 께게는 묵술을 보지 아우공이 어였다. 시금대 대욕으로 처정 소이 몸되 감아 못 싸여 되어는데? 한 소은 P을 처표 와는 , 아래을 짧글이면서 떠어내는데 궝했 생깃을 싸다니 처샬었다.\n\n여대에서 배저나롤 다다. 윤원봉사되고, 시숨데 안 서너 사삼이 깨받는나 나는 못해서 씀 롷은 겪었나, 비직한 짓잔가?\n\n시도 한데 아의 사정을 많이 아니다. 정정이 도심 처음 막았지 데몽에 직시되 했고, 아미 약당기산 자도마다. 게미기 전에 싯겠 알아 잉기대몽이 파르과 줄 다상을 것이다. 그교 다자기 지징 몸은 잊식 까냈고 못 전정들하고 받았 씀 쎗 신디에 청듬이 더디싱이도 하니 좋음되기도 한다.\n\n어렴 똘롬이 되지 몸았는 나의 처지가 비창하다.", "summary": "대학 시절 심리적 피로와 무기력함, 그리고 깊은 고민과 자아 성찰에 관한 개인적인 일상의 기록. 관계와 자신의 방향성에 대한 혼란과 막연한 불안감을 표현하고 있다.", "tags": ["고민", "일상", "감정", "자아성찰", "대학생활"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1996년_열린마음_p036.jpg", "processed_at": "2026-04-09T23:17:13.751461", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p036"}, {"date": "1996-09-17", "author": null, "content": "밤열완 이렇게 거신 윤타 나라에 대해 뭐 나라지 찬샛들을 방향지 잡다 윤션 윤어샤면 꼬너자는 안갓다. 같것이 싶지으로 받션되야 한다 그므 이 싶한에서 친천청을 하는게 어떻지싶해 몸머로 찰우도 입었다 겨절도 음늘 신강의 수 있다 버리 잔련지꾼을 수도 있다 꼬너나 나의 중요 사침으로 우너라 지음 장수 같 윤도 전장을의 배워에서 능강친으샤 그놈의 최른 야하자거 멈에 이 견영에 있는 찰우을 구충해나는 거리고 생각한다 지은 말에에서 전경의 싶한이 이문 널우 됫시 발샤 윤사가된다는 사랜들까 싶한다 그래한 윤사자로 우리의 찰우을 입눈다미 밤바나 슷음있이 받는 바면 이중 싱칭이 꼬러지 전에 어미에 있는 찰우들이 우쳐있었음 극칠타도 샹사한은 하루가 떠 있었 여제에 갖칭된 찰우를 구충하는 터있이 켈칭 쩨띤 꼬질랍니다\n\n1996 9 17 이견 뺌\n\n8. () 서 성례에서 칠계 '<몽을 닷팅 있는 찬샛들은 우 <킹 가'하다\n     다지 몽 서강토이 열데에 있고 그 종에 옳칠도 있다\n     제몬 강싣더 너여 태디녹 더몽이다\n     니기 & 서울에 꺼 떼기 꺼에 나 랏옷닝 심\n     항열 대기법을 쌔더다\n     타기 닷수한 몽놀 걸이 됫멍 놓거더", "summary": "작성자가 일상적인 고민과 생각들을 정리한 개인 노트. 1996년 9월 17일 작성되었으며, 삶의 방향성과 선택에 대한 성찰적 내용을 담고 있습니다.", "tags": ["일상", "고민", "성찰", "1990s"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1996년_열린마음_p037.jpg", "processed_at": "2026-04-09T23:17:27.547625", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p037"}, {"date": null, "author": null, "content": "뭔가 답답하고 뭔가 도대체 뭐 되는건지 모르겠다.\n청량 미안하다는 것. 청량 미안하다는 것.\n너와 촉기게 한 ㅅ 여름 앞두고 시간...\n촉지만 어 깎마음 믹여나다. 너\n여기서 꼭 너를 생각하면 쪽선을 다\n하겠다는 것.\n여기나 하셨을 꿈꾼다. The Dreamer.\n\n같 년[?] 독해 여름. Ball pen 왜사용 아니네? 자는 2미려\n자이자네 저기 시키 있었어!!\n나도(자는) 모양이 의 착(?가?)[?] 여은 한 져있고.\n여시 곧 마은 왜구는 자르은 여자하라는 아나는 등 길어\n내가 나은 댓각 이 책[표기?]은 PP 꼴댓다.\n꿈을 꼭의 PP자 읽기 자는) 그대 멘찬은 왜 ㄱ은\n꼭 [?]어 대테.\n— PP님 글 쓴분 —\n\n～ 뼈가 애기 ～\n문의 바다\n장은 뼈껴란.\n그러다 시속담다.\n\n나처꼴이\n창웅이 중금 쏟은기 쌍?\n써이체칠.\n\n다시도.\n맞을 하칠 힘이지.", "summary": "작성자의 답답함과 혼란스러운 심정을 표현하고 있으며, 누군가에 대한 미안함과 그리움이 드러난다. 꿈꾸는 자(The Dreamer)라는 주제와 함께 일상적인 소소한 고민들이 섞여 있다.", "tags": ["고민", "감정", "일상"], "mood": "negative", "decade": "unknown", "image_quality": "fair", "filename": "1996년_열린마음_p038.jpg", "processed_at": "2026-04-09T23:17:41.854230", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p038"}, {"date": null, "author": null, "content": "{\n  \"date\": null,\n  \"author\": \"X네데자\",\n  \"content\": \"세밀·가는 이렇게서 내 몸되돌려서 '내' 비받 꼮 비따라는 잠푸여 왔으가 느끼는 도화서 아야 나에 자기 삼음이 맺지 왔지 했으는 창자펀 얀은 여러 창드에기 시여 증나더 넘어와 씨여지는 했는 버여는 안경습나다 (있음이든 북권은 괴여 도로웠 창더 비웃은 콜는 돌 깊었지는 ?) 자의 자문을 곡빌 이자하기 지면하나다 제시는 꼬여의 말음 씨변지 잃움 웃체의 하찾습나다.\n(풀 모름 화학 야원더 처지 많시서 아야왔자 윽찬거여 하나 저 나는 섯 앓에 안 되기여 ?)\n\n아! 와 서반에 댕중 느껴. 걸구 깊은 서반느 이저 꺼웠나다 느껏 네기 배워했고 꼬리잔 바는 못싶나기 나도 꼬션에 지자으는 잠잔고 웃미한 잇짓다 ? 톺처의 데턴에서 수로라 잇든 한스드의 달옴이 괜되다.\n\n저는 둘짧메 ·· [남은이 몬 日) 저른 창종 시같서 의잔다다 어격다지 못근 여대 깜조리 ··\n\n자녀이 엋자게 온공의 시꼴려다·· 창정자료는 노있더는 노의 떠웃에 난 처음, 모자 돌는에 창정자로 나헤 생정도 왔았다 (나어 하는 몬정(x)) 곤더 싶몬 보나 ·어더 많하더 몬지 [불명확] 농려 광죽 | 12더나 종합하였다 하다. (나버자 고정지 자기 더나는 난 하는에 자자, 하서떄도 ~~하용등 그더다).\n\n한심 C떼더떠, TV·심문··· pc톰인 돈이 '닫응툭의 닶유사 '에 더훈 핳다따·또다. 걸더 우잔는 우산의 시꼴더다 우나 어장에 시꼴되자 돈음 모로하다\n\n닫별 호되는 다하다\n                           X네데자\n\n대표작은 그레 깉심서은 창장하는 우리느등 깑음이 땀적 지거가 나에도 다\"\n}", "summary": "파싱 오류 - 원문 보존", "tags": ["파싱오류"], "mood": "neutral", "decade": "unknown", "image_quality": "unknown", "filename": "1996년_열린마음_p039.jpg", "processed_at": "2026-04-09T23:17:58.075788", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p039"}, {"date": null, "author": "열린마음", "content": "나도, 타인 짜증나 노트의 하는 습관되는 등 빨리되어야, 시간 운전자라는 등... 다들 마약 나빠던 말도되지. [불명확]-몽\n\n다만, 새로운 것을 '찾는', 미숙적인 더처짐 어떤 사테를 싶게 있었다는 것념되더니, 여당 없게 해 안이하겠나, \"여차 믹지, 해지지 신경써라\" 든 어찬 말할 하겠다 나왔다.\n\n상황, 오늘 아침 저런 있었네!! 누나다 극게, 사건[불명확]\n\n어떤 것들에 \"바꼈다 먹어\" \"오는 것여\" 기고 싶다\" 라는 좋겠\n둘 여전 - 과 그렇여 어떤 의문 되인 것저\n\"오는 것여, 기고 싶다\"라고 나왔다.\n\n뭔갈 여건 사이로 나네 것든 [불명확] 아니다.\n\n[불명확], 더 것자가가 말도되네다. 미국은 사업해야되, 쌀쌀앞\n\n[불명확]년 요해을 [불명확] 길을 둥쳐, 있기 파드전고, 것다옳으\n\n으로 것, 글 중 'X쌤', '미시', '여피'에 대한 나따 하나 나태 음\n홉대여. 인나인는 중거여을 저갖댔다. 그것도, 그 책게 궁수 지?\n었는가?\n\n열린마음 끝으로\n\n우정아에서 홍미럿 12께 며해 되탓하다지? (중가 그형나?)\n변정에서 치돈 반은을 잘토 돌여 긴재 '홍미되\n더는 영건하는 스고 깟을 얍게 않접다.\n신강 유켕러타, 비정적이 많옳 왔다.\n\n과정: 어쩌뭉가 된어이 웅옥질 추알했는 웅파들은 든극엄?\n어찬이라는 지도자가 도점처는 깎 내버을 맡을 미랑겠는은\n추으덜자는 이은!!! 이음이야말, 합시신 이음야.\n\n마니면, 중을 '깃을'에 가꼬 잙쎄려댄 이음이 'ㅁ연죠이?,\n꼐도정기 것고밀 이항 하시 저겨겟다\n하층상지기", "summary": "학생이 일상에서의 습관과 태도 변화, 새로운 경험과 타인과의 관계에 대해 생각하는 내용을 담은 개인적인 노트.", "tags": ["일상", "고민", "자기성찰", "관계"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1996년_열린마음_p040.jpg", "processed_at": "2026-04-09T23:18:16.284124", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p040"}, {"date": "96.8.19", "author": null, "content": "거서를 읽혀\n\n참. PC통신의 까다로운 구조들 사람들이 있다고 한다.\n심리를 거부으로 삼고 있는 마음을. 그런 자유로운 움짜는 아니도 삼는다.\n\n[불명확한 부분들]\n\nPG. 8.\n\nX: 내 노드의 겠찹니다 지켜봐야해서 싸싸\n긍정합니다\n\n< 태정여준 가자양자!!! >\n\n태변이 젊은 제미렬다. 현이 받은 기젼다. 심장자다. - 어느 바본 -\n\n가능이 저러지 기 버너 슈퍼모. 우는 잠 노혼모 위어도\n세싱은 나는 그침. 못하게 담다.\n흔러 사든게 다 그런게 가-\n8.9 톰좁에 상가 헝웃며 커연 쥐정합 우주\n느낌우는 없는 삶짓이다\n저변의 끝이다. 한번만 자요 내진오면....\n간낭의 끝이다. 한번만 자요 미끼넓지면....\n환영 함며 사는 것도 욕 것웅게 사는 것도 나는\n바라지 않는다. 어니\n지금의 있어서 자아의 분이다.\n닫지. 정말 다알. 사랑하게 삶 누 있기 맞을\n비라 뭔....\n가능이 저러을 느껴고 싶다\n나는 우웃고 있는 우을 깨기워허 우웃이는 허와야겠다.\n\n96.8.19\n현데 고평 17일 짜 7", "summary": "1996년 8월 19일 작성된 일상 노트로, PC통신 문화와 심리, 개인의 자유와 삶의 의미에 대한 철학적 고민을 담고 있습니다. 인생의 의미와 사랑, 자아에 대한 깊이 있는 성찰이 드러납니다.", "tags": ["고민", "철학", "일상", "심리", "자아", "삶의의미"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1996년_열린마음_p041.jpg", "processed_at": "2026-04-09T23:18:27.955390", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p041"}, {"date": "1996-08-20", "author": "뜨레", "content": "데이 과민성 대화중에 왜냐 자카 싶다 촉히 봤자 웃겨다\n촌 모입자 한계에 선음 벽터 답해 냐 빠졌다. 그 순에 웃음\n웃음은 알았나 교육자카? 너가 잔잔 거기야서 민정해 엿다면?\n엿이더 엿금이 새자나다. 댁에 당해이 웃자은 핵처 촉뽐 낌은\n웃자즘 사정을 넘니 많음이 니덴 엿다다.\n\n못 웃자을, 못 놀지을 앞메 나의 나태함, 인정함, 비정함이 닉고련다.\n-뜨\n\n쏙겨집운 생표, 1996.8.20\n\n잠은 마 찾으에 깟다.\n얘게봄: 가중 드자꼴은 엑 5일째 하고 앟다.\n느르정기는 낸 많이 지켜짐다. 못 많이 따르작지 않고 개여야, 느은[불명확]\n절대가 칣하정한 사장에서도 앟은 여정게 해야했지 파곤은 서지 했고.\n나는 중깨게 하은 뒤여 쇠나야 다살이지면, 우리 새너기 돈정이야 열좔이은\n하은은 뒤지 앟고 석자째 서바을 승장가져여 열정이 사우은 읍다.\n누깎을은 비야한 것이다. 므은 쁨께울 깨켜지은 웃고 밀메만 거시고 읍다.\n\n것처넌, 우리 안정은 사각지넘면.......\n내 것음 곳음. 못을 여여. 각정지서는 정정케를 둠에 \"사신걸\" \"닙음차중차\"\n늘으로 쌑[불명확] 늘을 마여 처다중에 써똑음다 했다.\n씨상에, 칣정톱이 깩기더가? 흥얍요, 우리마으,\n서양하게 삶은 싶음 자은 조망하자. 칣정톱의 느껏은, 즈 묵얍으.\n\n내 가자은 하붕을 많이 자정읍다.\n하지면 우리 완정을 우스를 웃크로 자추하고 반성하기 합은 \n서양으로 칠텍다 새때을의 그것이 우싶을 생각나서,\n열서. 반성하며 *끝 역설, 서야기겠다.", "summary": "작성자가 자신의 과민성, 소심함, 비정함 등에 대해 성찰하며 반성하고, 관계와 태도에 대해 고민하는 일상 기록. 자기 성찰과 개선을 다짐하는 내용.", "tags": ["고민", "자기성찰", "일상", "감정"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1996년_열린마음_p042.jpg", "processed_at": "2026-04-09T23:18:44.846584", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p042"}, {"date": null, "author": null, "content": "상황은 정국 깊어지 않았건만 현실은 여우더\n궁핍해지고 있다 하지만 검으로 볼이는 상황들이\n그리고 약으로 이어붙것 같은 일들이 나를\n지치게 한다\n\n96 봄\n연대주재 9인짜\n\nP.S. 은화는 종앞서미 있다 니다\n맛이들 신경 쓴시다\n\n은화가 나왔습니다.\n옷은 (22일) 4시경여 짐메 내여 간닫습니다.\n우고했다. 은화야!\n\n하지만 도래 폭패 은화가 네왔고 폭았다 영차나 농도짖을까?\n삶도 쫓이 패짜갔다 대빵철 은화 앞 맞는 뼈 삶 것 위우자다.\n맛이 저편차고 둘 삼삶을 예게 빠리 충아지길 바란다.\n\n또 같은 오다가 러벱 신육 기질 기질이을 받자다 에베자 아는 길이\n라는 접차 걔핸 하는이 물하니 뜨다히 앞자다 자편에는 시국들\n의 무헝 돋에 말이이 없다 저메이 닮핸 에베자는 젯다 댓잔다 쇠해 여려면?\n거의 창이덮였다더디 이렇에기 뭅금 첫정짜기암 첫벙하는 쉰시 텔\n되욕 자하는 자상이 돈다 자하면 대를 잠 대마면.\n\n4 월 22\n[불명확]", "summary": "작성자가 일상의 여러 상황과 감정을 기록한 노트로, 상황의 어려움과 피로감을 표현하면서도 은화(인물명으로 추정)와 관련된 긍정적인 순간들을 언급하고 있다.", "tags": ["일상", "고민", "감정", "1990년대"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1996년_열린마음_p043.jpg", "processed_at": "2026-04-09T23:18:59.186475", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p043"}, {"date": "1996-08-22", "author": null, "content": "잘은 하늘아래,\n할게 살아왔던,\n'아'학번 도착생이었건만\n한 친구는 자신의 신념을 위해 써우다가\n청창아에 육체를 가누를수밖에 없고,\n한 친구는\n그의 척이 닥쳐버어 없었던\n짧음에 자신의 육체를 가누를수밖에 없다.\n\n<여전하게 적과 끝의 흔흔\n야상장이 있기 때문이 아닌다,\n옆자가 살아가는 행실이 너무나로 척비하겠어\n우리는 척행을 궁극는 것이다.>\n\n...여전하나서 오늘\n\n하지만 나의 신장으로부터\n이땅의 징곡들 정정 맞아져가고 있고,\n하지만 나의 가능에서\n'형법'이란 같아 정정 자자지지하다.\n왜일까?\n왜일까?\n...", "summary": "1996년 8월에 작성된 글로, 친구들의 신념과 현실 사이의 괴리에 대한 고민과 자신의 삶에 대한 철학적 성찰을 담고 있습니다. 시적이고 추상적인 표현으로 삶의 의미와 현실의 모순을 질문하고 있습니다.", "tags": ["고민", "철학", "자기성찰", "우정", "인생"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1996년_열린마음_p044.jpg", "processed_at": "2026-04-09T23:19:06.604406", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p044"}, {"date": "3월 23일", "author": "위아즈, 박지윤", "content": "[페이지 좌측 텍스트 - 불명확한 부분 많음]\n민트원군은 가지나 밤미족히털을 잠겨놀이 적응읍이 [불명확]...고 제고된 하던 교사족적정책 궤의 궤문의 이 느러시아 도 그것도 인정할 수 있다\n\n[페이지 중앙~우측 텍스트]\n인 많았던 괴로에 아에 받혔 괴렸지 [불명확]\n뭔족이 뺑광하기 를 기더...것\n총족적 팬을 전부어 것저힘 깑이언 과인이 아니다, 그것을 더 떨어 [불명확]\n러 잉길을 쓰일 유령이 [불명확]\n서를 받았다 더 [불명확]\n\n[하단 필기]\n위아즈 박지윤!\n3월 23일 ↓", "summary": "1990년대~2000년대 학과 방명록 페이지로, 복수 작성자가 참여한 일상 기록이다. 전체적으로 텍스트가 흐릿고 읽기 어려운 상태이다.", "tags": ["일상", "방명록"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1996년_열린마음_p045.jpg", "processed_at": "2026-04-09T23:19:12.789587", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p045"}, {"date": null, "author": null, "content": "가장이 좋아이 잘지, 잘다 교우과 은미이나 좋사는사 싶즈 써이 가지, 도단 워이자신 알이서 아덴 자신의 싫완치기 싶저진 야즈 것은 많았던 느끼가하고 거거기 과반이 잠수하였다. 방새 늑 마싸 교단 목 열려하자 지러 좋다가 싶 몬앞이저 잣이 은 즐 싶었다. 지은 단점 완게 자은 아싸잖 2 목덩이 왔지 완멸 먹었다. 못은 오즈지잖 좋이 머으의 좋은(즉잔) 아던 일깎 앙 우 잖은 것 앞다. (자즤 우쑥이자다). 우층도이 쎄자시, 우자하는 네다 갖자새하고 칯음이 좋은 깯 앙다. 충이즈이 머중의 좋은 없온 본 쨘다다. 아던 느머이 답며는 왜 족 우 잖은 잣은 아네...이제 끼매싶은 가자겠다. 오느 ::의 좋가창 닯이 아날 깯 잠더...하. 요.깥. 신.닭자창춘 의시어 \"나하는\" \"그젯 같은 사랑는의 앎 음멱 사혹은 박정 하잔용 라고 좋으닌 맞하된 마산 추신이 높한 자경 그 서광마 요는 면겨시 이 있던 곳은 긴충최 이렁 의굼이 자막 깧찰다. 14몽 열데 완미 서 강이 헤 었던 두명의 대명충건 여학우 왔 깧찰영 환우의 도능이 자궁 깧찰다. 직을 그 자체 중 우의이메도 조미 되는 깧 강 다. 너우나도 아까운 사랑는이 좋 이 깧다. 너로도 아까네... 96. 아저 꽃나저 앎은 느. 여터우자 12의저. 그", "summary": "과거의 관계와 감정에 대한 회상 글로, 여러 사람들과의 추억과 헤어짐에 대해 서술하고 있습니다. 1996년경의 기억들을 담고 있으며 복잡한 감정을 표현하고 있습니다.", "tags": ["고민", "감정", "추억", "관계", "회상"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1996년_열린마음_p046.jpg", "processed_at": "2026-04-09T23:19:29.980632", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p046"}, {"date": "1996-08-25", "author": "박정", "content": "우정이 영미에 어떤 일(인정이됨 제정 다함 일)이 인정이 첫의 삶은 바꿈 수 없는 슬미의 진희건정 수도 있더 성장까게 삶먼, 죽였다면 미쳤다. 나는이란는 기 시간들한 시간이 부족해 하지 못했던 일들을 할 수 있으리란는 생각이었다. 간다나 저작 바다 간던 사실에 빠진다면 진정하지 않고 바람 수 있습까. 나는 남의 입장은 새겨서 인한 맘한 정함는 것 같다. 또등 사람들이 많은 것한다. 그러나 옭기를 버러죠 앉는다. 특히 너라 많이 그러한 보움을 받다. 바쌤이야먔다. '바쌤'이야기가 내있서 하는 말인데 나는 바섯갈 얘기 많다. 그 중 한 가지가 자진 것정 및 웃음은 잘 못한는 전이다. 요즘 너라 잘 깨하고 싶이만 다시여 잘 헤는 것이 진바다. 왜냐면 나는 내 맘대로 세사하는 강함이 싫게 떠돈이다. 진근자 나의 이야기에 짜쳣는 사람들이 다던, 아니 일정 숨숨가 있는 것마다 그 어하는 그 사람들이 나의 마음을 깊작하지 떠돈이다. \"자녀라 샘나다기 해서\" ... 쉬나봐 한 다서의 일정이 인정(2) 선데게 있던 확증은 중 4셀 5더여은 우숨하고 4시정을 화버었다 처자를 취 받게 기르기게 만했자 우 4,000여여 시은 근처에자 앉풀게까나 싶정자정 잠깐 떠겨지들 미다가 중대함, 즈믐 화방씬족을 빠떤('、라미'이 우버씬아) 씨이 비는데곤). 약 3000여여 붕속음 내았다. 우리며 철람 여정이 첫이 차있는 여기게 있다. 우리가 낭 것같 받겨도 나의 우커겨른데, 어정이 첨은 데버붕 붕속씬원으서 재발싸지들을 놀아도 하과를 기틀 것 같다. 어느 여정이 첨은 문며 걸잠이 거두뎌!! Technic이 같다. 정대 앞 마자빼에 안경하고 곡갱 사래들이 곤한 중이 불어있는데, 먼약 그 싱들이 거칭 한는 사싱리려면 셔터 하윤들은 빈나해야 한다. 나는 나의 붕남 싱각을 이정게 깨쳬하고 싶다. \"여정이는 받되는 하고 받미다음 씌버 기마아 한다니 녀\"", "summary": "저자가 우정, 인간관계, 그리고 자신의 성격과 태도에 대해 고민하고 있는 내용. 다른 사람들과의 관계에서 자신의 말투와 감정 표현 방식에 대해 반성하고 있다.", "tags": ["고민", "우정", "인간관계", "자기반성", "일상"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1996년_열린마음_p047.jpg", "processed_at": "2026-04-09T23:19:49.314180", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p047"}, {"date": null, "author": "미싱(?)이107", "content": "2시하여 2 요잉 여쩌죠 ~~이렇게도?\n도결하 거니까 후배들의 요청이 정말 아중당다.\n\n[불명확] 소아하하 [불명확] 끄~끄엉당다\n나타어 ~~런데 아타숨다. 아~아.\n\n으지떼 삶아숨으려 넷헌 바는 삶은 어려 자는 즈씩\n\n깥 꿀중이어 꼼낄 뭐 앞뭔 쳗 ~~꾸쩌 블등어\n\n6뭥~ 드엉어 Q 헬빠더 . 드멍어 꺼는 [불명확] 엑쏜 엑쌘.\n존이 먹엉 메웃 샘들은 깟 꾸쩌꾸더~ 끼김여 깟 헤니 깟\n[불명확] 든중어 ⊙ 엽아뭐어..\n\n나. 어써 어셀 싶은 샘들 [불명확] 꾸뜨뜨다. 꾸뭋 뫼샤 깟\n어 50! 5[불명확] 꼬아~~느 소섯 삼중떠. 뭐 떠떠 뫼 꺼꼼이\n엣 느느중으 꼼어 얘쌀 꼬깟 즈씩쌀. 언즈 쉬뭔겨\n엣아겨 띤즈 샤저중떠더. 쎠쎠 꼼꼼 즐쌍 깟 느 꼼느 쌌쌌겨\n쑤~깟 [불명확]. 꼬영 시버! 돌쏘됴!? 즈뜨즈!& ⊙ ⊙\n\n..려또깟 . 밤 돌짝 생숨 깟담 다따눙떠? 즈뜨즈!& ⊙\n나즈 나쌀 더뭑 드르숨 느뮤즈 쌀낌뭇. 쌀고아뭐\n즈 꽈녀또.\n\n싸뭉겨. 깟 느쌉 아싸깟 샹더 쌀.[ OH1 혁멍\n쌌쌌 어저중떠다. 아샘.t 거쌀 하! 어런 깨멍\n쌌되겨. 어셀 즈쌍 아샤다 . 쌀샘 나는 즈쎼다.\n\n어긑겨 소뮤떠다. 꼬깥을 꼬즐겨떠. 쌀겨 꼬족겨떠 아.\n.느숨 . 달 돌짝느 싸샤 깟 느너겨. 쌀뭉깟.\n샘겨겨 어느것 '아야' 진떠 우~ㄴ 샤싸\n싸샤. 다쌀 느씨 아샤다. 쌀쌀 나흘 즈쎼다.\n\n어긑겨 삽셍데. 꼬씩이 꼬긋겨떠. 쌀겨", "summary": "학과 고 나만의 것이다.\n\n혼자라고 느껴질 때도 많지만\n누군가는 언제나 내 곁에 있다는 것을 잊지 말자.\n\n여름이 오면 생각나는 게 많다.\n추억들이 하나둘 떠오르고\n그 추억들 속에서 웃음을 짓는다.\n\n\"New Open - Hearth의\" [불명확]\n다양한 기억들 속에서 배운다.\n그리고 또 앞으로 나아간다.\n\n[중앙의 활자체 텍스트]\n모두가 함께한 시간들이 소중하다.\n그 시간들을 기억하고 감사하자.\n\n좌측 하단에 시그니처와 [불명확]", "summary": "감정의 다양함과 상실, 그리고 희망에 대해 성찰하는 내용입니다. 혼자라는 느낌 속에서도 곁에 있는 사람들의 소중함을 깨닫고, 추억과 경험을 통해 앞으로 나아가자는 메시지를 담고 있습니다.", "tags": ["일상", "고민", "감정", "추억", "희망", "감사"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "1999년_열린마음_p004.jpg", "processed_at": "2026-04-09T23:20:57.286709", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p004"}, {"date": null, "author": null, "content": "오늘 [불명확]\n\n안녕? 난 [불명확]\n우리 함께 있을 때가 제일 좋아\n[불명확] 우리 영원히 친구하자\n\n내가 너를 좋아하는 이유?\n첫째, 넌 정말 착한 마음을 가졌어\n둘째, [불명확]\n셋째, 너는 [불명확]\n\n우리 항상 이렇게 지내자\n힘들 때 서로 기대고\n기쁠 때 함께 웃고\n[불명확]\n\n새해가 되었어\n[불명확] 이루자\n우리 함께 화이팅!\n\n정말 고마워\n너 없이는 못 살 것 같아\n[불명확]\n\n기억해, 넌 특별해\n[불명확]\n우리 영원한 친구야\n\n[우측 페이지]\n최고의 선물\n[불명확]\n언제나 곁에 있어줘서 고마워\n[불명확] 없었으면 정말 외로웠을 거야\n\n우리 추억들을 [불명확]\n[불명확]\n\n미래가 설렘\n[불명확] 함께라면\n[불명확]", "summary": "친구에게 고마움과 우정을 표현하는 감성적인 일상 노트 페이지로, 상대방을 소중히 여기는 진심이 담겨있습니다.", "tags": ["우정", "일상", "감성", "고마움", "친구"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p005.jpg", "processed_at": "2026-04-09T23:21:02.919038", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p005"}, {"date": null, "author": null, "content": "○ 함께라서 행복해요 (C)\n\n함께... 정말\n그런데 이제 슬픈데...\n우리 정말 잘 지낼 수 있을까?\n너무 걱정돼\n\n(이렇게 써야 하나?)\n\n정말 한 번씩 같이 노는 게\n좋아서 그런가봐\n안만나면 심심하고\n너를 자꾸 생각하게 되고\n만나면 행복하고\n\n이런 기분... 좋은건가?\n나쁜건가?\n\n[불명확] 에 관련된 부분...\n다시 생각해 봐도\n좋은 추억만 남고\n\n앞으로 어떻게 될지\n정말 궁금한데...\n잘 지낼 수 있을까?\n\n같이 있고 싶은데\n어떻게 해야 하나?\n\n(E.D kam)\n[불명확] 이것\n[불명확] 됨", "summary": "함께하는 시간이 행복하지만 앞으로의 관계에 대한 불안감과 고민을 표현한 글. 상대방과의 관계를 소중히 여기면서도 미래에 대한 걱정을 드러내고 있다.", "tags": ["고민", "감정", "관계", "일상", "불안"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p006.jpg", "processed_at": "2026-04-09T23:21:07.786578", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p006"}, {"date": null, "author": null, "content": "I'm happy because you are.\n\n[불명확] 너의 웃음이 나를 행복하게 해\n[불명확한 여러 줄의 필기]\n\n내가 너를 사랑하는 이유?\n첫째, 넌 언제나 웃고 있어\n둘째, 넌 내 맘을 잘 알아\n셋째, 넌 정말 소중한 사람이야\n넷째, 함께 있으면 편해\n다섯째, 넌 내 친구야\n여섯째, 넌 나를 믿어줘\n일곱째, 넌 [불명확]\n\n그리고 많은 이유들이 더 있어\n넌 정말 특별한 사람이야\n앞으로도 함께하자\n우리의 우정은 영원할 거야\n\n1999 [?]\n\n[우측에 인물 스케치 그림]", "summary": "행복의 이유가 상대방이라는 내용의 감성적인 메시지. 사랑하는 사람을 향한 7가지 이유와 함께 우정과 소중함을 표현한 글이다.", "tags": ["우정", "사랑", "감성", "고백", "1990s"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p007.jpg", "processed_at": "2026-04-09T23:21:15.722092", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p007"}, {"date": null, "author": null, "content": "오늘 하루종일 힘들었다\n어제 있었던 일들이 자꾸 떠올라\n아무도 모르는 나의 고민\n누구에게 말할 수도 없고\n그냥 혼자 끙끙 앓고 있다\n\n[불명확] 해야 할 일들이 많은데\n자꾸 미루게 된다\n언제쯤 이런 마음이 사라질까\n\nTime is precious [불명확]\n\n아, 또 한 학기가 지났구나\n벌써 수강신청 때인가\n시간이 참 빨리 간다\n\n[불명확] 을 준비해야 하는데\n아직도 마음의 준비가 안 되어 있다\n\nP.S 누가 나한테 말해줄 수 있을까\n어떻게 살아가야 하는지\n무엇이 정답인지\n무엇이 내가 원하는 것인지\n그런 것들을 [불명확]\n4:09 pm", "summary": "작성자가 과거의 고민과 스트레스로 인한 심적 어려움을 표현하고 있으며, 시간의 흐름 속에서 앞으로의 방향성에 대한 불안감과 혼란을 드러내고 있습니다.", "tags": ["고민", "일상", "감정", "불안"], "mood": "negative", "decade": "2000s", "image_quality": "fair", "filename": "1999년_열린마음_p008.jpg", "processed_at": "2026-04-09T23:21:20.764108", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p008"}, {"date": null, "author": "유미", "content": "안녕하세요 열린마음 동아리에 오신 것을 환영합니다\n\n저는 동아리장 유미입니다. 앞으로 함께할 수 있어서 기쁩니다. 이 노트는 우리 동아리 멤버들의 일상과 생각을 나누는 공간입니다.\n\n열린마음이 의미하는 바처럼, 모두가 편한 마음으로 자신의 생각과 느낌을 나눌 수 있기를 바랍니다. 함께 좋은 추억을 만들어가요!\n\n행복한 시간 되세요 :)\n\n[오른쪽 섹션]\n새로운 멤버분들께\n\n작년부터 활동하면서 많은 것을 배웠습니다. 동아리는 단순히 모임이 아니라 우리의 일상을 함께 나누는 소중한 공간입니다.\n\n앞으로 많은 활동과 행사들이 기다리고 있습니다. 모두 함께 웃고 울고 떠들면서 좋은 추억을 만들어봅시다!\n\n화이팅!", "summary": "동아리장 유미가 새로운 멤버들을 환영하며 열린마음 동아리의 의미와 앞으로의 활동에 대한 기대감을 표현한 글입니다.", "tags": ["신입생", "동아리", "환영", "일상", "긍정"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p009.jpg", "processed_at": "2026-04-09T23:21:26.174046", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p009"}, {"date": null, "author": null, "content": "행복 Be-cause you are.\n\n너의 행복이 나의 행복이고 나의 행복이 너의 행복이었으면 좋겠어. 그리고 우리 모두 행복했으면 좋겠어. 인생이란 여행지 같아서 언제나 새로운 풍경이 기다리고 있어. 그것도 좋은 것만 있으면 좋겠는데 세상은 그렇게 만들어지지 않았나봐.\n\n그래도 우리는 계속 앞으로 나아가야 해. 왜냐하면 멈추면 더 이상 앞으로 나아갈 수 없으니까.\n\n[불명확] 내가 [불명확] 수 있는 방법은 뭘까?\n\n아무튼 다들 화이팅하고 앞으로 나아가자!\n\nP.S 우리 모두 행복하자!! 열심히 공부해서 그 이상의 [불명확]\n\n행운을 빈다 580 6396", "summary": "행복에 대한 철학적 성찰과 함께 모두가 함께 행복해지기를 바라는 마음을 담은 글. 인생의 여정 속에서 계속 앞으로 나아가야 함을 강조하고 격려의 메시지를 전함.", "tags": ["일상", "행복", "격려", "철학"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p010.jpg", "processed_at": "2026-04-09T23:21:31.149177", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p010"}, {"date": null, "author": null, "content": "I'm happy because you are.\n\n안녕 [불명확]\n\n그림과 함께 한국어 텍스트가 섞여있음:\n- 별, 별\n- 우리들의 [불명확]\n- [불명확]한 기억들\n- 꽃 그림과 함께 여러 문장\n- 우주선/로켓 그림\n- 별, 하트, 나비 등의 장식 그림\n\n오른쪽 페이지:\n- 여러 줄의 손글씨 한국어 텍스트\n- [불명확]한 부분이 많음\n- \"행복\", \"기억\", \"친구\" 등의 단어들이 보임\n- 마지막에 \"by kheun\" 서명으로 보임", "summary": "'I'm happy because you are'라는 영문 인사말로 시작하는 우정과 추억에 관한 메시지. 별, 꽃, 우주선 등의 귀여운 그림으로 장식된 일상 노트 페이지.", "tags": ["우정", "추억", "일상", "행복"], "mood": "positive", "decade": "2000s", "image_quality": "fair", "filename": "1999년_열린마음_p011.jpg", "processed_at": "2026-04-09T23:21:36.874122", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p011"}, {"date": null, "author": null, "content": "왼쪽 섹션:\n마음\n그리고 내 마음 속에\n나는 너를 내 마음 속에\n간직하고 싶었다\n그런데 시간이 흘러가고\n계절이 바뀌고\n내 마음도 변했다\n\n중앙 섹션:\n너를 사랑한다\n그것만은 e": "1999년_열린마음_p015.jpg", "processed_at": "2026-04-09T23:21:56.964811", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p015"}, {"date": null, "author": null, "content": "I'm happy because you are\n\n[불명확한 텍스트]\n\n행복함 [불명확]\n[불명확한 여러 줄의 한국어 텍스트]\n\n오른쪽 페이지:\n[불명확한 한국어 텍스트 여러 줄]\n\n주요 읽을 수 있는 부분:\n- 'I'm happy because you are' (영어)\n- 여러 한국어 문장들이 빽빽하게 작성됨\n- 펜글씨로 작성된 일상적인 내용으로 보임\n- [불명확한 대부분의 텍스트]", "summary": "일상 노트에 '당신 때문에 행복하다'는 내용으로 시작하는 개인적인 감정과 생각들을 기록한 페이지. 대부분의 텍스트가 선명하지 않아 정확한 내용 파악이 어려움.", "tags": ["일상", "감정", "개인일기"], "mood": "positive", "decade": "2000s", "image_quality": "poor", "filename": "1999년_열린마음_p016.jpg", "processed_at": "2026-04-09T23:22:01.184294", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p016"}, {"date": null, "author": null, "content": "왼쪽 페이지 (자주색 펜글씨):\n그리고 나는 이제\n그 때 아프게 느낀\n[불명확] 대로\n나를 사랑하는 법을 배워야\n[불명확]\n\n하지만 아직도\n[불명확] 울고 싶네\n[불명확] 너무 아파서\n나는 무엇을 해야 할까\n[불명확] 마음을\n[불명확] 주었는데\n[불명확] 이해할 수 없네\n\n너에게 미안해\n내가 너무 약했나\n아니면 내가 잘못된 건가\n자꾸 자책이 되네\n\n다시 일어나자\n그리고 내가 나를 믿자\n내가 잘못된 게 아니라고\n말해주는 누군가가 있으면 좋겠네\n\n오른쪽 페이지 (검정색 펜글씨, 흐림):\n[대부분 읽기 불명확하나]\n여러 줄의 한국어 텍스트가 있는 것으로 보임", "summary": "사랑으로 인한 상심과 자책, 그리고 다시 일어나려는 의지를 표현한 감정 일기. 자신을 믿고 나아가고 싶지만 여전히 상처와 혼란 속에 있는 모습을 보여줌.", "tags": ["연애", "고민", "감정", "상심", "자책", "희망"], "mood": "negative", "decade": "2000s", "image_quality": "fair", "filename": "1999년_열린마음_p017.jpg", "processed_at": "2026-04-09T23:22:06.349866", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p017"}, {"date": null, "author": null, "content": "I'm happy because you are.\n\n행복은 행복하지 않은 사람을 행복하게 할 수 없고\n행복한 사람을 더 행복하게 할 수 있다\n\n[불명확]\n4/2/12 1/7 [불명확]\n4/3/11 2/2 Ln 7\n\n[불명확]\n\n지금\n\n낙관적 낙관적 [불명확]\n[불명확] 없음 [불명확]\n[불명확] 7/12는 [불명확]\n낙관적\n\n아무튼 오늘도 좋은 하루 되고\n당신의 꿈이 이루어지길\n\n문제는 언제나 우리 앞에 있고\n그것을 해결하는 것도 우리\n\n낙관과 긍정으로 힘내세요~\n\n행복이 가득하길~", "summary": "행복에 관한 철학적 생각과 함께 긍정적인 메시지를 전달하는 글입니다. 작성자는 행복한 마음으로 타인을 격려하고 있습니다.", "tags": ["일상", "철학", "긍정", "격려", "행복"], "mood": "positive", "decade": "unknown", "image_quality": "fair", "filename": "1999년_열린마음_p018.jpg", "processed_at": "2026-04-09T23:22:10.855380", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p018"}, {"date": null, "author": null, "content": "Remember that piano\nThat classic sensation\n\n어디서나 피아노를 들으면\n그 감정이 나를 사로잡는다\n내 마음속 깊은 곳에서\n떠오르는 그 추억들\n\n[불명확] 되고 싶은 마음\n[불명확] 하고 싶은 마음\n\n그럼에도 불구하고\n나는 계속 앞으로 나아간다\n\n피아노의 선율처럼\n내 인생도 아름답게\n흘러가기를 바란다\n\n그 음악 속에서\n나는 나를 찾는다\n[불명확] 그 느낌\n\n마음이 무거울 때\n피아노를 찾는다\n그리고 다시 일어난다\n\n그 음악이 나를 치유한다\n그 감정이 나를 구한다\n\n[불명확] 앞으로도\n이 감정을 잃지 말자\n\nso delightful unusual\nsentiment confusion\n\n[불명확] 해서\n그 기분을 기억하고\n살아가야 한다", "summary": "피아노 음악에 대한 개인적인 감정과 추억을 회상하는 글. 피아노의 선율이 자신의 마음을 치유하고 위로한다는 내용의 감성적인 일기 같은 글.", "tags": ["일상", "감정", "음악", "추억", "감성"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1999년_열린마음_p019.jpg", "processed_at": "2026-04-09T23:22:16.204975", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p019"}, {"date": null, "author": null, "content": "[좌측 상단]\n기\n넓\n[중앙 상단]\n시간\n\n[우측]\n돌리기\n[불명확]\n\n[중앙 좌측]\n많은 한글 텍스트 (필적이 불명확하여 정확한 전사 어려움)\n\n[우측 중앙]\n4\n[불명확]\n\n[우측 하단]\n#2296\n[불명확]\n\n[하단]\nTo love [불명확]\n마음\n[하단 좌측에 파란 잉크로 낙서/드로잉 있음]", "summary": "1990년대~2000년대 학과 방명록 페이지로, 여러 사람의 손글씨가 섞여있으며 일부 텍스트는 필적 흐림으로 인해 판독이 어렵습니다. 감정 표현과 메시지가 포함되어 있습니다.", "tags": ["방명록", "일상", "메시지"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p020.jpg", "processed_at": "2026-04-09T23:22:23.347999", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p020"}, {"date": null, "author": null, "content": "[상단부 인장/도장들로 인해 일부 불명확]\n\n좋은 하루되세요\n\n[여러 줄의 손글씨가 있으나 각도와 겹침으로 인해 일부 불명확]\n\n아무도 모를거야 내 맘속에 [불명확]\n그댈 바라보면서 혼자 웃음짓고 있어\n하지만 언젠가는 알게 될거야\n우리 함께 할 날이 오면\n\n[중단부 여러 문장이 겹쳐 있고 필압이 약하여 완전히 읽기 어려움]\n\n항상 사랑하고 존경합니다\n[오른쪽 하단부]\n언제나 좋은 마음으로\n즐거운 하루하루가 되길\n\n[불명확] 세상이 아름답고\n[불명확] 일이 있어도\n그것도 좋은 추억이 될거야\n\nPS: [불명확]", "summary": "누군가를 그리워하며 언젠가 함께할 날을 기다리는 마음과 주변 사람들을 향한 존경과 사랑의 감정을 담은 일상 노트 기록.", "tags": ["연애", "감정", "일상", "희망"], "mood": "positive", "decade": "unknown", "image_quality": "fair", "filename": "1999년_열린마음_p021.jpg", "processed_at": "2026-04-09T23:22:28.416405", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p021"}, {"date": null, "author": null, "content": "제목: 열린 마음\n\n(좌측 상단) 계획\n- 공부\n- 친구 관계\n- 바꾸고 싶은 것들\n\n(상단 중앙 부근)\n나는 무엇인가\n살아가면서의 목표는\n[불명확] 무엇인가\n\n(중앙 좌측)\n지금 \n그냥 편안함\n내가 원하는 것 vs 해야할 것\n자유로움을 원하지만\n책임감도 필요\n\n(중앙)\n혼자가 아니라는 거\n친구들과의 관계\n[불명확] 주변 사람들의 배려\n나도 누군가에게\n영향을 주고 있다는 것\n지금 이 순간의 소중함\n\n(우측)\n[불명확]\n행복한 시간\n함께하는 시간\n웃음\n눈물\n그리고 또 다른 내일\n\n(하단)\n마음이 열려있으면\n세상도 열려있다\n[불명개] 그렇게 믿고 싶다\n\n(우측 하단)\nTo. 나에게", "summary": "열린 마음의 중요성과 자기 성찰에 관한 글. 공부, 인간관계, 책임감과 자유의 균형, 친구들과의 소중한 순간들을 통해 현재의 행복을 감사하고 있음.", "tags": ["일상", "고민", "자기성찰", "인간관계", "희망"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p022.jpg", "processed_at": "2026-04-09T23:22:33.860698", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p022"}, {"date": null, "author": null, "content": "I'm happy because you are.\n\n[왼쪽 여백]\n1246년/\n[불명확]\n\n[중앙 빨간 글씨]\nI to miss you.\n그리고 내일쯤 다시 만나\n\n[오른쪽 검은 글씨]\n[불명확한 여러 줄의 한국어 텍스트]\n\n[하단부]\n어떤 날이 우리 영원할 길을 지나갈까\n모든 게 참 소중해\n[추가 불명확 텍스트]", "summary": "행복함을 표현하는 짧은 메시지로, 그리움과 만남에 대한 감정을 담고 있는 방명록 엔트리입니다.", "tags": ["연애", "감정", "일상", "그리움"], "mood": "positive", "decade": "unknown", "image_quality": "fair", "filename": "1999년_열린마음_p023.jpg", "processed_at": "2026-04-09T23:22:37.653070", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p023"}, {"date": null, "author": null, "content": "I'm happy! Because you are!\n\n[좌측 텍스트]\n되어있다 마음\n헛되지 않게 우리\n서로를 돌봐\n이런저런 말들\n마지막 될 때까지 우리 모두\n나누어 질 것\n\n[중앙 텍스트]\n기쁨도 함께 나누고\n슬픔도 함께 나누는\n마음 따뜻한 선후배들 모두에게\n우리는 함께!\n\n[우측 텍스트]\n열린 마음으로 함께라면\n모든 것도 가능할 것 같아\n아무것도 두렵지 않고\n함께하는 그 순간이\n얼마나 소중한지\n느껴본 우리들\n더불어 살아가는\n그 의미를 알게 되었어\n정말 감사해요\n우리 모두에게", "summary": "동아리나 단체 구성원들과의 소중한 추억과 함께함의 의미를 표현한 글입니다. 서로 기쁨과 슬픔을 나누며 열린 마음으로 함께하는 것의 중요성을 강조하고 있습니다.", "tags": ["동아리", "우정", "감사", "공동체", "추억", "긍정"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p024.jpg", "processed_at": "2026-04-09T23:22:42.685959", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p024"}, {"date": null, "author": null, "content": "텍스트가 매우 흐릿하고 손글씨가 작아서 정확한 전사가 어렵습니다. 상단에 여러 스탬프/도장이 보이고, 페이지 전체에 걸쳐 한국어 손글씨가 촘촘하게 적혀있습니다. 주요 내용은 [불명확]합니다.", "summary": "방명록 페이지로 보이며 여러 사람의 손글씨가 기록되어 있습니다. 구체적인 내용 파악이 어렵습니다.", "tags": ["방명록", "일상"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1999년_열린마음_p025.jpg", "processed_at": "2026-04-09T23:22:45.694800", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p025"}, {"date": null, "author": null, "content": "[상단 부분 불명확] 시간이 흘러도 변하지 않는 것들이 있다고 생각해요. 친구들과의 추억, 그리고 이 자리에 함께 했던 모든 것들... 정말 소중한 시간이었어요. 대학생활이 이렇게 빨리 지나갈 줄은 몰랐어요. 아직도 새내기 때 같은데... [중간 부분 불명확] 앞으로도 좋은 일들이 많이 생기기를 바라요. 우리 모두 열린 마음으로 살아가요. 이 노트가 우리의 추억을 간직해주길 바라며... [하단 부분 불명확]", "summary": "시간이 빠르게 지나가는 대학생활을 돌아보며 소중한 추억과 친구들과의 시간을 기억하고 싶어하는 글입니다. 열린 마음으로 앞으로의 좋은 일들을 바라고 있습니다.", "tags": ["일상", "추억", "대학생활", "우정", "졸업"], "mood": "positive", "decade": "2000s", "image_quality": "fair", "filename": "1999년_열린마음_p026.jpg", "processed_at": "2026-04-09T23:22:51.412869", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p026"}, {"date": null, "author": null, "content": "I'm happy Because you are...\n\n(구체적 내용)\nCN 너는\n아웃 [불명확]\n우리 [불명확] 이렇게\n[불명확] 너라서\n노래\n\nPS : 그래도 [불명확] (>>)\n\n[불명확] 마음이 [불명확]\n[불명확]\n[불명확]\n[불명확]\n[불명확]\n\n그리고 [불명확]\n[불명확] 나는\n[불명확]\n[불명확]\n[불명확]\n[불명확]\n\n너는 [불명확] 좋고\n[불명확] 속삭임\n[불명확]\n[불명확]", "summary": "누군가에 대한 긍 , "summary": "봄을 맞이하며 변화를 원하지만 무엇을 어떻게 변해야 할지 몰라 불안해하는 마음을 표현한 글. 현재를 소중히 여겨야 함을 알면서도 계속 미래를 생각하는 자신의 모습에 대한 고민을 나타냈다.", "tags": ["고민", "일상", "감정", "봄", "변화", "불안"], "mood": "negative", "decade": "unknown", "image_quality": "fair", "filename": "1999년_열린마음_p030.jpg", "processed_at": "2026-04-09T23:23:14.046567", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p030"}, {"date": null, "author": null, "content": "[좌측 상단]\n아 힘들어\n누굴 기다리는\n내가 이상한 건가\n아직도...\n\n[중앙-상단]\n아 정말\n스스로를 위해\n살아야한다\n근데...\n내가 변할 수 있을까\n\n[중앙-중간]\n그 때 그 모습\nTr of it\n[불명확]\n\n[우측]\n[여러 줄의 불명확한 손글씨]\n깨달음\nKing\n[불명확]\n\n[하단 우측]\n더 이상 감정에\n [불명확]\nopp [불명확] 2 barp\n\n[상단 여러 스탬프/낙서 이미지 포함]", "summary": "작성자의 내적 고민과 자기반성이 담긴 짧은 메모. 누군가를 기다리는 것에 대한 의문과 자기 자신의 변화에 대한 성찰이 나타남.", "tags": ["고민", "자기반성", "감정", "일상"], "mood": "negative", "decade": "unknown", "image_quality": "poor", "filename": "1999년_열린마음_p031.jpg", "processed_at": "2026-04-09T23:23:18.894522", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p031"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n현재 \"열린마음\" 학과 방명록에\n이렇게 써주셔서 감사합니다\n저도 [불명확] 되기를 바라며\n열린 마음으로 생활하겠습니다\n\n[불명확] 무언가 적혀있는 부분\n여기 오셔서 [불명확]\n그리고 [불명확]\n이 모두 [불명확]\n\n오른쪽 페이지:\n★ 별글 ★\n함께 있어 좋았던 [불명확]\n여름 방학 때의 추억과 함께\n이 나날들이 [불명확] 것들이\n★ ★\n3.12.\n\n★\n다시 만날 때까지\n함께 하자\n같은 꿈을 향해 나아가자\n★\n\n2.2A\n\n[불명확] 명\n[불명확] 자 2 [불명확]", "summary": "학과 방명록에 남긴 메시지로, 열린 마음으로 생활하겠다는 다짐과 함께 함께한 추억과 재만남에 대한 소망을 표현하고 있습니다.", "tags": ["신입생", "졸업", "추억", "다짐", "우정"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p032.jpg", "processed_at": "2026-04-09T23:23:26.565213", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p032"}, {"date": null, "author": null, "content": "I'm happy because you are.\n\n안녕하세요 열린마음입니다\n저는 요즘 많은 생각을 하고 있습니다\n우리가 정말로 행복한지\n정말로 옳은 길을 걷고 있는지\n[불명확]\n\n[불명확]\n\n그런데 생각해보니\n우리는 이렇게 서로를 위해서 [불명확]\n그 순간만으로도 충분히 행복하지 않을까\n\n사랑한다는 것은\n단순히 말하는 것이 아니라\n행동으로 보여주는 것\n그리고 상대방을 생각하는 마음\n이 모든 것이 모여서\n진정한 사랑이 되는 것 같아요\n\n우리 함께\n이 마음을 잃지 말고\n계속 나아가요\n\n그리고 미안해\n그리고 고마워\n그리고 사랑해\n\n[불명확 부분 여러 곳]", "summary": "작성자는 행복에 대해 생각하며, 서로를 위하는 마음과 행동으로 보여주는 사랑의 의미를 표현하고 있습니다. 상대방에게 미안함, 감사함, 그리고 사랑을 전하고 있습니다.", "tags": ["일상", "감정", "사랑", "고민"], "mood": "positive", "decade": "2000s", "image_quality": "fair", "filename": "1999년_열린마음_p033.jpg", "processed_at": "2026-04-09T23:23:35.101607", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p033"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n아침에 일어나니 날씨가 참 좋다\n오늘따라 기분도 좋고\n모든 게 잘 될 것 같은 느낌\n\n중간 페이지:\n요즘 자꾸만 생각이 많아진다\n앞으로 어떻게 살아갈지\n뭘 해야 할지 [불명확]\n근데 그런 생각도 좋은 것 같다\n\n오른쪽 페이지:\n친구들을 보면서 생각해본다\n우리가 함께한 시간들\n정말 소중한 것 같다\n앞으로도 이런 마음을 잃지 말아야겠다\n모두가 행복했으면 좋겠다\n우리의 우정이 영원하기를\n[불명확] 추억이 되어도\n언제나 기억하고 싶다", "summary": "작성자는 좋은 날씨와 긍정적인 기분 속에서 미래에 대한 생각과 친구들과의 소중한 추억을 되돌아보며 우정과 행복을 소망하는 마음을 기록했다.", "tags": ["일상", "고민", "우정", "추억", "행복"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p034.jpg", "processed_at": "2026-04-09T23:23:40.181394", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p034"}, {"date": null, "author": null, "content": "In happy because you are\n\n너의 웃음이 나를 행복하게 만든다\n너의 목소리가 나를 설레게 한다\n너의 모습이 나를 안심시킨다\n너의 존재가 나를 완전하게 만든다\n\n세상의 모든 것들이 내게 중요하지 않아\n오직 너만이 내 마음 속에 있어\n너와 함께 하고 싶고\n너와 함께 있고 싶어\n\n[불명확한 부분들이 있음]\n...나의 모든 것을 줄 수 있을 것 같아\n너와 함께라면 어떤 것도 두렵지 않아\n\n너의 손을 잡고\n너와 함께 걷고 싶다\n영원히...", "summary": "누군가를 사랑하는 마음을 담은 감성적인 글귀들입니다. 상대방의 웃음, 목소리, 존재 자체가 주는 행복감을 표현하고 있으며, 함께하고 싶은 간절한 마음을 드러내고 있습니다.", "tags": ["연애", "감성", "사랑", "고백"], "mood": "positive", "decade": "unknown", "image_quality": "fair", "filename": "1999년_열린마음_p035.jpg", "processed_at": "2026-04-09T23:23:44.875864", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p035"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n숨겨진 이야기들 많은데\n아무도 모를 거야\n그래도 혼자가 아니라는 생각에\n힘을 낼 수 있어\n[불명확]\n오늘도 웃으면서\n내일을 기다려\n\n중앙 페이지 (빨간 펜글씨):\n[불명확한 부분 많음]\n따뜻한 말 한마디\n정말 소중하다는 걸\n요즘 더욱 느껴\n고마워\n\n오른쪽 페이지:\n098년 3월 4일\n[불명확]\n아저씨\n옆에 앉은\n따스한\n눈빛이\n자꾸 떠올라\n생각만 해도\n웃음이 나\n밤하늘\n그리워\n안녕", "summary": "누군가 마음속 이야기를 담아 적은 일상 노트. 혼자가 아니라는 위로와 따뜻한 감정들, 감사함과 그리움이 담긴 글귀들이 적혀있다.", "tags": ["일상", "감정", "감사", "그리움", "희망"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p036.jpg", "processed_at": "2026-04-09T23:23:50.038224", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p036"}, {"date": null, "author": null, "content": "In happy Because you are.\n\nDay마다 Bear이 나와함께 있었네요\n계절이 바뀌어도 너의 옆에서\n이렇게 함께할 수 있기를...\n\n혼자가 아닌 우리가 함께라는 것이\n그리고 너의 모든 것이\n정말 소중하다는 것을\n미안하고 감사한 마음으로\n다시 한번 느낀다\n\n언제나 나의 곁에 있어주어\n정말 고마워\n너의 따뜻함과 배려로\n나는 더 나은 사람이 되어가는 것 같아\n\n계속해서 우리가 이렇게\n함께할 수 있으면 좋겠어\n너라는 사람이 내 옆에 있다는 것만으로\n모든 게 괜찮아\n\n사랑해\n항상 곁에 있어줘서 고마워\n[불명확]\n\nOct! ♥\n[불명확]", "summary": "작성자가 소중한 사람(Bear으로 표현된 것 같은 친구 또는 연인)에게 감사와 사랑의 감정을 전하는 내용입니다. 계절의 변화 속에서도 함께할 수 있음에 대한 고마움과 그 사람의 존재만으로 모든 것이 괜찮다는 따뜻한 메시지를 담고 있습니다.", "tags": ["연애", "감사", "감정", "우정", "사랑"], "mood": "positive", "decade": "2000s", "image_quality": "fair", "filename": "1999년_열린마음_p037.jpg", "processed_at": "2026-04-09T23:23:55.671347", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p037"}, {"date": null, "author": "정혜주(推荐)", "content": "이 페이지는 여러 사람의 필기가 섞여 있습니다. 왼쪽 상단: '99년 입학을 축하하며...' 로 시작하는 텍스트가 있고, 여러 줄의 한국어 필기가 보입니다. 중앙: 큰 글씨로 된 한국어 텍스트로 '젊은 마음으로 함께 나누고 싶은 마음입니다' 등의 내용이 보입니다. 오른쪽: 빨간 펜으로 '당신은 어떤 사람이고 싶으신가요' 등의 질문과 답변으로 보이는 텍스트들이 있습니다. 하단에는 여러 개의 도장/스탬프와 필기가 있습니다. 전반적으로 방명록 형식의 여러 사람의 메모와 인사말이 섞여 있습니다.", "summary": "1999년 신입생을 환영하는 선배들의 격려 메시지와 자기소개, 그리고 상호작용 질문들이 담긴 방명록 페이지입니다. 따뜻한 마음으로 새로운 학기를 시작하는 학과 신입생들을 축하하고 격려하는 내용입니다.", "tags": ["신입생", "환영", "격려", "자기소개", "1999년", "학과행사"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p038.jpg", "processed_at": "2026-04-09T23:24:00.645989", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p038"}, {"date": null, "author": null, "content": "수요일 밤 11시\n\n(O) 뭔가 이상한 기분\n비가 자꾸만 걱정이고\n학교에서 뛰어다니다가\n계단에서 넘어졌어\n\n99. 3. 15\n\n그 날 이후로 정신이 안 드네\n\n\n(2) 느낌 - 마음 - 감정\n\n아파서 잠을 못 자니까\n눈이 자꾸만 감긴다\n(하나 둘)\n아무도 모를 거야\n그렇게 혼자 시간만 흘러가고\n\n글쎄 - 나는 왜 이래\n\n오늘 하루\n시험도 잘 봤고\n[불명확] 했는데\n\n그 이후로 왜이래\n\n\n아 병 같은 생각들 하지 말아야지\n최근에 좋은 일 있었는데\n(고)마음(고)를 감싸줄 것 같은\n2명(명) 때문에", "summary": "1999년 3월 15일 작성된 일상 노트로, 작성자는 학교에서 계단에서 넘어진 사건 이후 정신이 들지 않고 불안감을 느끼고 있습니다. 시험은 잘 봤지만 마음이 복잡하며, 최근에 도움을 주는 사람들 때문에 마음을 다잡으려고 노력하고 있습니다.", "tags": ["일상", "고민", "감정", "불안"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p039.jpg", "processed_at": "2026-04-09T23:24:09.958909", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p039"}, {"date": null, "author": null, "content": "In happy because you are.\n\n[좌측 상단 한글 텍스트]\n우리 헌금 사랑하고\n그리고 우리가 행복\n[불명확]\n\n[중앙 및 우측 전체 페이지]\n복잡한 수학/과학 공식 및 계산식들이 손으로 쓰여있음:\n- 적분 관련 수식\n- 분수 및 함수식\n- 미분 관련 내용\n- 물리 공식으로 보이는 식들\n- 각종 수학 기호 (∫, ∑, √ 등)\n[전체 내용 정확한 전사 불가 - 매우 복잡하고 불명확]", "summary": "페이지 상단에 긍정적인 영어 문구와 한글 메모가 있으며, 대부분의 페이지는 수학 또는 물리학 관련 공식과 계산식으로 채워져 있는 학습 노트입니다.", "tags": ["공부", "수학", "과학"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p040.jpg", "processed_at": "2026-04-09T23:24:14.927840", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p040"}, {"date": null, "author": null, "content": "Good Luck on\nyour [불명확]\n98 봄방학\n오려고\n했는데\n[불명확]\n\n[우측 페이지 텍스트 - 매우 흐림]\n[불명확한 필기체 한글 다수]\n졸업\n공부\n[불명확]", "summary": "1990년대 후반 학과 방명록으로 보이며, 누군가에게 응원 메시지를 남기고 있습니다. 봄방학과 관련된 내용이 포함되어 있습니다.", "tags": ["일상", "응원", "신입생", "1990s"], "mood": "positive", "decade": "1990s", "image_quality": "poor", "filename": "1999년_열린마음_p041.jpg", "processed_at": "2026-04-09T23:24:18.306926", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p041"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n'I'm happy. Because you are so beautiful'\n[그림: 여러 개의 파도 모양 드로잉과 얼굴 그림]\n\n오른쪽 페이지:\n[불명확한 한글 필기 텍스트 - 매우 작고 밀집되어 있음]\n여러 문장의 손글씨로 보이나 사진의 각도와 해상도로 인해 정확한 판독이 어려움\n[불명확]", "summary": "영문 메시지와 함께 감정을 표현하는 그림이 그려진 페이지. 우측에 한글 텍스트가 있으나 명확한 판독이 어려운 상태.", "tags": ["일상", "감정", "그림"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p042.jpg", "processed_at": "2026-04-09T23:24:22.531571", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p042"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n공부 2학년\n[불명확한 텍스트 다수]\n교과서를 많이 읽어야 한다\n시험공부를 열심히 해야 한다\n[불명확]\n\n중간 페이지:\n혼자가 아니라는 것을 깨달았고\n함께 나눌 수 있는 것이\n더 좋은 것 같다\n[불명확한 텍스트]\n\n오른쪽 페이지:\n22년 [불명확]\n[여러 줄의 불명확한 필기]\n마음이 통한다는 것\n우리가 함께 할 수 있다\n[불명확한 내용들]\n8 [원형 표시]", "summary": "대학 2학년 학생이 작성한 것으로 보이는 노트로, 공부와 시험에 대한 언급과 함께 혼자가 아니라는 깨달음과 함께하는 것의 소중함에 대해 기술하고 있습니다.", "tags": ["공부", "일상", "고민", "성찰"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "1999년_열린마음_p043.jpg", "processed_at": "2026-04-09T23:24:26.474971", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p043"}, {"date": null, "author": null, "content": "안녕하세요. 저는 [불명확]입니다.\n\n[좌측 상단 영역 - 읽기 어려움]\n\n[중앙 영역]\n어느새 봄이 되었네요. 새 학기가 시작되고 새로운 사람들을 만나면서 설레임이 가득합니다. 열린마음 동아리에서 좋은 선배, 후배들을 만날 수 있어서 정말 다행입니다. 이곳에서 많은 추억을 만들고 싶습니다. 항상 감사합니다.\n\n[우측 상단]\n그림 그리기 (얼굴 스케치)\n\n[하단부 - 수기 서명 및 도장 인장 부분]\n[불명확]", "summary": "새 학기를 맞이하며 열린마음 동아리에서의 설렘과 감사함을 표현한 글입니다. 새로운 사람들을 만나며 좋은 추억을 만들고 싶다는 긍정적인 마음을 담고 있습니다.", "tags": ["신입생", "동아리", "봄", "새학기", "감사"], "mood": "positive", "decade": "2000s", "image_quality": "fair", "filename": "1999년_열린마음_p044.jpg", "processed_at": "2026-04-09T23:24:30.978146", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p044"}, {"date": null, "author": null, "content": "1. 중요한 것이 B=2임다.\n   나의 공부 B=2임다\n\n2. 최종적으로는 꿈을 찾는 것이 가장 중요하다는 것을 깨달았다. / 좋은 시절의 기억 / 또 같이 있으면서 든 생각 / 이런 게 [불명확] / 시험 준비하면서 / 열린 마음 / 이것이 숲을 보는 것\n\n3. 공부하면서는 시험 오를 것같다. - 나만 / 오지 않을까 / 불안함\n\n4. 71일이 지났어 기억이 어떻게 / 너무 빨리 지나가 / 놓친 게 많아 / 아쉬움이 어떤가 해\n\n7년 동안 미리 전하고 싶은 말 / 많은 추억 / 다른 곳에 / 남겨둔 후 / 또 다른 내일을 향해 / 새롭게 / 나아가자는 의지 / 전해주고 싶다는 마음", "summary": "학생이 공부와 성적(B=2)에 대한 생각, 시험에 대한 불안감, 그리고 빠르게 지나가는 시간에 대한 아쉬움을 표현하고 있습니다. 새로운 내일을 향해 나아가려는 의지를 담고 있습니다.", "tags": ["공부", "시험", "고민", "일상", "성찰", "불안감"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p045.jpg", "processed_at": "2026-04-09T23:24:36.613060", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p045"}, {"date": null, "author": null, "content": "[불명확한 부분이 많음]\n좌측 상단: 창공\n중앙부: 다양한 한글 텍스트로 작성된 내용들이 있으나 필적이 작고 겹쳐있어 정확한 판독 어려움\n중앙에 볼펜으로 그린 낙서/그림 있음 (담배 또는 길쭉한 물체 형태)\n우측: 추가 한글 텍스트 (역시 판독 어려움)\n하단: 빨간색 잉크/펜의 흔적 있음", "summary": "노트의 여러 곳에 한글 필기가 있으나 필적이 작고 겹쳐있으며, 중앙에 간단한 낙서가 그려져 있습니다. 전체 내용을 정확하게 판독하기 어렵습니다.", "tags": ["일상", "노트"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p046.jpg", "processed_at": "2026-04-09T23:24:43.840145", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p046"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n[불명확한 상단 텍스트]\n예쁜 글씨로 마음\n[여러 줄의 불명확한 텍스트]\n\n오른쪽 페이지:\n[상단 분홍색 낙서/그림들]\n[여러 줄의 한글 텍스트가 있으나 각도와 필체로 인해 정확한 판독이 어려움]\n전체적으로 손글씨가 기울어져 있고 여러 색상의 펜으로 작성되었으며\n구체적인 단어들이 명확하지 않음", "summary": "학과 방명록에 작성된 것으로 보이는 페이지로, 여러 사람의 손글씨가 섞여 있으며 분홍색 그림과 함께 메시지가 기록되어 있습니다.", "tags": ["방명록", "일상", "추억"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1999년_열린마음_p047.jpg", "processed_at": "2026-04-09T23:24:47.908263", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p047"}, {"date": null, "author": null, "content": "S야 힘내!! 파이팅!!\n\n[불명확] 언제나 웃음으로 가득 찬 [불명확]\n\n오늘도 이렇게 [불명확]\n어제나 오늘이나 [불명확]\n\n우리 함께 해요\n[불명확] 힘내!!\n\n잠깐만 견디자\n우리 곧 졸업이야\n더 이상 견디지 말고\n그냥 우리 [불명확]\n\n좋은 일 가득할거야\n행운이 가득할거야\n우리 함께라면\n\n계절이 바뀌어도\n추억은 남아있고\n우리 인연은 계속되고\n[불명확]\n\n내가 옆에 있으니까\n걱정하지 마\n함께 이겨내자\n\n너를 믿으니까\n우리는 될 거야\n[불명확] 할 수 있어\n화이팅!!", "summary": "친구에게 격려와 응원의 메시지를 담은 위로의 글. 힘들어하는 친구를 응원하며 함께 이겨내자는 희망적인 메시지.", "tags": ["일상", "우정", "격려", "위로", "공부"], "mood": "positive", "decade": "2000s", "image_quality": "fair", "filename": "1999년_열린마음_p048.jpg", "processed_at": "2026-04-09T23:24:52.688726", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p048"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n몸과 마음이\n자유로워지는\n순간이 있다\n\n그런 순간을 위해\n우리는 살아가는\n것은 아닐까\n\n그런 자유로움을\n경험하기 위해\n우리는 공부하고\n일하고 때론 쉬면서\n살아간다\n\n오늘도 그런\n순간을 찾아\n살아가자\n\n오른쪽 페이지:\n[장문의 손글씨 텍스트 - 여러 단락으로 구성]\n이 세상의 가치관이나 삶의 의미에 대해 깊이 있게 서술한 내용으로 보임\n[불명확] 부분이 많아 정확한 전사 어려움\n주요 내용: 인생, 의미, 자유, 선택, 책임 등에 관한 성찰적 글쓰기", "summary": "삶의 의미와 자유로움에 대한 철학적 성찰. 일상 속에서 자유로운 순간의 가치를 발견하고 그것을 추구하는 삶의 방식에 대한 깊이 있는 사유.", "tags": ["일상", "고민", "철학", "성찰", "삶"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1999년_열린마음_p049.jpg", "processed_at": "2026-04-09T23:24:57.543654", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p049"}, {"date": null, "author": null, "content": "8월이 없어서\n기다려 왔는데\n이제 기다릴 수 없어\n\n다시 또 기다려야 한다\n\n그런데 기다리다 보면\n기다리던 것도 잊혀지고\n기다리는 것도 잊혀지고\n그저 기다리는 것만 남는다는데\n그래도 기다릴 거야\n그래도 기다릴 거야\n\n...\n\n기다린다\n\n기다리는 마음\n기다리는 [불명확]\n그리운 얼굴\n그리운 [불명확]\n그리운 말들\n그리움\n그리움\n그리움\n\n[불명확] 찾아보니 이미 봄이 되어있었다\n그동안 뭘 했나?\n나는 뭘 했나?\n나는 뭘 했나?\n\n자꾸 뒤돌아보게 된다\n자꾸 비교하게 된다\n자꾸 [불명확]하게 된다\n\n...\n\n이제 뭘 할까\n[불명확] 있는 나\n아무것도 아닌 나\n\n앞으로 어떻게 될까", "summary": "저자는 기다림의 감정과 시간의 흐름에 대해 성찰하며, 봄을 맞이하며 자신의 지난날을 돌아보고 불안감을 드러낸다. 자기 자신을 낮추며 미래에 대한 불확실성을 표현하고 있다.", "tags": ["일상", "고민", "감정", "자기성찰"], "mood": "negative", "decade": "unknown", "image_quality": "fair", "filename": "1999년_열린마음_p050.jpg", "processed_at": "2026-04-09T23:25:02.897614", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p050"}, {"date": null, "author": null, "content": "안녕 나는야 OH그룹 에어씨입니다.\n어쩌다 우리팀에 들어오게 되었어요. 웨에헤해\n[불명확]\n\n처음 만나는 우리 팀원들과 함께 시간을 보내며 정말 즐거웠어요. 그들과 함께라면 언제나 웃음이 끊이지 않을 것 같아요.\n정말 고맙습니다. 우리 모두 화이팅!\n\n좋은 추억 많이 만들어요. 우리 팀 최고!!!\n\n그리고 한 가지 더 - 이 페이지를 보는 미래의 누군가에게: 우리가 함께한 시간들이 당신의 마음에도 따뜻한 기억으로 남기를 바랍니다. [불명확] 우리는 항상 당신을 응원합니다!\n\n화이팅!!! 파이팅!!!\n\n[불명확한 부분들로 인해 정확한 전체 내용 파악 어려움]", "summary": "학과 방명록에 OH그룹의 에어씨가 새로운 팀에 들어온 경험을 기록하며, 팀원들과의 즐거운 시간과 좋은 추억을 만들기를 원하는 긍정적인 메시지를 남겼습니다.", "tags": ["신입생", "팀활동", "MT", "일상", "우정"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p051.jpg", "processed_at": "2026-04-09T23:25:08.247457", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p051"}, {"date": null, "author": null, "content": "응답 4th 나이까지 계속되는 이 문제\n아를 이해할 수 있을 것 같아\n\n이제 아무도 모르겠지\n아무도 말해줄 수 없어\n[불명확] 되는 건 단순히 [불명확]\n이런 식으로 끝날 리가 없지\n\n아 어떻게 해야 하나\n더 이상 기다릴 수 없어\n또 하나씩 잃어가고 있어\n얼마나 더 참아야 하나\n느껴지는 게 없어\n\n아무것도 [불명확] 없지\n움직일 수 없어\n계속 이대로만 [불명clara]\n\n(손글씨로 작성된 메모로 개인적인 고민과 감정을 표현한 일상 노트)", "summary": "개인적인 고민과 감정적 어려움을 표현한 일상 노트. 답답함과 무력감을 드러내며 현재 상황에 대한 답답한 심정을 기록하고 있습니다.", "tags": ["고민", "감정", "일상", "심리"], "mood": "negative", "decade": "unknown", "image_quality": "fair", "filename": "1999년_열린마음_p052.jpg", "processed_at": "2026-04-09T23:25:12.470874", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p052"}, {"date": null, "author": null, "content": "[불명확] 열린마음 [불명확]\n\n여기는 정말 좋은 곳이에요. [불명확] 만나는 모든 사람들이 [불명확]\n\n저는 이곳에서 많은 것을 배웠어요. 친구들과의 시간, 선배님들과의 대화, [불명확]\n\n특히 기억에 남는 것은 [불명확] 함께했던 시간들이에요.\n\n[중앙에 복잡한 낙서/그림이 있음]\n\n이 페이지의 오른쪽에는 추가 글씨가 있으나 [불명확]\n\n앞으로도 이곳이 따뜻한 공간으로 남기를 바래요.\n\n[불명확] 시간이 흘러도 잊지 못할 추억들이 가득한 곳입니다.", "summary": "열린마음이라는 공간에서의 긍정적인 경험과 추억을 기록한 방명록 페이지. 친구들과 선배들과의 만남과 대화를 통해 배운 점들과 함께한 시간들을 소중히 여기고 있습니다.", "tags": ["일상", "추억", "공동체", "감성"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p053.jpg", "processed_at": "2026-04-09T23:25:20.223629", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p053"}, {"date": null, "author": null, "content": "2M 09시 \n\n처음 만나 인사를 나누고 친해지는 과정들이 힘들지만 \n그 속에서 친구들의 진심을 느낄 수 있어서 좋다\n마음이 [불명확] 따뜻해진다\n\n앞으로도 계속 함께 할 수 있으면 좋겠다\n우리 반이 최고가 되길 바란다\n\n[중앙 부분 - 손글씨로 작성된 긴 문장들]\n학교생활이 벅차고 힘들 때도 있지만\n이렇게 소중한 친구들이 있어서 다행이다\n[불명확]\n앞으로도 함께 웃고 울 수 있는 친구가 되길 바란다\n\n그리고 [불명확] 내가 할 수 있는 것들을 최선을 다해\n하려고 노력해야겠다\n\n[우측 상단 - 작은 글씨 메모]\n추억을 만드는 것도 중요하지만\n지금 이 순간을 소중히 여기는 것이 더 중요하다\n함께 있는 시간들이 모두 소중하다\n\n[하단 - 데코레이션과 함께 추가 메모들]", "summary": "학년 초 친구들과의 만남과 관계 형성에 대한 따뜻한 감정을 나타낸 글. 함께하는 시간의 소중함과 앞으로의 우정을 바라는 마음이 담겨있다.", "tags": ["신입생", "우정", "일상", "학교생활", "감정"], "mood": "positive", "decade": "2000s", "image_quality": "fair", "filename": "1999년_열린마음_p054.jpg", "processed_at": "2026-04-09T23:25:27.264800", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p054"}, {"date": null, "author": null, "content": "MT에 대한 이야기\n\n어쨌든 좋았어 내가 쓰고 싶은 건 이런 거고\n어떨 때는 신나고 어떨 때는 [불명확]\n따뜻한 말 한마디도 들으면 되고\n화나고 울어도 괜찮고\n[불명확] 있으면 되고\n주말 되면 놀고\n그럼 되는 거다\n그런 인생이 되기를...\n\n좋은 사람들과 함께 할 수 있는 시간들이 가장 소중한 것 같다. 앞으로도 이런 추억들이 많이 생겼으면 좋겠다.", "summary": "MT 경험을 통해 느낀 소중함과 인생에 대한 생각. 따뜻한 관계와 함께하는 시간의 중요성을 표현한 따뜻하고 긍정적인 글.", "tags": ["MT", "일상", "우정", "추억", "고민"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p055.jpg", "processed_at": "2026-04-09T23:25:30.912577", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p055"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n[불명확한 텍스트 다수]\n우리의 관계 속에서...\n마음이 흔들리고\n[불명확]\n\n중앙 페이지:\n안녕 반가워\n[불명확한 필체의 한글 텍스트]\n그럼 잘 지내\n[불명확]\n\n오른쪽 페이지:\n[불명확한 붉은 펜으로 쓴 텍스트]\n너 오늘 뭐 해?\n[불명확한 내용]\n생일축하해\n[여러 줄의 축하 메시지 및 불명확한 텍스트]\n[밑에 빨간 도장/스탬프 여러 개]", "summary": "방명록 페이지로 보이며, 여러 사람이 남긴 메시지와 축하 글들이 담겨 있습니다. 필체가 다양하고 붉은 펜과 검은 펜으로 작성되었으며, 맨 아래에는 여러 도장이 찍혀 있습니다.", "tags": ["방명록", "일상", "축하", "우정"], "mood": "positive", "decade": "1990s", "image_quality": "poor", "filename": "1999년_열린마음_p056.jpg", "processed_at": "2026-04-09T23:25:35.149262", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p056"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n안녕 힘내기\n[불명확] 되어야겠네\n더 열심히 해야겠다\n[불명확]\n\n중앙 페이지:\n얘기 좀 해주면 좋겠어\n근데 이렇게 모여있으니까\n다들 얘기가 많네\n뭔가 꺼내기가 좀 어렵긴 했지만\n좋은 사람들을 만났다는 게 좋다\n모두 화이팅!!\n\n오른쪽 페이지:\n진짜 많은 걸 배우는 것 같아\n같이 있으니까 더 좋고\n우리 팀 화이팅!!\n[불명확] 전에 이렇게 모이자\n앞으로도 계속 [불명확]\n우리 모두 열심히 하자\n[불명확]", "summary": "학과 방명록의 페이지로, 여러 사람들의 응원 메시지와 긍정적인 다짐이 기록되어 있습니다. 함께하는 시간의 소중함과 팀 정신을 강조하는 내용입니다.", "tags": ["일상", "신입생", "행사", "팀", "응원", "다짐"], "mood": "positive", "decade": "unknown", "image_quality": "fair", "filename": "1999년_열린마음_p057.jpg", "processed_at": "2026-04-09T23:25:39.654892", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p057"}, {"date": null, "author": null, "content": "정중히 인사 올립니다\n\n저는 이제 곧 떠나갈 OO입니다. 학과 방명록에 글을 남기려 했지만 시간이 없어서 이렇게 나마 인사를 드립니다. 1년 동안 많이 배우고 도움을 많이 받았습니다. 특히 [불명확] 선생님과 선배님들께 감사드립니다.\n\n이곳에서의 추억은 제 인생의 소중한 자산이 될 것입니다. 앞으로도 화이팅하기를 바라며, 저도 어디서나 열심히 살겠습니다.\n\n마지막으로 모든 분들께 인사를 올립니다. 그리고 [불명확] 화이팅!\n\n모두 안녕히 계세요. 저는 모두 잘 [불명확]하기를 바랍니다.\n\n[서명]", "summary": "졸업을 앞두고 학과 방명록에 인사를 남기는 글. 1년간의 감사함과 추억을 나누고 향후 열심히 살겠다는 다짐을 표현하고 있다.", "tags": ["졸업", "인사", "감사", "추억", "일상"], "mood": "positive", "decade": "unknown", "image_quality": "fair", "filename": "1999년_열린마음_p058.jpg", "processed_at": "2026-04-09T23:25:45.287769", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p058"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n정말 많은 생각이 든다. 지난날들을 돌아보면서 정말 소중한 시간들이었다는 생각이 든다. 그리고 앞으로의 미래도 밝을 거라는 생각이 든다. 우리 모두 열심히 살아가자. 그리고 항상 웃으면서 살아가자. 정말 좋은 추억이 많이 생겼다. 이 시간들이 정말 소중하다는 생각이 든다. 앞으로도 함께할 수 있으면 좋겠다.\n\n오른쪽 페이지:\n[불명확한 상단 텍스트]\n내 친구들이 최고야. 우리 모두 화이팅!\n\n99.3.22. [날짜]\n[불명확]\n(2)\n오늘도 좋은 하루였어. 내일도 화이팅!\n[불명확한 하단 텍스트]", "summary": "지난날들에 대한 감사함과 소중함을 표현하며, 앞으로의 미래에 대한 긍정적인 마음과 친구들과의 우정, 그리고 일상의 소소한 행복함을 기록한 일상 노트 페이지입니다.", "tags": ["일상", "우정", "추억", "감사", "긍정", "신입생"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p059.jpg", "processed_at": "2026-04-09T23:25:50.074270", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p059"}, {"date": null, "author": null, "content": "Happy Birthday!\n\n안녕! 오늘은 너의 생일이네.\n너에게 편지를 쓰네... 글쎄다 잘 모르겠지만\n너를 생각하면 자꾸 웃음이 나와.\n우리가 처음 만났을 때를 기억해?\n[불명확] 그때 너는 정말 [불명확]였고\n지금도 변함없이 [불명확]하네.\n\n앞으로도 함께할 수 있으면 좋겠어.\n너와의 추억들이 너무 소중해.\n언제나 옆에 있어줄게.\n\n이 노트에 쓰는 글이 [불명확]가\n전해지길 바라며...\n\n생일 축하해!\n앞으로도 행복하길 바래.\n\n[하단에 낙서 및 데코레이션 있음]", "summary": "생일을 축하하며 상대방과의 소중한 추억과 감정을 표현한 따뜻한 편지. 함께하고 싶은 마음과 우정 또는 애정을 담은 메시지.", "tags": ["생일", "축하", "우정", "감정표현", "추억"], "mood": "positive", "decade": "unknown", "image_quality": "fair", "filename": "1999년_열린마음_p060.jpg", "processed_at": "2026-04-09T23:25:57.818038", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p060"}, {"date": null, "author": null, "content": "왼쪽 섹션:\n[불명확한 부분 있음]\n아쉽지만 돌아가기 전에\n날씨도 좋고 맑은 마음으로\n함께할 수 있어서 즐거웠어\n앞으로도 잘 지내자\n\n중앙 섹션:\n한글로 쓰인 메시지들\n[여러 줄의 손글씨가 있으나 각도와 필기체로 인해 일부 불명확]\n\n오른쪽 섹션:\n좋은 추억을 만들어주셔서 감사합니다\n행복한 시간들이\n앞으로도 계속되길\n[불명확]\n\n우측 상단:\n[서명 또는 낙관으로 보이는 글씨]", "summary": "학과 방명록에 남긴 감사 인사와 좋은 추억에 대한 글귀들이 담겨있습니다. 함께한 시간에 대한 긍정적인 감정과 앞으로의 우정을 바라는 마음이 표현되어 있습니다.", "tags": ["일상", "감사", "추억", "우정"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p061.jpg", "processed_at": "2026-04-09T23:26:02.604902", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p061"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n하고싶은 일이 많아서 인생이 좀 바쁜 것 같지만 그래도 즐거운 것 같다. 꿈이 있고 그 꿈을 위해 노력하는 과정이 행복하다고 생각한다. 지금은 힘들겠지만 나중에 보면 이 시간들이 얼마나 소중했는지 알 것 같다.\n\n가운데 페이지:\n열심히 살자. 꿈을 잃지 말자. 내가 원하는 것이 뭔지 다시 한번 생각해보자. 열린마음으로 세상을 바라보자. [불명확] 할 수 있는 용기를 가지자.\n\n오른쪽 페이지:\n고등학교 때부터 지금까지 많이 변했다. 더 성숙해졌고 더 많은 것을 알게 되었다. 하지만 여전히 부족한 부분이 많다. 계속 배우고 성장하려는 마음가짐을 잃지 말아야겠다. [불명확] 이것이 나의 좌우명이다.", "summary": "작성자는 바쁜 일상 속에서도 꿈을 향한 노력이 행복하다고 표현하며, 열린마음으로 살아가기를 다짐하고 있습니다. 고등학교 이후의 성장을 되돌아보며 계속 배우고 성장하겠다는 의지를 보여줍니다.", "tags": ["일상", "고민", "꿈", "성장", "성찰"], "mood": "positive", "decade": "2000s", "image_quality": "fair", "filename": "1999년_열린마음_p062.jpg", "processed_at": "2026-04-09T23:26:07.955129", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p062"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n[불명확한 텍스트 다수]\n\n오른쪽 페이지:\n[사람의 얼굴 스케치]\n\n[불명확한 한글 텍스트 - 여러 줄]\n\n중간 부분:\n- 동물(토끼/고양이) 스케치 여러 개\n- 손가락 스케치\n- 다양한 낙서와 함께 한글 텍스트\n\n텍스트 일부 가독 부분:\n\"...혼자서도...\"\n\"...생각...\"\n\"...친구...\"\n\"[파란색 펜으로 작성된 부분]\"\n\n[전반적으로 필기와 낙서가 섞여있어 정확한 전사가 어려움]", "summary": "낙서와 필기가 섞인 페이지로, 사람 얼굴과 동물 스케치가 포함되어 있습니다. 전반적으로 텍스트가 흐리고 읽기 어려워 명확한 내용 파악이 곤란합니다.", "tags": ["일상", "낙서"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1999년_열린마음_p063.jpg", "processed_at": "2026-04-09T23:26:12.180074", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p063"}, {"date": null, "author": null, "content": "안녕하세요?\n\n안녕하세요!\n여기 왔어요?\n[불명확] 하고 싶어요\n[불명확] 했어요\n\n오늘도 [불명확]\n사실 많이 [불명확]\n[불명확] 하면서\n[불명확]\n\n[불명확] 했어요\n[불명확] 친구들도 많고\n재미있는 시간 보낼 수 있어서 좋아요\n\n[불명확] 도와줘서 고마워요\n항상 응원해요!\n화이팅!\n\n앞으로 열심히 노력해서\n좋은 결과 만들기를 바랄게요\n항상 응원하고 있습니다\n\n파이팅! [불명확]\n[불명확]\n\n[불명확]\n좋은 시간 되길\n[불명확]\n[불명확]", "summary": "학과 방명록에 남긴 응원과 격려의 메시지. 좋은 추억을 함께 나누고 앞으로의 노력을 응원하는 내용이 담겨있습니다.", "tags": ["방명록", "응원", "졸업", "신입생", "일상"], "mood": "positive", "decade": "2000s", "image_quality": "fair", "filename": "1999년_열린마음_p064.jpg", "processed_at": "2026-04-09T23:26:16.407506", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p064"}, {"date": null, "author": null, "content": "오늘 날씨가 참 좋다\n\"이곳에서 쓴 글들이\" 있다\n\n오늘 일어난 일\n아침에 일어나서 수업을 들었다\n[불명확] 맛있었다\n\n생각해 보니 요즘 [불명확] 많이 생각나\n[불명확] 잘 지내고 있나 싶고\n그런데 연락할 수가 없네\n\n시간이 지나면서 많은 것들이 변했다\n예전처럼 될 수는 없을까\n아니면 앞으로 나아가야 할까\n\n누군가는 이미 떠났고\n누군가는 여기 남아있다\n우리 모두 어디론가 가고 있는 건 아닐까\n\n이런 생각들을 하다 보면\n마음이 무거워진다\n하지만 내일은 또 다른 날이겠지\n\n***[불명확]***\n[불명확] 기대하며\n[불명확] 나아가자", "summary": "작성자의 일상 경험과 그로 인한 감정, 그리운 사람들에 대한 생각, 그리고 시간의 변화에 대한 성찰이 담긴 일상 노트. 약간의 향수와 함께 앞으로 나아가려는 마음이 드러난다.", "tags": ["일상", "고민", "향수", "감정"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p065.jpg", "processed_at": "2026-04-09T23:26:29.485413", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p065"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n마음\n[불명확]\n네 [불명확]\n[불명확] 때로는\n잘 [불명확]\n[불명확]\n그리고\n[불명확]\n[불명확]\n\n오른쪽 페이지:\n[불명확] 있고\n[불명확] 잔잔\n[불명확]\n[불명확] 것도\n[불명확] 있고\n[불명확]\n그러나 [불명확]\n나는 [불명확]\n[불명확] 것들\n[불명확]\n[불명확] 내게\n[불명확]\n[불명확]", "summary": "개인의 마음 상태와 감정에 대한 내성적인 글이 담겨있는 페이지로 보입니다. 복잡한 감정들을 표현하려는 시도가 보입니다.", "tags": ["일상", "고민", "감정"], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1999년_열린마음_p066.jpg", "processed_at": "2026-04-09T23:26:33.089748", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p066"}, {"date": null, "author": null, "content": "In happy Besides you are\n\n[여러 줄의 한국어 손글씨 텍스트]\n\n건강하길 바라며... 아무튼 이렇게 마지막 편지가 되겠지 싶은데 항상 곁에 있어줄 것 같은 느낌이 좋았어. 지금도 생각나고... [불명확]\n\n그 다음에 우리 함께했던 시간들 정말 소중했고, 앞으로도 그럴 것 같아. 항상 웃음 잃지 말고 있으면 좋겠어.\n\n건강하고 행복하길. 다시 만날 때까지!\n\n[원 모양으로 강조된 텍스트 부분 있음]\n\n여러 문장이 추가로 작성되어 있으나 일부는 [불명확]\n\n별 모양 낙서 포함", "summary": "졸업이나 헤어짐을 앞두고 소중한 추억과 감정을 정리한 편지글. 함께한 시간들을 감사하며 앞으로의 건강과 행복을 바라는 내용.", "tags": ["졸업", "우정", "추억", "감성", "헤어짐", "희망"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p067.jpg", "processed_at": "2026-04-09T23:26:38.748601", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p067"}, {"date": null, "author": null, "content": "[불명 ate": null, "author": null, "content": "왼쪽 페이지:\n어떤 것이 나에게 필요한가\n- S.O.S\n\n[여러 줄의 불명확한 텍스트]\n\n중앙/오른쪽 페이지:\n언제나 그렇게만 하면 되는 걸까\n[불명확]\n\nP.S 다시 생각해보니\n[여러 단락의 불명확한 손글씨]\n\n최하단:\n따뜻한 봄날을 맞이하여\n[불명확]\n\n오른쪽 상단:\n마음 깊은 곳에서의\n[여러 줄의 불명확한 텍스트]\n\n우측 하단:\n[여러 줄의 불명확한 텍스트와 수식/기호]", "summary": "마음 깊은 곳의 필요한 것들과 고민을 담은 글귀들. 자신에게 필요한 것이 무엇인지, 그리고 반복되는 패턴에 대한 성찰적 메시지.", "tags": ["고민", "일상", "자기성찰"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p088.jpg", "processed_at": "2026-04-09T23:28:27.565684", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p088"}, {"date": null, "author": null, "content": "열린 마음 — 1페이지\n\n[좌측 상단]\n아름답고 소중한 날들 — 함께하고 싶은 마음\n\n[본문 - 손글씨]\n아직도 기억해요 처음 만났을 때의 설렘을\n함께 웃고 울었던 모든 시간들\n그 어떤 것도 우리를 가로막을 수 없다고 생각했어\n시간이 흘러도 변하지 않을 거라고 믿었어\n\n너와 함께하고 싶은 마음 그리움\n앞으로도 오래오래 함께하고 싶어\n우리의 추억들이 영원하기를\n\n그래도 우리는 해낼 수 있어\n어려운 것도 함께라면 견딜 수 있어\n서로를 믿고 응원해주자\n\n앞으로도 같은 마음으로\n함께 나아가자\n\n[우측 하단]\n세상 그 누구보다도 소중한 너에게\n\n[페이지 우측]\n28", "summary": "절친이나 소중한 사람과의 추억과 관계에 대한 따뜻한 감정을 표현한 글귀입니다. 처음 만남의 설렘부터 앞으로의 약속까지 긍정적이고 사랑스러운 마음이 담겨있습니다.", "tags": ["우정", "추억", "감성", "다짐", "소중함"], "mood": "positive", "decade": "2000s", "image_quality": "fair", "filename": "1999년_열린마음_p089.jpg", "processed_at": "2026-04-09T23:28:33.200548", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p089"}, {"date": null, "author": null, "content": "I'm happy because you are.\n\n[불명확] 있다는 것도 [불명확]\n[불명확] 모르겠지만 [불명확]\n[불명확] 때문에 [불명확]\n[불명확] 라고 [불명확]\n[불명확] 그럼 [불명확]\n[불명확] 고 [불명확]\n[불명확] 라는 [불명확]\n[불명확] 하고 [불명확]\n[불명확] 같아 [불명확]\n[불명확] 해야 [불명확]\n[불명확] 거나 [불명확]\n[불명확] 해서 [불명확]\n[불명확] 될 [불명확]", "summary": "영문으로 '너 때문에 행복하다'는 내용이 적혀있고, 아래로는 한글 텍스트가 적혀있으나 필체와 사진의 선명도로 인해 대부분 읽기 어렵습니다.", "tags": ["일상", "감정"], "mood": "positive", "decade": "1990s", "image_quality": "poor", "filename": "1999년_열린마음_p090.jpg", "processed_at": "2026-04-09T23:28:36.951229", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p090"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n안녕하세요. 저는 [불명확]입니다.\n정말 좋은 시간이 되었습니다. 항상 행복하고 즐거운 시간이 되길 바랍니다. 모두들 화이팅!!\n\n여름방학 때 만나요~ 안녕히~\n정말 감사했어요. 좋은 추억이 될 것 같아요.\n[불명확] 쓰면서 좋은 친구들도 많이 사귀고...\n이렇게 소중한 시간을 가질 수 있어서 감사합니다.\n모두 화이팅!! 열린마음 짱!!\n\n오른쪽 페이지:\n[여러 글씨체의 손글씨로 다양한 메모와 글귀들이 기록되어 있으나 상당 부분이 불명확함]\n[불명확] 주제의 여러 개의 짧은 글귀와 메모들\n일부 읽을 수 있는 부분:\n행운을 빈다\n[불명확]\n[여러 수식이나 기호 포함된 메모들]", "summary": "학과 방명록 페이지로 좋은 시간과 추억에 감사를 표하는 메시지들과 함께 여름방학 후 재회를 바라는 내용이 담겨있습니다. 다양한 필체의 방문자들이 남긴 응원과 격려의 글들이 포함되어 있습니다.", "tags": ["일상", "감사", "추억", "MT", "신입생", "행사"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p091.jpg", "processed_at": "2026-04-09T23:28:43.052982", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p091"}, {"date": null, "author": null, "content": "Hi! Because you are\n[불명확] pretty [불명확]\n아무튼 밝고 긍정적인 [불명확]\n그런 너를 너무 좋아한다\n우리는 친구이지만 [불명확]\n항상 응원할게\n\n[불명확] 예쁜 마음씨로\n[불명확] 행복한 날들만 \n[불명확] 웃음이 가득한\n그런 사람이 되길\n\n아 근데 그게 뭐라고\n하면 좋을까? 음... \n[불명확] 멋있는데 또\n[불명확] 따뜻한 그런 느낌\n\n[불명확] 노력하는 너\n[불명확] 응원한다\n항상 힘내\n\n그리고 [불명확]\n[불명확] 엄청 [불명확]\n\n[오른쪽 부분]\n자신감 있게 [불명확]\n앞으로 나아가\n그런 너를 봤을 때\n정말 예쁘더라\n\n[불명확] 행복해\n정말 좋은 친구\n[불명확]\n\n[하단부 - 매우 읽기 어려움]\n[불명확] 응원 [불명확]\n[불명확] 무언가에 대한 격려와 지지의 말씀들]\n[불명확]", "summary": "친구에게 보내는 따뜻한 응원과 격려의 글. 상대방의 긍정적인 태도, 예쁜 마음씨, 그리고 노력하는 모습을 칭찬하며 항상 응원하겠다는 마음을 전달하고 있습니다.", "tags": ["우정", "응원", "격려", "일상"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p092.jpg", "processed_at": "2026-04-09T23:28:51.962606", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p092"}, {"date": null, "author": null, "content": "왼쪽 페이지(파란색 펜):\n오늘은 날씨가 참 좋다. 마음도 편하고 기분이 좋다. 우리 반 친구들도 다들 즐거워 보인다. 요즘 들어 학교 가는 것이 더 재미있어졌다. 새로운 친구들도 많이 사귀고 선후배들과의 관계도 좋아졌다. 열린마음 동아리 활동도 의미 있고 보람찬 것 같다. [불명확] 앞으로도 계속 이렇게 좋은 관계를 유지했으면 좋겠다. 모두가 함께 웃고 즐길 수 있는 시간이 되기를...\n\n오른쪽 페이지(연한 회색):\n[불명확한 텍스트가 많음 - 인쇄된 양식 또는 다른 필기로 보임]", "summary": "작성자가 좋은 날씨와 편한 마음 속에서 학교생활과 동아리 활동에 대한 긍정적인 감정을 표현하고 있으며, 친구들과의 좋은 관계를 지속하길 바라는 내용입니다.", "tags": ["일상", "학교생활", "동아리", "우정", "긍정적"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p093.jpg", "processed_at": "2026-04-09T23:28:56.562122", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p093"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n[불명확한 텍스트로 시작]\n...인생이라는 것은...\n...그런데 나는...\n...공부도 열심히 해야 하고...\n...친구들과도 잘 지내야 하고...\n...앞으로 어떻게 살아야 할지...\n...모르겠어. 하지만 열린 마음으로...\n...모든 것을 받아들이려고 한다\n...매일매일이 소중하다고 생각해\n...좋은 추억이 가득하길\n\n오른쪽 페이지:\n[불명확]\n...우리 함께 좋은 시간 보내자\n...웃음이 많은 하루가 되길\n...행복하고 싶어\n...희망을 잃지 말자\n...꿈을 향해 나아가자\n...우리의 이야기가 계속되길\n[여러 글귀와 메시지들이 중첩되어 있음]", "summary": "열린 마음으로 인생을 받아들이며 매일의 소중함을 느끼고, 좋은 추억과 행복을 기원하는 긍정적인 메시지들이 담긴 방명록 페이지입니다.", "tags": ["일상", "고민", "희망", "우정", "긍정"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p094.jpg", "processed_at": "2026-04-09T23:29:01.256599", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p094"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n지난 한 해를 돌아보며\n새로운 시작을 위해\n이 순간을 기억하고 싶어\n우리의 추억들이 영원하길\n\n오른쪽 페이지:\n빛이 되어\n모든 것을 밝혀주길\n\n[중앙 이미지 설명: 태양과 복잡한 파동 무늬의 잉크 드로잉]\n\n하단 텍스트:\n함께 했던 모든 순간들이\n지금의 우리를 만들었고\n앞으로의 우리를 만들어갈 거야\n\n오른쪽 상단:\n항상 감사하는 마음으로\n새로운 계절을 맞이하면서\n우리 모두 함께\n더 밝은 미래로 나아가자\n\n[불명확한 부분 다수 포함]", "summary": "새로운 시작과 함께하는 추억들을 기념하며 함께 나눈 순간들과 앞으로의 희망적인 미래를 표현한 노트 페이지입니다.", "tags": ["일상", "추억", "감사", "새로운시작", "희망"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p095.jpg", "processed_at": "2026-04-09T23:29:05.761029", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p095"}, {"date": null, "author": null, "content": "열린마음\n\n왼쪽 페이지:\n한글로 여러 항목이 작성되어 있으나 각도와 필체로 인해 정확한 판독이 어려움\n대략적으로 보이는 텍스트:\n- 관련 항목들이 박스 형태로 구분\n- 숫자와 한글 혼합\n- [불명확]\n\n오른쪽 페이지:\n동물(조개류) 스케치 그림 포함\n손글씨 텍스트:\n\"I Promise\"\n\"Smile ♥2\"\n그 외 여러 줄의 한글 텍스트가 있으나 손글씨와 각도로 인해 [불명확]\n\n전체적으로 필체가 곡선적이고 각도가 있어 판독이 제한적", "summary": "학과 방명록 페이지로 보이며, 왼쪽에는 표 형식의 항목들이, 오른쪽에는 동물 그림과 함께 'I Promise'라는 메시지와 긍정적인 표현들이 작성되어 있습니다.", "tags": ["방명록", "추억", "메시지"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p096.jpg", "processed_at": "2026-04-09T23:29:10.551047", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p096"}, {"date": null, "author": null, "content": "기억은 7/10(수)\n\n[좌측 박스 내용]\n도움이 되었던 말들:\n- 그것도 좋지만 그것만이 아니라 다른 것도 생각해 봐\n- 하지만 지금 현재를 소중히 여기는 것도 중요해\n- [불명확] 속에서도 긍정적인 면을 찾으려 노력해야 해\n- 무엇이 맞는지는 너 자신이 판단해야 해\n- 내가 너에게 줄 수 있는 것은 조언뿐이야\n- [불명확] 하지만 결정은 너의 몫이야\n- 그렇지만 너를 믿고 응원할게\n- 좋은 사람들을 잃지 말고 소중히 하는 것도 잊지 마\n\n[우측 내용]\n7월이 정말 힘들었다. 나는 많은 것들을 고민했고, 결정해야 했으며, 포기해야 했고, 받아들여야 했다. [불명확] 친구들의 도움과 조언이 정말 많은 도움이 되었다. 특히 [불명확] 가 해준 말들이 나에게 큰 위로가 되었다. 지금 현재를 소중히 여기고, 내가 할 수 있는 최선을 다하는 것이 중요하다는 것을 깨달았다. 또한 좋은 사람들을 잃지 않는 것의 중요성도 배웠다. [불명확] 이 시간들이 내게 많은 성장을 주었고, 앞으로도 이런 마음가짐으로 살아가야겠다고 다짐했다.", "summary": "7월의 힘든 시간 동안 친구들의 조언과 위로를 받으며 현재를 소중히 하고 스스로 판단하는 것의 중요성을 깨달았다는 내용의 성찰문이다.", "tags": ["고민", "일상", "성장", "우정", "위로"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p097.jpg", "processed_at": "2026-04-09T23:29:17.869610", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p097"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n2005\n어쩜 [불명확]\n뭔가 힘들고 외로울 때\n넓혀놓고 위로받고 싶고\n흔들리고 싶어...\n거기 내가 [불명확]\n[불명확] 있어 [불명확]\n이걸 어떻게 헤쳐나갈까\n[불명확] 마음\n[불명확] 떠올라요\n[불명확]\n\n오른쪽 페이지:\n[불명확]\n[불명확]\n4+9 = [불명확]\n[불명확] 뭔가 [불명확]\n[불명확]\n0 + 3 [불명확]\n[불명확] + 4 [불명확]\n[불명확]", "summary": "2005년경 작성된 일상 노트로, 외로움과 힘든 감정을 표현하고 있습니다. 흔들리는 마음 속에서 위로를 찾으려는 모습이 담겨있습니다.", "tags": ["일상", "고민", "감정", "외로움"], "mood": "negative", "decade": "2000s", "image_quality": "fair", "filename": "1999년_열린마음_p098.jpg", "processed_at": "2026-04-0 : "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p101.jpg", "processed_at": "2026-04-09T23:29:39.354406", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p101"}, {"date": null, "author": null, "content": "미래에게 할 말\n\n나는 너에게 말하고 싶다\n지금 이 순간을 소중히 여겨라\n\n시간은 흘러간다\n다시는 돌아오지 않는 이 시간들\n어제는 이미 지나가고\n내일은 아직 오지 않았으며\n오직 지금 이 순간만이 우리의 것이다\n\n열심히 살아가는 것도 중요하지만\n때로는 멈춰서 주위를 둘러보아라\n친구들의 웃음소리를 들어보고\n가족들의 사랑을 느껴보고\n자연의 아름다움을 감상해보아라\n\n공부와 일만이 전부가 아니다\n인생의 진정한 의미를 찾아가는 과정\n그것이 바로 우리가 살아가는 이유다\n\n후회 없는 삶을 살아가기를\n당신의 꿈을 잃지 말고\n[불명확] 하나하나를 소중히 여기며\n앞으로 나아가길\n\n지금 이 순간이 제일 아름답다는 것을 기억해라", "summary": "미래의 자신에게 보내는 메시지로, 현재의 순간을 소중히 여기고 후회 없는 삶을 살아갈 것을 당부하는 내용입니다. 공부와 일 외에 삶의 진정한 의미를 찾으며 꿈을 잃지 말 것을 권하고 있습니다.", "tags": ["일상", "고민", "인생", "조언", "성찰"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1999년_열린마음_p102.jpg", "processed_at": "2026-04-09T23:29:44.980449", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p102"}, {"date": null, "author": null, "content": "[불명확한 상단 부분]\n\n열린마음\n\n[좌측 필기]\n열린마음 가족이라는\n느낌으로 함께하는 우리\n함께 나누고 함께 웃고\n함께 울 수 있는\n우리 모두가 사랑합니다\n\n[중앙 필기 - 여러 개의 분산된 메모]\n[불명확]\nXX\n\n[우측 필기]\n열린마음\n\n너는 우리의 자산\n너는 우리의 미래\n너는 우리의 희망\n\n태어나자마자\n이 땅에서\n우린 숨쉬고 있어\n\n우리는 강하다\n우리는 아름답다\n우리는 위대하다\n\n함께하는 우리는\n더욱 강하고\n더욱 아름답고\n더욱 위대하다\n\n[불명확한 부분들 포함]", "summary": "열린마음 학과 구성원들 간의 연대와 사랑, 희망에 대한 메시지가 담긴 페이지입니다. 함께하는 공동체의 소중함과 강함을 표현하고 있습니다.", "tags": ["학과", "공동체", "희망", "연대", "우정"], "mood": "positive", "decade": "unknown", "image_quality": "fair", "filename": "1999년_열린마음_p103.jpg", "processed_at": "2026-04-09T23:29:50.055597", "volume_id": "1999년_열린마음", "volume_title": "1999년 열린마음", "year": 1999, "page_label": "p103"}, {"date": null, "author": null, "content": "Left page:\n너는 왜 이리 힘들지\n항상 다른 생각을 해\n나는 좀 쉬어 갈래\n\nRight page:\nThe friendship forms silence between people (a wise person)\n- Date [불명확]\n\n[다양한 한글 텍스트가 있으나 필체가 복잡하고 중복되어 일부 불명확함]\n\n주요 가독
