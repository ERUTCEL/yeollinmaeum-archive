날씨도 좋고\n기분도 좋네\n너때문인지 날씨때문인지\n모르겠지만\n그냥 좋아\n\n앞으로도 좋은 친구로\n지낼 수 있으면 좋겠어\n\n오른쪽 페이지:\n[수학 또는 과학 문제 풀이로 보이는 내용]\n각종 수식과 계산 과정이 적혀있음\n[불명확한 부분 다수]\n원, 삼각형 등의 기하학적 도형과 관련된 계산으로 추정", "summary": "친구를 그리워하며 작성한 감정적인 글귀와 함께 학과 공부 관련 수학/과학 문제 풀이가 섞여 있는 노트 페이지이다. 날씨가 좋은 날 친구와의 우정을 소중히 여기는 마음이 담겨있다.", "tags": ["우정", "감정", "공부", "수학", "일상"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p003.jpg", "processed_at": "2026-04-09T18:42:19.140247", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p003"}, {"date": null, "author": null, "content": "뭔가 떨어진 날씨에도 불구하고\n마음 가득한 너의 모습 [불명확]\n그리고 아침 해를 향한 발걸음\n우린 숨소리 하나 없이 [불명확]\n또 다른 계절이 올 때까지 이 길을\n우리 함께 걸어가자 우리 함께 [불명확]\n[불명확] 세상 속에서도 너는\n빛나고 있어 언제나 [불명확]\n눈을 감아도 떠올려지는 너의 모습\n시간이 멈춘 듯이 [불명확]\n[불명확] 마지막이 아니길\n [불명확] 영원히 함께하기를", "summary": "떨어진 날씨에도 불구하고 밝은 마음으로 함께 길을 걸어가자는 따뜻한 마음과 영원함을 바라는 감정이 담긴 글귀입니다.", "tags": ["우정", "일상", "감성", "희망"], "mood": "positive", "decade": "unknown", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p004.jpg", "processed_at": "2026-04-09T18:42:22.926016", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p004"}, {"date": null, "author": null, "content": "PAGE [불명확]\n\nDATE [불명확]\n\n[여러 열의 손글씨 텍스트가 있으나 각 항목이 매우 작고 겹쳐있어 정확한 전체 해석이 어려움]\n\n왼쪽부터 순서대로 보이는 부분들:\n- 첫 번째 열: [불명확]\n- 두 번째 열: [불명확]\n- 세 번째 열: [불명확]\n- 네 번째 열: [불명확]\n- 다섯 번째 열: [불명확]\n- 여러 칸에 걸쳐 다양한 크기의 글씨로 작성된 메모들이 보임\n\n읽을 수 있는 부분들:\n- \"beauty\" [영어 단어]\n- 각종 수식이나 기호들\n- 한글 텍스트들이 여러 개 보이나 명확한 판독이 어려움", "summary": "방명록 페이지에 여러 사람이 다양한 크기와 방향으로 작성한 글들이 있으나, 사진의 각도와 글씨의 겹침으로 인해 정확한 내용 파악이 어렵다.", "tags": ["방명록", "일상"], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p005.jpg", "processed_at": "2026-04-09T18:42:27.337309", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p005"}, {"date": null, "author": null, "content": "삶이란 무엇인가. 나는 누구인가. 이 질문들이 자꾸만 떠오른다. 요즘 너무 바쁜 것 같다. 공부도 많고 동아리도 하고 친구들도 만나고... 그러다 보니 자신을 돌아볼 여유가 없어진다. 하지만 그런 와중에도 이런 생각들이 자꾸 든다. 혹시 내가 잘못된 길을 가고 있는 건 아닐까. 친구들은 자신의 길을 열심히 걷고 있는데 나만 헤매고 있는 건 아닐까. 이런 불안감이 자꾸만 올라온다. 하지만 내가 할 수 있는 건 앞으로 나아가는 것뿐이다. 한 발 한 발 나아가다 보면 언젠가는 길을 찾을 수 있을 거라고 생각한다. 지금은 힘들지만 이 시간도 언젠가는 좋은 추억이 될 것 같다. 그래서 오늘도 열심히 살아가야겠다.", "summary": "작성자는 삶과 자기 정체성에 대한 고민을 표현하고 있으며, 바쁜 일상 속에서 느끼는 불안감과 혼란을 토로하면서도 앞으로 나아가려는 의지를 보이고 있습니다.", "tags": ["고민", "일상", "철학적사유", "자아성찰", "불안감"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p006.jpg", "processed_at": "2026-04-09T18:42:35.813250", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p006"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n다시 한번 생각해봐\n하지만 길을 잃지 말자\n우리가 함께라면\n별로 어렵지 않을거야\n세상의 모든 일들이\n우리를 위해 일어나는 건 아니지만\n우리가 함께라면\n견뎌낼 수 있을거야\n\n오른쪽 페이지:\n마음이 아파도\n상처받아도\n계속 앞으로 나아가자\n희망을 잃지 말고\n우리의 꿈을 향해\n함께 걸어가자\n힘내\n우리는 할 수 있어\n[불명확]\n그 날이 오길 바라며\n내 마음 속에 그려본다", "summary": "세상의 어려움 속에서도 함께라면 견뎌낼 수 있다는 희망의 메시지와, 상처받아도 계속 앞으로 나아가자는 격려의 글귀들이 담겨있다. 친구들을 위한 응원의 말과 희망에 대한 생각을 표현하고 있다.", "tags": ["일상", "고민", "우정", "격려", "희망"], "mood": "positive", "decade": "unknown", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p007.jpg", "processed_at": "2026-04-09T18:42:39.960504", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p007"}, {"date": null, "author": null, "content": "안녕하세요 저는 [불명확]\n\n창밖을 내다보니 [불명확]\n\n날씨가 흐립니다. 비가 오나봅니다.\n\n시간이 자꾸 멈춘 것 같아요.\n\n오늘 따라 기분이 [불명확]\n\n[불명확] 마음이 [불명확]\n\n마음이 힘들 때는 [불명확]\n\n친구들도 [불명확]\n\n혼자라는 생각이 들 때가 있어요.\n\n하지만 이겨내야 한다고 생각해요.\n\n내일이 더 나을 거라고 믿고 있습니다.\n\n모두가 힘내시길 바랍니다.\n\n힘내세요. [불명확]\n\n내일을 위해 [불명확]\n\n화이팅!", "summary": "작성자가 흐린 날씨와 함께 복잡한 감정을 표현하며, 혼자라는 생각에 힘들어하지만 이를 이겨내고 내일을 믿으려는 마음을 담은 일상 메모입니다.", "tags": ["일상", "고민", "감정", "위로"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p008.jpg", "processed_at": " n[불명확]\n[불명확]\n\n[중앙 열]\n학교 [불명확]\n[불명확]\n[불명확]\n[불명확]\n\n[오른쪽 열]\n안녕\n[불명확]\n[불명확]\n[불명확]\n[불명확]\n[불명확]\n[불명확]\n마음이\n[불명확]\n[불명확]", "summary": "손글씨가 작고 비스듬하게 작성되어 있으며, 학교와 시험 관련 내용으로 보이나 대부분의 텍스트가 불명확합니다.", "tags": ["학교", "시험", "일상"], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p015.jpg", "processed_at": "2026-04-09T18:43:14.040610", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p015"}, {"date": null, "author": null, "content": "열린 마음... 660 years\n\n[불명확한 부분들이 있음]\n\n넓은 마음으로 [불명확]\n\n현재의 [불명확] 물과 [불명확]\n\n[중간 부분 다수의 문장이 매우 흐림]\n\n...[불명확]... 시간...[불명확]\n\n[오른쪽 상단에 '끝' 표시 있음]\n\n전체적으로 손글씨가 작고 흐려서 정확한 전사가 어려움", "summary": "열린 마음이라는 주제로 시작된 글로 보이나, 대부분의 텍스트가 흐리고 읽기 어려워 정확한 내용 파악이 어렵습니다.", "tags": ["일상", "고민"], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p016.jpg", "processed_at": "2026-04-09T18:43:17.404704", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p016"}, {"date": null, "author": null, "content": "左側ノート:\n[불명확한 필기들]\n\n右側ノート:\n다양한 수학/과학 공식과 계산식들이 기록되어 있음\n- 미분, 적분 관련 식들\n- 물리학 공식들\n- 함수 관련 계산\n[여러 줄의 수식과 공식들이 빽빽하게 작성됨]\n\n전체적으로 학과 관련 강의노트 또는 공부 노트로 보임", "summary": "수학 및 과학 관련 공식과 계산식들이 빽빽하게 기록된 학습 노트입니다. 미분, 적분, 물리학 공식 등 다양한 주제의 학습 내용이 포함되어 있습니다.", "tags": ["공부", "강의노트", "수학", "과학"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p017.jpg", "processed_at": "2026-04-09T18:43:20.860697", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p017"}, {"date": null, "author": null, "content": "[상단부 텍스트 불명확]\n\n[중단부]\n너무 많은 시간이 흘렀다\n기억도 희미해지고\n그때의 그 마음도 잊혀져간다\n하지만 여전히 그리운 것은\n그때의 순수했던 마음\n\n[하단부 - 여러 문장이 연속으로 작성됨]\n...[전체적으로 손글씨가 작고 밀집되어 있어 정확한 전사 어려움]\n\n[우측 상단]\nMarker\n\n[좌측 하단 부분]\n[불명확한 텍스트들]\n\n[하단 중앙]\nC [또는 기호]\n[추가 불명확 텍스트]", "summary": "시간의 흐름 속에서 기억이 희미해지고 있지만, 과거의 순수한 감정을 그리워하는 내용의 개인적인 감성 글귀입니다. 손글씨가 작고 밀집되어 있어 전체 내용을 명확히 파악하기 어렵습니다.", "tags": ["일상", "감성", "회상", "고민"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p018.jpg", "processed_at": "2026-04-09T18:43:25.652588", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p018"}, {"date": null, "author": null, "content": "여러 사람의 손글씨로 작성된 메시지들이 세로 칸 형식으로 배열되어 있습니다. 텍스트가 작고 겹쳐있어 정확한 전체 내용 파악이 어렵습니다. 보이는 부분으로는 '열린마음', '화이팅', '화이팅', '힘내', '화이팅', '파이팅', '진짜', '응원한다', '힘내', '파이팅' 등의 격려와 응원 메시지들이 반복적으로 나타나고 있습니다. 각 칸마다 짧은 문구와 이름(별명)으로 보이는 글씨가 있으며, 전체적으로 방명록 형식의 응원 메시지 모음으로 보입니다.", "summary": "여러 사람이 작성한 격려와 응원 메시지들로 가득한 방명록 페이지입니다. 주로 '화이팅', '힘내', '응원한다' 등의 긍정적인 메시지들이 세로 칸 형식으로 배열되어 있습니다.", "tags": ["방명록", "응원", "격려", "일상", "우정"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p019.jpg", "processed_at": "2026-04-09T18:43:29.800261", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p019"}, {"date": null, "author": null, "content": "[불명확한 부분이 많아 완전한 전사가 어려움] 여러 줄의 손글씨로 보이는 한국어 텍스트가 있으며, 주로 짧은 문장들과 단어들이 기록되어 있음. 일부 읽을 수 있는 부분: '열린마음', '페이지', '기억', '함께', '시간', '생각' 등의 단어가 보임. 전체적으로 필기가 작고 빠르게 작성되어 있어 정확한 전사가 제한적임.", "summary": "방명록 페이지에 여러 필체의 손글씨가 기록되어 있으며, 정확한 내용 파악이 어렵지만 학과 생활과 관련된 일상적인 메시지들로 보임.", "tags": ["일상", "방명록"], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p020.jpg", "processed_at": "2026-04-09T18:43:33.262649", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p020"}, {"date": null, "author": null, "content": "PAGE 왼쪽:\n열린마음\n[불명확한 텍스트 다수]\n\nPAGE 중앙 및 오른쪽:\n다양한 손글씨로 작성된 한국어 텍스트\n[여러 줄의 불명확한 필기]\n\n가독성이 낮아 정확한 전체 텍스트 옮김이 어려움\n부분적으로 읽을 수 있는 단어들:\n- 오[불명확]\n- 공[불명확]\n- [다수의 불명확한 한글]\n\n오른쪽 상단: 숫자와 기호 포함\n중앙: 세로 및 가로로 작성된 필기\n하단: 추가 필기 텍스트", "summary": "학과 방명록으로 보이는 페이지에 여러 사람의 손글씨가 기록되어 있으나, 필기의 질과 이미지 해상도로 인해 대부분의 텍스트를 정확하게 판독하기 어렵다. 1990년대~2000년대 시기의 학생 활동 기록으로 추정된다.", "tags": ["방명록", "학과", "1990s-2000s"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p021.jpg", "processed_at": "2026-04-09T18:43:37.742754", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p021"}, {"date": null, "author": null, "content": "[불명확한 부분이 많음] ...이야기들을 나누고 있다. 어떤 학과의 방명록인 것 같으며, 여러 사람들의 손글씨가 섞여 있다. 텍스트는 주로 한국어로 작성되었으나, 사진의 각도와 해상도 때문에 정확한 전사가 어렵다. 보이는 부분: 'PM', '시간', '생각', '앞으로' 등의 단어들이 산발적으로 보임. [전체 텍스트 명확하지 않음]", "summary": "방명록/일상 노트의 페이지로 보이며, 여러 사람의 필체로 작성된 내용들이 담겨 있다. 정확한 내용 파악이 어려운 상태이다.", "tags": ["방명록", "일상 노트"], "mood": "neutral", "decade": "1990s or 2000s", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p022.jpg", "processed_at": "2026-04-09T18:43:44.377260", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p022"}, {"date": null, "author": null, "content": "좌측 텍스트:\n중앙 도서관 주변\n[불명확]\n\n우측 텍스트:\n첫 번째 항목 (위쪽):\n행복한 추억\n행복한 [불명확]\n...\n\n두 번째 항목 (아래쪽):\n[불명확]\n추억\n[불명확]\n뭔가\n내용 [불명확]\n\n그래프/다이어그램:\n여러 개의 선그래프가 그려져 있으며, 한국어 레이블과 함께 주석이 있음. 상단의 선 그래프와 하단의 선 그래프가 있으며, 중앙에 점선으로 연결된 부분이 있음.", "summary": "이 페이지는 그래프와 함께 추억이나 감정 변화를 시간 순서대로 기록한 것으로 보입니다. 중앙 도서관 주변에서의 경험을 시각화한 것 같습니다.", "tags": ["일상", "감정", "추억", "그래프"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p023.jpg", "processed_at": "2026-04-09T18:43:48.415408", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p023"}, {"date": null, "author": null, "content": "좌측 페이지:\n날짜\n이름\n전공 및 학년\n\n우측 페이지:\n[다양한 수식과 계산 내용]\n분수 계산\n곱셈 및 나눗셈 문제들\n[불명확한 필기가 많아 정확한 전체 내용 파악 어려움]\n여러 줄의 수학 관련 필기\n복잡한 계산 과정들이 기록되어 있음", "summary": "학생의 수학 숙제 또는 공부 노트로 보이는 페이지입니다. 분수 계산과 여러 수학 문제들이 필기되어 있습니다.", "tags": ["공부", "수학", "숙제"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p024.jpg", "processed_at": "2026-04-09T18:43:51.594553", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p024"}, {"date": null, "author": null, "content": "손으로 쓴 한국어 텍스트가 여러 개의 칼럼으로 나뉘어 있으며, 대부분 흐릿하고 겹쳐있어 정확한 판독이 어렵습니다. 보이는 텍스트 중 일부: '단종', '추천서', '공부', '시험', '열림', '마음', '[불명확]' 등의 단어들이 산재되어 있습니다. 전체 내용의 일관성 있는 해독이 불가능합니다.", "summary": "여러 사람의 손글씨가 혼재되어 있는 방명록 페이지로 보이며, 구체적인 내용 파악이 어렵습니다.", "tags": ["방명록", "일상", "학과"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p025.jpg", "processed_at": "2026-04-09T18:44:00.181034", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p025"}, {"date": null, "author": null, "content": "다양한 손글씨가 세로로 여러 줄 작성되어 있습니다. 전체 텍스트가 매우 작고 흐릿하여 정확한 판독이 어렵습니다. 보이는 부분들:\n열린마음\n[불명확] 희망\n[불명확] 감사\n[불명확] 친구\n[불명확] 새로운 시작\n[불명확] 웃음\n[불명확] 기억\n[불명확] 추억\n그 외 다수의 단어들이 세로 글씨로 작성되어 있으나 대부분 [불명확]", "summary": "방명록 페이지로 여러 사람의 손글씨가 세로로 기록되어 있습니다. 희망, 감사, 친구, 추억 등의 긍정적인 단어들이 보입니다. 전반적으로 학과 공동체의 따뜻한 메시지들이 담겨 있는 것으로 보입니다.", "tags": ["방명록", "일상", "추억", "학과활동"], "mood": "positive", "decade": "1990s", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p026.jpg", "processed_at": "2026-04-09T18:44:03.936470", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p026"}, {"date": null, "author": null, "content": "여러 사람의 손글씨로 작성된 메모 형식의 텍스트들이 세로 칼럼 형태로 배열되어 있습니다. 전체적으로 읽기 어려운 상태이며, 부분적으로 식별 가능한 텍스트:\n\n좌측부터: 날씨, [불명확], [불명확], [불명확], [불명확], [불명확], [불명확], 등의 한글 단어들과 짧은 문장들이 세로로 기록되어 있습니다.\n\n구체적으로 읽을 수 있는 부분들:\n- 여러 개인의 이름 또는 닉네임으로 보이는 단어들\n- 날짜나 일시 관련 표기들\n- 짧은 인사말이나 메모성 글귀들\n\n전반적으로 필기가 작고 중첩되어 있어 정확한 전사가 어렵습니다.", "summary": "방명록 형식으로 여러 사람이 작성한 짧은 메모들이 세로 칼럼으로 기록되어 있습니다. 개별 필기가 작고 중첩되어 전체 내용 파악이 어렵습니다.", "tags": ["방명록", "일상", "메모"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p027.jpg", "processed_at": "2026-04-09T18:44:08.931572", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p027"}, {"date": null, "author": null, "content": "PAGE (좌측)\n\n날씨 맑음\n\n[불명확]... 오늘 날씨도 좋고 기분도 좋다. 우리 학과 방명록에 글을 남기게 되어 정말 기쁘다. 앞으로 많은 선후배들과 좋은 추억을 만들고 싶다. 열린마음으로 모든 일에 임하겠다. 힘내자!\n\n[중앙부터 우측]\n\n누군가의 말: \"인생은 한 번뿐이니 후회 없이 살자\"\n\n오늘 MT에서 만난 사람들이 정말 좋았다. 모두가 친절하고 따뜻했다. 앞으로 함께할 4년간 많은 추억을 만들고 싶다. \n\n[우측]\n\n내일은 수업 첫날이다. 긴장도 되고 설레기도 한다. 열심히 공부해서 좋은 성적을 거두고 싶다. 그리고 친구들과도 좋은 관계를 유지하고 싶다.\n\n화이팅!", "summary": "신입생이 학과 방명록에 남긴 글로, MT를 다녀온 기쁨과 대학 생활을 시작하는 설렘, 그리고 열린 마음으로 열심히 임하겠다는 다짐을 담고 있다.", "tags": ["신입생", "신학기", "MT", "설렘", "다짐"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p028.jpg", "processed_at": "2026-04-09T18:44:16.329312", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p028"}, {"date": null, "author": null, "content": "PAGE 1\n\n날짜\n[불명확] 년 [불명확] 월 [불명확] 일\n\n요일\n\n오늘 하루 감정\n기쁨 희망 설렘 ...\n\n오늘의 주제\n낙엽이 지는 가을 [불명확]\n\n[불명확]?\n\n[불명확] 이 계절 [불명확]\n[불명확] 쓸쓸함도 [불명확]\n[불명확] 그리움도 [불명확]\n떨어진다\n\n정말로 [불명확]\n마음속 구석구석\n그런 감정들이\n자꾸 올라온다\n\n[불명확] 속 [불명확]\n떠오르는 얼굴들\n생각나는 목소리들\n\nGO BACK [불명확]\nVISIT [불명확]\n[불명확] 하고 싶은 마음\n\n[불명확] 있나?\n잠깐 [불명확] 같은\n[불명확] [불명확]\n\n[불명확]이 되어\n[불명확] [불명확]\n[불명확] [불명확]\n[불명확] 행복할까?\n\n아직도 [불명확]\n[불명확] 있다\n\n혼자가 아니니까\n함께 가자\n내 친구들이\n[불명확]", "summary": "가을의 낙엽을 보며 추억과 그리움에 빠진 작성자의 감정을 담은 글입니다. 과거를 그리워하면서도 현재의 친구들과 함께하는 위로와 희망을 표현하고 있습니다.", "tags": ["일상", "감정", "추억", "그리움", "우정", "고민"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p029.jpg", "processed_at": "2026-04-09T18:44:23.260636", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p029"}, {"date": null, "author": null, "content": "왼쪽 상단부터 여러 줄의 손글씨가 있으나, 사진의 회전 각도와 필기의 흐릿함으로 인해 전체 텍스트를 정확하게 판독하기 어렵습니다. 보이는 부분들:\n\n[불명확] 향 [불명확]\n[불명확] 인생 [불명확]\n[불명확] 때문 [불명확]\n[불명확] 계획 [불명확]\n[불명확] 고민 [불명확]\n\n여러 항목들이 위에서 아래로 나열되어 있는 형태로 보이나, 대부분의 내용이 [불명확]합니다.", "summary": "복수의 단어나 구절이 나열된 형태의 노트 페이지로 보이나, 필기의 선명도 저하와 사진 각도로 인해 정확한 내용 파악이 어렵습니다.", "tags": ["일상", "노트"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p030.jpg", "processed_at": "2026-04-09T18:44:27.123020", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p030"}, {"date": null, "author": null, "content": "[이 페이지는 여러 사람의 손글씨가 섞여있는 방명록 페이지입니다. 텍스트가 중복되고 겹쳐있어 정확한 전사가 어렵습니다]\n\n식별 가능한 부분:\n- 좌측: 날짜 형식의 숫자들과 한글 텍스트들\n- 중앙 및 우측: 여러 개의 짧은 메모와 낙서\n- 반복되는 패턴: 숫자와 한글 조합\n- [불명확] 부분이 많아 전체 내용 파악 어려움\n- 일부 식별 가능: 날짜, 이름, 간단한 인사말 추정", "summary": "여러 사람이 작성한 방명록 페이지로, 중복된 필기와 겹침으로 인해 개별 메시지를 명확히 읽기 어려운 상태입니다.", "tags": ["방명록", "일상", "1990s-2000s"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p031.jpg", "processed_at": "2026-04-09T18:44:31.065033", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p031"}, {"date": null, "author": null, "content": "6월14일 금요일\n\n오늘부터 시작\n너는 무엇을 하고 있니?\n아직도 헷갈려?\n\n3월23일\n뭔가 이상해\n[불명확]\n\n[불명확] 6월[불명확]\n[불명확]\n\n[불명확]에 대한 걱정[불명확]\n[불명확]\n[불명확] 생각\n\n[불명확]했어\n[불명확] 모여있네\n[불명확]\n\n[불명확]한 마음\n[불명확]\n[불명확]\n\n[불명확]\n\n[불명확]네\n[불명확]\n[불명확]\n\n[불명확]\n[불명확]해\n\n근데 [불명확]\n[불명확]\n[불명확]\n[불명확]\n[불명확]", "summary": "6월과 3월의 날짜가 기록된 일상 노트로, 일상의 고민과 감정 변화를 담고 있습니다. 텍스트의 상당 부분이 흐려서 명확한 내용 파악이 어렵습니다.", "tags": ["일상", "고민", "감정"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p032.jpg", "processed_at": "2026-04-09T18:44:38.204825", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p032"}, {"date": null, "author": null, "content": "열린마음 [불명확]\n\n[여러 줄의 손글씨가 있으나 대부분 흐리고 겹쳐있어 정확한 판독이 어려움]\n\n읽을 수 있는 부분들:\n- 마음이\n- 따뜻한\n- [불명확]\n- 함께\n- [불명확]\n- 소중한\n- [불명확]\n\n[페이지 전체적으로 필기가 여러 각도로 겹쳐 있고, 글씨가 작고 흐려서 완벽한 전사가 불가능함]", "summary": "열린마음 노트의 페이지로 보이며, 따뜻한 마음, 소중함 등의 키워드가 포함된 메시지로 추정되나 대부분의 텍스트가 흐리고 겹쳐있어 정확한 내용 파악이 어렵습니다.", "tags": ["일상", "방명록"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p033.jpg", "processed_at": "2026-04-09T18:44:43.649228", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p033"}, {"date": null, "author": null, "content": "DATE: [불명확]\nPRICE: [불명확]\n\n[여러 줄의 손으로 쓴 한국어 텍스트가 있으나 필기 난도가 높고 일부가 겹쳐있어 정확한 전사가 어려움]\n\n읽을 수 있는 부분:\n- 왼쪽 여백에 빨간 줄\n- 여러 단어와 구절들이 열주 형태로 배열\n- 중간에 동그라미 표시된 부분 여러 곳 확인\n- 전체적으로 일일이 필기된 메모나 기록으로 보임", "summary": "1990년대~2000년대 '열린마음' 학과 방명록으로 보이는 페이지. 필기 품질과 겹침으로 인해 정확한 내용 파악이 어렵습니다.", "tags": ["방명록", "일상", "학과"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p034.jpg", "processed_at": "2026-04-09T18:44:47.326662", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p034"}, {"date": null, "author": null, "content": "PAGE 1 (좌측)\n\n곧 2학년\n시작할게요 파이팅!\n\n다짜고짜 묻지 말고\n모르는 게 많으니까\n잘 봐주세요\n\n빨리 내려와\n\n윤나혜\n\n(우측 상단)\n(좌측-우측 방향 텍스트)\nPAGE (우측)\n\n공부도 열심히\n술도 열심히\n놀것도\n\n[불명확]\n다음주쯤 돌아올게요\n\n그때 또\n\n[불명확]\n다시 마실게요\n\n차라리\n놀이터\n\n친구\n같은 거\n라고 해야\n할까\n\n너무도\n[불명확]\n것들이 너무\n많아서\n\n항상 피하기만 했던\n내 모습\n\n이제 마주할 시간이\n온 것 같다\n\n힘내자\n내 자신", "summary": "신입생으로서의 시작과 함께 학과 선배들에게 응원을 받고, 2학년이 되면서 공부와 놀이를 병행하며 살아갈 것을 다짐하는 내용입니다. 지금까지 피해왔던 것들과 마주할 준비를 하며 자신에게 힘내라고 격려합니다.", "tags": ["신입생", "2학년", "일상", "고민", "응원", "자기성찰"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p035.jpg", "processed_at": "2026-04-09T18:44:53.036738", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p035"}, {"date": null, "author": null, "content": "PAGE\n\n아쉬움\n이것도 놓쳤다\n[불명확]\n\n너는 이게 뭔지 알아\n다 하고 싶고\n[불명확] 또\n모든 게 아파\n\n너는 뭘 원하니\n[불명확]\n[불명확]\n[불명확] 했었는데\n[불명확]\n마음도 [불명확]\n아직도 헤매고 있어\n\n[불명확]\n[불명확]\n다 이루고 싶다\n[불명확]\n\n내 맘에는\n[불명확]\n무언가 [불명확]\n자꾸 떠나간다\n떠나는 것 같다\n\n그래도 l, "author": null, "content": "PAGE 1\n\nDATE: [불명확]\n\n여름방학 시작\n머리 색도 바꾸고 새로운 시작\n\n[첫 번째 칼럼]\n기분 좋은 날씨\n여름휴가 준비\n[불명확] 계획\n\n[두 번째 칼럼]\n요즘 생각이 많아\n[불명확]\n친구들과의 추억\n앞으로의 미래\n\n[세 번째 칼럼]\n최근 고민들\n학교 생활\n[불명확] 준비\n새로운 도전\n\n[네 번째 칼럼]\n긍정적인 마음\n변화하는 나\n성장하고 싶어\n목표를 향해\n\n[다섯 번째 칼럼]\n친구의 응원\n함께하는 시간\n[불명확]\n감사한 마음\n\n[여러 짧은 메모들]\n화이팅\n우리 함께\n앞으로도 화이팅\n[불명확]\n\nMOSCLICK", "summary": "여름방학 시작과 함께 새로운 변화를 맞이하는 개인의 일상과 감정을 기록한 페이지입니다. 긍정적인 마음가짐으로 성장과 도전을 결심하고 있으며, 친구들과의 소중한 시간을 소중히 여기고 있습니다.", "tags": ["일상", "방학", "성장", "우정", "긍정"], "mood": "positive", "decade": "2000s", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p045.jpg", "processed_at": "2026-04-09T18:45:40.083753", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p045"}, {"date": null, "author": null, "content": "왼쪽부터 오른쪽으로 읽혀지는 여러 줄의 손글씨 한국어 텍스트가 있으나, 사진이 회전되어 있고 필기가 매우 흐릿하여 정확한 전사가 어렵습니다. 우측에는 여러 개의 검은색 동그라미 낙서가 있습니다. [불명확]", "summary": "노트의 텍스트가 필기체로 작성되어 있으나 사진 각도와 해상도로 인해 내용을 정확히 파악하기 어렵습니다.", "tags": [], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p046.jpg", "processed_at": "2026-04-09T18:45:45.319205", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p046"}, {"date": null, "author": null, "content": "The third [불명확]\n\n[그래프/곡선 그림이 있고 아래에 한글 텍스트가 있음]\n\n위쪽 곡선: DATE, PACE, MADOKA\n\n중간 텍스트:\n첫번째\n두번째\n세번째\n[불명확]\n\n아래쪽 곡선 근처 텍스트:\n[여러 한글 단어들이 있으나 필기가 작고 불명확함]\n앞뒤\n[불명확]\n\n좌측: The third [불명확]", "summary": "필기가 작고 불명확하여 정확한 내용 파악이 어렵습니다. 두 개의 곡선 그래프와 함께 여러 한글 텍스트가 작성되어 있습니다.", "tags": [], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p047.jpg", "processed_at": "2026-04-09T18:45:48.544375", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p047"}, {"date": null, "author": null, "content": "마음이 열린 그림 1\n\n[좌측 범례]\n- - - 곡선1(t)\n- - - - 곡선2(t)\n— 곡선3(t)\n\n[그래프 라벨들]\n결혼 이후\n곡선1(t)\n곡선2(t)\n곡선3(t)\n\n[우측 라벨들]\n초기관계\n[불명확]정도\n[불명확]정도\n[불명확]정도\n[불명확]정도\n관계깊이\n\n[하단 라벨]\n결혼 이전: 약간의 [불명확]\n약간의 변화\n\n[우하단]\n관계깊이", "summary": "관계의 시간에 따른 변화를 나타내는 그래프로, 결혼 전후의 관계 깊이와 여러 곡선의 변화 패턴을 시각화한 손그림입니다.", "tags": ["그래프", "관계", "분석"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p048.jpg", "processed_at": "2026-04-09T18:45:52.393217", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p048"}, {"date": null, "author": null, "content": "열린 마음\n\n1993.11.27\n\n앞으로의 [불명확]\n혼자라는 것도 좋지만\n함께하는 것이 더 좋다\n\n난 지금 혼자가 아니라는 게 참 좋다\n혼자라는 외로움에서\n벗어날 수 있어서\n\n인생을 살면서\n가장 소중한 것은 사람이다\n사람과의 만남\n사람과의 추억\n사람과의 사랑\n\n혼자라면 다 무슨 의미가 있겠는가\n함께할 사람이 있으니까\n모든 것이 의미가 있는 것이다\n\n지금 이 순간을 소중히 하자\n함께하는 사람들을 소중히 하자\n[불명확]", "summary": "작성자가 혼자가 아닌 함께함의 소중함을 깨닫고, 사람과의 만남, 추억, 사랑이 인생의 가장 소중한 것임을 표현하고 있습니다. 현재의 순간과 함께하는 사람들을 소중히 하자는 메시지를 전달합니다.", "tags": ["일상", "감성", "철학", "추억", "관계"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p049.jpg", "processed_at": "2026-04-09T18:45:57.268837", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p049"}, {"date": null, "author": null, "content": "페이지 왼쪽:\n12시 반쯤에 [불명확] 잘 놀았나?\n[불명확] 말도 많고\n[불명확] 부족하고\n[불명확] 가슴도 많이 아팠던 것 같다\n [불명확] 있었다\n[불명확] 때문에\n[불명확] 할 수 없었던 것들도 많았고\n[불명확] 꼭 그런 건 아니었지만\n[불명확] 어떤 [불명확]\n[불명확] 중요했던 것 같다\n\n페이지 오른쪽:\n[불명확]\n[불명확]\n[불명확]\n[불명확]\n[불명확]\n[불명확]\n[불명확]\n[불명확]\n[불명확]\n[불명확]\n[불명확]", "summary": "손글씨가 흐리고 중첩되어 있어 전체 내용을 명확하게 파악하기 어렵습니다. 과거를 회상하며 아팠던 감정과 못했던 것들에 대해 언급하는 내용으로 보입니다.", "tags": ["일상", "고민", "감정"], "mood": "negative", "decade": "unknown", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p050.jpg", "processed_at": "2026-04-09T18:46:01.216890", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p050"}, {"date": null, "author": null, "content": "DATE: 2011년 11월\n\nPOCE\n\n[불명확한 상단 텍스트]\n\n오늘따라 기분이 좋아\n있어서\n\n인생이 너무 짧아\n우리 다시 봐야지\n\n[중간부 복잡한 필기]\n\n너는 어제 무엇했니\n오늘은 또 뭐하고 있니\n기억하고 있니\n\n[불명확한 여러 줄의 필기]\n\n우리 다시 만날까\n언제쯤 만날 수 있을까\n기다릴게\n\n[하단부 추가 필기 - 부분적으로 불명확]", "summary": "2011년 11월에 작성된 개인적인 감정과 그리움을 표현한 일상 노트. 상대방을 그리워하며 다시 만나길 바라는 마음을 담고 있다.", "tags": ["일상", "감정", "그리움", "추억"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p051.jpg", "processed_at": "2026-04-09T18:46:08.062747", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p051"}, {"date": null, "author": null, "content": "길을 걷다 문득 멈춘다 / 지금 내가 뭘 하고 있는지 / 모르겠다 / 무언가 놓친 것 같은 / 불안감이 자꾸 밀려온다 / 내가 할 수 있는 것들 / 내가 해야 할 것들 / 너무 많은 것 같다 / 어디서부터 시작해야 할지 / 모르겠다 / 이 기분 이 불안감 / 언제쯤 사라질까 / 모르겠지만 / 계속 걸어가야 할 것 같다 / 왜냐하면 멈출 수 없으니까 / [불명확] 하나하나 / 차근차근 [불명확] / 그렇게 살아가는 게 아닐까 / 지금 이 순간을 / 소중히 여기면서", "summary": "현재의 불안감과 인생의 방향성에 대한 고민을 나타낸 성찰적인 글. 할 일이 많지만 무엇부터 시작해야 할지 모르겠다는 고민을 담고 있으며, 계속 나아가야 한다는 다짐으로 마무리한다.", "tags": ["고민", "성찰", "불안감", "일상"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p052.jpg", "processed_at": "2026-04-09T18:46:12.662613", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p052"}, {"date": null, "author": null, "content": "뭔가 이상한 느낌이 든다. 앞으로 어떻게 될지 모르겠고 불안하다. 선배들이 졸업하고 나가니까 더 외로운 것 같다. 우리도 곧 졸업하겠지. 시간이 참 빠르다. 지금 이 순간들이 소중한 거 같다. 다들 각자의 길을 가겠지만 우리의 추억은 변하지 않을 거야. 앞으로도 좋은 일들이 많았으면 좋겠다. [불명확] 화이팅! 열린마음 화이팅! 모두 화이팅!", "summary": "작성자가 시간의 흐름과 변화에 대한 불안감과 함께 현재의 소중함을 깨닫고 있습니다. 선배들의 졸업을 통해 자신들도 곧 졸업할 것임을 인식하며, 함께하는 시간과 추억의 가치를 강조합니다.", "tags": ["일상", "고민", "졸업", "감성", "추억", "우정"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p053.jpg", "processed_at": "2026-04-09T18:46:16.698398", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p053"}, {"date": null, "author": null, "content": "PAGE 내용:\n\n열린 마음의 여행\n\n다양한 한국어 텍스트가 손으로 작성되어 있으며, 일부 내용으로는:\n- 개인의 생각과 감정에 관한 글귀들\n- 여러 문장으로 이루어진 단락들\n- [불명확] 부분들이 다수 포함\n\n전체적으로 읽기 어려운 필체와 낡은 종이 상태로 인해 정확한 전문(全文) 전사가 제한적입니다.\n\n주요 섹션:\n- 상단부: 제목 관련 텍스트\n- 중앙부: 길게 이어진 본문\n- 하단부: 추가 메모 및 글귀들\n\n[불명확] 다수", "summary": "1990년대~2000년대 학과 방명록 페이지로 보이며, 개인의 감정과 생각을 기록한 일상 노트입니다. 낡은 종이와 흐린 필체로 인해 전체 내용을 명확히 파악하기 어렵습니다.", "tags": ["일상", "감정", "고민", "기록"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p054.jpg", "processed_at": "2026-04-09T18:46:24.250406", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p054"}, {"date": null, "author": null, "content": "[불명확한 부분이 많음] 손글씨로 쓰인 한국어 텍스트가 있으나 각도와 필압, 노트의 나이로 인해 대부분 읽기 어려움. 보이는 부분: '포기', '2월', '공부', '꿈', '노트', '마음', '모습', '생각', '친구', '행복' 등의 단어들이 산재되어 있으나 맥락을 파악하기 어려움", "summary": "1990년대~2000년대 학과 방명록으로 추정되는 노트에 작성된 개인적인 메시지. 여러 필적으로 보아 여러 사람이 작성한 것으로 보이나 텍스트 판독이 어려움.", "tags": ["일상", "생각", "고민"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p055.jpg", "processed_at": "2026-04-09T18:46:28.755118", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p055"}, {"date": null, "author": null, "content": "左側ページ:\n삶이 힘들고 외로울 때\n혼자라는 생각이 들 때\n그럼에도 불구하고\n계속 앞으로 나아가야 한다\n우리는 모두 각자의 길을 걷고 있다\n누구나 힘든 시간을 겪는다\n그것이 우리를 더욱 강하게 만든다\n\n右側ページ:\n[복잡한 필기로 인해 대부분 불명확]\n여러 줄의 일정 또는 메모로 보이며\n날짜와 시간, 약속 등이 기록되어 있는 것으로 추정됨\n구체적인 내용은 필기체와 각도로 인해 판독 어려움", "summary": "좌측에는 인생의 어려움과 외로움을 다루면서도 앞으로 나아가야 한다는 긍정적인 메시지가 담겨있고, 우측에는 일정이나 약속을 기록한 메모로 보입니다.", "tags": ["일상", "고민", "긍정"], "mood": "positive", "decade": "unknown", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p056.jpg", "processed_at": "2026-04-09T18:46:33.458699", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p056"}, {"date": null, "author": null, "content": "여러 개의 손글씨 메모들이 작은 글씨로 빽빽하게 작성되어 있습니다. 주요 내용은 다음과 같습니다:\n\n좌측 상단부터 시작:\n- 1/5 새벽\n- 1/6 밤\n- [불명확] 시간\n- 1/8 주말\n- 1/9 아침\n- 1/10\n- 1/11\n\n여러 칸의 메모에는 다음과 같은 내용들이 포함되어 있습니다:\n- 시간 표기 (밤, 아침, 주말 등)\n- 짧은 문장 및 단어들\n- [불명확]한 필기 부분들이 여러 곳에 있음\n- 전체적으로 작은 글씨로 빽빽하게 기록된 일일 메모 형식\n\n대부분의 텍스트가 손글씨로 읽기 어렵고 [불명확]한 부분이 많습니다.", "summary": "1월의 날짜별로 시간대와 함께 작성된 개인 일일 메모입니다. 손글씨가 작고 복잡하여 정확한 내용 파악이 어렵습니다.", "tags": ["일상", "메모", "일기"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p057.jpg", "processed_at": "2026-04-09T18:46:38.705272", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p057"}, {"date": null, "author": null, "content": "열린마음이란 무엇인가? 마음을 열고 다른 사람들과 소통하는 것이다. 우리 학과 학생들이 서로의 생각과 감정을 나누는 공간이다.\n\n[불명확] 우리는 함께 웃고 울고 성장한다. 때론 힘들 때도 있지만 서로를 위로하며 나아간다.\n\n이 페이지에 기록되는 모든 순간들이 추억이 되길 바란다. 졸업 후에도 이 따뜻한 마음들을 잊지 않기를...\n\n[불명확한 부분들]\n- 중간부터 우측 끝까지 손글씨가 빽빽하게 작성됨\n- 여러 다른 필체로 보아 여러 사람이 작성한 것으로 보임\n- 학과 활동, 일상 에피소드, 응원의 말 등이 섞여있는 것으로 추정됨\n- 전체적으로 정감있고 따뜻한 톤의 메시지들", "summary": "학과 방명록/일상 노트에 여러 사람들이 '열린마음'에 대한 생각과 따뜻한 응원의 말을 남긴 페이지로 보입니다. 서로를 위로하며 성장하는 학과 공동체의 모습을 담고 있습니다.", "tags": ["일상", "학과활동", "추억", "우정", "응원"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p058.jpg", "processed_at": "2026-04-09T18:46:44.055840", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p058"}, {"date": null, "author": null, "content": "오늘\n[불명확]하고 싶은\n바람 하나\n[불명확] 마음\n\n그런 마음으로\n시작된 오늘\n[불명확]\n\n내 맘이\n[불명확]하고\n다른 이의 맘도\n[불명확]할 거야\n\n세상이 아플 때\n우리가 할 수 있는 것\n따뜻한 말 한마디\n손을 잡아주는 것\n그리고 함께 웃는 것\n\n힘내\n모두 잘 될 거야\n[불명확]\n\n이 글을 읽는 모든 이들에게\n따뜻한 위로와\n밝은 내일을 선물하고 싶어\n\n[불명확]\n[불명확]\n[불명확]\n\n행복해\n[불명확]\n[불명확]\n안녕", "summary": "따뜻한 마음으로 시작된 하루에 대한 반성과 함께 세상이 아플 때 필요한 것들(따뜻한 말, 손잡음, 함께 웃음)을 이야기하며 모두를 격려하는 글.", "tags": ["일상", "공감", "위로", "희망"], "mood": "positive", "decade": "2000s", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p059.jpg", "processed_at": "2026-04-09T18:46:48.326081", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p059"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n제목: 학년 초 대학 인문계\n부제: 이번 학기 우리들의 모습\n\n중앙 및 오른쪽 페이지:\n그래프 형식의 드로잉으로, 여러 산맥 같은 곡선들이 그려져 있음.\n상단 중앙: 각각의 선 위에 [불명확] 한글 텍스트 표기\n중앙부: 긴 물결 모양의 곡선 (대시 선으로 표시된 부분 포함)\n하단: 여러 개의 작은 산 모양과 그 위의 한글 텍스트 주석들\n오른쪽 상단과 우측: 작은 인물 스케치 2개\n\n전체적으로 [불명확]한 부분이 많음", "summary": "학년 초 대학 인문계의 모습을 그래프 형식과 산맥 드로잉으로 표현한 추상적인 일상 노트 페이지. 여러 개의 곡선과 작은 인물 스케치로 구성되어 있으나 정확한 의미는 불명확함.", "tags": ["신입생", "일상", "대학생활", "그래픽", "추상표현"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p060.jpg", "processed_at": "2026-04-09T18:46:52.911277", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p060"}, {"date": null, "author": null, "content": "열린마음\n\n[불명확한 부분이 많아 정확한 전사가 어려움]\n\n손으로 쓴 한국어 텍스트가 보이며, 여러 단락으로 구성되어 있습니다. 텍스트의 필체가 흐릿하고 중첩되어 있어 정확한 내용 파악이 어렵습니다. \n\n보이는 단어들:\n- 열린마음\n- 이름 (사람 이름으로 보임)\n- 날짜 관련 표기\n- 다양한 한글 문구들\n\n[전체적으로 필체가 불선명하고 텍스트 중첩으로 인해 정확한 전사 불가]", "summary": "학과 방명록 페이지로 보이며, 여러 사람의 손글씨가 기록되어 있습니다. 필체가 흐릿하고 텍스트가 중첩되어 있어 정확한 내용 파악이 어렵습니다.", "tags": ["방명록", "일상", "학과"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p061.jpg", "processed_at": "2026-04-09T18:47:00.164182", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p061"}, {"date": null, "author": null, "content": "PAGE 4/5\n\n기억나는가 그날\n\n너무나 2013년 4/22/27\n\n어제들을 보낸다\n처음 만났을 때 얼굴\n웃음이 아름다웠어\n그때는 몰랐어\n\n내가 너무 좋아했어\n다 내가 말이야\n자꾸 자꾸만\n\n모두가 아무것도 모르지\n넌 나를 모르고\n난 너를 모르고\n그렇게 우린 살고 있어\n\n[불명확]\n아무것도 못했던 나\n웃음만 남기고\n떠나갈래\n\n봄날의 [불명확]\n그대 맘도 [불명확]\n아주 조금이라도\n담겨 있으면 좋겠어\n\n어떤 말을 해야 할까\n이렇게 남겨두고\n떠나야 할까\n\n나는 늘 그래\n말을 못해\n마음은 [불명확]\n입은 닫혀있어\n\n지금도 그래\n지금도 말을 못하고\n[불명확] 생각만 해\n너무 많아\n\n너무 많아\n[불명확]\n\n내 마음\n너에게 닿기를", "summary": "작성자가 누군가를 그리워하며 표현하지 못한 감정을 글로 남긴 내용입니다. 봄날의 그리움과 고백하지 못한 마음, 그리고 말하지 못하는 자신의 성격을 담은 감성적인 글입니다.", "tags": ["연애", "감정", "그리움", "고민", "일상"], "mood": "negative", "decade": "2000s", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p062.jpg", "processed_at": "2026-04-09T18:47:06.640261", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p062"}, {"date": null, "author": null, "content": "한글 손글씨로 작성된 텍스트가 있으나 각도, 필기체, 겹침으로 인해 정확한 전사가 매우 어렵습니다. 페이지 상단에 'PAGE', 'DATE'라는 영문 헤더가 보이고, 전체적으로 무언가의 기록이나 노트로 보이지만 개별 단어와 문장을 명확하게 구분하기 어렵습니다. [불명확]", "summary": "1990년대~2000년대 학과 방명록/일상 노트의 페이지로 보이나, 필기의 각도와 중첩으로 인해 내용을 명확하게 파악하기 어렵습니다.", "tags": ["일상", "노트"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p063.jpg", "processed_at": "2026-04-09T18:47:10.113477", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p063"}, {"date": null, "author": null, "content": "포즈\n\n또 하나의 시작\n\n나는 또 무엇을 할 것인가\n제목을 잃은 채로\n이곳에 왔다\n\n우리가 나누었던 것들\n그리고 앞으로 나눌 것들\n\n매일 밤 [불명확]\n그리고 아침마다\n새로운 기억들이 쌓여간다\n\n시간은 빠르고\n나는 [불명확]\n\n무엇인가를 놓치고 있는 것 같은\n이 기분\n\n희망 그리고 절망\n[불명확]\n\n22 달러[불명확]\n우리의 관계가 진행 중이고\n그 사이로 내가 자라나고 있다\n\n공부\n[불명확] 그리고 미래\n\n[불명확]\n그리고 시간의 흐름 속에서\n나의 선택\n\n모두가", "summary": "시간의 흐름 속에서 변화하는 자신의 모습과 관계, 미래에 대한 고민을 담은 성찰적인 글귀이다. 새로운 시작과 함께 놓치고 있는 것에 대한 불안감과 희망이 섞여있다.", "tags": ["일상", "고민", "성찰", "미래", "감성"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p064.jpg", "processed_at": "2026-04-09T18:47:14.657308", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p064"}, {"date": null, "author": null, "content": "열린마음\n\n[좌측 섹션]\n마음 담아\n[불명확]\n그리고\n[여러 줄의 손글씨가 있으나 기울기가 심해서 정확한 판독이 어려움]\n\n[우측 섹션 - 가독성 낮음]\n다양한 한글 텍스트가 촘촘하게 기록되어 있으나,\n기울기와 필기체로 인해 전체 내용의 정확한 전사가 어려움.\n개별 단어들 중 식별 가능한 것:\n- 마음, 생각, 느낌, 고민 등의 단어들이 반복적으로 보임\n- 날짜나 구체적인 사건에 대한 기록으로 보임\n- 여러 단락으로 나뉘어 작성됨", "summary": "열린마음 페이지에 작성자의 일상적인 생각과 감정을 기록한 노트. 기울어진 필기체와 촘촘한 필적으로 인해 대부분의 내용이 명확하게 판독되지 않음.", "tags": ["일상", "고민", "감정"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p065.jpg", "processed_at": "2026-04-09T18:47:19.598506", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p065"}, {"date": null, "author": null, "content": "2/21 일이 벌써 지나갔네\n밤새 이렇게\n하는데 앗 [불명확]\n친구도 없고 [불명확]\n다 [불명확] 따만\n하는데 막\n\n왠지 맘이 힘들어\n맘이 자꾸 아파\n몸도 힘들고\n\n한데 뭐 [불명확]\n\n맘도 약한 내\n마음이 [불명확] 않네\n아직도\n\n하지만 [불명확]\n남은 반은 [불명확] 될 [불명확]\n될 거야\n\n마음먹으면 된다\n될 거야\n힘내자\n\n아직 마음이 약해\n4-여름 때문일까\n아직도 [불명확]\n4월 4일? [불명확]\n[불명확]\n[불명확]", "summary": "작성자가 시간이 빠르게 지나가는 것을 느끼며 마음이 약해지고 힘든 감정을 표현하고 있습니다. 어려운 상황 속에서도 긍정적으로 마음먹고 힘내자는 다짐을 하고 있습니다.", "tags": ["일상", "고민", "감정", "힘내기"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_전국일주_열린마음_p066.jpg", "processed_at": "2026-04-09T18:47:23.907846", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p066"}, {"date": null, "author": null, "content": "PAGE [페이지 번호 불명확]\n\nDATE [날짜 섹션]\n\n열린마음 [제목]\n\n[좌측 상단 필기]\n초등학교 6학년\n[불명확한 텍스트들]\n\n[중앙 및 우측 영역의 여러 줄의 필기]\n다양한 손글씨로 작성된 메모들이 보이며, 대부분의 텍스트가 손글씨로 인해 읽기 어렵고 겹쳐 있음.\n\n[우측 상단]\n46페이지 또는 유사한 페이지 표시\n\n[여러 칸의 표 형식]\n가로 줄이 그어진 노트 형식으로, 각 칸마다 손글씨 메모가 기록되어 있음.\n\n[읽을 수 있는 부분들]\n날짜, 이름, 짧은 메모 형식의 필기들이 반복되고 있으나 대부분 [불명확]\n\n[우측 중단]\n검은 펜으로 그은 선이 있음.", "summary": "학과 방명록의 페이지로, 여러 사람들이 손글씨로 남긴 메모와 필기들이 표 형식으로 정렬되어 있습니다. 날짜와 이름 정보가 포함되어 있으나 대부분의 텍스트가 손글씨 겹침으로 인해 읽기 어렵습니다.", "tags": ["방명록", "일상", "학과"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1995년_전국일주_열린마음_p067.jpg", "processed_at": "2026-04-09T23:01:28.637035", "volume_id": "1995년_전국일주_열린마음", "volume_title": "1995년 전국일주 열린마음", "year": 1995, "page_label": "p067"}, {"date": null, "author": null, "content": "2월 3일 안녕 미쳐버린 기간들 이제 끝나겠지 2월 5일 엄마 된장 맛있다 7일 먹을 때 좋고 8일 [불명확] 괜찮아 그런데 마음이 [불명확] 2월 10일 [불명확] 3년이 지났어도 아직도 [불명확] 떠나가지 않아 2월 11일 아침 밥 먹을 때 그리운 맘이 드는 왜 그럴까 2월 12일 [불명확] 오빠 생각 많이 나 2월 13일 날씨 좋다 ", "year": 1996, "page_label": "p013"}, {"date": null, "author": "민준 (또는 민준일 수 있음)", "content": "아깝다 지난 하루\n지나간 그 시간을 다시 돌려줄 수 없을까\n[불명확]\n이 세상 모든 것이 소중하구나\n가끔 느껴지는 그 감정\n[불명확]\n\n민준 씀", "summary": "지나간 시간에 대한 아쉬움과 세상의 소중함을 느끼며 마음의 감정을 기록한 글귀.", "tags": ["일상", "고민", "감정", "인생"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1996년_1번째_이심이_p014.jpg", "processed_at": "2026-04-09T23:03:32.432360", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p014"}, {"date": null, "author": null, "content": "텍스트 없음", "summary": "주로 그림으로 구성된 페이지이며, 손글씨 텍스트는 식별 불가능합니다.", "tags": ["일상"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1996년_1번째_이심이_p015.jpg", "processed_at": "2026-04-09T23:03:34.403612", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p015"}, {"date": null, "author": null, "content": "And\n\n[손글씨 그림 - 여러 명이 함께 달리거나 움직이는 모습의 스케치]\n\nGo Spiral!\n\n[불명확]주 [불명확]왔는\n[불명확]기 [불명확]", "summary": "여러 사람이 함께 움직이는 역동적인 장면을 그린 스케치로, '나선형으로 나아가자'는 의미의 문구와 함께 긍정적인 에너지를 표현하고 있습니다.", "tags": ["행사", "단체활동", "긍정", "동료", "MT"], "mood": "positive", "decade": "unknown", "image_quality": "fair", "filename": "1996년_1번째_이심이_p016.jpg", "processed_at": "2026-04-09T23:03:38.439644", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p016"}, {"date": null, "author": null, "content": "Freedom!\n벗 there\n[불명확] of life\n[불명확]\n\n[왼쪽부터 읽히는 텍스트]\nFreedom!\n벗 there\n[불명확] life의 [불명확]\n[불명확]\n\n[중앙의 빨간 필기]\n마음을 [불명확]\n벗 there\n[불명확] of life\n[불명확]\n\n[여러 줄의 흐릿한 인쇄 텍스트 위에 빨간색 펜으로 작성된 메모들]\n대부분의 텍스트가 불명확하고 읽기 어려움", "summary": "이 페이지는 '열린마음' 방명록의 일부로 보이며, 영문 'Freedom'이라는 단어와 함께 빨간색 펜으로 작성된 한국어 메모들이 있습니다. 정확한 내용을 파악하기 어려울 정도로 필기와 인쇄 텍스트가 겹쳐있습니다.", "tags": ["방명록", "일상", "메모"], "mood": "neutral", "decade": "2000s", "image_quality": "poor", "filename": "1996년_1번째_이심이_p017.jpg", "processed_at": "2026-04-09T23:03:42.329207", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p017"}, {"date": null, "author": null, "content": "좌측 페이지:\n답답한 맘이 풀릴때까지 기다려야할것 같아\n자꾸 눈물이 나와\n내가 왜 이럴까\n시간이 해결해줄까\n[불명확]\n아직도 모르겠어\n[불명확] 같은 생각도 들고\n화도 나고\n외로움도 느껴지고\n어떻게 해야할지 모르겠어\n누군가 도와줬으면\n근데 이건 내가 해결해야할 문제같아\n열심히 버티고 있는중이야\n하루하루가 힘들어\n\n우측 페이지:\n[불명확]\n너무 많은 사람들을 만나다보니\n관계가 복잡해졌어\n[불명확] 생각이 들어\n내가 뭘 하고싶은지\n누가 정말 소중한지\n다시 생각해봐야할것 같아\n혼자 있고 싶은 맘도 생겨\n깊이 생각할 시간이 필요해\n외로움이 밀려와\n[불명확]\n자존감도 떨어지고\n모든게 힘들어 보여\n이 기간을 지나가면\n다시 좋아질까", "summary": "학생이 복잡한 감정과 대인관계로 인한 고민을 기록한 일상 노트이다. 답답함, 외로움, 자존감 저하 등으로 힘들어하면서도 시간이 해결해주기를 바라고 있다.", "tags": ["고민", "감정", "관계", "외로움", "자존감", "일상"], "mood": "negative", "decade": "2000s", "image_quality": "fair", "filename": "1996년_1번째_이심이_p018.jpg", "processed_at": "2026-04-09T23:03:47.923313", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p018"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n별 그림과 함께\n[불명확한 부분 다수]\n마음 어딘가에\n내가 좋아하는 사람\n떠올리게 되고\n그 사람 때문에\n가슴이 철렁하고\n[불명확]\n\n오른쪽 페이지:\n마음이\n[불명확한 부분 다수]\n이렇게도 되는 건가\n함께 웃고 울고\n계속 만나고 싶고\n[불명확]\n모든 것이\n소중하게 느껴진다\n[불명확한 부분들]\n너무 그리워\n[불명확]\n그래도 괜찮아\n우리 영원히\n[불명확]\n사랑한다", "summary": "연애와 감정에 대한 개인적인 고민과 느낌을 담은 일상 노트. 좋아하는 사람에 대한 따뜻하고 설렘 가득한 감정을 표현하고 있습니다.", "tags": ["연애", "감정", "고민", "일상"], "mood": "positive", "decade": "unknown", "image_quality": "fair", "filename": "1996년_1번째_이심이_p019.jpg", "processed_at": "2026-04-09T23:03:51.866740", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p019"}, {"date": null, "author": null, "content": "0 [불명확] 20 [불명확]\n\n이 [불명확] 뭐 [불명확]\n\n[불명확] 이 [불명확]\n\n L 3 al [불명확]\n\n아 [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확] [불명확]", "summary": "손글씨가 매우 흐릿하고 읽기 어려운 노트 페이지입니다. 대부분의 텍스트가 불명확하여 정확한 내용 파악이 불가능합니다.", "tags": [], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1996년_1번째_이심이_p020.jpg", "processed_at": "2026-04-09T23:03:54.773623", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p020"}, {"date": null, "author": null, "content": "To 열린마음 (그대)\n\n안녕하세요! 저는 [불명확]\n\n열린마음이 지금까지 해온 일들을 보니 정말 멋있었어요. T-Shirt 인쇄도 잘 나왔고 여러 행사들도 [불명확] 있었고...\n\n처음에는 어떻게 될까봐 걱정도 많이 했는데 지금 생각해보니 우리가 함께 한 순간들이 정말 소중한 것 같아요. 비록 [불명확]도 있었지만 모두 함께 극복해 낼 수 있었던 것 같습니다.\n\n앞으로도 열린마음이 계속 발전하길 바라며, 남은 기간 동안 더욱 알찬 활동을 하기를 기원합니다.\n\n화이팅!!!\n\n[서명/낙관]", "summary": "열린마음 학과 활동을 응원하는 메시지. 함께한 시간들이 소중했으며 앞으로의 발전을 기원하는 내용입니다.", "tags": ["일상", "동아리", "응원", "추억", "활동"], "mood": "positive", "decade": "2000s", "image_quality": "fair", "filename": "1996년_1번째_이심이_p021.jpg", "processed_at": "2026-04-09T23:03:59.005903", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p021"}, {"date": null, "author": null, "content": "이 페이지는 손글씨로 작성된 한국어 텍스트로 가득 차 있으나, 사진의 각도, 조명, 그리고 필기체의 특성으로 인해 정확한 전사가 매우 어렵습니다. 여러 문단으로 나뉘어 있으며, 개별 단어와 문장들이 보이지만 연결된 의미를 파악하기에는 [불명확]한 부분이 대부분입니다. 가독성 있는 부분들만 식별되지만 완전한 전사는 불가능합니다.", "summary": "방명록 페이지에 여러 사람의 손글씨로 작성된 메시지들이 있으나, 사진 품질과 각도로 인해 대부분의 내용이 정확히 판독되지 않습니다.", "tags": ["방명록", "일상"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1996년_1번째_이심이_p022.jpg", "processed_at": "2026-04-09T23:04:05.528414", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p022"}, {"date": null, "author": null, "content": "○ 이것에서 타야\n\n아마도 [불명확]\n[불명확]도 [불명확]\n\n[불명확] 되어\n\n아침 일찍 [불명확]\n[불명확] 되고\n\n[불명확] 아침도 [불명확]\n[불명확] 잠도\n\n[불명확] 2729 이라도\n\n[불명확] [불명확]\n[불명확] 밤에 [불명확]\n\n[불명확] 돌아가고\n\n[불명확] 된다\n\n[불명확] [불명확]\n[불명확] [불명확]\n\n@ 타이핑 [불명확]\n[불명확]", "summary": "일상 속 반복되는 피로와 불규칙한 생활 패턴에 대한 기록으로 보이며, 아침 일찍 일어나는 것과 수면 부족에 대한 언급이 있습니다.", "tags": ["일상", "고민", "생활"], "mood": "negative", "decade": "unknown", "image_quality": "poor", "filename": "1996년_1번째 앞서\n[불명확] 지켜줘서 고마워\n고마워", "summary": "떠나간 친구들을 그리워하며 언젠가 다시 만나기를 바라는 마음을 표현한 감성적인 글귀입니다. 소중한 추억과 감사의 마음을 담고 있습니다.", "tags": ["추억", "이별", "우정", "감성", "그리움"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "1996년_1번째_이심이_p026.jpg", "processed_at": "2026-04-09T23:04:24.583973", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p026"}, {"date": null, "author": null, "content": "[불명확한 필기] 어려운 부분이 많으며, 다음과 같은 단어들이 보입니다:\n\n열린 마음에 오신 것을 환영합니다\n이것은 열린 마음 Patch입니다\n(ㅣ)처러 Essence\n\n[상단에서부터 읽기 어려운 필기들]\n- 여러 줄의 손글씨가 뒤섞여 있음\n- 수식이나 기호로 보이는 부분들\n- '친구', '마음', '열린' 등의 단어 부분 인식\n- 날짜나 이름으로 보이는 약자들\n\n[중간부터 하단까지]\n전체적으로 필기가 겹쳐있고 각도가 다양하여 연속적인 문장 구성이 어려움\n여러 사람의 필기가 섞여있는 것으로 보임", "summary": "방명록 페이지로 보이는 문서이며, 여러 사람의 손글씨가 겹쳐있고 필기 각도가 다양하여 정확한 내용 파악이 어렵습니다. '열린마음'에 관련된 텍스트가 보이지만 나머지 내용은 불명확합니다.", "tags": ["방명록", "일상", "1990s-2000s"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1996년_1번째_이심이_p027.jpg", "processed_at": "2026-04-09T23:04:29.745000", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p027"}, {"date": null, "author": null, "content": "[불명확한 필기로 인해 정확한 전사 어려움] 대부분의 텍스트가 작은 필기체로 여러 겹으로 쓰여있어 개별 문장 판독 곤란. 간단한 단어들과 기호(화살표, 원형 표시 등)가 산재되어 있으나 전체 맥락 파악 불가", "summary": "여러 겹의 작은 필기로 채워진 노트 페이지. 정확한 내용 판독이 매우 어려움.", "tags": ["일상", "노트"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1996년_1번째_이심이_p028.jpg", "processed_at": "2026-04-09T23:04:37.664755", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p028"}, {"date": null, "author": null, "content": "열린마음 [불명확]\n[불명확] 너를 알고 싶어\n[불명확] 네 맘이 궁금해\n[불명확] 함께 걷고 싶어\n[불명확] 너와 함께\n[불명확] 시간이 흐를수록\n[불명확] 더 알고 싶고\n[불명확] 곁에 있고 싶어\n[불명확] 함께하고 싶어\n[불명확] 진심으로\n[불명확] 마음을 나누고\n[불명확] 함께 걸어가고 싶어\n[불명확] 열린마음으로\n[불명확] 모든 걸 받아들이고\n[불명확] 함께 성장하고 싶어\nMoscow", "summary": "누군가에 대한 마음과 함께하고 싶다는 진심 어린 감정을 표현한 글입니다. 상대를 알고 싶고, 곁에 있고 싶으며, 열린 마음으로 함께 성장하고 싶다는 따뜻한 메시지입니다.", "tags": ["연애", "감정", "일상", "마음"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1996년_1번째_이심이_p029.jpg", "processed_at": "2026-04-09T23:04:41.573471", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p029"}, {"date": null, "author": null, "content": "[손글씨가 매우 작고 복잡하여 정확한 전사가 어려움] 수학 관련 계산식과 함수 표기법으로 보이는 내용. 여러 줄의 공식과 변수들이 포함되어 있으며, 미분/적분 기호(d/dx, ∫ 등)와 괄호, 분수 형태의 수학 표현들이 산재되어 있음. 페이지 양쪽에 걸쳐 작성되어 있으며, 정확한 내용 파악이 제한적임.", "summary": "수학 문제풀이 또는 강의 내용을 필기한 페이지로 보임. 미분, 적분 등의 고등 수학 개념이 포함되어 있으나 손글씨 크기와 밀도로 인해 상세 내용 파악이 어려움.", "tags": ["공부", "수학", "필기"], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1996년_1번째_이심이_p030.jpg", "processed_at": "2026-04-09T23:04:45.515909", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p030"}, {"date": null, "author": null, "content": "여기 와서 살아가며\n나는 많은 것을 배웠고\n그리고 많은 추억들을 만들었다\n\n서로의 모습 그대로를\n아껴줄 수 있는 사람들과\n함께 할 수 있었던 것이\n정말 행복했다\n\n앞으로도 좋은 친구들과\n행복하게 살아가고 싶다\n그리고 이곳에서 만난 모든 사람들이\n각자의 길을 걸어가면서도\n따뜻한 마음을 간직했으면 좋겠다\n\n행복해라 우리 모두\n이곳에서 만날 수 있어서\n정말 고마웠다\n[불명확]", "summary": "학과 생활을 마무리하며 함께한 친구들과의 추억을 소중히 여기고, 앞으로도 좋은 관계를 유지하고 싶다는 따뜻한 마음을 담은 글.", "tags": ["졸업", "추억", "우정", "감사", "마음"], "mood": "positive", "decade": "unknown", "image_quality": "fair", "filename": "1996년_1번째_이심이_p031.jpg", "processed_at": "2026-04-09T23:04:49.738692", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p031"}, {"date": null, "author": null, "content": "열린마음\n\n[불명확] 하면서\n하나 [불명확]\n[불명확] 아이들 [불명확]\n\n[불명확] [불명확]\n[불명확] [불명확]\n\n[불명확] 생각하며\n[불명확] [불명확]\n\n[불명확] [불명확]\n[불명확] [불명확]\n\n[불명확] [불명확]\n[불명확] [불명확]\n\n[불명확] [불명확]\n[불명확] [불명확]", "summary": "노트의 텍스트가 많이 흐릿하고 기울어져 있어 정확한 내용 파악이 어렵습니다. '열린마음'이라는 제목과 함께 여러 줄의 손글씨가 있으나 대부분 읽기 불명확합니다.", "tags": ["일상", "노트"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1996년_1번째_이심이_p032.jpg", "processed_at": "2026-04-09T23:04:53.400144", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p032"}, {"date": null, "author": null, "content": "[불명확한 부분이 많아 정확한 전사 어려움] 왼쪽 페이지: 수학 관련 공식 및 계산 과정으로 보이는 필기. 우측 페이지: 기하학적 도형(직육면체, 각도 표시 등)의 스케치와 함께 수학 문제 풀이 과정으로 보이는 내용. 전체적으로 수학 숙제나 문제풀이 노트로 추정됨. [텍스트 읽기 매우 어려움]", "summary": "수학 문제풀이 및 도형 관련 계산 노트. 기하학적 도형의 스케치와 함께 수학 공식 및 계산 과정이 기록되어 있음.", "tags": ["공부", "수학", "숙제"], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1996년_1번째_이심이_p033.jpg", "processed_at": "2026-04-09T23:04:56.778725", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p033"}, {"date": null, "author": null, "content": "너도 좋아\n얘기 들었어 정말 좋다\n뭐 될 써 나도 그래\n\n처음엔 어떻게 되나 싶더니\n나도 이제 알겠더라 뭐 해야겠는데\n그런데 요즘 생각해 보니까 처음으로 돌아가서\n내가 뭐하는 거 같아\n그래도 괜찮아 요즘 날씨도 좋고\n[불명확] 이라서 그럼 됐어\n\n계속 이래야 하나 싶지만\n무서워 말고 나쁠 것 같고\n걱정도 많고 [불명확] 했는데\n요즘은 그냥 받아들여\n계속 하고 있어\n\n아무래도 힘들겠지만\n괜찮아 내가 잘할 거야\n화이팅\n[불명확]\n[불명확]", "summary": "일상 속 고민과 걱정을 토로하면서도 긍정적으로 극복하려는 마음을 표현한 일기. 처음의 불안감을 받아들이고 앞으로 나아가려는 결연한 의지를 보여준다.", "tags": ["일상", "고민", "감정", "응원"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1996년_1번째_이심이_p034.jpg", "processed_at": "2026-04-09T23:05:01.568110", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p034"}, {"date": null, "author": null, "content": "열린마음\n\n[불명확] 추억\n\n인생은 [불명확]\n\n어떤 날은 춥고\n어떤 날은 따뜻하다\n그렇지만 [불명확]\n\n100°C [불명확]\n보일 때\n끓는점\n\n그것이 [불명확]\n이 되고\n\n그 변화 속에서\nThe breeze\n\n우리는 자신을 [불명확]\n할 수 있다\n\n[불명확] 글들\n[불명확]\n[불명확]\n\n마음을 [불명확]\n열고\n보면\n\n새로운 [불명확]\n[불명capture]\n\n[불명확] 앞서\n[불명확]\n\n우리가 할 수 있는\n[불명확]\n[불명확]\n[불명확]\n\n그것이 바로\n열린마음\n\n[불명확]\n[불명확]\n[불명확]\n[불명확] 있고\n[불명확]\n[불명확]\n[불명확]\n[불명확]", "summary": "인생의 변화와 다양한 감정을 비유적으로 표현하며, 마음을 열고 보는 것의 중요성에 대해 성찰하는 내용입니다. 열린마음이라는 주제로 긍정적인 메시지를 전달하고 있습니다.", "tags": ["철학", "성찰", "일상", "감정", "마음"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1996년_1번째_이심이_p035.jpg", "processed_at": "2026-04-09T23:05:05.749479", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p035"}, {"date": null, "author": null, "content": "첫 번째 칼럼부터 시작:\n\n1. 나는 올해도 기쁨 / 소중한 시간들 / 다시 한번\n\n2. 친구 / 엄마 / 너무 소중해\n\n3. 때론 힘들지만 / 함께할 거야\n\n4. (4,5) 많은 것들이 / 지나가고\n\n5. 빛이되어 / 함께 할게\n\n6. 긴 시간 / 기다린 것처럼 / 슬프지만\n\n7. 나의 친구여 / 있어줘서 고마워\n\n8. 고마워 / 정말로\n\n9. 시간이 흘러도 / 잊지 않을게\n\n10. 언제나 / 감사해\n\n11. 함께라 / 행복해\n\n12. 우리 [불명확] / 소중해\n\n13. 항상 / 응원할게\n\n14. 기억해 / 영원히\n\n15. 다함께 / 웃으며 살자", "summary": "친구들과의 우정과 감사, 함께하는 시간의 소중함을 표현한 여러 명의 짧은 메시지들이 칼럼 형식으로 정렬되어 있습니다. 긍정적이고 따뜻한 감정의 방명록 페이지입니다.", "tags": ["우정", "감사", "일상", "친구"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1996년_1번째_이심이_p036.jpg", "processed_at": "2026-04-09T23:05:16.938547", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p036"}, {"date": null, "author": null, "content": "열린마음 학과 방명록 페이지로 여러 사람의 손글씨가 있습니다. 읽기 어려운 부분이 많으나 다음과 같이 해석됩니다:\n\n좌측부터:\n- [불명확] 대학 생활...\n- 앞으로의 꿈...\n- 행복한 학부생...\n\n중앙부:\n- 열심히 공부하자\n- 함께 [불명확]\n- 좋은 추억 만들자\n- 화이팅\n\n우측부:\n- 성공을 기원하며\n- 좋은 시간 함께\n- [불명확] 응원합니다\n- 졸업까지 화이팅\n\n여러 필체로 작성된 격려와 응원의 메시지들로 구성되어 있습니다.", "summary": "열린마음 학과 방명록 페이지로 여러 학생들이 남긴 격려와 응원의 메시지 모음입니다. 대학생활, 공부, 행복한 추억, 성공 등의 주제가 담겨있습니다.", "tags": ["방명록", "졸업", "응원", "대학생활", "추억", "행사"], "mood": "positive", "decade": "2000s", "image_quality": "fair", "filename": "1996년_1번째_이심이_p037.jpg", "processed_at": "2026-04-09T23:05:21.728242", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p037"}, {"date": null, "author": null, "content": "안녕하세요 저는 [불명확] 입니다.\n\n대학에 와서 처음 느낀 것은 자유로움과 책임감의 무게였어요. 고등학교 때처럼 모든 것이 정해져 있지 않아서 신나기도 하고 두렵기도 합니다.\n\n요즘 고민이 많아요. 전공선택도 그렇고, 앞으로의 진로도 불확실하고... 선배들 말을 들으면 더 막막해집니다. 하지만 이렇게 방황하는 시간도 나를 찾는 과정이라고 생각해요.\n\n[불명확] 친구들도 만나고 좋은 인연들도 생기고 있습니다. 이 소중한 시간들을 잘 기억하고 싶어요.\n\n앞으로 열린마음으로 모든 것을 받아들이면서 내 길을 찾아가고 싶습니다.\n\n[하단부 일부 불명확]", "summary": "대학 신입생이 느끼는 자유로움과 책임감, 전공 선택과 진로에 대한 고민, 그리고 새로운 친구들과의 만남을 통해 긍정적인 자세로 앞으로 나아가고자 하는 바람을 표현한 글입니다.", "tags": ["신입생", "고민", "진로", "대학생활", "일상", "우정"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1996년_1번째_이심이_p038.jpg", "processed_at": "2026-04-09T23:05:26.701369", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p038"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n이것도 재미있고\n언제 또 어디서 또 만날까\n마음이 편했으면 좋겠다\n이렇게라도 자주 만날 수 있어서 좋다\n모두 졸업하고 시간이 지나도\n잊지 말고 자주 만나자\n내가 힘들 때 먼저 전화 줄래\n고마워 그리고 미안해\n\n오른쪽 페이지:\n모두가 응원하고 있으니까\n화이팅\n나는 항상 너의 편이야\n너를 믿고 응원한다\n[불명확] 많은 시간 함께했으니까\n뭐 문제 없겠지\n늘 이렇게 편한 사람 [불명확]\n기억해 줘\n내 마음은 [불명확]\n항상 응원해\n행복하자\n화이팅\n열린마음", "summary": "대학 시절 친구들과의 우정과 졸업 후에도 함께하고 싶은 마음을 담은 감성적인 메시지들입니다. 서로를 응원하고 격려하며 앞으로도 연락하기를 약속하는 내용입니다.", "tags": ["우정", "졸업", "응원", "추억", "일상", "감성"], "mood": "positive", "decade": "2000s", "image_quality": "fair", "filename": "1996년_1번째_이심이_p039.jpg", "processed_at": "2026-04-09T23:05:33.527196", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p039"}, {"date": null, "author": null, "content": "너무나 멀었던\n너를 찾아\n내가 맨날 생각 난다\n야 요즘에도\n넌 뭐하니\n아직도 그 눈으로\n날 바라보니\n한참을 기다렸어\n넌 나를 모르겠지\n그런데도 자꾸\n넌 내 생각이 나\n\n[불명확] 같은\n마음으로\n[불명확]\n[불명확] 보고\n[불명확] 물어\n[불명확] 대답\n\n인내는-\n\n-미니", "summary": "누군가를 그리워하며 마음 속 감정을 표현한 글. 오래 기다려온 사람을 향한 그리움과 외로움을 담고 있으며, '인내'라는 주제로 마무리된다.", "tags": ["연애", "그리움", "감정", "일상"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1996년_1번째_이심이_p040.jpg", "processed_at": "2026-04-09T23:05:37.779538", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p040"}, {"date": null, "author": null, "content": "깊이\n\n너는 어떤 깊이를 가지고 있는가?\n깊이란 무엇인가?\n\n깊이는 나를 알고 있는 것\n깊이는 남의 마음을 헤아리는 것\n깊이는 섬세한 감수성\n깊이는 내 삶의 울림\n깊이는 비로소 느껴지는 감정들\n깊이는 말 없이도 통하는 것\n깊이는 [불명확]\n깊이는 피어나는 [불명확]\n\n깊이는 내 안에 있는\n울음소리들이고\n깊이는 그것들을 느낄 줄 아는\n마음이다\n\n...2\n\n아무도 날 모르는 것 같고\n모두가 날 아는 것 같고\n내가 누구인지를 모를 때\n깊이가 있는 사람이\n내 옆에 있으면 참 좋을 것 같다", "summary": "저자가 '깊이'의 의미를 철학적으로 탐구하는 글입니다. 자신을 아는 것, 남의 감정을 이해하는 것, 섬세한 감수성을 깊이로 정의하며, 자신의 정체성에 대한 고민을 표현하고 있습니다.", "tags": ["고민", "철학", "정체성", "감정", "일상"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1996년_1번째_이심이_p041.jpg", "processed_at": "2026-04-09T23:05:43.419029", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p041"}, {"date": null, "author": null, "content": "왼쪽부터 읽으면:\n\n첫 번째 열: 제가 [불명확] 마음을 [불명확] / [불명확] 떠올리고 / [불명확]\n\n두 번째 열: [불명확] 마음이 / 많이 [불명확] / [불명확]\n\n세 번째 열: [불명확] 처음부터 / [불명확] 저는 / [불명확]\n\n네 번째 열: [불명확] 하고 / [불명확] 같은 / [불명확]\n\n다섯 번째 열: [불명확] 했던 / [불명확] / [불명확]\n\n여섯 번째 열: [불명확] / [불명확] 생각해보니 / [불명확]\n\n일곱 번째 열: [불명확] 그렇고 / [불명확] / [불명확]\n\n여덟 번째 열: [불명확] 것 같고 / [불명확] / [불명확]\n\n아홉 번째 열: [불명확] 될 / [불명확] 것 같다 / [불명확]\n\n오른쪽 제목: \"마음이 걱정돼 어떻게 살아갈것\"\n\n아래: 누군가 이름 [불명확]", "summary": "학과 방명록에 여러 사람의 손글씨로 마음에 대한 고민과 생각들이 기록되어 있습니다. 불명확한 부분이 많아 정확한 내용 파악이 어렵습니다.", "tags": ["고민", "일상", "감정"], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1996년_1번째_이심이_p042.jpg", "processed_at": "2026-04-09T23:05:48.304376", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "p042"}, {"date": null, "author": null, "content": "텍스트 없음", "summary": "이 페이지는 인쇄된 이미지와 한글 텍스트가 포함되어 있으나, 손으로 쓴 한국어 텍스트가 명확하게 식별되지 않습니다.", "tags": [], "mood": "neutral", "decade": "2000s", "image_quality": "poor", "filename": "1996년_1번째_이심이_cover_back.jpg", "processed_at": "2026-04-09T23:02:26.063977", "volume_id": "1996년_1번째_이심이", "volume_title": "1996년 1번째 이심이", "year": 1996, "page_label": "cover_back"}]}, {"id": "1996년_3번째_이심이", "title": "1996년 3번째 이심이", "short_title": "3번째 이심이", "year": 1996, "cover": "1996년_3번째_이심이_cover_front.jpg", "page_count": 20, "pages": [{"date": null, "author": null, "content": "열린마음\n\n일 ○ 월 □\n\n[중앙에 큰 글씨로]\n열린\n마음\n\n[오른쪽 상단에 필기된 텍스트]\n[불명확]\n\n[우측에 작성된 텍스트]\n열린마음\n[여러 줄의 불명확한 필기]\n\n[좌측 하단에 작성된 텍스트]\n열린마음", "summary": "학과 방명록/일상 노트 페이지로 '열린마음'이라는 제목과 반복된 텍스트가 기록되어 있습니다. 대부분의 필기가 불명확하여 정확한 내용 파악이 어렵습니다.", "tags": ["일상"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1996년_3번째_이심이_cover_front.jpg", "processed_at": "2026-04-09T23:05:57.944941", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "cover_front"}, {"date": "1998-12-23", "author": null, "content": "손으로 쓴 텍스트:\n맨 위: '느'\n오른쪽: '2098년?\n2099년?\n2100년!\n그때쯤?\n019년 8월 ?' [일부 불명확]\n아래: '98.12.23.'", "summary": "물고기 그림과 함께 미래의 연도들에 대한 궁금증을 표현한 낙서. 1998년 12월 23일에 작성된 짧은 메모.", "tags": ["일상", "낙서"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1996년_3번째_이심이_p001.jpg", "processed_at": "2026-04-09T23:06:01.885239", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p001"}, {"date": "96.12.23", "author": "The Dreamer", "content": "새로운 이성이 '짝' 이웃시다.\n덕청 비싼고, 덕청 무겁고, 덕청 혼은 거니다.\n천년 만년 써 붙시다.\n\n계 마데 과장\n\n와... 서유유 이섯이 청이다..\n먹처 [불명확] 하나마다!\n이섯이찬 짝은면 이섯이다\n\n마음 구 이팔아간 ((\n\n1. 중웨엇이 곰북하고 씨은 얻섯히 한 것.\n2. 여능마 서미나 육예는 꼭 되팍이 한 것.\n3. 건앉생 망이 고젱 것.\n4. [불명확] 서여 이섯이 [불명확] 쌍찰 창찰.\n5. 같이 따장학고도 * 꼬터웬드 그 칭다.\n   망이 찾께 거처.\n6. 층모선 벧감 찰 것 ( Dear 씨중 청섯)\n7. 얻능 이청 체기칭 한 것.\n8. 서미나 거러찰 것 ( 묵러하저 맀고)\n9. 환 이섯이 청러는 ( 찌선) 께싹 빤차하는 것.\n10. 항상 이섯이 당게 꼬거윤 마품오3 싼 것.\n\nP.S. 아저도 너가 대청민 즉흐 찰칭한다.", "summary": "작성자가 새로운 이성관계와 관련된 개인적인 감정과 다양한 상황들을 10가지 항목으로 정리하여 기록한 개인 노트. '더 드리머'라는 필명으로 1996년 12월 23일에 작성됨.", "tags": ["일상", "연애", "고민", "개인일기"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1996년_3번째_이심이_p002.jpg", "processed_at": "2026-04-09T23:06:11.180755", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p002"}, {"date": null, "author": "Arthur Schopenhauer", "content": "이심이끝적인 합동한 잃버머서 자주있다니... Merry Xmas\n& 새해 복많이 받자.\n낙서(?) 서 답은...\n\n왠이 틀어!\nPB, 12r.22\n\n<기분파나 존은 숨돈 사랑에게?>\n\n기분파 숨돈은 하는이다.\n기분과 숨돈의 약팔구조이 여느롯으로 취우치지 않을 떄,\n비로소 우리는 자유로우지며 [모양]하시 것이다.\n(only when you are empty you are at standstill and balanced)\n\ni kahlil Gibran을 \"the prophet\" 좋아서,,\n레이3X년\n\n그것은 [모양]우리는 것이 아니다.\n무엇하고 자극한 실태의 불이다.\n닷것 밖은 나가서 [모양]를 썼으나!\n\n우리 라준나.\nLE 30*\n\n자기의 [모양]는 놈문과 찾다면\n낙서과 지식은 클려클클 다. 결심이 경준다시\n낙선 각 지식방이 맞나다 하는 있는\n두 국의 문화에 바른 국으야 되는 국서이 닭진 자뇨며,\n그 낙래야 놀다며 국해은 닭기 앋은 재 을활잔면 자삶응\n하는만 돌어듣는 저 또원과 깊은 것자다.\n\nArthur Schopenhauer\nLE 1950년", "summary": "Arthur Schopenhauer와 Kahlil Gibran의 철학적 사상을 인용하며 자유, 정체성, 그리고 문화의 본질에 대해 성찰하는 내용입니다. 기분과 숨돈의 관계, 그리고 자아 발견에 대한 개인적 생각을 담고 있습니다.", "tags": ["철학", "성찰", "고민", "사상", "자유"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1996년_3번째_이심이_p003.jpg", "processed_at": "2026-04-09T23:06:22.129005", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p003"}, {"date": null, "author": null, "content": "이런게 좋은 이상이 짝짓 셜셜하네 이상이 짝짓에 우금창 밤전이 있는지여다. 짝짜 이상이 짝을 보면 눈앓 에 눈물이 아로거린다. 이상심이 짝을 주목 쓴 사랑은 의심이 형과 태용이형 밤어 없는것 같다. 돌과 돌앞사어삶은 여쿡 이상이 짝을 아무도 않지 않은것 같고 어제 어젯 이 았다는 것도 알지 못했다. 너무나도 변함 한 이상이 짝을 보고 차숨이 아잤서 이짝커 중을 농에기 킷 것이다. 내년여든 정할 이상이 위게의 목을 거를 말도록 노력해야 짝다. 암정나기 앞은 뉴메들이 중목과 저신의 고짓을 어거어다 도목짜 우 였도 족... 이상이 상심란는 자리를 포민화기 되며 했싼 두 까지 강정이 모자하기 친다. 새카 꼴꼬였된 꼳은 싹 누 았지 힘 친 중거올과 비녀어 흑빠는을 았다서 이심이라는 조", "summary": "이상이라는 인물에 대한 감정적이고 복잡한 생각들을 기록한 노트. 그 사람에 대한 미안함, 그리움, 그리고 관계의 변화에 대한 고뇌가 담겨있다.", "tags": ["고민", "감정", "관계", "일상"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1996년_3번째_이심이_p004.jpg", "processed_at": "2026-04-09T23:06:34.426735", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p004"}, {"date": null, "author": null, "content": "처음 이곳이 가야 할 곳 궁금함이 바로 그것이다.\n둘째 궁금함이 엄청난 중압감으로 나를 짓눌러 온다.\n하아를 쉬는 앎직히 맞은 데, 버릇터 이상이 상을\n어떤 식으로 정해졌다 괜찮 출렁일 다깔송 ◎칠회을 잡\n겨 못라켓다. 비록 어저는 란쌍이 어버지않 먹샘이렘을\n보편 쩡랑 대람하다은 상강이 든다. 자신이 또 깃을 이\n걸이여다 뚤다붓는 혀의 요창, 먹섬이 혜떠 그럿찾 엘중\n과 몸거를 내까 좋은 가준 수 있올까? 하지만 자나\n샹깅으로 돌롤 같찬 나 박잔성, 사녀이이 곡은 졸의를\n더다 하때, 나 자자서이기 다징해 봤다.\n\n칸 다여 하는 깨이고, 하지 방느다여 하지 았는\n깡싼다. 경로 삐 맞은 하지 아옷앤다.\n\n그러고 내벅에는 이싱이라는 쫔은 나 자신 여기 가자\n앙샤 옆 쫔으로 핵두고, 여뭉이와 칼꼐 꼬잔삭", "summary": "새로운 환경(아마도 입학)에 대한 불안감과 궁금증, 그리고 자신의 정체성에 대한 고민을 담은 글입니다. 힘든 상황 속에서도 미래에 대한 희망을 찾으려는 마음이 보입니다.", "tags": ["고민", "신입생", "불안감", "자기성찰"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1996년_3번째_이심이_p005.jpg", "processed_at": "2026-04-09T23:06:46.498540", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p005"}, {"date": "96.12.26", "author": "The Dreamer", "content": "정알즈 맞춘 이성아돌 화 뻐 다들이 저너 싫다\n\n밀라\n\n하하하. 난 안된다... 창한비츠한 것 들으면 좋아\n기분이 좋단 딱이야... 아무튼 선석같은 꿈이는\n놀이 사숨 딸 하다다.\n\n이런 맞이 있다. 뭔문 공염은 하떠 역속자는 '공장지듬'\n은 조작하여야 하다 Π. 공장지들이다... 한번 생각해\n보야야 할 이야기다. 뭔문 공장에 거들이술 있지 장다\n그러나 당정도 앓돈이 이런 뭔의 게다__ 아칭의 선정한\n보전이 농은 하면서 [불명확]해서는 누누한 샤움으 박이\n보여거지 앎는 느중 ! 그를 하자고 있는 느중지들의\n여양한 구팍은 꼭멍히 보고 있는 공장의 것듦은\n나러여야 하다는 것인게다. 뭔문의\n근거별 , 촌세이듣 쳐금북터 것인 인중꽃의 확하양 수듬을\n달지적도 것이 뭔문 이뭔느까.\n\n쿠마채닥이 되미다다.", "summary": "1996년 12월 26일에 작성된 일상적인 고민과 철학적 사유. '더 드리머'라는 필명의 필자가 감정 변화와 일상의 의미에 대해 성찰하고 있다.", "tags": ["일상", "고민", "철학", "감정", "자기성찰"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1996년_3번째_이심이_p006.jpg", "processed_at": "2026-04-09T23:06:56.320091", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p006"}, {"date": "2009년 12월", "author": null, "content": "우는 맛을 혼자서...\n\n그저 닭다리를 이것이며 못할 떤 저어.. \n인지 언제 도둑을 혼자..\n\n이것이는 둘이 다가 된 맞은 사랑을 여전히 사랑하는...\n마지막지는 이것이서 여은 게 주 계봐는 땅은 꼭 좋아서 늘\n미달하는...\n\n그것서 다네 이것게 운룡은 늘뭅...\n약은 굳옷 알지못 [불명확]합니다.\n\n좋이라는 것는데 같이, 안에 좋음에 [불명확] 사랑이 듣더라면,\n응.. \n\n나가 지향 나여 - 야야는 이것이, 그런 한 - 물화\n떻은 자장 이것한 끝은 '사랑' 이렇던 꼭 좋아서...\n나가 손터 앞는 인여에 대한 하여게 이렇게 사랑을에 어렷\n쉬었음기 좋는데 다했.. 둥길이 나따릴 나데지 살등도 다렀.\n그 사랑 텍에 없나기 그런 버텨..\n\n어깊 좋기는 하지만 사랑이란 꼭 인더기는 혼...,흠\n\n닫은 것도에 대한 사랑은 궁금기 비청더.\n쉬여정. 모었가 미괴하면 우의옷 걷에 다송 사람은\n > 사랑은 나것는 것에 다시 본 뜻 기본하기는 하...\n\n여시 도\n어거때를 조방 거기역, 도리고를...", "summary": "사랑에 대한 깊은 고민과 혼란스러운 감정을 담은 개인적인 일상 노트. 사랑의 의미와 관계에 대해 중얼거리는 형식의 성찰적 글.", "tags": ["고민", "연애", "감정", "일상", "성찰"], "mood": "negative", "decade": "2000s", "image_quality": "fair", "filename": "1996년_3번째_이심이_p007.jpg", "processed_at": "2026-04-09T23:07:09.406529", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p007"}, {"date": "96-12-31", "author": "The Dreamer", "content": "머리감 비누로 안짜게 헹굼 했는데\n저쪽엔 랄딩닭이 버너고 읽지는 않음속겨인데\n비누감 어셨던것이 읽먹으면 차갓슷니다 내것의\n거처가 거기터저 안아아면 어떤솜닭. 차갓차는\n징리하면 되를. 여솜은 게온의 하면 안되잖은.\n아므-돈 이[불명확]는 톡찮 주이는 놓다 자지 그리고\n장연더 히내가 ..\n\n그 온금 빠욱 챔이돈닭. 봉든 안싹\n마음는 안싹고 . 그러서 여기붓이 그훨솜닭\n하는게 수조자이 튼곤 [불명확] 닥아 마싶 .\n나는 어저봇.\n\n머저봇은 비싼시기. 난짓기 논뒷며 계온\n하서누나고 . 둘금은 교민닭 싱찬 궁애서 챙리\n희 나기시 바란닭.\n그려냐.\n따싺시 법은 궈하리 게시족. 얀는 공 뭇시다\n지기려다. 동짐하는.\n\n깨롤이 독옮 나는 지기려다.\n96.12.31\nThe Dreamer.", "summary": "1996년 12월 31일 자정, 작성자 '더 드리머'가 일상의 소소한 일들과 내적 성찰을 기록한 페이지입니다. 손글씨가 흐리고 읽기 어려운 부분이 많으며, 연말의 감정과 새해를 맞이하는 마음이 드러나 있습니다.", "tags": ["일상", "성찰", "연말", "감정"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1996년_3번째_이심이_p008.jpg", "processed_at": "2026-04-09T23:07:19.262340", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p008"}, {"date": null, "author": null, "content": "이름을 · 아무도 안 써준 ·\n\n내가 작못 이 땅때 의심이을 저중스럽게 ~깔깔좌\n최대인 어떠가 없었다다.\n\n여타인 착칠을 @ 이 곱붓하는 조직인데 4ㅅ해\n이섯이는 \"섣정하는 조직이었던 아뭏였다\".\n\n이심이는 착칠가 되어써 아못다다. 옥 는도 있고.\n우윤 \"무메싸형 조직이다\".\n\n복주 꽃와 켐든다. 쳥침찬 저해야 욕싶죽은\n왔는 는것 @@이 뭔여짜을 했다는 것이.\n그러도 어짐 는 없다. 아뭏 뭔공 능극마음\n해야했다다.\n\n속처귀 우더 대싶남은 4명 담담점은 와쓰\n마휴 는 없다. 싕가은 하인싯 것처 아너면\n반이 없어여 그러는 것처. \n하장 커켜자본 영금거점 처럼 싱엄싱맞이\n거켜려도 저무어저 칠하고 저는뭉하고 미섯이\n홍보처자 않든 .... 해야했데데 팟이다.\n\n어저, 는 없다. 나름대로 싱잔이 의겪 되 이/\n있겠지. 맡음 이률게 제칸하면 맞다.\n\n낭즉저칙은 이겨희는지 윤아. 저뭉. 삭은또\n이섯이야 감 구칭헷슬 소의답하고 있지 얼순이 -", "summary": "손으로 쓴 일상 기록물로 조직이나 단체에서의 경험과 고민, 그리고 자신의 감정 변화에 대해 기술한 내용입니다. 여러 사람들의 의견과 자신의 반성이 섞여있습니다.", "tags": ["일상", "고민", "조직생활", "관계"], "mood": "negative", "decade": "unknown", "image_quality": "fair", "filename": "1996년_3번째_이심이_p009.jpg", "processed_at": "2026-04-09T23:07:31.277174", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p009"}, {"date": null, "author": null, "content": "우리이혼이 / 알에즈 / 싶둘이 / 이심이의 / 쌕쌕은 되게?\n룩 띠 / 도배를 / 샘장귀하 / 하는다.\n\n91년 1월\nthe Dreamer\n\n사람 인자사 뻐녀닝 [불명확] 이1/2이나 우리야 ?\n나는 옜 옷은 샤셜.\n\n도우[불명확] 9m 샤샤이 인샤샤\n[불명확]하하하기 갈긴곳으로 논샤샤이\n\n의심이 는 이심이) 낸 ?\n\n약~ 은뭔 길곳이다...? 여름은 한 방토 악 했지려... 제깂꺼금면 _.\n다-쎨 곱은 색 Pen 근곳 써시 내 점씌가 헤는칠...\n운공이 띤~  Interchange Ⅲ 짐 저 곡거야 헤요표 ~ ♪ :여미\n\"문장이의 하하며\"\n\n→ 나 딩욕하게 싶는 봉이 쯩\n안미 머릭승 것산 봄싸고 샤승 첬다.\n우따거러 쁨곳이다\n\n싸은  20혁이  기서덴글 여싣씨 누여  떨찌 욧충은 닷싸샘-깊\n\n인공이 깞은 내 싼은 싸숨이 같은 것 같닭. 나나증 맙이 씨얏증데...\n로 쟈곳 닮음 짧고 웍므메 머니 하했. 궁것이의 한게는 낭뮤다.\n[불명확] 척고  꼬 꼬이 샤포... ㅇ...  현강삐__n 그째 xxⅺ 어인 맑서\n종다. ( xx깂 ? 샤장족싸나 _.n )", "summary": "1991년 1월에 작성된 노트로, '더 드리머'라는 제목 아래 개인적인 생각과 고민들이 산발적으로 기록되어 있습니다. 음악이나 가사와 관련된 언급과 함께 일상적인 감정과 고민이 담겨있는 페이지입니다.", "tags": ["일상", "고민", "음악", "1990s"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1996년_3번째_이심이_p010.jpg", "processed_at": "2026-04-09T23:07:46.682916", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p010"}, {"date": null, "author": "너정이", "content": "x x 묻은 너를 여왕여... (?) 약든 깊음이가 영마 앉 냅싼데\n\n모든 것을 모른 것 같타... 영증이 린끼 거뭉하다... 온마, 자작\n영종에 배치는 저 몬처서요... 너 미우하지 마서구요...\n윤경, 악마디\n\n제지김이야.......\n→ 어제 바뀐 상황 거시기뭔가?\n\n양둔 너 저기있어서 하싸 우진 둘이가가 장젯다.\n\n정향은.\n\n했다 영중이 온마 처리고 너 쌌 환은서 자본은 거기\n씨 찍도가? 아픈감아요......\n\n영성히 하여주 2ㅇ뭐서 너 조은 달맀암.\n글데 정향 헤등해요.\n\n온은 정 너 궁젠 인의 있어서 영종에 배싼야 할 것\n린태은 ....\n\n린정 & 영더의 왈더.\n\n\"담근 장대죽 아 바저겔 한 뭔상 없는... ㅣ\"\n글은\n\n\"덜것 마음과 함머 이싱이 깊 ○ 해 준자!\"\n\n제지기뭐.... 그범께 덜정이 가윽켓도 좋 .....\n\n[하단부]\n9/11일 앉읍은 된\n문은하뭔 이용을 얌 없는\n깊음이를 가저 아다기... 있도여졌는데\n지금과 내영 죠은... 정정여...[불명확]\n진지정 새내 네게지니,냥 역시이 해다 앉는.", "summary": "학과 친구들과의 관계와 감정에 대한 개인적인 고민과 생각을 기록한 일상 노트. 친구들 간의 관계 변화와 미안함, 그리고 깊은 우정에 대한 회상이 담겨있습니다.", "tags": ["일상", "고민", "우정", "감정", "관계"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1996년_3번째_이심이_p011.jpg", "processed_at": "2026-04-09T23:07:59.072618", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p011"}, {"date": null, "author": "펀숭", "content": "여름이 온밤, 겨울해요, 겨지기...... 저는 열미에밴... 저거 우얘뭘\n자몸 가슴치 닭정나다... 서스턴 저는 거지지메요중 맞았어면... 저거 죽\n낫죠? (어버서도)... 요금 가속 연금이 너무 재밌어서 (요움 이게 뭐자\n어제 하룬... ) 킬통이다 너무 재밋을 때 강어떼...\n그럼 이바다... 버버가 표현서 ~♪)\n\n어제도 강옛이 연금을 마서 행됴다...\n은... 허어에 싶기 저거겐 지풋 누주면 야푼증...\n그래도 2008이 기대도다. 야... 또 여룩한겨 가도롭 시간이다. (시거겐 더머\n가즈 콧봇데... 저기! (시 그링이 굳언... 여정 가도도~...\n정어에서 문사가 온다. 빻저 러헌을 구성해 하드데...\n연금이 온바가 싶는 네 쳇이나 둥늣데 교밥친 여기도 제매를 못 한 것\n같다. 여기서 마밌는 거거를 나누 은겨 할수메... 여문지는 다서 맞은 드렇다.\n'는가는 것능 이도 며는 종내를 싶이 있는 것 같다.\n사되해요 이정.\n\n2008 깂옣는 환련도를 환상 그 자체였다. 첫수의 괘과되와 연국\n의 것, 90층의 높과 것와, 홓장 이 것가한 한 것의 웳과피따리.\n첫위서 환정했는 이성이 같여에 파다 공위하는 정정있는 다서 많은 느렛다.\n'는가는 것능 이도 며는 중내를 싶이 있는 것 같다.\n사되해요 이정. - 펀숭 -", "summary": "2008년에 대한 회상과 감정을 기록한 글로, 여름의 추억과 대학생활의 즐거움, 그리고 타인과의 관계에 대한 성찰을 담고 있습니다.", "tags": ["일상", "고민", "감정", "추억", "대학생활"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "1996년_3번째_이심이_p012.jpg", "processed_at": "2026-04-09T23:08:15.272307", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p012"}, {"date": "1991년 3월 28일", "author": null, "content": "이성이 짧은 것마다 앉어있듯다.\n여생각이 짧은 나다.\n\n\"해님의 청심\"징슥어슨 먼저지게 해님 여러분등은 앉으로도 읽지 마심숨. 해님의 청심.\n\n저는 3학 확과계는 이성이 소중 더욱실것 느껴집니다.\n먼즐 콘슥아줄에 비해서 젝은 수가 얼급은 있다. 돼있까...\n\n이성아가 무썬을 해샘포 올레는 못것은 꼭 정잇거 전할 팩원등은 앎 국려기가 없다. 저선의 | 누은 국각게 하ㅓ하는더[ 이성이가 도여게 무 하는 초현잇 으았야 찾 것 아닌니가 이 종슥 짝성 칠싱아 /\n\n\"이성이더 사표\"를 하자. 이게 비는 국는 여다. 작서하면 자것은 국각기여 ( 터칙 · 방서하고 ) 온의 목고기는 ( 더충정을 콜 나국어 ) 여성이. \n\n91: 3. 28. 깨같의 변 응싰기는 한다. 차머리 먹기고 작씨하다. 위게 여사의 한 롤자. 칠현자씨 어른하자. 답엉합은 다는 하자.", "summary": "성(聖)에 대한 인생철학과 고민을 적은 글로, 청심(淸心)의 중요성과 현실적 갈등을 다루고 있습니다. 1991년 봄에 작성된 깊이 있는 성찰의 기록입니다.", "tags": ["고민", "철학", "성찰", "1990s"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1996년_3번째_이심이_p013.jpg", "processed_at": "2026-04-09T23:08:25.408694", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p013"}, {"date": null, "author": null, "content": "근심한 맘 곱게 곱아도 궁해여덴 이싱이 곧음과 도드여 밤끝고!\n이싱이 본적 이문은 쓸 쉬곤 드린이 새롬 란\n앎으로 이싱이 곱돗을 열싱쉬!\n\n옆친멍이 반은... 이싱이 짠⚬\n나또 아께 이싱더라!! 하하핳~♬\n우... 이싱이 왕은 여싱이~ 여싱이~\n어... 쓸 맘이 여다. 그찮 나아중에 ~.\n~ 여미.\n\n하지 6잉이 서정 꿀움을나 않겻다.\n정정-너 서버님오 비슥한 고달나 쎄버님오이 곱이 있것남\n보고 중싱다. 이싱이이 곱곱한 점을 놓있. 즈 잇잇멍 가리없다\n아리 쏘정에서 가머나지 못한 성댐. 생깟이 않난다.\n이싱이 차테링! 쌍\n\n이싱이가 완다. 왜? 더뭬 눈낭 왠것.\n\" 노 무여야 한다. 왜? 더뭬 웅몽이.자.\n이싱이는 곧아다, 며~뭉!\n차랏신, '여정이다 '명청이' 라고. 허러.\n짓도 아싱기 이뭔 도다 먼종 ... 쏫. 쏫 ...\n뭣도 보은게! [불명확]\n\n기됨 런 너 데여~....", "summary": "이싱이라는 인물에 대한 고민과 감정을 기록한 일상 노트. 친구의 행동과 관계에 대해 여러 생각을 정리하고 있으며, 혼란스러운 감정을 표현하고 있다.", "tags": ["일상", "고민", "관계", "감정"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1996년_3번째_이심이_p014.jpg", "processed_at": "2026-04-09T23:08:36.111814", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p014"}, {"date": "1999-04-15", "author": null, "content": "은 예쁜이 첫 여름이다.\n우리구럼 뭔가였다. 앞으로 여름이 될까지...\n여미가 한쪽 모깨누데 지금 족고 구경 가자는근 ...\n\n피 —\n\n나도 가야지.\n\n서저 소린 신입생들이었던지 있었다\n저번에 서배둘이 몹짓 지버이었을 거라 칠보제\n솔친이 박곤 저머 앙지는 앗움은 (좋빈에 완는?) 찬무\n\n이잠지 춤으로 잘곡 아듯옴솔스(노.\n앗어었에 [불명확]이몽을 아몽로 젯지 앗른네들 찬무\n\n사랑해♦ ○□□ ...\n\n홍태가 냐고낑다. W00dy 호 냐약낑\n마이\n냐\n냐사총\n냐공져\n우와움하다\nEr제\nN소은 아마즈 [불명확]버 처함니다 웻다\n구겨 도혜가 족제네 [불명확] U나\n\n흘깏뭉 [불명확] 매[불명확]하네 빼내는\n\n구겨의 웋은깎 [불명확]는거[불명확] 바낭딩 □[불명확]\n\n99. 4. 15.\n\nthe Dreamz", "summary": "봄에서 여름으로 넘어가는 시간에 대한 감정적 기록. 신입생들과의 시간, 사랑에 대한 단상, 그리고 일상의 순간들을 자유로운 필체로 표현한 일기.", "tags": ["일상", "감정", "신입생", "사계절", "추억"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1996년_3번째_이심이_p015.jpg", "processed_at": "2026-04-09T23:08:48.747144", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p015"}, {"date": null, "author": null, "content": "얍 이선아는 처처봤다. 느낌나? 왔다네\n하정빠의 어렬이를 해처하다. 지금의 표준 의혹...\n이선이 뭉깅은 표두 비보다. 응하키 몽긍글 누은 묻지않...\n비본 어렬이 s! 나가 ~ 로 ~ 움 ~ !\n능 기가족 따원 머나!!! 그렇잖아서(ㅇㅈ) → 항해.\n99. 4 [불명확]\n용정 목: 이선아는 마·보·다!\n명·정·이·다#\n그기몽 ~~, 최뭬더! 추덕하 , [불명확] ~ 울!\n어나는 선하 취중되다. 그래도 위킹는 싱트롤 홍좋다. ~ 늑밤 ~\n혀 궁음 앗음도 똥지 복할은 우적 축우이다. 그러다, 한법은 간드러의 땅도 ...!\n처잠~, 나까 잔차 뭉처빠면 이런 빨 인솥다.\n그것은 모른은 어정이는 의시 씨뻔 좋게 비보동이다.\n명마저 어정이 비무 곳 하니까 날 따머더? 뭐하면 궁칙더더더......\n바·무 , 명·정·이 , 등진!\n에여아는 뭉기아와 ~~~~~ , 곡, 곡...\n99. 4 . 18\n좌금: 나도 잘 웃 것다!", "summary": "친구들 간의 일상적인 인사와 재미있는 상황을 손글씨로 기록한 페이지. 여러 친구의 이름이 언급되며 장난스럽고 친근한 분위기가 드러남.", "tags": ["일상", "친구", "낙서"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1996년_3번째_이심이_p016.jpg", "processed_at": "2026-04-09T23:08:59.917928", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p016"}, {"date": null, "author": null, "content": "{\n  \"date\": null,\n  \"author\": \"목돈역, 꽃샘\",\n  \"content\": \"닫혀있는 손은 쇠건 왜냐하면 생각했다. 아네 떠났던 새삼채 맺는, 도형채 맺은 삶따라 되로린 받아다, 하지만 나를 거슬하다. 직슬하는 도래 그 직슬목 곡기 것같자거 되잖다. 그기 직은 이이 인지은 요즈직치 받 아귀해는 그런 상태였다. 육은 고장기 하고 왔었던 여기 심은 채여 하지 않는나. 미숙한 성가이 점점더 되묻는는 것같아 버짐 것같다. 목얀곤은 밤미셨 아때 숨은 너섯 안졌나. 춤샘영공이 악어 위 떼웃어다. 제운더 이생졌으로 사른하지 않이젯다. 그엇데 하번 한 우는 절린 더 놉게거 육감네...\n\n너이순에는 한 우 있는 것이 [불명확] 써서 머머에 훈해하저 답누는 곳은 지 른다.\n\n요즉 여 떠혜곡이에 빠져 샤는 것같다.\n\n이본곡은 시원 기술합니다.\n\n무 - 우리 넘처 안족은 여싶이 금막확사다.\n\n-한리 나 여정 3번이아아 까져이갔니다. 모는 딴싶한? 환, 합니다.\n- 목돈역 -\n\n예남 이싶이 폐장 숨태충 롱... 왔다 ... 99·95·94 한 자거미\n모여 환장했다. 우충하지 99는 다 아싶이었다. 다는 빕북주는데 여심이는 뭐려런가. 한교곤 안 방우음\n\n한싶이싶이 99 여러네 아무리 싶영이 있다고 한터라도 너못한는 여는 중침 팔고 나별이여라 (곤싶에서) 치오자는 직있족식\n여에 뭎되까 - 꽃샘 -\",\n  \"summary\": \"마음의 닫혀있음과 열려있음에 대해 고민하는 내용. 미숙함과 성장에 대해 자신의 감정을 표현하고 있으며, 특정 기간(99·95·94)에 대한 회상과 함께 인간관계와 자신의 마음 상태에 대해 성찰하고 있습니다.\",\n  \"tags\": [\"고민\", \"성찰\", \"감정\", \"일상\", \"심리\"],\n  \"mood\": \"neutral\",\n  \"decade\": \"1990s\",\n  \"image_quality\": \"fair\"\n}", "summary": "파싱 오류 - 원문 보존", "tags": ["파싱오류"], "mood": "neutral", "decade": "unknown", "image_quality": "unknown", "filename": "1996년_3번째_이심이_p017.jpg", "processed_at": "2026-04-09T23:09:14.563149", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p017"}, {"date": "1997-4-29", "author": "17기 지친 몸을 이끌고", "content": "티끌이 곳 기쁨이랑 이성이 뭘이를 하나씨 시키 거듯었다.\n근데 맞이여.\n내 이성이는 바쁠이 깨졌다. 처럼편 웃겨져서 웃겼다.\n하나면.\n이성이는 겁한 몸짓없나. 하나를 웅경야 처너.\n웃겨겠나 잘봐겠나\n\nP.S. 펜은 잃었데 시깨상도 섰을중데\n솔곤 솔나랐다. 4.23\n[The Dream]\n\n나는 이성이랑때 연숨을 거의다 배배 벗겼다.\n글짜였든 기억은 거우 법 받이 있다. 질병자. 복잡 다다를 시작했\n... 왜 이리 속요본 바뀐지. 그래도 환변 여싶는 여유했는\n이성이다. 빼어는 결정은 많으에 볼좋해서 해넣았다.\n장교를 한번 저 봤는데 여전 찾육였다. 처는 복터 잘 한 수는\n찾겠지. 회상을 다라나 , 이꼭! 소꼭\n1997·4·29(일)\n/17기 지친 몸을 이끌고", "summary": "이성에 대한 복잡한 감정과 회상을 다룬 개인적인 일상 기록. 과거의 기억과 현재의 감정 변화를 표현하고 있다.", "tags": ["일상", "감정", "고민", "연애", "추억"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1996년_3번째_이심이_p018.jpg", "processed_at": "2026-04-09T23:09:26.533319", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p018"}, {"date": null, "author": null, "content": "열린마음\n[불명확]\n[불명확]", "summary": "열린마음 노트의 페이지로 보이나 대부분의 텍스트가 손으로 그려진 기하학적 도형과 추상적 선으로 덮여 있어 명확한 텍스트 내용을 읽기 어렵습니다.", "tags": [], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1996년_3번째_이심이_p019.jpg", "processed_at": "2026-04-09T23:09:30.759140", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p019"}, {"date": null, "author": null, "content": "열린마음\n[불명확]\n[불명확]\n[불명확]\n[불명확]\n[불명확]", "summary": "노트의 제목 페이지로 보이며, '열린마음'이라는 텍스트가 크게 쓰여 있고 나머지 부분은 흐려서 읽기 어렵습니다.", "tags": [], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1996년_3번째_이심이_p020.jpg", "processed_at": "2026-04-09T23:09:33.010025", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "p020"}, {"date": null, "author": null, "content": "손으로 쓴 텍스트:\n[좌측] 누군가 [불명확] 기억할 것 같은데... [불명확]\n\n[우측] 물고기 뼈 모양의 그림 2개와 함께 숫자 표기", "summary": "물고기 뼈 모양의 그림들과 함께 불완전하게 작성된 노트. 정확한 의미를 파악하기 어려운 스케치와 텍스트로 구성되어 있습니다.", "tags": ["일상", "스케치"], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1996년_3번째_이심이_cover_back.jpg", "processed_at": "2026-04-09T23:05:54.565892", "volume_id": "1996년_3번째_이심이", "volume_title": "1996년 3번째 이심이", "year": 1996, "page_label": "cover_back"}]}, {"id": "1996년_열린마음", "title": "1996년 열린마음", "short_title": "열린마음", "year": 1996, "cover": "1996년_열린마음_cover_front.jpg", "page_count": 50, "pages": [{"date": null, "author": null, "content": "텍스트 없음", "summary": "이 페이지는 주로 인장/스탬프와 도장이 찍혀있으며, 읽을 수 있는 손글씨 텍스트가 명확하지 않습니다.", "tags": ["방명록"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1996년_열린마음_cover_front.jpg", "processed_at": "2026-04-09T23:09:40.333639", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "cover_front"}, {"date": null, "author": null, "content": "안녕하세요 저는 [불명확]입니다\n\n즐거운 시간 함께 보내고 싶어요.\n\n화이팅 화이팅\n\n좋은 추억 만들어요\n\n[불명확]\n\n날씨가 좋네요\n새로운 시작이 좋아요\n앞으로 잘 부탁드립니다\n다 함께 화이팅해요\n시험 화이팅\n공부 화이팅\n[불명확]\n[불명확]\n[불명확]\n\n나도 [불명확]\n열심히 공부하자\n[불명확] 하자\n화이팅\n[불명확]", "summary": "새로운 시작을 응원하며 앞으로의 좋은 추억을 함께 만들길 바라는 긍정적인 메시지입니다. 공부와 시험을 격려하는 내용이 담겨 있습니다.", "tags": ["신입생", "일상", "응원", "공부"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1996년_열린마음_p001.jpg", "processed_at": "2026-04-09T23:09:43.994954", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p001"}, {"date": null, "author": null, "content": "2학년 1학기\n\n그래도 올해는 정말 열심히 노력해야겠다\n3학년 블록제 때문에 지금부터 준비해야 한다\n\n다양한 경험을 해보고 싶다\n- 레포트 작성법을 배우고\n- 발표를 잘하고\n- 새로운 사람들을 만나고\n- 동아리 활동을 열심히 하고\n- 공부도 열심히 하자\n\n(자괴감) 불안감 [불명확]\n\n(아직도 젊다) 아직 기회는 있다\n\n이번 학기에 해야 할 일\n- 동아리 임원 맡기\n- [불명확]\n- 좋은 학점 받기\n- [불명확]\n- 영어 공부 열심히\n- 자격증 따기\n- MT 준비 [불명확]\n- 교내 행사 참여\n- [불명확] 참여\n- 선후배 관계 좋게\n- 신문 동아리 활동\n- [불명확]\n\n앞으로 할 일\n- 학점 관리\n- 진로 탐색\n- 취업 준비\n- 외국어 능력 향상\n- 성격 개선\n- 건강 관리", "summary": "2학년 1학기를 시작하며 새해 다짐과 목표를 작성한 페이지. 학업, 동아리, 인간관계 등 다양한 분야에서 성장하기 위한 구체적인 계획과 해야 할 일들을 나열하고 있다.", "tags": ["신입생", "공부", "동아리", "행사", "진로", "고민", "자기계발"], "mood": "positive", "decade": "2000s", "image_quality": "fair", "filename": "1996년_열린마음_p002.jpg", "processed_at": "2026-04-09T23:09:50.190163", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p002"}, {"date": null, "author": null, "content": "안녕하세요 [불명확] 라고 말씀드렸는데 [불명확] 제 마음이 [불명확] 말씀드렸습니다 [불명확] 앞으로도 열린 마음으로 대하겠습니다 [불명확] 저도 [불명확] 열린마음을 [불명확] 항상 감사합니다 [불명확] 아직도 [불명확] 많이 부족한데 많이 도와주세요 [불명확] 즐거운 시간 [불명확] 열린마음의 [불명확] 계속 [불명확] 저희 모두 [불명확] 열린 마음으로 [불명확] 앞으로도 [불명확] 화이팅 [불명확] 더욱 [불명확] 함께 [불명확] 진심으로 [불명확] 좋은 [불명확] 많이 [불명확] 계획 [불명확] 함께 [불명확] 진심 어린 [불명확] 모두 [불명확] 함께 [불명확] 열린 마음으로 [불명확] 열린마음 [불명확] 방명록 [불명확] 계속 [불명확] 함께 [불명확] 좋은 [불명확]", "summary": "열린마음이라는 학과/동아리 방명록으로 보이며, 회원들이 남긴 짧은 메시지와 격려의 말들이 기록되어 있습니다. 서로를 응원하고 감사를 표현하는 따뜻한 분위기가 나타납니다.", "tags": ["방명록", "동아리", "일상", "감사", "응원"], "mood": "positive", "decade": "1990s", "image_quality": "poor", "filename": "1996년_열린마음_p003.jpg", "processed_at": "2026-04-09T23:09:55.259443", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p003"}, {"date": null, "author": null, "content": "열린마음\n\n[불명확] 하루하루\n그 [불명확] 마음\n나에게 [불명확]\n4 [불명확]\n4 [불명확]\n\n우측 텍스트:\n[불명확한 한글 필기들 - 여러 줄의 작은 글씨로 작성되어 있으나 회전된 각도와 필기 난필로 인해 정확한 판독이 어려움]", "summary": "학과 방명록에 작성된 짧은 메모로, 일상 속의 마음가짐과 감정을 표현한 것으로 보입니다. 대부분의 내용이 필기 품질 저하로 인해 명확하게 판독되지 않습니다.", "tags": ["일상", "감정", "고민"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1996년_열린마음_p004.jpg", "processed_at": "2026-04-09T23:10:02.166882", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p004"}, {"date": null, "author": null, "content": "당신의 마음이 열려있나요?\n\n마음이 열려있는 사람 [불명확] 희망적인 [불명확]\n\n[왼쪽 섹션 - 작은 글씨로 읽기 어려움]\n[불명확] 나를 [불명확]\n[불명확] 그런데 [불명확]\n[불명확] [불명확]\n[불명확] 사실은 [불명확]\n[불명확] 나도 [불명확]", "summary": "열린 마음을 가진 사람들에 대한 성찰적 글쓰기. 마음이 열려있는 것과 희망적인 태도에 관한 개인적인 생각을 담고 있습니다.", "tags": ["일상", "고민", "성찰"], "mood": "neutral", "decade": "1990s 또는 2000s", "image_quality": "fair", "filename": "1996년_열린마음_p005.jpg", "processed_at": "2026-04-09T23:10:05.828173", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p005"}, {"date": null, "author": null, "content": "왼쪽 페이지:\n마음이 복잡할 때\n[불명확] 때 생각나는 것들\n그냥 흘러가는 대로\n기억하고 싶은 것들\n소중한 사람들\n[불명확] 시간\n즐거웠던 순간들\n외로웠던 날들\n[불명확]\n\n오른쪽 페이지:\n마지막이란 말이 자꾸 나오는데\n[불명확]\n다시 시작할 수 있을까\n[불명확] 생각해본다\n[불명확]\n처음처럼 설레는 마음으로\n다시 만날 수 있기를\n소중한 시간들을 잊지 않고\n[불명확] 살아가고 싶다\n[불명확]\n매일매일이 소중한 것 같다\n[불명확]\n함께할 수 있어서 고마워\n앞으로도 잘 부탁한다\n[불명확]\n시간이 멈췄으면 좋겠다\n하지만 계속 흘러가겠지\n[불명확]", "summary": "마음이 복잡한 시간들과 소중한 사람들, 추억에 대해 적은 감성적인 글귀들. 이별 또는 변화 앞에서 그동안의 시간을 돌아보며 고마움과 그리움을 표현하고 있다.", "tags": ["일상", "고민", "감성", "추억", "관계", "감정"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1996년_열린마음_p006.jpg", "processed_at": "2026-04-09T23:10:16.247599", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p006"}, {"date": null, "author": "그중 / 목자광", "content": "사람은 왜 부여지나?\n내가 볼랜은 어떤 이유가 있고서 달라졌다. 좋고의 그 깨어는 명시거지\n\n완수놀버머거지 (녕선 이게 서스꼬) 완성시써으로 뻑아다아자자\n응-15 곡머거지 변함을 여행게 되져 ...\n\n그녀슈나 처려께 나가아 잠 것이다. 기준무자는 국영전, 그인누 ?\n사람은 요홍샤 거려 도닮는 시간도하나 사함씨는 비뻔 ...\n\n로자.견쳐은 톨버저거 싫은깨다. 그써 빼뻔겷 칭하는 한들.\n밤중깔인 어디써 그것나... 시대가 뭐께든따...\n\n촉중. The Dreamer\n\n사랑은 왜 부여이 맞지?\n내가 톨린 때 되어써 묻껴잔 눈지적인 뻘음으로 음증이여기거 들었다.\n또 어떤 사랑은 견다닌수셔 갓다.\n어제 속 죄여쓰 따아어짜다.\n\n너무 잔혹 사땠나? 작은 싸았 얘:49?\n4옹황있자. 학려이 2러 권없어 4왔였나 러리써저저지는 너무 기빼여\n내 어마은 지우 앵근다. 칭고 써직인 걸을도 성까이 있는 좋 잔우로\n잠은 수다 깠나. 아. 2례을 장은 싰다.\n앗 나는 여전 써여 영법 와우이 왔에 눌뻔다.\n모두 자기 고민을 앗고 깧 자는 깓 까너.\n여찌 경걸이 ting 헤그 깓 어젠 쉽 로긋난아지!\n사롱이 며더 2린.\n\n1998/ 7 /첫\n\n목자광", "summary": "사랑에 대한 철학적 고민과 삶의 의미를 탐색하는 내용. 꿈꾸는 자의 심정과 인간관계에서의 혼란을 표현하고 있으며, 1998년 7월에 '목자광'이라는 필명으로 작성됨.", "tags": ["고민", "철학", "사랑", "삶", "감정"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1996년_열린마음_p007.jpg", "processed_at": "2026-04-09T23:10:30.046134", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p007"}, {"date": "1996년 9월 31일", "author": null, "content": "아버 아빠(?)3 제아버 생각나는 수학은 읽마. 아버나다.\n아저차 이법 아버이 잔 뭍히면 뭇 우 읽마. 아버는 쉐해 산고있다.\n세상에 씨이 게씨다번 ... 나 같은 놈은 앞은 않은타 곡샤기? 나 뼤 찰한 춤 같았던 앞으면 ... 아머가 붕다. 물낭 춤!!\n아저차 여귀 남은 셈다. The Dreamer\n\n1996년 9월 31일 왔다 정네 잔은 앞어머면 궁금 우절다 것아터 장은 궁시기고\n↓\n잔은 앞어머레이 조셔 떤정치거고 해졌다. 나에게 두까지 곡성이 있었는데\n한자기거 떨겼다. 다른 한까지 건준, 곡씨, 아바 한 1떨읍는 궁좋져 같는 것이다.\n\n보써 잔 자씨이 앞다. 하내씨 체결카다면 깐참자겠지.\n합사곡씨을 잔 해려깎다 떡좋 열싣이 홍씨다.", "summary": "1996년 9월의 개인적인 감정과 고민을 담은 일상 기록. 아버지 그리움과 인생에 대한 자문이 드러나며, \"The Dreamer\"라는 표현으로 희망을 표현하고 있습니다.", "tags": ["일상", "고민", "가족", "감정", "1990s"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1996년_열린마음_p008.jpg", "processed_at": "2026-04-09T23:10:41.783645", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p008"}, {"date": null, "author": null, "content": "< 나는 천국을 맛져 있는다 >\n\n나는 천국을 맛저 있는다\n아무릐 못사가 저정여데도\n나는 너의 똑 숨는 맛든다\n너의 웃이야말로 천국의 맛이니까\n\n나는 하늘같은 맛저 있는다\n아무릐 못사가 저정여데도\n나는 너의 바음을는 맛든다\n달려 너의 사는 있어야까\n\n나는 여마로 맛저 있는다\n자우를 자우의 교통로 맛저 있는다\n밀은 것은 너의 두 눈과\n배정한 여의 맛은이다\n\n< 하이네 >", "summary": "천국의 맛을 주제로 한 낭만적인 시 작품. 사랑하는 사람의 존재 자체가 천국이라는 감정을 반복적으로 표현하고 있습니다.", "tags": ["시", "연애", "감정", "낭만"], "mood": "positive", "decade": "unknown", "image_quality": "fair", "filename": "1996년_열린마음_p009.jpg", "processed_at": "2026-04-09T23:10:47.319625", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p009"}, {"date": null, "author": null, "content": "< 글/보내며 >\n\n글쓴이 나에게 글 받는 당신께 보내는 편지입니다. \n지나간 시간들 속에서 우리가 함께 했던 생각들이 모이고 모여\n\n새로운 하루 나를 위해 글을 쓰고 글을 읽으며 지내는 것 같아요.\n어떤 날은 외로움에 밤새우고 어떤 날은 기쁨에 환호했던 우리.\n날이 갈수록 더 깊어지는 우정 속에서 글을 통해 만나고 있어요.\n\n새로운 시작을 앞두고 있는 우리들에게 [불명확] 미래는\n\n설렘과 두려움 사이에 있을 거 같아요. 하지만 우리는 이미\n많은 것들을 이겨냈고 함께 나눴던 그 경험들이 우리를\n더욱 단단하게 만들어 주었던 것 같아. 이제 그 경험들을 안고\n\n우리 각자의 길로 나아가 되겠지만 우리의 우정과 추억은\n변하지 않을 거야. 언제나 옆에서 응원할게. 그리고 우리\n\n다시 만날 때 우리의 이야기가 더욱 많아지기를 바랄게.\n힘내요! 우리는 할 수 있어. 화이팅!\n\n                        < 나와함께 적는종이 >", "summary": "졸업을 앞두고 우정과 추억에 대해 감정을 담아 쓴 편지. 함께한 시간들의 소중함과 앞으로의 미래에 대한 설렘과 희망을 표현하고 있습니다.", "tags": ["졸업", "우정", "감성", "추억", "응원", "희망"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1996년_열린마음_p010.jpg", "processed_at": "2026-04-09T23:10:54.531198", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p010"}, {"date": null, "author": null, "content": "나가봐 나쌤 궁금 혼란 내겐 곡 과하지마요 귀갖 [불명확]\n나가봐 나쌤 넌 내겐 곡 과함\n종혼 중 긴 노곡라 곡는 거 당당 나외가 ㅇ 이중 ㅇ 더곡\n나가봐ㅇ 집이여 과각금 나결을 ㅂ쁨\n줍 나하라나 따나 현대 나강 곡금 내귀 나운나나고 과낌\n나가봐나다 ㄹ곡당 나귀 과내여\n과나당너넓 나결금 101 궁 내나 내 00:6 부때 나나 중 공\n나가봐 내울여 줄문 ㄴㄴ 나장는 궁 나쌤\n(아궁 곡울 나 중 따과사 때 미며 나나 충 내곡\n궁내나나 나햐나 나너 궁 ... 따이금이 나 궁극 과나나금\n곡 궁 곡음 과나금 내\n곡따금 내움 나결\n음남 당을 노을 당음당 때나 따야나 줄어 제금\n나가봐 쌤 나울 나울나 궁 내 나 과나\n나가봐나나금 묻금\n나우 귀금 내과과 노금나나 곡나 ㅇ 궁금\n나가봐 내마음 내귀금 궁 ㅇ\n나나금 나 금 내있 궁\n\n[수학 관련 계산식들]\n각 을을 (가 × 쌍나 10 내 까 음) ㅂ ㅂ 18 12 궁\n나 각 ㅂ곡 ㅂ 나 나 19 ㅂ나\n나 나 ㅂ을 ㅂ금\n~ 나\n\n글 ㅇ ㅇ 을 곡\n12 10\n~ 나", "summary": "개인적인 고민과 혼란을 표현한 글로, 관계나 감정에 대한 내용으로 보이며 끝부분에 수학 계산식이 포함되어 있습니다.", "tags": ["고민", "일상", "감정"], "mood": "negative", "decade": "unknown", "image_quality": "fair", "filename": "1996년_열린마음_p011.jpg", "processed_at": "2026-04-09T23:11:05.060775", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p011"}, {"date": null, "author": null, "content": "[상단 필기 - 불명확]\n\n[여러 줄의 한글 필기 텍스트가 있으나 필체가 어렵고 사진 각도로 인해 정확한 판독이 어려움]\n\n주요 가독 부분:\n- 상단에 날짜로 보이는 '1 8 '96' 표기\n- 여러 문장의 손글씨가 있으나 대부분 [불명확]\n- 페이지 전체적으로 작은 필체와 흐린 이미지로 인해 정확한 내용 파악 곤란", "summary": "1990년대 중반 작성된 것으로 보이는 방명록 페이지이나 필체가 작고 사진 품질이 낮아 구체적 내용 파악이 어렵습니다.", "tags": ["방명록", "일상"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1996년_열린마음_p012.jpg", "processed_at": "2026-04-09T23:11:12.530321", "volume_id": "1996년_열린마음", "volume_title": "1996년 열린마음", "year": 1996, "page_label": "p012"}, {"date": null, "author": null, "content": "{\n  \"date\": null,\n  \"
