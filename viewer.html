.vol-cover{width:100%;aspect-ratio:3/4;overflow:hidden;background:#e8dfd0}

.vol-info{padding:10px 12px}
.vol-title{font-size:.85rem;font-weight:600;color:#3d2b1f;margin-bottom:3px;line-height:1.3}
.vol-meta{font-size:.72rem;color:#8b7355}

.page-indicator{font-size:.82rem;color:#6b5a48;min-width:72px;text-align:center}
.viewer-body{flex:1;display:flex;overflow:hidden}

.trans-meta{font-size:.72rem;color:#a09070;margin-top:5px;min-height:16px}
.trans-footer{display:flex;align-items:center;gap:8px;margin-top:8px}

.save-btn:hover{background:#5a3f2e}
.save-btn:disabled{opacity:.5;cursor:default}
.comment-list{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;min-height:20px}

.comment-time{font-size:.68rem;color:#aaa;margin-top:4px}
.comment-actions{display:flex;align-items:center;gap:8px;margin-top:6px}
.comment-like-btn{background:none;border:none;cursor:pointer;font-size:.78rem;color:#888;padding:2px 6px;border-radius:12px;display:flex;align-items:center;gap:3px;transition:background .15s}
.comment-like-btn:hover{background:#e8dfd0}
.comment-like-btn.liked{color:#c0392b}
.comment-reply-btn{background:none;border:none;cursor:pointer;font-size:.78rem;color:#888;padding:2px 6px;border-radius:12px;transition:background .15s}
.comment-reply-btn:hover{background:#e8dfd0;color:#3d2b1f}
.reply-form{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.reply-form textarea{padding:6px 8px;border:1px solid #d4c8b4;border-radius:6px;font-size:.82rem;font-family:inherit;resize:none;background:#fdf9f3;outline:none}
.reply-form textarea:focus{border-color:#a08060}
.reply-form-footer{display:flex;gap:6px;align-items:center}
.reply-form-footer input{flex:1;padding:4px 8px;border:1px solid #d4c8b4;border-radius:6px;font-size:.78rem;background:#fdf9f3;outline:none}
.reply-submit{background:#3d2b1f;color:#f5efe4;border:none;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:600;white-space:nowrap}
.reply-submit:hover{background:#5a3f2e}
.comment-form{display:flex;flex-direction:column;gap:6px}
.comment-nick{padding:6px 10px;border:1px solid #d4c8b4;border-radius:6px;font-size:.82rem;background:#fdf9f3;outline:none}
.comment-nick:focus{border-color:#a08060}
.comment-text-input{padding:8px 10px;border:1px solid #d4c8b4;border-radius:6px;font-size:.85rem;font-family:inherit;resize:none;background:#fdf9f3;outline:none;line-height:1.6}
.comment-text-input:focus{border-color:#a08060}
.comment-submit{background:#3d2b1f;color:#f5efe4;border:none;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:.82rem;font-weight:600;align-self:flex-end}
.comment-submit:hover{background:#5a3f2e}
.loading-dot{color:#bbb;font-size:.8rem;font-style:italic}
#search-view{display:none;max-width:860px;margin:0 auto;padding:24px 16px}
.result-card{background:#fffdf7;border:1px solid #e0d0bc;border-radius:9px;padding:14px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s}
.result-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.1)}
.result-vol{font-size:.72rem;color:#9b8870;margin-bottom:4px}
mark{background:#ffe066;border-radius:2px;padding:0 2px}
.mobile-controls{display:none}
.toolbar-rotate{display:flex}
.toolbar-zoom{display:flex}
.fav-btn{background:#f0e8dc;border:1px solid #c8b89a;color:#3d2b1f;width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background .15s}
.fav-btn.active{background:#ffe0e0;border-color:#e8a0a0;color:#c0392b}
.fav-section{margin-bottom:28px}
.fav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.fav-card{background:#fffdf7;border:1px solid #e0d0bc;border-radius:8px;overflow:hidden;cursor:pointer;transition:all .2s;font-size:.78rem}

  .mobile-controls{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 12px;background:#fff;border-bottom:1px solid #e0d0bc;flex-shrink:0}
}

... 중. 마종이... 등다.\n\n니기네 꽉 느 나의 계홍사 생줄구으을 겨증싸다가 것다 싱가은\n\n벚꽃이 [불명확] 다른 싸중이 꽉 것을 별서 나 자서을 발싱했다 것다.\n\n너도중 나의 싶현네 충싱해지자 이깟이 버로 몽은 것의 싱간임자 됨다.\n\n나도겸 거아잔 위줄 왕누한 다등에 나머 한이 싶은 왜등 충나가 앓다\n\n내 거깝정이 싶창에 충싱했다 다른 일은 장 찮 오 있다? 안등다.\n\n잔짐 / 충머거 나의 인싱을 창은 것 이다.\n\n[불명확]년 4. 6 꼴올\n\n\n화시깐면 롤라윤중이 싸깐중이 싸깐을 받고 있다.\n자깐 찬정 수깐은 롤중중이 싸깟차고 싸깡완싼진 귀롤깡이 중자\n계속 싸깡치고 싸깡양싼시자.\n\n완시깡중후정?년이. 6.\n\n깡싱깡 깡중죡깡죡의 차싸게하고 완싸깡는.", "summary": "봄날에 대한 감정과 일상적인 고민을 적은 일기 글. 반복되는 표현과 손글씨의 흐릿함으로 인해 내용이 다소 불명확함.", "tags": ["일상", "감정", "고민"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p010.jpg", "processed_at": "2026-04-09T17:46:04.400074", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p010"}, {"date": "1991년 4월 6일", "author": null, "content": "지금 내 맘은 너무 복잡하다. 우리의 이런 [불명확] 끝났다... 지금이 눈 눈 도시 꼭 되어가고\n우울 우리의 이런 끝났다 \"이렇게 정했\n시작의 과실들에 도와다. 우리 과정사는 진정 다른 상황한 눈의기.\n자극 도와 하다는 생각의 도와다 움직 껴 할짜이 도를 먹었다.\n경험 가장 있 이야는 것 이었다 정성 경제의 과제된 꼭 육\n심각 서류 왜지할 미션창 정의 기선이 그만했다 것이 수 북의\n내부의 매우 컨디 것 느껴다. 위치에 정의 나가다... 도 버터\n그런 상황에서 것 시각 꼭 있어머 불러다 것... 그것도 흘려\n그것 나쁜 것 아니다 반성상도 있고 하는 [불명확] 나는 있어둔데\n뭔가해서 우용없 있는해 소원 꼭 궁금다 원인상화 과정 은\n미술을 궁금고 있었다. 영향을 거의 선을 함해 나아간 한가\n기자 서 느껴있... 앗으로 더 꼭 없어갔던 받속 미쳤나\n천령 나 것... 밖 먹으로 나가다 흔들 버터... 천했네\n것도 길뭔 하는 뭔색데 버터 고초기 념은 역은 싶요 웃다.\n어릅 기도 왔 먹었도 여러의 버나 끼션 한글으면 흘려다\n[불명확] 문을 읽고 ?\n\n1991. 4. 6 로신\n\n4/6 기억.\n\n한은 감옥다 깊은 심원에 옮겨진다 그리고 맏한다 그미가 감자에서\n준은은 이것도 저것도 알 것을 이념이초 저것... 있어야이 한는\n것 사람. 한은 먼내 나너져다 자 기얻에 먹시가 것다 상\n먹음 간당와 한은 너가져 저 여기 먹은 옷이 한 꼬 ...\n꼭정 왕에됨 옷은 합. 난 옷소행 \"의미\"는 루하자 합", "summary": "1991년 4월 6일 작성된 글로, 작성자의 복잡한 심리 상태와 고민이 담겨 있습니다. 관계의 끝, 자신의 성찰, 그리고 의미에 대한 깊은 성찰이 주제입니다.", "tags": ["고민", "자성", "감정", "관계", "철학"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p011.jpg", "processed_at": "2026-04-09T17:46:22.052995", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p011"}, {"date": "1998년 4월 9일", "author": "너처럼 자유로운 / 영아가", "content": "[상단 검은 년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p013"}, {"date": "1991년 4월 20일", "author": null, "content": "원래 이게 metal 같은데 위칠을 물감선자 로써 느낌을 빠짐 깍는 삼각나비아~3층 신지여는 사리의 죽이던 산업과 가서쌍이 나라던 밤껄 에서는 음과 꼭의 기차가 높의 높혀진 절정이다 아 세 내가 배우저 더 없은 못쓰겠다 아결 앗 씨 밤이져.\n\n ㅂ. 낱말 관심된 낙이면서 정말에 가네다갈 꼬솥 뿌원도 할짱 떨 꾼는 왠 밝떼 싹 굼뭠 알의 나온 \n\n여전을 꼬해 있에 맛이 치려는 높이는 맞이 안짓다닙니다 나는 본남 지여 맞 맞은 잔과 맞이 맞이 심상정는데 애를은 모르나 바요.\n\n왜 애을은 저제래 줄하상순 자는 이해 국어진 아울야따 많중화의 화지은 에 글되 지하찬 나는 국어진 것 에 지여하지 손으로 자지을.\n\n올은 나 꾸피\n\n ㅍ. 사각은 기분하나다 주여저 것 받음 지이 아닌 자리는 릅이 완려지는 기분이나다.", "summary": "작성자의 일상적인 생각과 감정을 기록한 개인 일기. 무언가에 대한 혼란스러운 느낌과 성찰을 담고 있으며, 여러 단편적인 생각들이 나열되어 있습니다.", "tags": ["일상", "고민", "감정", "개인일기"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p014.jpg", "processed_at": "2026-04-09T17:46:59.814001", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p014"}, {"date": "1991-04-09", "author": null, "content": "돌아올 땐 많이 가져다.\n우리의 큰 여정이 여정한하는 법며 온두빛인다.\n낭만이어 아념았다.\n\n1991.4.9 돌자\n\n누 것 나와 드러마 꽃 옷 거들 너은\n시함하자! 어) 꼭 어냥 똑은 쌤 쌌\n닦는게 [불명확] 끝 괜 녀어젓 혼 앞.\n학년처럼 과 어념었던 짓은 꽃이?\n있을 씌버싶 녀 하우는 쌤\n닦 징하. 어렸나 나뭇 어느 곳쩐없네 어너연\n남금 같잔 만데 벤전 같이. 세은 나과\n어냥 장려하던 있든 때 공깟 뜬뜬?\n닦은 쌤 자져. 꼬잘인 쌤 어 campus즈\n아너양.. 꼬우는 .... 뭍돋는 새는 냔문 [불명확]\n쌤[어] 옳쌤 넨 녀어지차 냐냥.\n\n이는 어런 선비마 \"stair way to heaven (2)\" 이런\n꽃을 찾았다. 난 온은 기본이 뭐다. 놀래가 마음 온에 저미화된다.\n신비롭의 노름머 화종숨주 정함되더 냥장 온어더지다. 내 음은\n최면의야다. 하는 저정해 괜찮던 된다. 진장한느 촌드려지떼\n교표 계너리증 핏멍을는 도드리고 못도 하아왔해 괜것더 ...\n은고나가 영어는는 능은혻어머 난 여더은. 해야했더고 성각했지만\n했것이 념ㅜ 아기왔다. 검금까지 건님명에서 등근어질 선배 늘들이상\n단아의었다. 내가 지금 왜 이렇까? why 우울한 경명까?\n나가 보는 하는하는이 잘치고 꺠진 봄든 어켓숨까?\n영긋이 왜비에게 정멀민한다. 이제 꽃숨져찮담고 밤자리성에서\n공종되고 왔었다. 내가 선배들의 수코즈 어누나 가여놓게 병장", "summary": "1991년 4월 9일에 작성된 일상 노트로, 작가는 대학 생활에서의 고민과 혼란스러운 감정을 표현하고 있습니다. '스테어웨이 투 헤븐'이라는 곡을 언급하며 청춘의 방향성과 인간관계에 대해 깊이 있게 고민하는 모습이 드러납니다.", "tags": ["일상", "고민", "대학생활", "1990s", "감정표현", "신입생"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p015.jpg", "processed_at": "2026-04-09T17:47:14.215282", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p015"}, {"date": "1991년 4월 9일", "author": "나병", "content": "했던 것 같다. 그렇지석 채운공. 다야뭐니. 여때 북도은 제대로\n한하니. 대바틀이 한 시간 강중을 위해서 그 몇배의 시간증\n돈다는 것 같을 잘 맘버티도 난 너무 무심했다.\n여제도 나나 샘창이 잔아진 것 같다.\n\n\"얍작인빠 / 미안해요.\"\n\n1991년 4월 9일\n\n나병 정은 나가.\n\n내 하고도 확장이 또은 우데다 여김 바등\n에 나은 저기만가\n\n4때을 듣여 사강의 4때을 마나 다은 강이\n단 회짜 해가 포 어늘강을더이 우은\n웃짜 잘자ㅅ삼즘의 고자와 이 시재의 다\n듯은 야은이야 맞여나 충하?\n도바효은 뭔지도 하강여가 시자자\n하게 하니 싶로 맛장지 하 사랐에\n사강은 나누고 심지만. 나의 솜칭전저\n웃좋이 고해서 같더 잖 수 있는\n여유와 훠있잖이 우자. 비언자자.\n하자과 우려 (90) 가즈 싶우하는 너즉\n가스히 먹켜하고 와싱하는 우의 너송\n더즈 꾸잠자(으) 촛샤자이기 하나 - 이\n우자. 아종잠자는 싶하을 해. 북자\n요집에 꼬미있는 거삭재도다는 너.\n너째도 샤은 꽃다.\n가을 나갖다가 성사기 맣음 쑸\n꾸여자.", "summary": "1991년 4월 9일 나병이 작성한 글로, 과거 행동에 대한 반성과 미안함을 표현하고 있으며, 시간의 소중함과 인간관계에 대한 고민이 담겨 있습니다.", "tags": ["일상", "고민", "반성", "1990s"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p016.jpg", "processed_at": "2026-04-09T17:47:29.607051", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p016"}, {"date": "null", "author": "null", "content": "6/22(수)에\n\n쉬는\n숨쉬이도\n\n쉬는\n도의\n\n비즐\n\n도의\n\n청잔에\n\n쉬기에\n\n...\n\n노아\n\n사춘꽃고\n\n91 애들이\n\n꿈의\n\n아깟도\n\n밤은\n\n내겐\n\n맞찬\n\n이것은\n\n아이었\n\n있음도\n\n아씨도\n\n나의\n\n잘았던\n\n공이\n\n밤집을\n\n밤장을\n\n꿈길이\n\n내가\n\n걱정되기\n\n까나\n\n쉬울\n\n것같\n\n나를때\n\n육예에게\n\n해\n\n못\n\n믹이\n\n않다\n\n나의\n\n걱정\n\n1년이란\n\n생각이\n\n도대체\n\n무엇\n\n못\n\n뻔뻔이다\n\n나의\n\n상겟던\n\n생각으로\n\n뭔\n\n다시\n\n우리고\n\n있다\n\n아니면\n\n공혼이이\n\n고민을\n\n각고\n\n있고\n\n그\n\n고민을\n\n하찮된\n\n것같기다\n\n그\n\n것의\n\n사슬을\n\n다링\n\n하여\n\n떠\n\n다하와는\n\n것이다\n\n오렌\n\n곤재는\n\n밤싶을\n\n방걷한\n\n수\n\n있다\n\n그것된\n\n내가\n\n고민을\n\n하는\n\n것", "summary": "이 페이지는 1991년경 작성자의 내적 갈등과 고민을 담은 자유로운 형식의 글입니다. 꿈, 미래, 책임감과 관련된 깊은 생각들을 표현하고 있으며, 자신의 심정과 고뇌를 솔직하게 기록하고 있습니다.", "tags": ["고민", "자아성찰", "일상", "감정"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p017.jpg", "processed_at": "2026-04-09T17:47:37.071508", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p017"}, {"date": "1991-04-10", "author": "청승", "content": "4 계획 발전시킨다는 것하지.\n왜 여럿 무한정 것하지.\n\n91. 4. 10.\n\n며 이래 어딨는 ? 40 앞날 저것은 의식는놓이 것을 해다.\n보수 가는데는 즉 것이 떠오릅니다... 괜찬을 133 도랑어건\n뺀 의것다가?\n\n4.10.\n- 학승 -\n\n오랜만에 중요 쏟는 것 같다. 인 그럼을까?\n담임다움이 켈코 내 교시은 아거찰 수 없이서앞까?\n남이게 내 교의이 들기는 것을 우려윤 큰 을깟까?\n보고 싶은, 같이 하고 싶은 친구들흔 [불명확]\n못 하써인지 [불명확] 쌤황도 그럼께 중지 많은 산 다.\n하지만, 전 표경은 것빛으로 들들이고\n질달래(이는 부과의 은[불명확]이다)는\n가만 두지 않는다. 그 질알래이 핏빛이\n욕것을 의미하는 지, 우리는 그 앞에서 앗겨하고\n다결하야 하곤은 지를 느끼고 싶은\n나는 그 앞에이 켈코 욕끼렀고 싶지 않다.\n이제 정의만 있으면 4.1야 대중정이 있다\n[불명확] 이 땅의 미궁이 우원을 의껸던 샘메듯의\n람정은 오는데 [불명확] 자주 민족 - 통의 진궁을\n다그것 나가야 라것다. 버낸 욕영던\n4.1야구머장경 다시 라씀 이은 솔 우려 극이을\n등을구다 4기닞\n\n4월 10일 12시\n청승", "summary": "작성자가 미래 계획과 삶의 의미에 대해 고민하고 있으며, 사회적 책임과 개인의 갈등을 표현하고 있습니다. 4월 10일에 작성된 성찰적인 일상 기록입니다.", "tags": ["고민", "철학", "일상", "성찰", "신입생"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p018.jpg", "processed_at": "2026-04-09T17:47:49.407737", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p018"}, {"date": "1999-04-10", "author": "곽신", "content": "열린 마음을 가진 친한 친구에게 편지를 쓴다. 학교생활과 일상에 대한 생각들을 담았다. 처음 만났을 때부터 우리는 많은 대화를 나눴고 서로의 생각을 존중해왔다. 기타를 배우고 있으며 음악에 대한 열정이 있다. 졸업을 앞두고 있는 시점에서 미래에 대한 고민과 불안감이 드러난다. 친구와의 우정이 계속되기를 바라는 마음이 담겨있다. 대학생활의 추억들을 되돌아보며 감사함을 표현한다.", "summary": "1999년 4월 10일 작성된 편지로, 곽신이 친한 친구에게 학교생활, 음악활동, 미래에 대한 고민을 나누고 있다. 졸업을 앞두고 변화하는 환경 속에서 우정의 소중함을 느끼고 있다.", "tags": ["일상", "고민", "우정", "졸업", "대학생활", "음악", "기타", "편지"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p019.jpg", "processed_at": "2026-04-09T17:47:53.533636", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p019"}, {"date": "1991-04-10", "author": null, "content": "새로운 시작... 처음 느낀 낯선 환경... 많은 것들이 있었고... 그 속에서... 돌아다니며... 여행도 하고... 재미있게 지내고 있다. 새 친구들... 다양한 동료들... 살펴보면서 적응하고 있는 중이고 가깝게 지내게 되면서 서로를 이해하고 배우고 있다. 생활하면서 정말 많은 변화가 일어났고 그동안 경험하지 못한 다양한 경험들을 하고 있다. MT, 행사 참여 등을 통해 학과 전체의 분위기를 느끼고 있으며 선배들의 도움도 많이 받고 있다. 처음에는 어려웠지만 지금은 많이 익숙해졌고 함께 하는 시간들이 즐겁다. 열심히 공부하고 새로운 지식을 배우면서 대학생활을 보람차게 보내려고 노력중이다... 맺음말로... 이 시간들을 소중히 여기며 최선을 다해 모든 일들을 진행하겠습니다.", "summary": "1991년 4월 신입생으로서 새로운 대학 환경에 적응하며 느끼는 설렘과 성장의 과정을 기록한 일상의 글.", "tags": ["신입생", "적응", "대학생활", "MT", "행사", "성장", "일상"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p020.jpg", "processed_at": "2026-04-09T17:48:02.098729", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p020"}, {"date": "1991-04-04, 1991-09-12", "author": null, "content": "나뭇잎에 맺히는 예슬 같은 한맺다.\n이룸 한벗 '구름 종엔 신효라'...\n뒤나 뭉에 핀 흥금은가다.\n햇열은 대땅은 지쟁를 여여 흥겨워하고 찾우 한는\n냥겸저 그어 나는 품걸 느껴서 하여 앞나하 하나?\n                                                    1991. 4. 4. 저녁 여 22분\n                                                    #송\n\n○ 싶아다. 여젠 입짐 한공에 난은 곤 어선 신은 다. 저때야 여저 한말더저\n곸나나 입짐 중구 싶어 씨는난...\n여제는 말은 곤은 고대화 저말하는 느혀 해떨다.\n흥 냥이영에서 흥 달 밤이 종장 나 예 짖는 밤이 쌉다.\n찮아 횡장한 한때는 빕은 곤 아님데, 찾을 나타 억짐 고라 싸냣 거강으\n워하다. 강다 살뤼미 산에 대한 완후가 찻장이 더추다.\n여뭔 싸뭔도. 난 더나 굳다.\n여며 새나등이 널 고떨 저떨하는 여뭔 그모등.\n만지 여선(저떨은 구여는 막) 찾장은 나때 다기어 하짓다. 그신베을 육우\n난 그 육짐에서 내 삼는 해떨하 우 있는 헌과 밤은 오때다.\n찮아 문말다. 모극에...\n대떨 난 떨떨다. 메이'요 모응은 구강하 여여다\n그 요떨에 밤지지 수셔싶나다. 난 중답 여장이 나 추장은 찾고 가마에\n모추한 것아다. 자는 쌍이 하는 찮장 복뭄된 삶다.\n그따 #따다.\n\n— 1991. 9. 12. 아침 [불명확]\n\n또 따다. '걷찬에 숨찬다' 간데 뭉기 난 걷찬에 숨찬에 샘찬되.\n또 새찬하는 야나고 샘찬하거 이는 이추한아 여때는 호에 억전론 겨\n여 문열다. 닭은 앖닍 강장이고 샘지히 야?", "summary": "1991년 4월과 9월에 작성된 감정적이고 반성적인 일기. 자연 속의 작은 것들에서 느끼는 경험과 내적 갈등, 삶에 대한 고민이 담겨있다.", "tags": ["일상", "고민", "감정", "반성", "자연"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p021.jpg", "processed_at": "2026-04-09T17:48:16.746986", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p021"}, {"date": "1991-04-12", "author": "웅수네", "content": "먼저야 닌. 나 대며 먼저미 촉촉하던 떠어. 솔 비판받는 것에서.\n로고머다 리그와 설. 사미 떠촉화 받은다.\n그래 자잔다가 떠떠냐? 봄훈이냐(III)\n왜 이런 헤션)\n오중 겹혀 사상이 촉. 맥이 다 꿉한다\n어제인 날의 맙촉 떠촉아 받쳐 떠 리 괭훈친다 어제 사찬한 촉때.\n금파 앗받다. 에나 어마차기 있어앗던 시상을 훈받한다\n어제 로촉서 촉한다. 또 그래도 솔.\n리칙한 헨다 봅때 샤햟을 떠 촉. 거미어 내들. 사촉을 받고 명\n졷넣다. 에나 로촉서 촉훈한다.\n<Quoting>\n웅하다네 그때 촉.\n—1991. 4. 12. (2:00 밤—\n\n둘째 종철판 [불명확]다. 진행께 자뭔써. 깎숨다. 모든 깃을 느껴다\n나의 과자야 거져하 미먼어 대헤서.\n뜨 깓을 [불명확]되어 나와 수였찻 깓이라 아직 주솃가나 하는\n나는 국채을 고정하지는 롯히깟다 영친미충 자장\n이울하다면 그럭 응획이 샤비겟시.\n너나는 한다 사항을 족하는 자신에 대한 솜함이한다.\n그깓이 반싱을 어어서 정종을 구지하 되똿든데 놀게데.\nOTHERS 한은 나의 받이 깓다\n받 정자을 좌짜되 시결 찾이다 고 케뭄(Black Syndrome Guitarist) 등 하약에 나샤을 자고 6.시간을 게되고\n나미처 사뭉 솕 덩어려 비비더 왓다\n1 나에의 솜이 동늘다\n나의 미라는 결정지 솜겨기 어제서 결정에 되치 옮곳 것 전다\n정싱겨인 자뭔이 적맺이었고 깟원 한당너 [불명확]\n달정에 빠져 같음 ? 솜봉이 나맘 받을데 깓이 왔다", "summary": "1991년 4월 12일 작성된 일상 기록으로, 작성자의 심리 상태와 고민들을 담고 있습니다. 자신의 감정 변화와 주변 사람들과의 관계, 앞으로의 결정에 대한 고민이 주된 내용입니다.", "tags": ["일상", "고민", "감정", "자기성찰", "1990년대"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p022.jpg", "processed_at": "2026-04-09T17:48:35.917690", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p022"}, {"date": null, "author": null, "content": "4월에 피어나는 진달래는 아름답다.\n봄 붉은 깔맞 꽃잎들이\n자꾸만 나의 가슴까지 태우거에 아름답다.\n\n나월에 피어나는 개나리도 아름답다.\n교정 곳곳곳 피어나는 개나리도\n푸른 하늘바다 푸르른 너의 미소와\n여름 저편 또까운 너의 눈동으로 피어나거에 아름답다.\n\n그리하여\n4월에 지는 목련 솜솜으로 아름답다.\n솜도 문종자로 바꾼 널러어 가는 너의 모습은 봐지한\n여제 까지나 네 여윤이 닿아있는 띠거지는 바라보며\n여정가 내 앞에 다시 팀\n그 덜을 가다딤 수 있거에 아름답다.\n\n4월. 봄", "summary": "봄의 여러 꽃들(진달래, 개나리, 목련)을 통해 자신의 감정과 그리운 사람에 대한 마음을 표현하는 감성적인 글귀입니다. 계절의 아름다움과 사랑하는 사람에 대한 그리움이 얽혀있습니다.", "tags": ["감성", "봄", "자연", "연애", "그리움"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p023.jpg", "processed_at": "2026-04-09T17:48:42.357293", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p023"}, {"date": "1991-04-12", "author": "지현", "content": "제목은 '안녕하는 손가락?'\n\n여러 문단의 손글씨 한국어 텍스트로 주로 일상적 고민과 감정에 관한 내용. 처음 부분에서는 자신의 감정 상태와 주변 사람들과의 관계에 대해 기술하고 있으며, 중간에 많은 질문들이 포함되어 있음. '왜 그럴까?', '어떻게 해야 할까?' 같은 자문적 표현들이 반복됨.\n\n후반부에는 더 개인적이고 심화된 감정 표현이 나타나며, 마지막 부분(1991년 4월 19일)에는 다시 한 번의 짧은 메모가 추가되어 있음. 전체적으로 청소년의 심리 상태와 자아 탐색에 관한 내용으로 보임.\n\n[불명확한 부분들이 여러 곳 존재]", "summary": "1991년 4월에 작성된 일상 노트로, 저자 '지현'이 자신의 감정 상태와 대인관계에 대한 고민을 기록하고 있습니다. 자신의 행동과 감정에 대해 질문하며 자아 탐색을 하고 있는 청소년의 심리 일기입니다.", "tags": ["일상", "고민", "자아탐색", "감정", "대인관계", "청소년"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p024.jpg", "processed_at": "2026-04-09T17:48:47.291483", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p024"}, {"date": "1991-04-13", "author": "우석", "content": "7월 처음부터 시작하는 되풀이되는 것 같아 처음젖은맛—이제나와 여름 같 노들 새삼개되다. 기의 깨은 먼날 흐리를들 느미 답왕 되어 잋아정 깨이 본틀 낫두을 착 신숨이 잋곤데는 게틀 게뭬 지깡 죄 지걸 못이 여중 깡깡귀 햇짱처. 먹기: 아가중 [불명확] 물엣 종 한 빨더침은 중 싸또 놀겟 다다 지곡 이 떻이 왓도 어됭이 그 속이 곡정치 왓는 그 신옷이이 다나는 너 잊은 곡메 뭐다는 너는 너 잊. 동헤로 위하려 깟. 이제나와 (UbMuk 것인 뮤이 받는-뭔가?) 한괄를 뭉하서는 느낌이다. 아마는 같이다 나의 옷짐 뮤이 바뀌지게 욕재다. 신옷자는 깊 켠 뭔더렴치겨 앞시다. 근덤 깥 상야닫. —흐왕 씸느이 있깡이 싱—. 본좋찐. 이른 기꼴에 왕했에 도착했다 여큰분터 지뭐 너는 사효 쇠팜—거봉 가치스련기 우리말에 모른왕에 자각은 연딧다. 오뭉 좋읽 가야댓다. /1991 4 13 도 입읍", "summary": "1991년 4월 13일에 작성한 노트로, 우석이 일상의 변화와 감정을 기록하고 있습니다. 계절의 시작, 새로운 경험에 대한 성찰과 함께 일상의 소소한 순간들을 담아내고 있습니다.", "tags": ["일상", "감정", "계절", "신입생"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p025.jpg", "processed_at": "2026-04-09T17:48:57.583738", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p025"}, {"date": "기본 4월 13일 4번", "author": null, "content": "비는 창자 바녀는 쌓여져 써져 여집나... 기본 4월 13일 4\n\nㅣ. 자전거\n   로운\n   자전이었다\n\nㅣ. 어머니\n   제비처 죽 (Caries with wit) 조.\n\n6. 아저의\n   잠깐 핀   조린것은\n\n없은 무우와  인정의  조한\n넓좌한  웅..   쏘곤  자터\n\n한 써을을\n\nㅠ. 좋아쩌 것  봅쳐줄  것이  아어서지   침원 (oneness) 알거\n   없경한  님에:  이려  쳐진어 늑 있을 것이면  니자 어쪽\n   것은  떡한 며  정더꾸가\n\n왜 쌍씨가 네 쌍\n카력이 창 쌍\n에돈은 다 왔어나다.\n X 어제  쏘 있었던  쌓씨은  윤리동  쌍나\n아직   운  뛰  띠  잔 왔씬.\n아니 왜  쌍삭이  합지?\n꽃꼬..   장 미음이  표현해\n\n[불명확]", "summary": "일상적인 생각과 고민들을 기록한 페이지로, 자전거, 어머니, 다양한 상황들에 대한 성찰과 질문들이 담겨있습니다.", "tags": ["일상", "고민", "자전거", "가족"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p026.jpg", "processed_at": "2026-04-09T17:49:05.446096", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p026"}, {"date": null, "author": null, "content": "1991년 4월 13일 토요일 2시 외출... 나는 어제 손가락\n- 현이(I)\n\n겨울 '이야기'를 하고 싶다. 다는 무장 여친 '이야기 중\n고자 어떠(?) 하면서 다지 기분이 파편찰 이야기 못내렸었다.\n여전마는 다(곳 이야기)에 참여 못한 '맛'을 쓸 수 있나\n내 마음에 답되었다. 나는 맛대로종을 다기 계몽이다.\n도준이 벤처 짖다. 빤정\n\n나도 괴야 했다. 현이(II)\n맞은 기막롭 다시려 죽다. 죽음에 '나'를 내가 기분하지 당기 괜해\n- 현이(III)\nⅠ - Ⅱ - Ⅲ\n\n'열린 마음' 이야는 맞이 처음되, 롤리나 위청들의 마음을 우주자게 채웟\n자자. 몬이라는 계장을 >>이 떻(화)은 정학 마음다다.\n>>해. 이렇다다.\n장자적인 맛 참여함, ⊃ 몬정 이렇다은 학공이나 이렇다는 사이 못 되는\n거인 야당종다.\n\n다을 궁금은 또 시정되. 사정혜처지, 제별 제빤 모든 다영의 기롬에\n문병에 있었다 별려 기영을 저서 래더는 싶이있었 곡작다.\n\n몬론,\n더 있은 새내서 넓이 앖는 우지 없어정지. 대별정에 출장에\n보내 있었겨, ⊃ 맛은 맞 여은 여기는 감아에서 일앗다 설정이\n있었다. 사흔 바다나은 맞려 해장의 시흔. 사흔 사흔의 님을\n궁연이느 대별한 정합다다. 서별은\n우리의 [불명확] 새별 정이[불명확]는\n우리어 감온 몬이 정앗이 [불명확]되.\n\n- 결럼써/\n별양을 여왕자' 자가 이 궁침이야\n단다 기문 '다서은 다가 갖은\n맞은 을이다. 저, 저은", "summary": "1991년 4월에 작성된 일상 기록으로, 작성자가 '열린 마음'이라는 개념과 관계 속에서의 감정 변화에 대해 성찰하고 있습니다. 현이라는 인물과의 상호작용을 통해 마음의 열림과 관계의 의미를 깊이 있게 탐구하고 있습니다.", "tags": ["일상", "고민", "철학적 사색", "관계", "감정"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p027.jpg", "processed_at": "2026-04-09T17:49:28.316296", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p027"}, {"date": null, "author": null, "content": "연락이 잘 연락이 싶은데도 안된다고 한다-\n혼자는 혼자한 듯이 한 날 선지 창하는-\n교실 살 많다. 어김나다. 흑. 살아도.\n하나하는 여기 이 정도 즉 내의 궁금이 새롭진 이 나와 이 정지자들\n내 쏟아죽었다.\n정도 대년채-정짜하는 대년채, 웃은서 무은 선, 알종하여 나아다며 그\n다만 받았던 서버에 받아선, 나력 재백증에... 알아하는 그 공정이\n나버핸 잔종나다.\n저시 저저왓싼 게버비도 정짜어덴 것정 시중 다다로 거기있는데,\n저은 다짜은 삼뭔징 찰핸 저저버싸다. 서살이하는 게, 저저이싸 게\n배러잔는 돌핸 이 도해를 꺼어했던 기약이 일엇다.\n저:\n저저 잘핸 게버던 그 선현, 전을 선들 아내었 싶거 존도나싼 창던 나\n더 솎 겉은 나누던 무할는-) 것이 나은 어던 창던 그 사건.\n여엔녀 재 바은 여정 수 었는, 어엔녀 잘 종는 모로켜너다.\n집게 창하고(!) 집메 게버싸어서는 집메 씬아레버지는\n집메 자기첨네 게돌었어버지는 집메 삭아이하는 것은 저아국는,\n깆 앞을론에 꼴겁싸어던 앞은 앞는 싸인서 성다다.\n여왠- 나 이 앞은 깟 꼴아하는 여- 도이, 산써 여정 여저.\n깟깟깟.\n성메 실안하는 섯메 기머는 싶메 이아하는 은정하는 단자전 나런다.\n것어었자 나사에서는 앞른다... 여들는... 둘ㅅ.\n것은?\n그런, 그런던 사정.\n하하: 겟겨은아는 아너, 사정.\n여정, 여정 싺어있는 에 정싣 깟는 싴되이메는 처국가 롯 짬았다\n이제도 이제도.", "summary": "작성자가 연락이 잘 안 되는 상황과 혼자라는 감정, 그리고 누군가와의 관계에 대해 반복적으로 고민하고 있습니다. 감정적으로 혼란스러운 내용이 손글씨로 표현되어 있습니다.", "tags": ["고민", "감정", "연락", "관계", "일상"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p028.jpg", "processed_at": "2026-04-09T17:49:46.934451", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p028"}, {"date": null, "author": "화사", "content": "대학은 그 정도 사람들에게 인생을 떨어져갔다. 불선한은. - 아당, 각 자리나. 돌피을. 한 씨상, 한 약이여 삼아하는 사람이여. 우정이야 인을 그게을 새삼하나가. 자지 여겨젤 됩게. - 샤 느-\n\n웋서이과 화면 '정터수'로 이정 문이 위겨진 넉재, 여겨있 음되는 화중심의 여뜻 노은 '영골 망을'에 떠미는 호은 추씨즈 서 봄나다. 다는 한의 아너라, 머질 제지 작씨 추거한 정여멍수다. 거기에 작성을. 주토을을 같은 것과 궤적고 중무무 칮은 알이던 (인국자체여), 여작성 의 지살펑참 았아옴나다. 여정성 자화페으로 서셔로 창기 톨려 솨게칟는 나머지는 아직 웃찾맙도내다. 즉 본인 봄은 저기 막착 수혜요... 그냥 솔으 봉은 솔 못속 깏 정보와 못미 여 ● 서야강경애에, 한아던 착포. -정차너 창각도 아너왱샤 여앤 궤메로 사참의 저이 중영다 것은 밝혀고 씨정여, 카더도닝 숭자러가 방아 의 알움, 한은 사합족은, 싸야 마족 능드능나야 웨한 주 깟는 사합증은 방증기 여움련다. 모 한정자한 마족 왕아 성태, 씨증 벤어 씨태 우 마족 사조 성태요. 간향로, 봄 어기는 한정멍샤 깎여 깟는 즐이숨의 아적한 은종에 증거의 정서나. 작 악 깔윤연 UBF의 그러자숙 몫 악미 되있은 론이 그자자숫 미사나 너도 나자걸쳐 그 ○ 꺼의 판 (샹깐효을, 즉의어 백) 을 여깟성 못찯습나다. 느켜면 삳겠 자겨 윗은 약, 취충은이 숫깟 곺앤 도 예은 솟죽이 기우하고 깟업다. 지굼 내얚은 아님은 웯지샤 여댐 뉴슚측이도 걷이 즐좋화나. 조좌-ㅠ다. 한 다 ▬씨 아너옆 지핵 빠의 못세의 웅어 탐른은 좌혀영여 아 그는도 나동 다갓찬 샤며 그듯 였여 웟지우, 웠겠조, 기나더 정서다.\n\n화사 M추-", "summary": "대학 생활과 인생, 그리고 자신의 신앙과 신앙 공동체에 대한 개인적인 고찰과 성찰을 담은 글이다. 우정, 신앙, 공동체의 의미에 대해 깊이 있게 생각하고 있는 모습이 보인다.", "tags": ["일상", "고민", "신앙", "성찰", "인생"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1991년_열린마음_p029.jpg", "processed_at": "2026-04-09T17:50:05.247926", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p029"}, {"date": "1988년 12월", "author": null, "content": "6/24 메모\n\n무대 설정\n○ 중앙 무대\n처험 A 와 처험 B\n② 뒤\n1988·12·광 12시\n윤찬 은숨과 벼락써\n\n은창인물이 무도 비우내를 잡지 발기어 그리와 어이 몯동곧다\n처험 A와 처험B는 벼락이 와 않는다. 처의 뒤에 앉은 잘은것다. 그리와 때\n찰처이이 처험을 발견다. < 어이서 찬광을 이 우 사청이 처험이는 것과\n이 사청이 마는 서비스를 느낌과 것다?\n\n~ 몽 ~\n\n넘쳐우런 붕장가 이것 깨닭다. 화과사려이 깔짓것네\n밥은 잡혀려지 것한 칠등는 질핀 이제 곡 막분려 칠다\n자 만서.\n\n우도를 좋자하다 CIM14 우도를 그리고 내도를 좋다\n지금 까지 잘 지내왔다 알으도 잘 지내기지\n제기랑 으로더다 쉬 이은게 깅성정진 생각들만 드는것같다..\n여기 노가 있었으면 좋겠다\n나도 I 서장) 너게 자기를 기다릴 수 있을까?\n우는 한번 기다려 붓다. 우가나다. 과연 누가 놀다.\n풍금해 미쳐겠어! 내앓이. 지핑겠다 (신장) 같서 젊어\n좋아다다다 정말 싫다\n윤자- Guitar 처기도 기정고.\nxxx ㅇ| 롤이 잃어도 좋겠다 좋 그걷 비서이 왔서 옷\n잘어내더다 너 좋다 지아음 아멋하게 왠우 잧자-\n그것 의가- 나의 시정자 그것의가 나의 정심이 괴장을 이해다", "summary": "1988년 12월의 일상 기록으로, 무대 설정과 관련된 메모, 다양한 일상의 감정과 생각들을 담고 있습니다. 기타 연주, 사람 간의 관계, 그리고 개인적인 고민들이 혼재되어 있습니다.", "tags": ["일상", "고민", "메모", "감정", "음악"], "mood": "neutral", "decade": "1980s", "image_quality": "fair", "filename": "1991년_열린마음_p030.jpg", "processed_at": "2026-04-09T17:50:18.292451", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p030"}, {"date": "1991-04-14", "author": null, "content": "앞으로 좋은 친구 되기를 바랍니다.\n앞으로 따뜻한 마음 갖기를 원합니다. 서로 좋은 20대시대를\n우리 9시대 이것을 명심하자.\n그 때까지 이 종이 비를 세상에 붙여\n이번 신입생 때는 써놓은 글이 나를 말씀을 직접 보면서 이것은\n내 앞기지이 이러했 었다\n나는 이것 이것은 내 삶잔다 도심선 했다면 이 여백은\n여자 때문에 꼭 찾은 것이다. 내 앞기존에 나의 여자는\n대기다 싸나가 이정대 공공 생강해서 이것 내가\n미음을 열지 못했다 정말로 돈다 그런 싶은데.\n그런데 미음을 열면 미약처럼 연애되기 위을 아내다\n다닝(기억의 글 때 에서) 맏한 것 같다\n그러면 총 어디다 사랑이 솔직해지지\n그것시간 사랑이 정 대비가 있고 다른 여기가 있지\n열린 마음 있는데.\n여기맞은 다른 것에 완해셜 미음을 열어봤다.\n그것은 열어봤\n싸여.\n나 왜있나\n여기셔 내가 왜있고는 거지?\n받 터였는 나가\n내가 ?\n그렇 터였지 않나다 여기까 붙있지 찾는 거지?\n사랑은 누구때문 같춘 싶은 비밀이 있는 테이나\n더더을 비밀이다가 같고 싶은 거이찬지\n결렇은 더였지 않아\n충무 해나 나의 비밀 서피다 붓이야\n\"\"\"\"\":\n더려을 너였", "summary": "1991년 4월 대학 신입생 시절 작성한 개인적 고민과 감정의 기록. 열린 마음, 사랑, 우정에 대한 성찰과 자아 질문이 담겨있다.", "tags": ["신입생", "고민", "자기반성", "감정", "사랑", "우정"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p031.jpg", "processed_at": "2026-04-09T17:50:33.226004", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p031"}, {"date": null, "author": "SAGACTA", "content": "잔잔, 은나빛이어01 / 잠깐-닭 잠깐테여01\n\n먼 봄옷습니다.\n나게는 좋 이해하고 불편하고 괴로찮\n그러므 즐라옴니다.\n\n아것은 [나게도이] 잠아지도임 /\n___ SAGACTA\n\n깣은 파형하 / 그으에 지켜을 바로 여러마음이\n\n윽은 인지가 우청 놓은 것 -나\n그먹금 ㅇㅈ, 그러은 우거농의 상이 성증써신다.\n그러은 그리은 폐메의 개인저, 상극이 여극다신다.\n음기깐치.\n\n밤이은 먹이마은 이웬되었 잠다\n윽은 정험이우은 봄떼서 우청 우너의 ㅡ이\n우정 다 딕았다.\n\n혀네어 [?] 마뜬요, 롱저나의 잠이봐산는", "summary": "작성자 SAGACTA가 일상의 감정과 생각들을 자유로운 형식으로 기록한 개인적인 노트. 봄, 불편함, 그리움과 같은 감정들이 담겨있으며 형식적 문법보다는 감정 표현에 중점을 두고 있습니다.", "tags": ["일상", "감정", "고민"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p032.jpg", "processed_at": "2026-04-09T17:50:41.247762", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p032"}, {"date": null, "author": "공재이", "content": "창피로 과거의 방황 중등 소풍어 다는 지루해\n너 도는음 인자하게 짝다.\n문화이중 같서 씨씨 9시 놀어장 자래를 내리고\n던 못하는 여형이 무짓 인다정다\n90조간 M.T는 바라 거봉져.\n내일 독의 잊었 이후 무산에 잠다.\n써선 이러자는 우찬중 솔어서 9시충 저자\n아 우하는 우구정 내려카아만 준\n짖이다.\n인지 이 중나태 반지에 뚜산하니 싶다\n\"사람의 어떠 좋겨는 진정하는 것이\n아니다 - 사우정 종자가 인성응\n정성하다 \"\n- 저너정 2년 4월 나자\n공재이", "summary": "저자가 과거의 방황과 현재의 일상을 되돌아보며 마음의 정성에 대해 성찰하는 내용의 일상 기록입니다. 인용문을 통해 삶의 의미에 대한 고민을 드러냅니다.", "tags": ["일상", "고민", "성찰", "MT"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p033.jpg", "processed_at": "2026-04-09T17:50:48.772193", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p033"}, {"date": null, "author": null, "content": "{\n  \"date\": \"1991-04-15, 1991-04-16\",\n  \"author\": null,\n  \"content\": \"금 버릇같아 방을 시작에 내가 좋아하는 친구들 나가 같다 오는 그래서 버릇 좋다. 여러 우정, 저기 다른 버릇 나가지 앎하는 것 몰 손 맺음같다. 여기 중요한 네가 앗아 있아 좋은 어떤 나의 잠에하 자꾸 본심 같다 가을 네가 나가 싶은데 나하게 보이는 좋다. 그건 여행 어렵지 앎하는 나 한다 생각. 과거 좋다네. 억지로쓴 버릇사람 는 여면 가좋한 버림는 옛 또 생각다 그 자신 내 맘 생각 &느 버림 나가처한다. 나 톱 꺼아인 저 맘. 아 그래도 앗아서 싶어 오늘 짝 꺼아내면 \\\"저러\\\" 너강 나눔 앗아서는 사랑이네 좋다 좋시 나 는 앗아나며 심지 같다 나게 나거어야 내자는 눈 중겸든 좋아다. 는 중심 입어 따라가 심다 샘에 그대 지친 앎는 반다 버림아에 나누암 앗다. 너 어떤 생각겠 어떻 여명 앗다 좋음이 상대 떄쌍은 본갖이 하는 눈 민느 나중겨는 버럽다 관심이 혼심 라궁 버려 른다 -느 맘같다. ___________  (1991.4.15. 이렇)\n\n\\\"얘길이'오 나중같 확정의 앗겠으대  91 확심의 '얘길 마음'으 지각 이름에서 솔다. 마이 지각 내 ... 마이 지각 써서 과다. 하고한 나를통 말고도 나영한나. 다른 확심도 마음 여자 우리 싶거지 사정된다고 샤번다다. 우리 다 같이 는 돌려 버컬곱.  다른 확심이 마음 영금 우리 싶거지.\n\n사항은 중 확 여겨! 몽 '91봄!\n여기 마음을 사항하셨요.\n여기 짐은 사건는 마음 여 쏘 앎다 샤함하 먼을. '짐 마음은 단심 짐이 어나다 중 확 전점의 마음랍니다.\n                                        91. 4. 16.\",\n  \"summary\": \"1991년 4월, 학생이 우정과 관계에 대한 생각을 자유로운 필체로 남겼습니다. '열린마음'이라는 공간에 대한 애정과 함께 봄의 신학기 시작을 기념하며 마음의 상태를 표현했습니다.\",\n  \"tags\": [\"일상\", \"우정\", \"감정\", \"신입생\", \"봄\", \"마음\", \"고민\"],\n  \"mood\": \"neutral\",\n  \"decade\": \"1990s\",\n  \"image_quality\": \"fair\"\n}", "summary": "파싱 오류 - 원문 보존", "tags": ["파싱오류"], "mood": "neutral", "decade": "unknown", "image_quality": "unknown", "filename": "1991년_열린마음_p034.jpg", "processed_at": "2026-04-09T17:51:07.578510", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p034"}, {"date": "1991-04-16", "author": "민아", "content": "깊은 생각 깊은마음. 나의순 때라는 어쩌자국 알았다. 어제 뭔 슬픔 때문인 나투겸? 따뜻한질 고고해서나다다. 깨달은 것 정심아 어져 (죽여 산) 슬픈 인것같다. 또중이다\n\n추사에 외심정은 빠져나가다. 집심은 위리후정이 다른 기슬이 없어 위울 다간 벗서 슬픔 믿어 짤수 없는 나다. 어제 깊이. 순이 위깊을 채우는 우스시에 나도 마음이 맞이 승여마 그멋 수공한. 수러를 마은 약철다\n또, 사슴의 인점에 되는 듯 싶어댈 때 인정에 새도는고 넓 대심정송화? 어제 깊은 그정은 하다다다. 현자는 문를 왜 넣 응응 홉터 산샤다 베끝 괴곡해자 점삽 네 곡-봣은 정집에 삽하게다. 종은 우러 증정하다 어느 때에 바껴다하나 힘 굿찰아 산 우경 못 봤도려 숭해다 옯외 승슬 저면여 강첨다.\n\n도리데와 이자게이 내 이충 곡심의 몯는 사정층에게.\n내 이충은 곡실 한다 다춤다 노션이 어땠다\n몯정하세!\n\n1991. 4. 16 토스", "summary": "1991년 4월 16일 '민아'가 작성한 깊은 생각과 내면의 감정을 담은 글입니다. 마음의 무게, 깊은 생각, 인정과 관계에 대한 복잡한 감정들을 표현하고 있으며, 일상 속의 철학적 고찰과 개인적 성찰이 담겨있습니다.", "tags": ["일상", "고민", "성찰", "감정", "인간관계"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p035.jpg", "processed_at": "2026-04-09T17:51:17.607540", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p035"}, {"date": "1989-4-16", "author": null, "content": "나는 어릴때부터 어떤사항이 좋아나는 말을 늘어먹다가 찰 이았자 느낌이 묻다. 나도 친구를 잃은 사항중이게 설명책중에 소개중래 찰같이 묻다. 왜 오래것과? 내 어떤 친구중이는 비와 것시지요 별명지더 중 아이가 있었는데 늘봐서의찰 생각와 신간 나도 했자 강약다. 기인짜인 생각으로 좋 원장장 아이 있던 곡찬 아이도 찰찬 아이가 이 있 같있다. 나도 이렇에서 대해서 자아신변서 자나의 제강을 없음에 곳것은 인장은 좋 자맨서도 좋 같았다.\n\n나머 창하한 말들다. 왜 창나다창하? 내 자는 창하머 대움다다. 맞이 말창늘++\n나 창히머이 앗다. 서정물, 컴퓨터, 말홍 창히면 문자.(2) 모르랜다.\n나 국자 [불명확]. 자하데미 내나 자는 인장하더는 나 자는 약다. 미친나다.\n나쁜 돌네는! 곡려다자해. 어려 대는 부창해에 몬잔다다. 어수늘을 어싱AR\n곡자머 어저 곡의 [불명확]해다. 광지이 맞다. 내내 무슨 창장다)\n- 1989.4.16. 담아 써내 -\n\n곡찬 찾 요련아이다. 이렇 판창단 기뭔은\n아정 기문이 벡 서려했다.\n입장관자서 찹 당 밥 나무나 달금할면 느겨짐을 더\n네 것던가 무무나 무정나 소못러거 느겨진다.\n우의 창찬 창구줄은 자는 이변 자정에 서 았은가?\n장 웬선여게 찰아가 받아 촉는데\n곡지 빠빠달는 말은 내 자성을 빠빴어 꼭다.\n또 내 소중한 사정늘에게 소중해 저려 됐다\n남지가 정앞 줄든.\n어제는 나어게 또 현나 심정했다.", "summary": "작성자가 어릴 적 친구 관계와 마음의 변화에 대해 반성하고, 현재의 감정과 대인관계에 대한 고민을 기록한 내용. 자신의 선택과 행동에 대한 후회와 성찰이 담겨있다.", "tags": ["고민", "자기반성", "인간관계", "감정"], "mood": "negative", "decade": "1980s", "image_quality": "fair", "filename": "1991년_열린마음_p036.jpg", "processed_at": "2026-04-09T17:51:35.840295", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p036"}, {"date": "1991년 4월 10일", "author": null, "content": "학교는 입장 왔지만, 자신감 어디로는 오백만에\n빠져 정유와 까아) 하는라? 수수한 속 빠졌다\n궁금 자립이 있던 시간에는 수수한 바뀌들 듣아졌다\n처시했다. 학토이 그럼저 앞의 학심한 자지았는데\n오는는 또 우심한은 어떠게 처방?\n홀 어진도 밥공하는 내 못은 놀어 되겠지.\n나덩은 또 어떠겨?\n닫는 줄 푸시게 밤고 깻써고 싶다\n너 저저는 느겨고 싶다.\nxxx이 보고 싶다. 소중한 사랑\n\n바바 내깐 옳다 로을이 나 없는 생각한\n준대 내왔 봤든 나에 싣다.\n제매공 어저 어톱데 왕랠대 앗아나 축쌘과\n한대는 멱어 앙수 찍다. 어저 시정에서는 사랑!\n봉대에 봤의 있고자 최롱가가 되어 되갈자 되는 되로 조금의\n를로다자 얼이쓰 다새 다운을 정변했자는 멈기도 아컸거지 옛다\n여름 봅자서. 어제 어떤처이 봤는 홈흐 아흙려 읽여는 마음을\n태잎 나 왠하었고 있었다. 언친 느으네와 the smile on her face\n라는 깨자 앗데 봤는 것 것겠 상짓했... 봇는 홓려\n맞았자고 자기가 마침었다는 것이 마공 겠는 무 빕겠!\n육자잔 자신감의 샘껏다 다는 영심히 추를 신겠다\n중 어험에 잠여 북활나겠다.", "summary": "학교 입학 후 자신감 부족과 고민, 그리고 소중한 사람에 대한 그리움을 표현한 감성적인 일기장 글.", "tags": ["일상", "신입생", "고민", "연애", "감성"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p037.jpg", "processed_at": "2026-04-09T17:51:48.467719", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p037"}, {"date": null, "author": null, "content": "#2 자누는 쩨/쩨 자는\n\n보고지터가 자본그러라\n쩨디지다은\n어는 좋은 사이 밤은 성공 되어야 한다\n\n자유로 외제\n파쩨 하다는 왔이 잦는\n사설법 왔이\n보고지터\n무더를 받는\n노지 하는 가을\n어그러이 자밤머는\n쩨이 멸어다 서녀잖는 가을\n쌍송은\n진 고동한 것이지\n\n#송4\n내 고동하다 하는 것이지\n\n쩨이 자는 송 셀만들(쌍 잘놀 이다 쌍다\n4월[어이 앉어 입함는 꼬\n[불명확]리지다아 아니다 [불명확] 우리 신어 정잔을 에 오저이 후자성\n빠어 [불명확]아지는 [불명확]이 [불명확]? \n버고 노 [불명확] marathon을 하다가 [불명확] 의저[불명확] 쩨이다-것다", "summary": "열린마음 노트의 일상 기록 페이지로, 작성자의 개인적인 생각과 고민들이 불규칙하게 필기되어 있습니다. 내용이 단편적이며 뜻이 명확하게 드러나지 않는 부분이 많습니다.", "tags": ["일상", "고민"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1991년_열린마음_p038.jpg", "processed_at": "2026-04-09T17:51:56.247321", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p038"}, {"date": "1991-4-19", "author": "6시 55분", "content": "쿠 받을 쏟과?\n&차붐로 써는 향치 앗! 싶군.\n배릿은 4·18 이다. 오늘은 4·19 이다. 모레는 4·20 다.\n와! 정말 죽처 죽겠한 학생들이 탈구나!\n또 다음주는 시험기간이고…\n학교생활이 나에게 주는 삭 의육한으로 다가오고 있다.\n죽과 죽과 대환틀…\n선배들의 대한예도 의육해 지고. 낛 우르는 자유들과의 인사에도 의육해었다.\n죽유한을 남겨야지. 아침은 내 호 하나의 담음으로 매물산기 휠친.\n밤이 없야아지. 그리고 오래 살아아지.\n밤에는 비가 오고. 나는 정명 가고.\n나는 자존 앗되바이 것다.\n1991. 4.19 ~ 죽 몰 : 6시 55분\n\n모자게 바뀌의 이정에 쏟추. 긍정하괠 바자게은 2008 이었찬\n다 해삭은 나 바자게 촉다. 언았의 픔은 바자게. 나 더먼\n종유한다. 바처 구의나 바르 가봐은 나지 배처었이 갓인.\n바메 물친다. 꺼 샤유야잉으로 하던 샤는단다. 긋잠에 죽답다\n나 하자치 의미는 이미. 의미은 뭐허비기네 삽바가.\n샤선 여쌍이 하네 있고. 나 요순 내산살이 그다. 폭 켜구가\n다니게 내 빡 산존송선. 갓 앞아댄 있듀. &모 너운 충음\n긋것 선선이 앗명의 종해다. 샤증편어 궁묘은 촉무고 이야게다\n여원지 저성멸여 차는 바법 거처사하다.\n바버 내네다.\n\n1991. 4.19. 안바.", "summary": "4월 19일 학생운동 기념일에 대한 감정과 학교생활에서 느껴지는 불안감을 기록했으며, 삶의 의미와 죽음에 대해 깊이 있게 고찰하는 내용의 일상 노트.", "tags": ["일상", "고민", "학교생활", "철학적 사유", "4·19"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p039.jpg", "processed_at": "2026-04-09T17:52:13.088545", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p039"}, {"date": null, "author": null, "content": "{\n  \"date\": \"4·18 2014\",\n  \"author\": null,\n  \"content\": \"기분좋게 기쁨이든 괴로워하던 이런 것들은 더이상 이내 꾸족의 괴롭 이내 빼놓의\\n구즈 좀 말씀해\\n몸이 아파도 앞마다 4.18.5 4.18.6 흙하.하줄\\n맡고다\\n9|호텔 자비봉이 아이인 너흥곡이 하는 한다\\n4베인 동층 더이인인 더이 높은은 높은로 됨을 것이 이 제조의 즉\\n다시 봅니다 젯\\n이 홍다하는 맞는 역힘이 겼 상귀빙이 있으 [불명확]이어 나은 기저지어?\\n고물 낮 네이 올 있니다\\n\\n내가 아는 여전 사랑은 왔었다 쌀이 맙\\'이니까 쇠메 봉났다\\n그래 난 싶은은 같았다 내 같음이 가장 중하하젯 사람은\\n있는 이떼메 그 사람이 대한 장금했다 내 자신이 대한\\n심함이 더 춤 마추는 우정가? 전공의 우종을 따르했다\\n사는 아마다 없어겠고 세상이 싶지는 순간들의 길 ···\\n처은로 풀겁더 대보 뒤 선 먼증\\n있었서 해봅은 처봤서 쩌버 쩌젯겠젯\\n내가 앗으로 어렵게 대하쩌지는 잘 모르겠다\\n그렇게 흉하하던 얻음을 난 외우자지 무하고 있다\\n씨는 stick을 중았다 다시는 없음을 쵀 싶 겪이다\\n처짐된 처봤 널따가 내 세마을 유지커젯 남은 잔 벗기\\n가선환 [불명확]이다\\n이떼 모든 것을 다시 정하해까았다\\n제가 \\'열린 마음\\'이 좋은 속머 생샤하아며 제1제1 았\\n(여상시 제3세세는 옛이 이러던 진실로 최하다) 에 대해 좋 씨 것으\\n정기자 이육하는 있다\\n우선 안는 같으 지나간 Europe 지역의 우멈이 더겨서\\n왕하냣다\",\n  \"summary\": \"4월 18일에 작성된 글로, 감정적 혼란, 사랑과 자아에 대한 고민, 그리고 \\\"열린 마음\\\"이라는 학과나 커뮤니티에 대한 성찰을 담고 있습니다.\",\n  \"tags\": [\"고민\", \"연애\", \"자아성찰\", \"감정\", \"공동체\"],\n  \"mood\": \"negative\",\n  \"decade\": \"2000s\",\n  \"image_quality\": \"fair\"\n}", "summary": "파싱 오류 - 원문 보존", "tags": ["파싱오류"], "mood": "neutral", "decade": "unknown", "image_quality": "unknown", "filename": "1991년_열린마음_p040.jpg", "processed_at": "2026-04-09T17:52:27.878079", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p040"}, {"date": null, "author": null, "content": "Europe은 음악 문화에 있어서 시대의 또 다른 기비이 기타이 Europe은 기타 뮤직 번역 관점으로 볼 수 있었다 (음악어 나타났다)\n\n1. 뭐 Europe은 시장의 르네상스 음악과 교회 음악 중심의 흐름들 단순하게 있다. 크래이의 '제르슨'을 때문이면 이것가??\n라이프 새로운산 같은 거인들이 나타난 랑.\n이미 여러 뮤지션의 와에 많은 ABBA가 나타난 것.\n뭐 Europe은 80년대 이후 더 음악 중심 이것에 지구전송\n찹찹하다 있다. 우리 게에 많았는 Yngwie Malmsteen을 봤다\nSilver Mountain, Europe, 그리 1\"그로 배웠는 Sweden,\nKing Diamond, Pretty Maids, Skagarack을 놀 Denmark\nGolden Earring 이것은 영창한 group을 알으니 네벤느로\n비로 INJ의 나라에을 는 위한 Heavy Metal의\n정센장으로 있어 했 것이 비로 북 Europe 것.\n로 Metal 여여 음타 맞이 정정하려 있다 산술는\n나기 용우이 이것 음여 측움다\n\n2. 같은 Europe은 세계 최해의 음악 정정충이 변달다는 것이다\n정정 정정로 쁘소로 나타한 여러 나다들이 쁘제에 있다\n넓 이야기가 세세하더니가 칭과 쁘소만 지정한\n정비 변아지 쁘칭 — Bach의 나다\n여 흥아이는 정정, 강정과 음정해 여칭과 정정나에\n그야도 정정된 로 에 맞는 음여 우는 자중이\n1965년대 1925년 사이 10년9 음악 정정/ 을 음해\n4대 Progressive group 음 배웟 나다\n칭 중음는 정하도 Progressive 는 정향\nHeavy Metal 는 음정한 나타은\n나기고 정정가자 송음는 여정 칭의 나데여서\n자정은 지아 실감정다.", "summary": "유럽의 음악 문화, 특히 80년대 이후의 록/메탈 음악과 여러 유명 뮤지션들(Yngwie Malmsteen, Europe, ABBA 등)에 대한 분석과 음악사적 변화 과정을 다룬 글. Progressive와 Heavy Metal 장르의 발전 과정을 설명하고 있음.", "tags": ["음악", "유럽문화", "록", "메탈", "음악사"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p041.jpg", "processed_at": "2026-04-09T17:52:41.342941", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p041"}, {"date": null, "author": null, "content": "Holdelm, Wallenstein, Triumvirat, Faust, Guru Guru\nAmon Düül II 등 progressive group들...\nStat Helloween은 U.K. Scorpions, Accept, Zero Set\nGroupet Running Wild U2, Sinner 등 NZ Band들\n[불명확] 것. [불명확]한 이들 시즈 [불명확] 있다[불명확] 기타 음악이 [불명확] 듯...\ndrummer Bass 등 [불명확]하면 [불명확] 자아내는 ?\nFrance는 [불명확]에 상은으로 [불명확]여 있지만 small\nprogressive가 [불명확] 변해진 나타남\nAnge, Atoll, Pulsar를 [불명확] Martin Gaus 등\nHalloween 은 [불명확]이 [불명확]된 [불명확]을 듣기도 했다.\n[불명확] [불명확] [불명확]아[불명확]\n까만 metal group 는 Trust를 등 수 있다.\nTrust 등은 [불명확] [불명확]한 Liveworth [불명확]는 [불명확]\n있던 같 재미났다\n\n3. 남박 tanse 에는 Italyst Greece 등 있다\nItaly는 [불명확] 이탤리 나가찾 [불명확]도 있지만\nNR [불명확] 자체에 progressive 받이렛 ([불명확]... )\n[불명확] 받치 20,01,02 더가져 [불명확] Italy group들의\nRole 정한 [불명확] 정 정원 아운 수고 사는 있어 [불명확]\n받다. 까 Italy에) 기초과정 우에 과후성답 듣기에는\n바통에 XIX 에도장한 [불명확]로 정보기 [불명확]여 싼렬\n견제하면 [불명확] 나가 되어있다 어렀도 그 운락정\n세개는 [불명확]된다\n차른 방이 진도 [불명확] 된 있는 adagio을 뭐 New Troll을\n비츠 Premiata Forneria Marconi (SBr PFM), Banco\nMauro Relosi, Mario Pensari, Osanna, R.R.R, R.M.D=\n어젯든 듣는 이중 [불명확] [불명확]", "summary": "유럽의 프로그레시브 록 장르에 대한 음악 평론. Holdelm, Wallenstein, Amon Düül II 등 독일 밴드부터 France, Italy의 프로그레시브 록 그룹들을 분석하고 있으며, 각 국가별로 특징적인 음악 스타일을 비교하고 있다.", "tags": ["음악평론", "프로그레시브록", "유럽음악", "밴드분석"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p042.jpg", "processed_at": "2026-04-09T17:52:57.134756", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p042"}, {"date": "1991년 4월 18일", "author": null, "content": "22(세)는 다나에스를 버렸어 고마운 덕분에 대정찰 니켈리스 과거다니셨을 ᄇ 배웠겠다\n본편 Europe의 문학은 르네상스 과정에서 갓본은 생겨서 했다.\n\n4 육칠천은 잖 깨말의 못은 같 운화를 많이 할장제는 있다. City의 육 (어떤 중심 아래, 자국!) Autograph, 거리 Park 의 산같들 다여저자 삶들힌 다중은 했다\n\n새로 없마 한 잖 안며 많은 내변을 단증기 육자빠의 잖 할겠다. 다른 반에는 Asia-못돈 안마너기 하고 정밀 같은 움밟을 똑 좋 잘겠다 자찰 인정한 잘는 여따을 깨 구원혼내 같다 붕았아 자중 네하는 ※봉이 주하하했는 잘 다하겐 깨 짓짐이 며덤핸 올 나에게 있었요 미집이 병리댄 고것은 봄 내가 발씨 이충 둔 운화을 있찮을 수 있찮 잘 먼든기 주는 것이다 하셨하는 족은 깨싱 싸여나 잘 우한다\n\n1991 4/18\n\n※5 : 국 병 중 에메다 님암 듯의 싶이 전에 - 기B -\n국소렀 했다", "summary": "1991년 4월에 작성된 복잡한 내용의 일기로, 유럽의 문학과 르네상스에 관한 언급과 도시 문화, 아시아 전통에 대한 개인적 사색이 담겨있다. 다소 필체가 흐려 정확한 해석이 어려운 부분이 많다.", "tags": ["일상", "고민", "문학", "문화"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p043.jpg", "processed_at": "2026-04-09T17:53:07.740478", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p043"}, {"date": null, "author": null, "content": "나는 지난 여름 왔을 때 놀라지 않을 수 없었다 어떻게\n(어?) 맞았기 때문에 ... [불명확]\n어제는 서편 거울은 기술이 집중했다 어디가자는 느낌\n\n음은 Asia 의 음악을 찾았다\nAsia 는 우리 음악 할 때대하여 깊어요-우리는 우리는\n제에 우리 대한이 증가자 자연 놀으는 있다\nAsia 음악을 증은 중앙 잎은 중등 서쪽이 돌로\n남 수 있다 내가 작은 있는 것이 찾아 해다는 것은\n익혀다\n\n1. 동아시아의 음악은 지난 역진하다 이이 내전은 유..., 윤..., 지지와\n판관 자신이 있다 먼저 있는 이이 곽이서 넓인 것적\n[불명확]의 음악 강은은 생각했고 많아를 쓴다\nTim, Casiopeia 는 넓지 -서현 수많이 Jazz Band 들이\nOutrage, Title, JESUS, ANTHEM, LOUDNESS, VoW WoW,\nDEAD END 등의 메타? 그룹들이 그강정 지는 있은\n것을 넓 있을 band 는 임이 세계 최강점이다고 해는\n며진이 어나다 있는데 서서 3K 응한 시장 증의 하나이고\nQuiet Riot, UFO, Scorpions, Europe 등 수 많은\ngroup 들이 있는 장을 좋께 세계 무대에 떨은 내렸었다\n우리나라는 지난 방는 기간을 한 많은 Rock Band 가\n곡화했는데 여기 뿐한 것은 남, 귀나라 여로\n한 번 다른 버이 직갓다\n동경의 음악은 내게 비판 자료로 인해 설근초 렸온\n어잔거께 여거 다는이 지는을 추괴서 전어했다\n\n그 음악와 악은 음악은 역시 아저 중심 중의 완은 전준되\n받게 과현어 있는다 음의 음은 스지기 자신 중으로\n[불명확]", "summary": "작성자는 아시아 음악, 특히 재즈 밴드와 록 음악에 대해 이야기하고 있으며, 팀(Tim), 카시오페이아(Casiopeia) 등 다양한 뮤지션과 밴드들을 언급하면서 음악이 자신에게 미치는 영향을 기술하고 있습니다.", "tags": ["음악", "아시아", "록음악", "재즈", "일상"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p044.jpg", "processed_at": "2026-04-09T17:53:25.089836", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p044"}, {"date": "1991-4-20", "author": null, "content": "동경 4 기숙 경을 넘어 가는 연장(의)인 누워서 우리를 이루고 있는 나머지 사람 처정 연결을 그 경향은 서게에 끝났 있고 Beatles 의 멤버였던 George Harrison 은 한국 구종을 싫어 싶 넘 넘(음) 좋은 만큼 받 있다. 자치 버튼 정철 해 주는 범생(음) 을 거운 모든음이 여전스럽지 시끌 뭭 놓 있다.\n\n2 장군 서아시아의 온돈 여김 비달 갈증 자세팀 있은 것 하깎까싶 정자져 정팝 단편 새로 곡정에서 뭄뭄된 Progressive group 인 Asia Minor 의 멤버들이 서옴 서아시아의 뭔더 우기거깟든 있어다.\n\n③ 서아에 상서서 바마한 자증 혼메 것 너 갈신 누쳐다 정은 법이는 원더 나나 등댁 앞 여생악 서 죽체제 응은 바터홀 좋 그 여름야 죄 나갓 응닥홉 자발69으 여싶 법려다", "summary": "George Harrison과 Asia Minor 등 음악 그룹들에 대한 개인적 감상과 평가를 기록한 노트. 한국과 서아시아의 음악 문화에 대한 관심을 표현하고 있다.", "tags": ["음악", "일상", "감상"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p045.jpg", "processed_at": "2026-04-09T17:53:32.942189", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p045"}, {"date": "1991-04-20, 1991-04-21", "author": null, "content": "첫 번째 항목 (1991.4.20):\n어떤 사건이나 상황에 대한 성찰적 기록. MT나 학과 활동과 관련된 내용으로 보이며, 누군가와의 관계나 감정에 대해 기술하고 있음. \"나는 부끄러워했다\" \"나는 외로웠다\" \"다시 생각해보니\" 등의 표현이 있음.\n\n두 번째 항목 (1991.4.21):\n더 긴 분량의 성찰적 글. 학과나 친구들과의 관계, 자신의 행동과 감정에 대한 깊이 있는 고찰. \"좋은 마음에서...나는 정이다\" \"욕심 때문이었나\" \"할 줄도 없고\" \"공포심이 드는\" \"두려움\" \"서로 다른가\" \"나는 그래도 고마워한다\" 등의 표현들이 포함됨. 자책과 성찰, 감사의 감정이 섞여있음.", "summary": "학과 활동과 관련된 개인적 감정과 관계에 대한 성찰적 기록. 자신의 부끄러움, 외로움, 그리고 다른 사람들과의 관계에서 느낀 감정과 고민을 솔직하게 표현하고 있습니다.", "tags": ["고민", "성찰", "인간관계", "감정", "자책", "학과", "일상"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p046.jpg", "processed_at": "2026-04-09T17:53:38.303878", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p046"}, {"date": null, "author": null, "content": "{\n  \"date\": \"1991년 4월 21일\",\n  \"author\": null,\n  \"content\": \"기억의 벽들에 기대 손 모을 새야 짐날 우리 등 뒤 울려잔다. 딴다. 어떤 어떤 농길하게 중은 누므 나쁜 서너를 딴다. 오래잖아 고려들 이다자한 것같. 짤 겨찰을 걸은 수 있으리라고 비고 어때들 싶나야 딴다. 벽 않은 사랑들이 그자의 의미를 앎으 않으리라고 딴다. 모떠 (Dolten) 의 \\\"Lost behind the wall\\\" 이라는 노래. 짤은 Friday Afternoon I on \\\"지렁씨이 마경싹을\\\" 이라는 노래떠 짤 Pink Floyd 의 'The wall' 이라는 것들의 짤 회얀렌의 \\\"By\\\" 이라는 앎시과 싶음. 리라의 짤 상당떄 싶에 대한 곳 지켜저다. 같은 지킴. 어자들 등 못압스려! 하세나는 고가을 깨 하려면 구차형 앗지이 했는 누깊을 느낀다. 벽을 너머지 응아오 싶왔다. 되었 내깜했다. 뭐다곡 벽은 너머 꽈처는 웅치고...\n\n1991. 4. 21      로진\n\n나 음는 시간을 씨깨나 본다 [이시] 시. 고시\n든데 공카는 자나는 아챘다 거킹워다\n오주 거켝쳤으면 [시의] 멜까 -비는 여기 어지 받이 것그야\n싸서 뮤지 여저 나 왜저 바랑 낡다\n-지금 딫 =\\\"연공나가 와서 당내렁다 나 지음가지 공중으 찼고 있었다\n놓아 가고 앉다 그럼에 같 놀어 맞다 내 진구흔은 다 네때! 나방 앞짐 깅당이다 나 있 자태이게 (디지좀) 싶로싸다.\n나 오 시간을 (에) 깨 나 왔다 [이시 시 고시]\n싸버 있이 왔다\n뭐 재비왔 거 찬다        - 잔\n\nR.S. 로켓야 / 이룬깬 룬 노내가 좋다 싶르뜨 [불명확] (Jerry Mares) The End of the World\",\n  \"summary\": \"1991년 4월 21일 '벽'이라는 주제로 쓴 일상 에세이. 기억, 사랑, 벽의 의미를 철학적으로 성찰하며 Pink Floyd와 다양한 음악을 언급하고 있다.\",\n  \"tags\": [\"철학적 사유\", \"음악\", \"일상\", \"감정\", \"1990년대\"],\n  \"mood\": \"neutral\",\n  \"decade\": \"1990s\",\n  \"image_quality\": \"fair\"\n}", "summary": "파싱 오류 - 원문 보존", "tags": ["파싱오류"], "mood": "neutral", "decade": "unknown", "image_quality": "unknown", "filename": "1991년_열린마음_p047.jpg", "processed_at": "2026-04-09T17:53:52.752008", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p047"}, {"date": "1991-04-23, 91.4.23", "author": null, "content": "try once more like you did before\nSing a new song\n\n알수 정도 수정해봐 L.A 까 빼기\n\n잔뜩몬! 계 에메 주정해봐는 그렇도.\n내 경우 본나 끝어 오다. 우하! 뭐 나대 롱짜?\nWhele lotta love 빠고. Rock n' Roll 는걸이 롱짜?\nX비명 6시에 몱집 기신 305년 중장해 중장해버렸 지현\n지비는 밤차 서술죠 염곡이 굼룬찌 내비 다. 막곡이.\n내는 고중바 다 염곡이 하정다\n내가 아저던 b시에 것나 6시 3던해 롱해에 모자하정다.\n내가 이기나 내가 이기나 중백차 중달아야!\n나는 내 문제에 도자조 봇 데나 너는 7봉게 훼바라\n내봉을 자리를 먼지 못하면 자충 훼버렬도 모룬다\n나의 참여 움 그롱훼나가 했다\n자 : 독청나다\n\n1991. 4. 23 아정 로석\n\n91.4.23.\n여전조 이 법정 소중이는 — 놀치는 데까 우켓다... — 딴바라는 제 &\"날응 영곡 받으\"이\n외움은 창 맞았다. 반성다다. 하기 촌충다 자 학금의 영곡을 의심고자 여겨다고\n자신했지다. 겟났 붕고다다. 이제 정나뵈 놀자사 참녀의 영곡은 봤도 난 잔다도\n안했다. 이 나뵈자다. 잉젯의 식정까지 빼어고 사사 참려션에 처녀면 넓이\n의롱 가다런 껴이다. 어쨌 내가 가야지. (롱 납정하다. 난 창승\"로다 완도\"는\n런주네 껴사림을 기는 선여 롱자른 고독론 껴도다.)\n네곡은 서열이다. 하지만 곳중화자는 달 아자른 벽이 난 껴봣 낭질을 느껴다\n내도 청궤 콩는 — 환곡 홱자 위한 —을 왜도 했다. 그래나 지의 내는 다시\n농었는 우정이 방했게 그상한 변다. 사랑이다는 나가는 혼상에 적게 받으라지 못하\n껴다. 난 데자나가? 벽성이 깉을 이렇하고 앖다. 앞도 싶곡 선도에 대한 곳은\n앙겨을 뻘이다. 데로하지 뿌는 강음. 마저 졸 정자을 뻘껴 달다.\n경보 욕하는 혜야하는 콤는 이렇게 야나가 난다. 서렇기한이란? 그런 는도엔음은 못시\n카능은 서정 정비댓 하는 이뭬이 껴잔 이상하다. 아나. 내가 이상하나?", "summary": "1991년 4월 23일 작성된 페이지로, 위쪽에는 가사나 노래 관련 메모가 있고 아래쪽에는 감정적인 고민과 성찰에 관한 긴 글이 작성되어 있습니다. 연애, 사랑, 변덕스러운 감정에 대한 자기 성찰적 내용으로 보입니다.", "tags": ["고민", "연애", "감정", "성찰", "1990s"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p048.jpg", "processed_at": "2026-04-09T17:54:16.566235", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p048"}, {"date": null, "author": null, "content": "정말 이렇게 좋은이 옛다 것이 부러웠다. 자라면 알뭔 나겨다가 잠깐 버렸으면 좋았으면. 이제 바뀌 따스고 미치게 다 잊혀진게 같다.\n아니 아니 강요하지 말자.\n사실 엔딩은 ( 왜다던지 이제 아서는 본 갖새(!!)) 처럼 이것 엔딩은 앎부 뭔안서 뭘춘말씀 뭐를 뭐다 그거 속에서 사는것은 측계낼. -1993-\n※ 광도 ○ 혼자 시대 엔딩랜테는 이 갈궈 학정의 강뵈 언케 상감선은 '많 롯기'가 잊핕이에 자처고 있으니 와무즐을 뭔잉시카을 ...\n\n내멋보디 시절이다 그대 중을 싶야주\n곤은 거나는 기라리던 우리나다 문장 -\n솔째 우리 나다 음악 이러른 못쳐 나는 싶은 머마하자\n혼녀볼뼈 · 강ㅁroup council 송이 잘했다 그러나 그것은 저정 앗는 의려한게 대는 어떤 의어는 뭐먼 누 앗겠나 뭔족 거나 누들의 가죽한 음악좋 열힘 들은 뭐이 강하이어야 할 것이다\n우리 나다의 Rock 앞에 가항 쿨 천했겠이 되 자는 [10여대까]\n이어 90년대 끝을 이어지는 때마다 붑다\n강정정으로는 경설가정된 이 기타에나는 Rock을 원죽 자젯 정깨\n내대 붓어 같은등은 의서 묶은시겠던 것이다\n대푸정 group으로른 죠 하면의 \"마나다\" 김 칭정의 \"신송\"  \n김 우정의 \"같은 것인\" 꼬리 \"중심냅\" 등이 있다\n어싸야 눈 있었이 Rock 앞 띠로 마사이 듯 90정야음은\n곡혜은 정정너인 Sound를 주지하고 있던데\n10렸이 는게 기난 자중으로 그듯의 곳해는 정정불하기\n있다 김 과던 (guitor) 고 하문 ( bass /voca )\n못 저선 (drum) 0? 여혜이잔 완탐한 든서 sound 어다.", "summary": "1990년대 대학 시절의 음악 동아리 활동과 밴드 구성원들에 대한 추억과 감정을 기록한 글. 그룹의 음악 활동과 멤버들에 대해 회상하고 있습니다.", "tags": ["음악", "동아리", "밴드", "추억", "90년대", "대학생활", "그룹"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1991년_열린마음_p049.jpg", "processed_at": "2026-04-09T17:54:36.507555", "volume_id": "1991년_열린마음", "volume_title": "1991년 열린마음", "year": 1991, "page_label": "p049"}, {"date": "n 을묘는 중째 는 킹장 세혁 과.\n\n(⊂) 안글 사이에서 우장-구장 왓는 아닷 문 마국 의\n강의묘광 웃으우서 를이우고 그롭의 탈밥 욯중\n들에게 미지는 자지적 (아국 독자적 흘저 세국\n으국 장장 하지 웟짓 미을들이 나왓서 흘을 중\n꾸훈 가긴, 을 의 플 웟여 '미국 홈분'을 속중 될 하고\n자 하는 (?) 인국 중상의 사구 요다다.\n\n우중 강이 키에 돌웟우는 수네 톨 혼 홀을 중에\n는 '중, 도래응도 톡임을 꺼하지 홀샤요?'\n('아닷으 B4 톨도 왓지 인다 요?')\n('홀사적 하롱이 안족 초삼 화데')\n이최 걸롭이 안옷니다.\n\n아더은 우리나라의 독스찬 수 롱을 교정 하지 왓고\n다등 좌 톡은 기게 중인 '째련중 여롭 뵘' 을 무른\n상찬 사친에 도롭 하기 때나옥이 아나까쵸", "summary": "여러 인물들과 관계, 그리고 국가 간 문화적 차이에 대해 성찰하는 내용. 미국과 한국의 문화 비교와 개인적 고민을 담고 있습니다.", "tags": ["고민", "문화", "인간관계", "성찰"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1992년_열린마음_p013.jpg", "processed_at": "2026-04-09T17:59:03.742868", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p013"}, {"date": "null", "author": "null", "content": "우리나와는 저럭에 의해 족동강이 나고 아궁도 그등 의 영향력 때야래 자지욕 도모 욕승나다 거멀다라 쨀 자다도 좌죄 딩하고 못 것으며 그더콘 좌죄는 비구 느플지들에 극찬죄이 것는 아쉽나다 우리는 웹제 시대 때 자죽의 야들이 독죄군의 토이 와천과 흘자게 싸우던 장염을 TV나 족에서 봈읍 본 낱았습니다. 아자 노동자 여왕이는 우리 똘자는 있의 보라는 조호 상공이 의식칠은 자여은 보국 노동자 들의 좌죄에 흔을 략쳐 자죽중은 조국 은 자설 찮은 때 똘지 중을 까요 - 족죄한 데혁, 이가 - 삼싱사삼나다. 호중 께 당비 자졸썩다. 수라 직지저서 인의 어라 아다 그닥 찬자 덜저다 우저서 씬싱하자 인자다 고내 있중이 떠노읽 컿읍 훤렬 있었다. 나는 법법 10,5) 김상륜 ('우')가 11월 느려좌은 6박 가정점에 나웠금 109-20 B 김장옷 자짱 염라리 나우리잔에 쳐 분신이 염전도 염저길 우구나 콰리, 모두 짝팅 지자한다. 70. 우리한 데박 자앞 잘 외였다 충 1 좌나는 좌짜", "summary": "[불명확] 손글씨가 매우 흐려 정확한 내용 파악이 어렵습니다. 사회적 이슈와 개인적 생각, 날짜 정보 등이 포함되어 있는 것으로 보입니다.", "tags": ["일상", "고민"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1992년_열린마음_p014.jpg", "processed_at": "2026-04-09T17:59:15.667842", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p014"}, {"date": null, "author": null, "content": "하하하! Campus Life 에 나타 났다.\n인제게 정복을 위한 최첨 발걸음!\n\nP.S. 저기 나온 말은 쉬워서에 되어간다\n         시험에 나온 것\n\n나 ○ 미 국수 는 는하고과 도되어 마침을 받았다카다\n○ ㅎ 아 나 ? 나 N. 것이네\n그러나 · 대학이라는 나쁠 정말 흘좋을 것(약)\n미즈도 (○ 점 보 좋다카다\n암 / 은 / 는 나비는 띄은 삶이\n도이어 궁궁을 짧짧다 · 여겨자 된다\n그렇다 밥(짓 봄) 의곡이", "summary": "캠퍼스 라이프에 대한 일상적인 감정과 생각을 표현한 메모로, 대학생활과 시험, 그리고 일상의 소소한 순간들을 담고 있습니다.", "tags": ["일상", "캠퍼스생활", "대학", "시험"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1992년_열린마음_p015.jpg", "processed_at": "2026-04-09T17:59:24.853459", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p015"}, {"date": null, "author": null, "content": "가을이다.\n뭐와 딱 같과 맑한 수는 없지만 쌔죠 바뀌이 셀레이는, 공중은 솔솔 하리도 한 가을이다.\n작년 이맘때를 새각래 본다. 그 때는 뭔을 뭬해 산고 있었는까? 당졸시방에서는 은하나구 넓어이 노른데 훘뜻어 한묻 우유 떠러커[불명확]된 활련 교사 윽서 뜻다 하지인 사을은 더 빠른게 낙더이 창하는된 간다\n나는 Y.Y로 북터 왕정전 넓단 줄 알았다. 그 없이도, Y.Y을 생각저 삼야깓 수 있는 줄 알았다.\n하지인 그것은 의설정으로 내가 새각지게 피한 것이저 결고 내가 그을 있어버런 같이 아버얭는 줄 깨달았다.\n차약매서 Y.Y을 바꿔정지과 눈을 광아버린 나을 어떻케 설정한 수 않았가. Y.Y을 읽거왜 사칠 아이듬에게! 새각래 보니 나의 진심한 갖죠이 진저 않었던 것 같다. (?) 미련하다.\n정알 이제 껴서 나의 사랑에 가장 큰 여하을 미치고 귀제를 해 곽거는 그너가 아닌가 했다. Y.Y떠분에 비흑 낭무다 1년 윾는는 더깠지만드.\n하지과 Y.Y떠분에 자신의 몭래을 윞해 처정한 저요도 전선을 다시는 그런 사항은 없다는 것을 깨달을 수 있었다.\n나는 밤떠 Y.Y에게서 기찬깜, 정알, 진짝도 벗어 낵. 것이다.\n\n※P.S 정감이가 시정못 법네 나타는 B.S.\n노태웅. 김 [불명확]심 김 대중. 저 자켠. Bush. Clinton. Perot. 바바라 부셔.\n북창의 김 [불명확]. 김 [불명확]. J.L. W.M. (원) 등등\n고아을\n\n우리들의 꿈과 희망 93 학번 씨발뜻!", "summary": "1990년대 가을날 과거 그리움과 특정인(Y.Y)에 대한 복잡한 감정을 기록한 개인적인 일상 노트. 사랑과 자책, 그리고 성장에 대한 성찰이 담겨있다.", "tags": ["일상", "고민", "연애", "감성", "성찰", "93학번"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1992년_열린마음_p016.jpg", "processed_at": "2026-04-09T17:59:39.247005", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p016"}, {"date": "1992-10-19", "author": "홍혜", "content": "사랑이 끝났다. 못자라는 떠도나요?\n\n다들이 긍ㅣ음에 것다.\n\n나도 나는 상태.\n\n그 옛모 아냐ㄲ시나, 난 느껴지지 솜이\n표우싶다.\n\n1992.10.19\n홍혜\n\nP.S 판중하면, 삶이 가승하면 - 영감마음에 오자 오래기는\n살기가 건 징담 뭐나? 국가복자 그래?\n\n1992.10.19 (나)\n아! 여자 여자! 쌕 받아져 나는 쌕 받아는 손이나\n자조 요우자\n\n쌌 풀은 우울했는 16시(중) 4분 모숨사로 좋아한다.\n\n바다 찬숨들어기 바꼔 짐은 먹 없다.\n\n[불명확]은 풍 먹길 ... ??? [불명확] 봤", "summary": "사랑이 끝나고 힘들어하는 마음을 적은 페이지. 여러 사람의 필체로 위로와 응답이 이어져 있으며, 감정적으로 힘든 시간을 보내고 있는 상황이 드러남.", "tags": ["고민", "연애", "감정", "위로", "일상"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1992년_열린마음_p017.jpg", "processed_at": "2026-04-09T17:59:46.006524", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p017"}, {"date": "1992년 10월 19일", "author": "토모오", "content": "미세한 콤플렉스의 악독이 뒤따돈 거대한 삶을 이룩고 옆쪽 꽃이너 나쁜 삶고았다.\n인물관의 좁은 터에 터키의 인 서회적삶에 문을 묻고 칠기하된 카를의 수능들처럼.\n나쁜 황창의 단문머 가운 카다다기다의식 삶다.\n나 내까 삶고였것 꽃을 흘어했낫떠 -- \n그리며 내가 이젠닭운 쓸 것을 묻드러 북정하고\n되찬했고 쓴은 비표여지 은댓데며들다.\n그러나가 내가 [불명확]과 말응 아닭린이머기- 인은 혜초여다.\n쳐죽다플니고 나쁜다저 케유를은 ⊙ 피합앗있다.\n그은 같음이다 • 굳고는 면회향 • 나쁜은 수종화 •\n쎄밤 ----\n문우을 잘저나기를 -----\n삶응는 기대콜 같다와다\n지가 얀는 기회에 펴싸있은 쉬가-⊙-기다▼\n머러가 아운다.", "summary": "개인적인 복합한 감정과 삶에 대한 고민을 표현한 일상 노트 기록. 자기반성과 앞으로의 삶에 대한 다짐이 담겨있다.", "tags": ["일상", "고민", "감정", "자기반성"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1992년_열린마음_p018.jpg", "processed_at": "2026-04-09T17:59:58.593538", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p018"}, {"date": null, "author": null, "content": "여등이 이새겨나 조 와는 (1) 내 음악 마음을 짧아피 위헤,\n그건 나중과의 관계은 어떠나 정도의 답은 내용을 다시 순환\n담은 서기 짧이 「T10 강하파」, 보책저자는 처치나사 권속울셀 와는\n국정되자 여깁은 어떠는 와하쎠 달라져를 다는 써잔자.\n우리 아우 이내 와과, 여과 화는 꼭누다. 구하를 잖지 조쪼 우라나샤\n자는 예빠 (1) 조.4 9초족과 잠께 여뭐으로 화헤 거영다.\n\n강하뵤 되게 '빈주겨지 제항' 등 '빈주저너우심' 이야는 뮤예 와는\n관는 지데충의서의 강섯는 다시 하별 어쎠는깨깨기 찰다.\n고이는 궁겨를 곳어 많자.\n\n나좋는, 치사나자, 고리 다하움한 MBC 나곡자는 2내\n55년 쌌세는 - - - - - -\n'민주정과' 라는 더 만든의 이음은 같 사게 (2) 체 종 왔다든\n좋는은 기기면 인음자. 다발 고도 '번역 한우문 ㄱ 솔아는\n강려작 과 그 앞', 으 미자는 자하인사 라는 명법 사것이 객엿을\n한자서을 분이다.\n\n좋인은 정심과 이음은 데이했다.\n자새은 울려 긴찬 죄는 긴저밝자.\n우리다 싶께 시 잞는 좋 가 누겨낼!\n그는 우리다 합께 시 잞은 좋 가 누겨낼!\n\n그네 어뫼 정심자. 공나는 정심송아 이음은 데이았다.\n민중때도로은 이왔 이내다.\n쿠 궤여미 이은 샤다자. 그것의 정심이 이내!", "summary": "작성자가 음악, 방송 프로그램, 그리고 인생의 의미에 대해 고민하고 있으며, 친구들과 함께 시간을 보내는 것의 소중함을 표현하고 있습니다.", "tags": ["고민", "음악", "방송", "우정", "일상"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1992년_열린마음_p019.jpg", "processed_at": "2026-04-09T18:00:12.952888", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 인적인 고민과 감정이 드러나있습니다.\",\n  \"tags\": [\"일상\", \"학교생활\", \"고민\", \"방학\"],\n  \"mood\": \"neutral\",\n  \"decade\": \"1990s\",\n  \"image_quality\": \"fair\"\n}", "summary": "파싱 오류 - 원문 보존", "tags": ["파싱오류"], "mood": "neutral", "decade": "unknown", "image_quality": "unknown", "filename": "1992년_열린마음_p021.jpg", "processed_at": "2026-04-09T18:00:46.407110", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p021"}, {"date": null, "author": null, "content": "무는 세상은 깊어졌 못하다. 맞은 맞은 서는 옳하는 것는 이졸머버는 맞는 쉐쳐 앓는 처럼 + 과정머의 겨냥였으로 하다. 깊데이 때 이것를 받는 아르지? 3, 10, 14 손\n\n머리가 너무 복잡하다. 속이 아파졌서 묻는을 매일 (인붕(깊서야 피하셨다.)\nAnswer: 깊야 3절을 봇는 5불천선은 깍 들으로와 넗원을 나가고 있다. 별원의 속을빠서는 누이 dd 롤아 속합별원 더는 각에 넓혀졌다. 제길, 눈이 더무 보이질 앓으다. 책충 왕을 수가 없다. 병원 의사능들은 10년동안 극도족 궁부 해서 우다 별기위낸 눈여 시별김 삼학하고, 나뼈표, 못되표, 파련적확 높을니다. 로는 또 그런 병원댈 가야한다.\n\n내일 언기해 봉앞된 신정을 받으려 간다. 나는 지금 돌혜 마칠 근대를 깎저, 아니면 내버테 깔지 식갓하게 머러를 극려고 있다.\n\n놓다 지금 나게게 누는 즉실이 우 있는 특권이 차이진다면 - 3첫반 - 나는 이 사람들을 가자맺이 즉여버릴 것이다. 그 많은 능정처침가지. 전 두 환, 노 태 닭. 김 던 삼\n\n제발 빨리 날부 동일을 혜서 직정제을 머제서원 5, 있다면 나는 그감상은 맞실이지 않고 대목렷으로 빨는 것이다. (당 영상은 제버.)\n\n목요일은 더 저정하다가 힘들다. 깎씨도 우칠하고.\n\n현포다. 비가 쌓 자리 잔지 써서 미난다.\n\n별원에 자서 궁심밖은 후 비는 롱팍 맞고 다시야서 쌓다.\n\n시간와 또 오채고 한다. 제른.\n\n지금 관점에서 18세 특표권 굳슬을 의한 특깖을 지혜인다. 당연하 않이다. 깐 >0세 신기원은 죽도 자대적 정정서주나는 우리나자다 롯본, 그러고 롯봐 파하젯 나자빠이다. 안약 표 3과 대학 나뼈이 트드렷이 있다면 → 우가 머져달을 깍왕는가! (3렁 구? 물하!)\n\n나에게 투문항 쉰터를 달라! 특표아버면 죽음을 달라!", "summary": "마음이 복잡하고 신체적인 건강 문제로 인한 고민, 시각 건강에 대한 걱정과 병원 치료에 대한 불안감을 토로하고 있는 일상적 고민 기록.", "tags": ["고민", "건강", "일상", "심리", "불안"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1992년_열린마음_p022.jpg", "processed_at": "2026-04-09T18:01:07.554956", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p022"}, {"date": null, "author": null, "content": "광당광당하며 하루하루 지내도 계절은 옆지 않고 찾아온다\n누겨진다. 튼튼 히 음을 짚고 쑥이지는 안 풀이 행살 속에서, 낙영이 포근하기\n관사누는 돌백쥐에서, 찬우의 예기치 못했던 되저 한 장 에서.\n예전에 입벚축처럼 했던 방, 거슬은 있고 있었던 방이 다시 떠오른다. 그럼, 처했화게\n우는 하루도. 우위의 모든 것들이 나에게 요마은 곡씨로 다가온다\n오는 아 람 간의 소통과 이해에 관해 성찰하고 있습니다. 여러 관계 속에서 느끼는 감정과 깨달음을 기록한 글입니다.", "tags": ["일상", "고민", "관계", "성찰", "감정"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1992년_열린마음_p024.jpg", "processed_at": "2026-04-09T18:01:46.996226", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p024"}, {"date": null, "author": null, "content": "{\n  \"date\": null,\n  \"author\": null,\n  \"content\": \"아양환 성장과 사랑이 우르렁 우 왔 사위 우차하 바하는 사랑의 삶 도숨이다. 지금 이 시점에서 마니 태변이 인창한 시점에서 시우가 자기의 족소환 주장하는 칫 솔저잔 국한정이 때찐도는 되겨 있다.\n\n안와 으령제 되카된 기저 대시요다는 터로 떠비왕이 못 재아시켜에 완미 앗칠 것이다 궁하창은 실소 나토 앗등 우으 겨의왕다. 서세의 싶해는 와늘이 차지 왕왕단.\n\n머제나되는 돈 조화된 애키울 쏘갑다 쏙 단다.\n\n영지았으면 부정 가을은 다는 사왕을, 되요의 하는 사수능이 굳이 보인다. 로여언 자선에게 [불명확] 되어봐라는 가을에 대해 나아가 성영찰을 봐서오 앗지 앗은몬, 쌀 닥댔요 댈아저오 스삶환 바깥/ 붕 요정은 거 엔면 삭선회 경삼삶일 누 있다. 화지만 수인 가을은 독서의 게정이다 강정정으로 되다는 달을 넙 닷이 되었다. 그제 자선은 강상정으로 왜야 기울어 어즈인다는 것으로 병환 저 어엄까? 가을은 촉도 계정이다 못 초식이 애찰 버즈은 자들 들다, 아소싱 다풀 이선에 언마나 아즉다우겨! \n\n이영지 중은 게정은 휴러자시에 난뼘게 본으낟다.\n\n자선의 마을숨을 자것회 왜난 등랴 보자.\n\n지금 사랑들이 되는에 하는 이욕은 제자기 마양환챗자한 중어 앉차게 요긴 버서 조 더 나는 선환은 나마앙수 왓는 제지으 마를었음 솔깔려연 싶경 한\n\n그러므 수 그 으인 화는 새화 욕에서도 최명하게 살자 이도는 으려깁자. 다는 좋은 것이 있기 바랍니다.\n\n쌀데못는 땀 맘 써서 되어\n\n되요하내는 수려.\",\n  \"summary\": \"개인적인 성장과 사랑에 대한 삶의 철학, 현재의 시점에서 마주하는 변화와 결정에 대해 서술한 일상적 고민과 성찰의 기록.\",\n  \"tags\": [\"고민\", \"성장\", \"사랑\", \"성찰\", \"일상\"],\n  \"mood\": \"neutral\",\n  \"decade\": \"unknown\",\n  \"image_quality\": \"poor\"\n}", "summary": "파싱 오류 - 원문 보존", "tags": ["파싱오류"], "mood": "neutral", "decade": "unknown", "image_quality": "unknown", "filename": "1992년_열린마음_p025.jpg", "processed_at": "2026-04-09T18:02:02.912562", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p025"}, {"date": "1990-10-20", "author": null, "content": "넋을 잃어, 아우래도 나도 느꼈던 정심이는 못 쌓게 될 것 같다.\n난도! (와서 써가주면 우리중은 한은운거같...\n\n[불명확]는 '또 4일샘' 을 싶다.\n바꾸 며알 재증 - 맞은 여한둘이 스꼇있단 - 눈솔한 몸이 [불명확]있다만\n고래도 재칠은 여한짤다.\n여한 누승 여는 정겨어 있다.\n\n교뭄에서 바꾼서위은 집느데 정질이 처지 도어있다.\n사실판 - 0있에 나우자서 바뀌돌 다 밤증라나 빛옳은\n달자원...\n\n한 우짓 한 여러 글들이 섞여있고, 마지막 부분에는 영문으로:\n\n\"She wore a blue velvet.... And I can still see a blue velvet through my tears.\"\n\n1992.10.31\n황B+7명", "summary": "1992년 10월 31일에 작성된 동아리 방명록으로, 여러 명이 참여하여 Club 활동에 대한 다양한 생각과 감정을 나눈 페이지. 마지막에 영문으로 감정적인 표현을 남겼다.", "tags": ["동아리", "방명록", "추억", "감정", "1990년대"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1992년_열린마음_p028.jpg", "processed_at": "2026-04-09T18:02:39.240784", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p028"}, {"date": "10/22 (월요일)", "author": null, "content": "서로를듣기...\nY.H. H.H. H.T. 2건2 중요한메세 우리의 문득보호 신뢰를 잃어버렸다.\n그렇다하더...\n\n침대에자국.여름아. 내입이면 딴 새로운 자기가되 아쳐을 받아우너아. 되인면 가짓 나라내...\n\n_약수_\n\n10/22 먼청점...\n정때 깟쭉에서 깣을 대충한 원 지자는 위한\n사명중은 한 겟겟다.\n깐자기 저정한 구정과 함게 우정이었 여부이\n위메을 카해 른짜도 있었다.\n힘차게 머려첩력 우헤는 윤여하고 있었때\n받 우영에 서법초하는 억울의 그 승겠진 윤글은 읽겠다.\n개먹 바더는 표시이 스저지나갓다.\n그러면 왓도들의 머자섰던 수덴은 지지하는 박스\n그러면 못보 그려면 뭬짱\n그러면 서법구은 \"바척\"의 의미 겻신 윤글.\n그러면 뭬섰던 수덜을 그러하는 다쳐의 학쌩들.\nㅇㅇ! 내노에 이떤게 높일까?\n잉섯을 더 개꽃이 ㄹ아야 겟다\n\n좋이아는 에니 그 개짓한 열글을\n노려을 뭔고 수잔이는 자신 있는 다\n하지만 그들을 는깟깐이다 몸이이 음흘가는\nRemember! Do the Right Thing!\n이명한로은 생각하자!", "summary": "10월 22일에 쓴 노트로, 신뢰를 잃어버린 관계에 대한 고민과 올바른 행동을 기억하자는 다짐이 담겨있다. 여러 상황에서의 감정과 선택에 대해 성찰하는 내용이다.", "tags": ["고민", "신뢰", "관계", "성찰", "일상"], "mood": "negative", "decade": "unknown", "image_quality": "fair", "filename": "1992년_열린마음_p029.jpg", "processed_at": "2026-04-09T18:02:51.207397", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p029"}, {"date": null, "author": null, "content": "{\n  \"date\": \"1992-10-20\",\n  \"author\": \"홍원웅\",\n  \"content\": \"1992년 10월 20일\\n\\n다같이 탁풍이는 곳 좌터 하셨어 좌아왔네\\n그렇게 아서 우린 뭐 찾멀등 곳은 찾방 가는 어네 밤 그등의\\n쌔근은 헌픅 , 그등 내면죠), 없아마흐는 방 는온으는 복죽뭉는\\n것들은 보내 뒤여서 좋아간\\n\\n그러한 탁풍이) 왔었이문 간정 이옷 난 2등은 싸아완로\\n그러 한 것좋 -)는 그럼은 이혜하는 받아송국 있다.\\n\\n도되여 닥징든이) 더 싸야스겸다.\\n\\n작고미 다 뻐 약자의 뒷봉치은 어들어 있고나 밠다.\\n\\n쁘나 변런 신켱 쎄징 곽돈다. 세싸 상아가머서 됬 싸나등\\n놈이 한 처는 깟는 한 석 곤는 쎄은 있되 왈다.\\n\\n쏘하면 처봉이) 저앉은 죠리 합다 히혀나는 마야 뭐 이족이 묻하\\n쏘하 완곱은 뻬다면 밤석즈 죽다.\\n\\n아들어 / 있마 너 아미르 청은 떠 쌔양,\\n공듭에겐 간은 깨지도 곳은 하들를 하벙서 어네저너 복깡치는\\n에 넓너 교시어 댄깡는 싸뭐 있는 후 해서 꺼이어 곽숨싸진다\\n걸는 .......... [불명확]\\n\\n", "summary": "파싱 오류 - 원문 보존", "tags": ["파싱오류"], "mood": "neutral", "decade": "unknown", "image_quality": "unknown", "filename": "1992년_열린마음_p030.jpg", "processed_at": "2026-04-09T18:03:08.339949", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p030"}, {"date": null, "author": null, "content": "10살 22살 학시 20살 ... 이런 시간이 쌓였어 외질여 냥아서\n열린 마음을 묻지뜻 우리는 써보라 한듯 요즘이 화긋같다.\n자는 이것 영혼이 성주 터울이혁이 있다\n이런 처럼 믿음으로 빠짓더 날듯 지내 조금은 ... .\n자자장혈은 엿겟다 버뭉러서 쌔기 했다. 다른이 쓰까 .\n\n요르나여 역나비우은 낮았다.\n그물인 역나 당냉엣 다... 몸잔이 올렷다'. 이것 어떤 의미써\n'우왕증 하 자잔가... 낫다는 올지 안디 놀려지 읽은 것 같다.\nOth다하면 올은 것 밤 따지 따 벗벗 골이 빼지 한툰가 하는\n네 개 [불명확]이다. 사실. 내가 너는 올하려면 너도 나는\n올리게 지은 것이 딧시살것이? 1+1=2 이어야했 궁금 것)\n대체 올은 것 밖시 만 쳐신은 고럐하나?\n또, 한 천구가 어니 우리다 - 하게 한 슨 있는 찬 비싼? ?)\n비나는 사장에 고것의 새는. 봣음 해북 든데 온나\n그에 데함하여 듣쟁하 그것 - 게러해야하 찬 것같??\n\n바 한가지는 우리는 어떤 사장이 되육하려 한다고쌴\n하는 못으 짜시기 자내 그런 한해라 수 있는 빈사을\n찿아야만 하는 것이다.\n\n자물 머례은 받이쏴서 기차산데자은 새도옴 치미\n주는 그에 특쟁하 새 빈은 자하 이자에... 그 우리다\n근과 쳗 누 있는 내 봉봉용 찿여보? 그것이 집에 대하-\n톨메따야만 찬 것 있다.\n\n돈, 그것은 대해겨치, 김도쵸 ? 이것 사장의 우리다", "summary": "삶의 의미와 자신의 진로, 사람과의 관계에 대해 생각해보는 성찰적인 내용. 1+1=2라는 수학적 확실성과 달리 인생은 불확실하다는 고민을 표현하고 있습니다.", "tags": ["고민", "철학", "자아성찰", "진로", "인생", "일상"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1992년_열린마음_p031.jpg", "processed_at": "2026-04-09T18:03:22.999133", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p031"}, {"date": null, "author": null, "content": "첫날 첫 수 깨는 팀팀이 앉는가는 뜨거지 한편. 나던 새도이 다르다하거 완은 [불명확] 했하다 들했 봤우의 서샤을 위한 특짜은 차지 앉는다. ..그일 데해 등짜하데 한다 ... 는 것은 [불명확] 자자자으이 앉음하?\n\n땀 깔 롱나는 등착한 공간에서 뭐이나는 사람 좋은 그이나는 사람이 우더 차하며 핧 수 앉는가는 뜨다지, 똑착 하메 하[불명확] 50에 데해 등짜하다는 [불명확] 기대로\n([불명확] 앉는) 것이 히 사려의 문훤화는 그너 T뭇의 못음을 우한 기이 깟이다.\n'나 ... 이깨이 싶다' '이깨이 꼴다'... 이향은)\n[불명확] 저장 등짜 발원이거면 이녀 것은 비따 해 누 싶다.\nGT깃 사람의\nT 롱뭇 히 한원이면. T뭇의뭉뭘 는 이나던 / 그너 나.\n'벽었해' = 라둥 자' 이거는 사는 [불명표] 꼴 붙이는 앗다는 에기행숭은 싶다. 따하는 뜨롱이면 앞뭉\n(4/5) 사람 등책 20년 10뭘 22\n당 텐 롱.\n\nP.S. 네 구이 [불명확]한 쌍도여자 쌍여저. 당했이다. 너자바 떠기에 구 깧 깧는 구 이깨이 음깨다니 나는 [불명확] 봤은 [불명확] 구 나빠돼이가 자려는 앉음은 맞깟의다 하다", "summary": "학과 생활과 대인관계에 대한 고민을 담은 일상 기록. 사람들 간의 관계와 감정에 대해 성찰하는 내용으로 보이며, 특정 사건이나 만남에 대한 언급이 포함되어 있습니다.", "tags": ["일상", "고민", "관계", "감정"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1992년_열린마음_p032.jpg", "processed_at": "2026-04-09T18:03:39.036677", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p032"}, {"date": "1990-10-23", "author": "B.U", "content": "우는 목숨 뜻 긴 하루가 되어 것 같다.\n시작이 일렀으니까.\n태몽 읽의 말.\n짓것이 웃어가? → 짓것을 [불명확]하는 것이나가?\n\n그것, 는 내가 (생각하는) 층음하는 것이\n웃다는 화자본신이 있다 - 그렇게 말은 설치면.\n\n그러면, 는 '짓것을 할 것이냐?'인 나름한\n웃겨버즈 자신없다.\n\n는 다만, -못은 농하는 웃음 한정되 보지면 -\n '투명이 줄이 것다.\n\n이런 내 웃음이 것하는 까:\n웃은 이상에게 짓점인들 와는 -지지까지)\n나중까 좋은 생정을 했다.\n\n는 짓것을 습하여 하아?\n\n1990. 10. 23\n\nI. 5. 함은 귀여 화겨 된 되었다\n힝팓이 좋 것하고, 이상이 여든 얻는,\n된 것, 상의 찰지 있어다. 그리고. 상등의 란것 떺을 웃으아.", "summary": "자신의 웃음과 그 의미에 대해 성찰하는 일상적인 기록. 짓것(웃음)의 의도와 진정성에 대한 고민을 드러내고 있다.", "tags": ["일상", "고민", "성찰"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1992년_열린마음_p033.jpg", "processed_at": "2026-04-09T18:03:47.104825", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p033"}, {"date": null, "author": null, "content": "중디의 맞게 정석된 지저를 봤어\n우리는 기 이다.\n고쳐 joint M-T를 가야하고.\n2013년: 더버려짜도 상태\n       Bison을 우쳐로 언데는 맛는 흠한\n       대동딩이도 좋은\n       똑빠더 등각자 차른 걸로\n       표미미이 못 쩜한\n       관구가못 개한\n       데인이도 놈\n       변더 성윤자가 못 터혀\n       똑빠노은 억\n       그러 3전 1년의 어버미도 나.....\n       한!화하!\n       께야옷 혼도 중타다.\n       그떼 거른도 중잎은 해움까?\n       \n* 민중구현? 민중데응먀 쳐?\n민중와 데동열? 민중이 데동열이 뭐 있는가? 신대전자의 곳 옳 에서가\n마나까? 한이면 다말케 장경 떤려이다. 민중으에 자여을 민중후보가\n대동열이 싸 쬐 있다는 것처럼 해괴칭형 (인정이어지옹) 한이면\n이 조앙 유의 하지 처지다 를히 '민중의 동심정 징척세력칭' 는 구정\n같은 정영에서 한 사상의 층몽에게 대동열 아는 놈앞를 들이는 것\n같히 버성해야 한다.", "summary": "2013년의 상황과 민중 및 대동열의 개념에 대한 고민을 기술한 노트. 다양한 질 서 민족주의가 침륜 신자장 것이나 밥종 민족주의자 처해 과거는 비멸기에 젊봉과 관리한 것이나 칠서기 203층 '검제펜'으로 칠하며 려족터 옳과 (二) 한 모함은 본이는 것이서 본 수 있듯이 미미 민족는 봉 여어저 너는 자족야 크다 그런데, 족안한 정은 많음이 다시 작정하는 옳다는 차님의 본기야 마나나. 이미 정원과 한 배는 닫는 것이다. 다소 안정되는 미오는 여는는 있지만 ... 이는 위에서 보여준 예나 국정정 최신은 마다 안는 답전 기능는 사실은 우리인 윤칠한 마함을 모함 응함이 안 수 있다. 그러메도 불타하는 긴태충이 닫시 자옹하는 헬못 때, 우는 이것 '비중주부'가는 불되야 할 것인가? 사림을 지새하는 요도 창처야 그래프 임이는 옳주하는 인족민이 바껴있다면 그것 목록과하 '미족지부'는 발는 수 있는가 시정가 신 처리는 보편처 악아야 한다. 이것을 간장하는 시정는 톡해 '미족지부' 의 '변형' 이형을 애기하는 것 말듣의 그것은 핵십칙은 심어주 발이다. 그러므 신기가 아린 본제정 우의 기장 큰 하는는 신정", "summary": "필체가 손글씨로 되어 있으나 텍스트 내용이 판독이 매우 어렵고 불명확한 부분이 많습니다. 민족주의와 관련된 사상적 내용으로 보이나 정확한 의미 파악이 어렵습니다.", "tags": ["고민", "사상", "철학"], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1992년_열린마음_p036.jpg", "processed_at": "2026-04-09T18:04:30.209249", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p036"}, {"date": null, "author": null, "content": "사귀의 대인 믹숑르 하여금 거기리) 정서적인 전차 -우리래기- 그만 자선녀 자지작 닫군 국한시키? 있음이르 북구나는 이곳 닮여사하는 이히돋기기디 충분은 지섬 맞다는 정이다. 삶자 믹숑르는 나-다년 구 다 하자의 뜻 해사랑 자선돋의 정치를 밝혀하는 있다는 정이다. 그리고 이 관녀머지 [삼제]는 문깟 내내써떨돔이게 [요혁히] 쥐다. 믹숑당, 국회강이 믹자당와 정끼) 련자랑은 믹숑디도 합박적인 정책너서 어떠한 경로크로 이히그기나 등정을 한 구 없다는 정이다.\n\n※ 있잔 어기에서 믹토 종지것세합니다. [영진마움] 의 소이는 넓과 거리적인 정경이 자사장 같이 엇궁하와 맞습니다. 그러나 의의 몇 아기 물제제기는 한자사 하족돋의 광성 에선에 대한 궁중등 뭘뫼구기 되어서 맞습니다. 아직 사선거지 봉잔 뿌른 덤순 강습니다.\n\n1) 전자가 가칠 정게야 그기깐에 봉구하고 (정기 개인, 믹중주는 주어하는 미뭉 우궁인가?\n\n2) 정서기 [정국연강] 의 대선 밝칠 열저에 가지고 있는 물제적 우렫 인가\n\n3) 믹중주 자젯는 이렿게 구자지여아맙이 징정으로 '믹중의 독자적 정지세 역하' 는 아문 우 있는가?\n\n깎것. 이 쇽메서 달로과-한 중짱 을-[증하 배뭉는 사선, 독해 대심의 믹전자숨 국괴에 보쳣던 13대 여울에 국회가 가지르 있었는 간제와 이르 독해 앗 우 있는 국회의 [신잔, 정서기 믹숑사통령 철 메다변 의 뭘터니 어치추 있는 문등 냑석 등 말니다.", "summary": "대인관계와 정서적 문제에 대한 철학적 고찰과 의문점들을 담은 글. 삼각관계와 관련된 여러 쟁점들과 정치/사회적 문제들을 혼합하여 작성한 것으로 보임.", "tags": ["고민", "관계", "철학", "일상", "정치"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1992년_열린마음_p037.jpg", "processed_at": "2026-04-09T18:04:49.028072", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p037"}, {"date": "1992-10-23", "author": "나진", "content": "나쁜수 펑겨3 걷절 받나서 애이 다지 찾아도 누는 받았하며, 디제중처 여러붓늘아 잠깨 위토의 앞느는 미려하고라 합니다. 거아가 있는 곳 「구찬셀린 」 등 미궁처여 합성비「뎀니다. 잠깨라 싸다나셍 서로 -●●● ㅇ ---\n\n하얀전 넓 사사했다.\n마멍게 되었이었었 짓다. 위레시서 안워도 심심해어도 아워다.\n새냥했다. 네 됨에서 워하지 않드는. 먹지인가?\nㅣ서 곗는로 옆다. 너 심사깬 머버 너 눈녕해서 도사이도\n앉히는 느끝 였있다.\n어떻선터 톨어나나 찬시.\n으움이의 숨음에도 아뭔 수영를 추 눈 많는 여터천 사청어미다\n으종 침아 된 껴지 있헜 아다합니다.\n쳇산기 떠냐기도 아야깃다.\n내 닫움 매는 곧 웨낫는 생곳깎뜨머 많은 심곳 카술\n사져잠 눈 줏한다. 너비 어학하다. 톨기 ㅇ늘융한여...\n낟 깜머 가다. 메앗좌 뱌 기똑 샘쳠이 댄다. 잘을 이들!\n장깜 좌 눈 있었려 줬았다.\n종사뭔 같아므 뮌은 맞쳤.\n92. 10. 23. 솔\n나진.", "summary": "작성자가 일상의 고민과 감정을 솔직하게 기록한 개인 일기. 복잡한 심경과 관계에 대한 생각들을 표현하고 있습니다.", "tags": ["일상", "고민", "감정"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1992년_열린마음_p038.jpg", "processed_at": "2026-04-09T18:05:01.036665", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p038"}, {"date": null, "author": null, "content": "여자 연을 봤다.\n대조의 \"자정\"\n\n옆잔 여자가 침에 좋다 않다가 한 녀의 강한 담담 뺐쳤다.\n냥자는 자신의 닳은 목소리 여자를 따은더 했다가\n여자는 빠깥 생존지에 놀이 먹이 말씀을 기한 여자에 입세\n으뭉을 못했다. 여자는 공정에 신뢰 하더고 하더만 비아네기는\n냥자의 말.\n\"나야 널 강타려 했더는 증거가 여자였.\n눈 쓸긴정으로 몰려 냥겨다.\n그러면 난 다셔 앜서 널 강타찼더.\"\n여자는 신뢰 몰고 냥을 아따른 충 몰려다다. 촛 성합을 갔다.\n찻것으 여자폐 아야되셔더 샘봉 여자한다 혹시 당화했다.\n여자의 찻 하니는 가싸도 여서 여정에 강마었씬 것이 있는더\n자게는 가난 인지바았다 했다. 사뭉 켓도 달걸 전 았었다.\n고냥 상입 냥정다고.\n\n열심 여자는 냥을 공정에 신뢰하면 촛 혼내며, 여뭉 몰났다.\n\n이 여은 뭔이 여각 냥정저 몽는 먹에 더해서는\n걸 몬올 했지만 강의 샘음은 여석의 촉렴에 더 더맨\n몬제정이 았다. 뭉 사봉의 샘을 네는 냥서 않에서 놀이\n샤찬 가자을 하는 여자들에게 짐깐이 아나는 했다. 그나.\n그 냥는 그 여자를 봐 담더의 샘을 평층 것이 아만\n사변실로 가자를 도우에 게왔었는, 여자를 강안했던\n한 것이다.\n나는 아작기저는 샘정이라는 목제에 대해 게쌤한\n[불명확]", "summary": "한 여자와의 만남과 그 여자에 대한 깊은 성찰을 담은 내용. 자신의 감정과 여자와의 관계에 대해 복잡한 심정을 드러내고 있습니다.", "tags": ["일상", "고민", "연애", "감정", "성찰"], "mood": "negative", "decade": "unknown", "image_quality": "fair", "filename": "1992년_열린마음_p039.jpg", "processed_at": "2026-04-09T18:05:13.997747", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p039"}, {"date": null, "author": null, "content": "변은 나라가가 핫돈다. 다산정 뭔 생각정이 침이따롱 돈 어떤 것이다. 족 더 많은 괴로이 발견한다. 한영롱은 한께 귀인·우움을 헤 봤었던 솔겠다.\n\n제\n\n하형에 버려옴이 됨이 잠다. - 장호에 뜬의 뭉숨한 숨음으\n뜬 아깡미 뜬은 하림 기운이 솟을 거라는 젝다.\n그리로의 맘공이 져지즈 한다.\n\n6 나 내가 에제 다 것는 중 앗잖다.\n곱면 이 [불명확]을 함 때이것 는는 인이것은\n나는 자서 내가 여인 되이가는 것 까떠잦다.\n머러기 떠정어 '삶'에 침우정 수 봤엄 멈는 것이겠지.\n깊고 둡답이, 뭉이하는 이겨하나으 뜬 오와 한하도 - 숨을이\n인수자는 뭉전나 - 너내이자.\n나은 머정자적 '밝정:) 하겠음을 솟겠다.\n'삶'에 침정시 합고 내 성임을 하시지 하는\n깊정으 뭇겠다....", "summary": "삶과 죽음, 그리고 인생의 의미에 대한 깊은 성찰과 고민을 담은 내용으로 보입니다. 저자는 현실의 고통과 삶의 무게에 대해 진지하게 사색하고 있습니다.", "tags": ["고민", "철학", "일상", "성찰"], "mood": "negative", "decade": "unknown", "image_quality": "fair", "filename": "1992년_열린마음_p040.jpg", "processed_at": "2026-04-09T18:05:27.317539", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p040"}, {"date": "1990년대 후반 (1999.10.23 추정)", "author": "불명확", "content": "보충은 18, 이곳 것이었 너 입에서 떠내신 깎는다.\n오늘밤은 그렇더라 않겠지 좋은한...\n\n☞ . 18 .\n\n**** 심제명 ****\n\n1. 민국이와 창호이, 창구가 싸웸 한다. 눈데 이거 저한 우기네.\n2. 그럼더 창호이, 창수 꼭정이 안았다. 내려든 high다!\n3. 그것저 자는 간 애들했던 안 놀고 안 간아들이잖 놀았다.\n4. 플 끗.\n\n뭐서 떠무실어다.\n쌌아지 자는 쌌 꼭정 깐차었다 거라다 자기족 저짓군(:)\n\n5. 있구 싶습은 안 놀았다. 자증한다. 싶하! 놀다 왔다.\n6. 있구 again. 쌌아졌은 안 놀았다. 원아 천아헌은 놀 왔다. 쌌하! 놀 왔다.\n7. Last 왓다. 쌌정아뭘은 안 놀게다. 비싶떠 떠떠다다. 쌌하! 놀 왔다.\n8. 한글 잔 깎아져 자했다.\n\n보서 떠무실어다.\n[불명확] 자는 쌌 쌌져 [불명확]했다 거라다 깐구등을 자짓군등(:)\n\n9. 나암 곱이 놀 사상 웟과.\n10. 세벌 2시 이후.\n   • [불명확]. 영원 맛의 최적장!\n   A18, F16, M60. 비유은산점, 비야&잔했\n   과 팍여!\n   3양괴?", "summary": "1990년대 후반의 학과 방명록 페이지로, 친구들 간의 일상적인 상황과 활동들을 기록한 내용입니다. 여러 사람의 이름과 그들의 행동, 모임 계획 등이 기술되어 있습니다.", "tags": ["일상", "친구", "모임", "활동"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1992년_열린마음_p041.jpg", "processed_at": "2026-04-09T18:05:38.162084", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p041"}, {"date": null, "author": null, "content": "열린마음은 자신이 아니다.\n열린마음에 자신의 답으로 주는 자기 자신은 바뀌는 논은.\n아까워를 깨게 버렸거여.    이 [불명확]홍\n\n<잘못여러분\n잘새회 접했던 여름이에 제산합니다.\n현재 과정에의 소요인, 학회, 집회 윤고 등에 과연된 멍에\n묻는 혼남중에 대해 어떻게 생각하는지요?\n거경도 잘차간렸던 빠 아너라 내용이 몹얀한 톨봉도 너무\n왔다고 생각합니다.\n신기흥과 중 과정 롱봉의 그런치도 싣찼다고 생각하는데요.\n서려거 없은 빠뺏신 중은 알자던 신기흥중 같던 빠른 생\n내머 설해가능 것임딪 강슴입니다.\n잘회실 내에 그것찬다 오정 광간게만 못잇것을 저산느합니다.\n혼봉\n\n잘회실 벗이 되는 사야해요.\n나 잘우여러분 ↓ 내향여 잘초?\n\n두 반째는 \"열된 마음이 끝은 된었다.\n민거 곤산거 였며 단 했다. 1잘던 샘향 중 가자 정경정이면 른 사건이였다.\n잘샘등의 잘샘데이 대한 마선 관에 대달한 옹닦은 했으므\n부경미 아이까 멍가거 이떠여지시 있았다. 이죽 잘샘다 잘우는!\n르 말은 잘 받다 야기 위해선 삶 깎하다 멈전 이우여거야 했 것\n같다. 잘벼 M.T 해냐 부샹하다. 이런 잘샘디 에이M 파항지으로\n이우여진 경메서 과 나는 받징이 있 칠 다. 삼거 끝나며 략 던완\n것 줄 양 있는데... 우리의 관이 너무 달았나봅니다.\n빠진 샘행나는 과런 이 곤 저대는 했으멍 찾다.\n이 김했나가 다정된 잘샘디은 육으우 외았가는 나는 비라조\n있다.        3쪽  넓기서  →", "summary": "열린마음의 회원으로서의 자신을 돌아보고, 학회 활동과 공동체의식에 대한 고민을 기록한 글입니다. MT와 같은 활동을 통해 깨달은 개인의 성장과 공동체와의 관계에 대해 성찰하고 있습니다.", "tags": ["고민", "학회활동", "공동체", "성장", "MT", "일상"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1992년_열린마음_p042.jpg", "processed_at": "2026-04-09T18:05:57.098956", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p042"}, {"date": null, "author": null, "content": "텍스트 없음", "summary": "이 페이지는 한국어 인쇄 텍스트가 포함된 책이나 교재의 페이지로 보이며, 손으로 쓴 메모나 노트 내용이 없습니다.", "tags": [], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1992년_열린마음_p043.jpg", "processed_at": "2026-04-09T18:05:59.084358", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p043"}, {"date": null, "author": null, "content": "상단 메모: [불명확한 한글 필기]\n\n노란 포스트잇: \"Open the paper!\" (영어)\n\n중단 페이지: 한글로 작성된 긴 문장들 (읽기 어려움)\n[불명확] - 여러 줄의 손글씨로 작성되어 있으나 사진의 각도와 필기체의 특성상 정확한 전사가 어려움\n\n하단 페이지: 한글 텍스트가 빼곡하게 작성됨\n[불명확] - 작은 글씨로 다수의 문장이 작성되어 있음", "summary": "학과 방명록 또는 노트의 여러 페이지로 구성되어 있으며, 영어 메모 '열린 종이를 열어보라'는 지시와 함께 한글 필기가 대량으로 기록되어 있다. 1990년대~2000년대의 대학 시절 일상 기록으로 보인다.", "tags": ["방명록", "일상", "대학생활", "메모"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1992년_열린마음_p044.jpg", "processed_at": "2026-04-09T18:06:03.513502", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p044"}, {"date": null, "author": null, "content": "상단 노트:\n열린마음 2-22\n[불명확한 부분들]\n\n중단 페이지 (인쇄된 텍스트):\n다양한 한국어 텍스트가 인쇄되어 있으며, 주제는 [불명확]합니다. 여러 단락의 본문 텍스트가 보입니다.\n\n하단 페이지:\n여러 줄의 인쇄된 한국어 텍스트가 보이며, 좌측에 작은 손글씨 메모가 있습니다.\n손글씨 부분: [대부분 불명확하지만 부분적으로 보이는 텍스트들]", "summary": "이것은 '열린마음'이라는 노트/방명록의 여러 페이지로 보이며, 인쇄된 텍스트와 손글씨 메모가 혼합되어 있습니다. 날짜와 작성자 정보는 명확하게 읽기 어렵습니다.", "tags": ["방명록", "노트", "메모"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1992년_열린마음_p045.jpg", "processed_at": "2026-04-09T18:06:07.650303", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p045"}, {"date": null, "author": null, "content": "자신 과실에서 '좌사' 여전 공래카 흔흔요 왔어나다.\n자앙 겨가 너구나 족아하는 노래앞나다.\n\"고래가 금식중 내 여깨에 흔흔 [불명확] 먹이는 ··· \"\n먼은 바성은 해체됩나다.\n\n육심에는 post-it 쓰 으로 붙여놓은 자잔 식이서 흔흔이 식딕 극이 있었나다.\n묵원지 [불명확] 살곽 우더이서 아깔게, 그러고 분정지 비판합상아\n왈 그럴 극을 싹았흥나다.\n어허빠굿\n\n옹숭이 어떻움나까? 아 좌침요 2\n우리들은 [불명확] 서께바 어께를 갈사구는 그 온기를 느껴수\n쎄는 그럼 라누는어 되머여왔습나다.\n저 좌심이 앗으로 여럴 왈구를 같이 왈 사다도 댁리앉아에\n느럼 자발등) 말은 싸먹음나다. 더저 한잔 앙더거합다.\n그러나,\n\n저는 [불명표] 마족드됩나다.\n우리들의 아픔의 앙족은, 그러고 좌는 쌓은 싯싱지럴도\n우리는 충께실으로 ⟧어는 짐에 허여이자 화고, 항수 왠다고\n새로찰나다. 왠저 살아 좌근에 post-it을 보여주은 왈극의\n여행은 구하고 앗요 그런에 낮껴(?) 을 혜봉왔습나다.\n것밤 피아항되다.\n\n※ 왠이 육해는, 자한 안족리요?\n사료해묶 다다.", "summary": "저자가 여러 감정과 기억들을 정리한 개인적인 성찰의 글입니다. 과거의 순간들과 관계에 대한 그리움, 그리고 감정적인 혼란이 담겨있습니다.", "tags": ["일상", "고민", "감정", "성찰", "관계"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1992년_열린마음_p046.jpg", "processed_at": "2026-04-09T18:06:20.281509", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p046"}, {"date": null, "author": null, "content": "← 3장 전에(page) 니하는 작은 짝이 빠빠서 졸다. 바뀐 사람은 싫어 먹는 교뭉 못 찾니까.\n\nU.W.\n\nP.S. 상현이 씨빠뺀이!\n\n솔기 유빅 쩔정한 아침 . 괴피 데샤:\n황선타인 왜이. 에이 취거야나 잘 지어자 있다.\n전토적 작자의 전현서 씨나다. 지금 황석희쓰 씨냥곱인 사적. 아포 데여 깔축되다니\n하 씨지자은 브쎄 . 각.ㅡ.ㅡ 숲숲이 진처 로되닭 있자. 앙하\n커피 믿에 된눈 것이 있었 않다. 신록 사자맛. 숲씨바 올래따. 그가 바쎄 온다\n그가 뷔절 숲자지은 황죳지. 위더 황처켓 . 사야도 지쪽 엉니\n위의 황묵최찻 에진 몬짜이 씨니다. 전장 샤야차 신경 뭉작지.\n갓저 식 우 았지. 그리한 뿌떠여야야 잣 기야다.\nP| 쩔인 칠조이께 닏는웊 어겨 같은 빠돈항? 뭉나다.\n자큰 씨께 몯 황자온 깊다. 신거기고숭 그 완한 바새서서 즈번\n황누육아 깖이 하겨소 찍저 씨잠는 몫 에에이 버처묻났뜨는\n다저 찬난 디깐반 천실 시전 우기한에 황져저 있뜨는다.\n우기 않에. 황자 삼머황여가 착에 깔카를 우거의 사성자도\n깔재지족 위버 황번여 로변은 찐우있는된 즉징문나띤.\n\nP.S. 황생리장난게 북학굼나다. 그제\n쌓메 황성퓌 자씻뭔 의치치룹 저으심사요.\n[불명확한 부분: 마지막 줄]", "summary": "일상적인 생각과 감정을 담은 개인 노트. 친구나 주변인물에 대한 관찰과 함께 일상의 소소한 순간들을 기록하고 있습니다.", "tags": ["일상", "감정", "친구"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1992년_열린마음_p047.jpg", "processed_at": "2026-04-09T18:06:37.736432", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p047"}, {"date": null, "author": null, "content": "깊은 밤에 깊은 산책. 그리고 깊은 밤 깊은 사람들에게\n\n나 받은 것 깊고는 새로 마지막 만들지 않는다\n나 서로 지쳐 아침에서 닿기 임청 늠쩌미 이런 가는 원금으로\n깊은 그 어떤 벗기 같은범 서도쨩은 깊음온 깊게되는!\n\n깊 여어서 싶은 사람 발든 며 내가 뒤 굵음 ≡ 깊은\n것이 벗고 핍하여 교있었다 /깊앞미어서 어렓밤은 잠수에 솔\n깊은이 있고 시작하는 갈다다.\n\n깊은의 어떠?\n\n그깊 심온 새번 깊도 매는 온다\n놓은 명예 톡 것임온! 우리 우리이 것다\n그러나 [불명확] 그들이 우매의 웃음을 구조하는 온돈\n나봐 깊배여 깊으치고, 우 웃음 신온의 깊앙업 육 더다\n사심 그리의 사리 인않음이 대한 내 오인권 사러엄 오인곤 하기니거는어\n있다.\n그으든 공이 돌다쓰 깊건이 깊도한 목봄은 으기지마\n그댓 다.\n\n바다!\n\n오온인나...\n\n얘왓온 문온 새봉으니 바봐 깊은깊즌 깓용 버복잔 깊구하나는\n새별 아똑는 그깊은 깊어서 인깊서 슬켜다나\n사용길 왔자다.\n\n씀 울 너의 얀온 허는 부리 옛댓다으 단음 도깊언는\n(설 깊온은 깊인 것은 )\n\n가기은 바비본 저 으렇이?\n가온 공마라 ¸생마온 그인다\n인다했다. [서명]", "summary": "깊은 밤의 산책과 깊은 생각들에 관한 시적이고 철학적인 내용의 글. 의식의 흐름 방식으로 쓰인 추상적인 성찰.", "tags": ["일상", "철학", "밤", "산책", "생각"], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1992년_열린마음_p048.jpg", "processed_at": "2026-04-09T18:06:49.687285", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p048"}, {"date": null, "author": null, "content": "{\n  \"date\": null,\n  \"author\": null,\n  \"content\": \"10. 25일 방장이 밤새 쌀 켜 놓아 아침에 앉아나가자 불판이었는데 화끈이 화났나 그마냥 쌀 가졌다. 댓가 샀았하곤 있었지만 동까와 완전히 우중으로 먹었는데 칠싱이와 상준헌의 대자붕 보는 킹이 짤킨다.\\n이래자보미 걸정이 지지를 보네며 친 닷닷되껴지 우리도는 조화웃갔다. 어거는 쫘와 더뜨이은 밤이 있다 않아\\n\\n저마 상화 아미 ㅇ 버면을 찰 꼬는 ⊘씨나지다 잠찬 거중께\\n생화쩍나다. 차거란 ㄷ것 외 쩌기기. 오서 [불명확]께지는 보기가\\n저광이 느껴있은 태 언아테.\\n미랴듯더 자섯 · 6머기 넓턴면 집어나다. [서명]\\n\\n콘 8/22 아주은 쌀데는 사신 상화이 싱고이\\n샤게났고다.\\n그런 의완계는 내박 색 초리 선함 '씌싱이로 봉확지\\n쌈네메) 끼저 쌀산 눅은 사 2곡 중레로 다섯다.\\n아모면 거힘응 보요···\\n어센은 자씨공을 웃는 나지 쌀나\\n콕따땜이 씨로멍 증이응 우리 찰다\\n투꾸겨괴은 거진놀의 당장 보는 나다 곳 든들의\\n당장 뿌째다 ( 씨/씨각- )\\n\"내 씩 , 그런 곧읍 투꾸한 궤장-) '곳 든까되\\n꾸댁미 뛰찢겯 !\"\\n㉼ ◆ 충 당짜음 선답의 핑컷 충 쌀깎아 . ?\"\"\",\n  \"summary\": \"친구들과의 일상적인 모임과 경험에 대한 기록. 밥을 함께 먹고 즐거운 시간을 보낸 내용으로 보이며, 친구들 간의 상호작용과 감정을 담고 있음.\",\n  \"tags\": [\"일상\", \"친구\", \"모임\", \"식사\", \"추억\"],\n  \"mood\": \"positive\",\n  \"decade\": \"1990s\",\n  \"image_quality\": \"fair\"\n}", "summary": "파싱 오류 - 원문 보존", "tags": ["파싱오류"], "mood": "neutral", "decade": "unknown", "image_quality": "unknown", "filename": "1992년_열린마음_p049.jpg", "processed_at": "2026-04-09T18:07:06.237260", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p049"}, {"date": null, "author": null, "content": "여자채 2건 1/2독의 새깅들 줄을지는 옳다.\n2건4 1/2독은 \"자신의 단계\"에 싸내감의 여자채\n새로운 정함은 나기는 봄 사과 쌔 족은 릿는1\n\"한저자 좋은자선 중혜의 집에, 아난 도정으로 나기 것은\n아닌지!\n\"한저자 ___는 중은 다있는 좋지하, 너가\n뭔가싸인 알은 줄내규는 새침으로 차미어 봉 이급은\n맑고 나기자는 것 아닌지!\n알의 로 \"중의 자뭔 공극로 참지 - \"는 1/2독의 문동칠 생각있\n것이다 짜하는 쌔칭다.\n중산경자 지금 살았 싸쌔, 훔매판 움데, 은영다싸 - 한흥, 사남발 모든것\n뭐에하?\n여자된 자신의 자화쪽 깎려니까 먹는!\n구멍 알에 알간라!\n인식 자신의 기행싸 생어 자청 봄 족은 은는 긴나다.\n맑음으로 그고 쌔고나 하는 것은 드되는 싸셀 쌔 창 긴길.\n없선이 그게 먼는?\n포정은 것는 싸그라지 먹지! 구것이 한빙 빠을좌 자산네\n24자육's 후반 이는, 14것의 시싸다.\n있디하로 자신이 대싸았는 국수하는 나그 흥이하는 국수는이다.\n도션의 고정 그거는 그래는 자신의 음은 싸정하는\n싶지 읽은가?\n동바는! 도접은 알은 자든의 바기닌 것 싼가?\n찬흥! 가자, 착나기는 착히고, 나진싸지가 더 착히진는\n붕은 뭔 새는 기자리 자싸가나? 다는 받장-? 싸풍과 내증\n4 싸칠하지 않다! (정정하는)\n윤글 각 으덩네는 바죽에있 저저 성정이쌔 깋 우정은 빠 쌔들.\n자색? ) 다 윤글 싸음에 2되나다5 여저그여 쌔 자정정다!\n옹 4윤 네있?) 은 그샤 도정칠!\n", "summary": "학과 방명록에 적힌 개인적인 고민과 생각들을 담은 메모. 자신의 삶과 선택에 대한 성찰이 담겨 있으며, 불분명한 필기체로 작성됨.", "tags": ["고민", "성찰", "일상", "감정"], "mood": "neutral", "decade": "1990s", "image_quality": "poor", "filename": "1992년_열린마음_p050.jpg", "processed_at": "2026-04-09T18:07:22.287129", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p050"}, {"date": null, "author": null, "content": "것이 '나오의 유괴는 것'인 것인데, '것의 말로, '것의 욕'의 칭찬이\n·너인가?\n\n앞의 글에서 \"반박-\"와 먹혼다. 어떤 칭찬것인 보돌했다. 어떻게\n북있는가 있었지, 신어 어떻게 바뀌었는지 곰한 것이 우리를 훔칠까?\n\n[표 구조]\n교시: 1\n강의실 김의실\n교수명 [불명확]\n\n너2 칭찬의 돌려보는 지머미의 외 자못 뒤객는 뭐은 말다는\n그러나 과내여교과목 어떤 학교-나밟게 기년지 우리것을 먹혀나자!\n\n식중이 어자 [불명확]로\n그것에바 몹다 칭찬것은 담작. 쌍\n살치는 수2 칭찬 나밪것까?\n\n쓰 칭속지\n이것 몹다[불명확]\n선배와 칭선배칠 눈는 가능한 새칭께 앞자!\n\n가깝 홍최지 칭벵것는 가서다 곤 것\n(것지상이 곤) 지냅지\n\n있다.\n흰는 우는 뒤현다? \n그것에 과칭은 교과목[불명확]은 나칭자의 반전을 위젠 사선을 받칙해 보장!\n\n저 칭면대 자칭금 곱는 $와더 근 기집어 자선은 벗칭대 보장!\n\n[테이블 계속]\n교과목: 곱이\n강의실 김의실\n교수명\n\n[하단 테이블]\n사시간의 앞문서-그는 몹홍는 홍이다. 사밭칭다.\n\n교과목: [불명확]\n강의실: 1과를 다자선의 반전을 위젠 사선이 밑칭은 위자지\n\n구치정 앞 인 홍도종 칠자! [서명]", "summary": "강의 일정 및 과목 정보를 기록한 수강신청 또는 수업 계획 노트. 여러 교과목, 강의실, 교수명 등이 표 형식으로 정리되어 있습니다.", "tags": ["공부", "수강신청", "강의", "계획"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1992년_열린마음_p051.jpg", "processed_at": "2026-04-09T18:07:34.526161", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "p051"}, {"date": null, "author": null, "content": "가르 [불명확]\n기도\n[불명확]", "summary": "페이지 왼쪽에 손글씨로 짧은 단어들이 적혀있으며, 대부분 읽기 어렵거나 불명확합니다.", "tags": ["일상"], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1992년_열린마음_cover_back.jpg", "processed_at": "2026-04-09T17:56:12.207785", "volume_id": "1992년_열린마음", "volume_title": "1992년 열린마음", "year": 1992, "page_label": "cover_back"}]}, {"id": "1993년_열린마음", "title": "1993년 열린마음", "short_title": "열린마음", "year": 1993, "cover": "1993년_열린마음_cover_front.jpg", "page_count": 98, "pages": [{"date": null, "author": null, "content": "[불명확한 필기] 손글씨로 여러 글자가 보이나 명확하게 읽기 어려움. 파란색 도장/스탬프가 여러 개 찍혀있고, 페이지 하단에 나선형 바인딩이 보임.", "summary": "Korea University 방명록 페이지로 보이며, 여러 필기 흔적과 스탬프가 있으나 텍스트 내용을 명확하게 판독하기 어려운 상태입니다.", "tags": ["방명록", "Korea University"], "mood": "neutral", "decade": "2000s", "image_quality": "poor", "filename": "1993년_열린마음_cover_front.jpg", "processed_at": "2026-04-09T18:07:44.073364", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "cover_front"}, {"date": null, "author": "다산터 & [불명확]", "content": "창창 제기던는 전타수문제.\n여러번 여러여름 깨뜨린 고민 된답변까에 쉬더라.\n우리여름을 묶는 냥강도 하고 있는지... 같이 고민도 혜남지 않으셨어요.\n그런 우리되돈 단을 톡 모았다. 어떻게 나능지 이렇 앞터 있다는 각 촉 잉따렸는 거\n아니면? 마저막 서명행동 하던싶은 맣이 고장에 없어진. 여러답은 가능거를 해터 있는.\n~~ 가슴 더니써 빠 이튼 어잡샤 봣뻔이 장보본 연이야 ~~\n\n'93은 더많이 맞은 담랑은 느껴다 지마를 앓은 여 찯은 분댔어 갈때\n말층 들은. 원이 장새 등 된애 궁리한는 맞게 맏은 자으음\n되머여 우리다 나뿌는 봏있다 여저먼 자연소싱을 것이도 우정값\n제 흔 및 인급려잔 원이 자별의 원인에 데한 받설다 팟응하깎? 왔\n스데도 여저면 해 알다 받상정, 갈별은 과도짐게 받는 것 다있깐?\n것을 있에 르르는 공장허다, 인설어 자타지 잦은 ㅂ 같은 '깔은\n제도 갈자인 자딴 봐 갈 와다면 깨 건찰이되.\n\n- M.W -\n\n- 드한한 깨혼 나 절고 보착자이 아버다고 새강하다 -\n'93 깨테롤 줍 너버연 위한\n\n아 뻐질 ×+ 는 한 찰 깍 죽 ㄱㄱ [불명확]\n.. 웃음 .... 웃은 줄 깝을 튀 하쯤?\n\n※ 질모을 여거나, 매깔 가는 깧은 4- 수 됭 馬 [불명확]\n하의여다.\n\n[아래 섹션 - 흐릿함]\n다른 사람의 생활에 깨사서 하대으로 알려질 알아서\n공짜은 자신여서 받았어, 다른 자신의 알에\n자신은 전여 하없다.\n그러고......\n\n다산터 & [불명확]", "summary": "여러 고민과 감정을 나누는 대화 노트로, 우정과 삶의 의미에 대해 함께 생각해보고 있습니다. 서로의 상황을 이해하고 지지하려는 마음이 담겨있습니다.", "tags": ["고민", "우정", "일상", "감정", "대화"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p001.jpg", "processed_at": "2026-04-09T18:07:58.957995", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p001"}, {"date": null, "author": null, "content": "INDEX\n\nDESCRIPTION                PAGE\n7/6일\n7/8목\n7/9금\n7/4토\n7/7수\n7/1기\n7/8목\n8/2금\n8/3토", "summary": "이 페이지는 INDEX 페이지로, 특정 날짜들(7월과 8월의 여러 날짜)을 목록으로 정리한 것입니다. 각 항목 옆에 페이지 번호를 기입하기 위한 점선이 있습니다.", "tags": ["목차", "인덱스"], "mood": "neutral", "decade": "1990s", "image_quality": "good", "filename": "1993년_열린마음_p002.jpg", "processed_at": "2026-04-09T18:08:01.493593", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p002"}, {"date": null, "author": null, "content": "오늘 처음 [불명확] 이라는 과목에서 친구들을 만났다.\n\n혼자라 생각했는데 같은 생각을 가진 사람들이 있어서 좋았다.\n\n처음에는 어색했지만 차츰 편해졌다.\n\n배터리 필요하다 [서명]\n\n'93을 어기\n나도 그렇지 마 조기 - 예비학교등 에서 천혜지 천금족과 반 걸랑이 있으더 과 예문 의 우도 데엄 우독 진혜 정으면 궁계다\n신입생이다 나 쌍깨지마 천금족 청겨주 특히 과사업 갈은 것에는 극심히 창여 활으면 한다\n\n그리고 정신중 차리지\n[스크래치 표시들]\n\n꽃 받은 받-시펀 꼭준 꽃준\n의 쌤 받은 우닷중 문변우겐\n의 쌤 받은 우누온 꼭읍 추우용\n짜의 구기웅 느기나 어\n이 받은 버차우스읍다\n처 나 의 똑웁 해방옮다\n주업 우씨 몽 아 웃하\n아 자 나 므념사 어\n[불명확]\n[서명]", "summary": "새로운 과목에서 처음 만난 친구들과의 만남과 그 경험에 대한 일상 기록. 혼자라고 생각했지만 같은 생각을 가진 사람들을 만나 좋았다는 긍정적인 감정을 표현.", "tags": ["신입생", "일상", "친구", "학과", "경험"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p003.jpg", "processed_at": "2026-04-09T18:08:09.787973", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p003"}, {"date": null, "author": null, "content": "오는 것은 깊을 시대에 아침이다.\n끝이 시작 것은 오 그러 중간은 깨 말이다.\n자신조심히 93들이 돌환 51등을 심음을 집탑 93등을\n앎에 기억야 홍겨지다\n\n[불명확]는 차점\n⟨4 1⟩ 중 ⊗ 중 사장일\n\nⅠ. 6버꿈에게.\n앎 차별 앎 여자을 것에입니다\n존에 자매님의 쓰였고는 나 것들어 줄든다....\n\nⅡ 앎 내꿈다\n나버닭의 '옷싹더'을 하얀 이용장 있다다.\n메버치더 같는 쓴싸어에 단 것되못더.....\n앎은 명새 내용에마.\n\nⅢ 샆 홀이 찾겠다.\n공공신경세는 마연 쓴걸자가 나.5 강담에 글세!?\n자작에 여다을 낭여더였여야 하됴다 O3이억 얀즉 ....\n-그새사-\n\n끝되다. 꿈꿈 쮜마을 읽고다\n다쌌 서의 예쌤 가누는 보고 싶은 [불명확]\n* 자정 바지가 꼭우친다.\n\n오늘도 1,2시 이 옷들이 깊 다\n자별 종 시게 사을 사 싸 모여거\n- 8 - 나이용은 한 중 이도\n징징 극써8 왔 빻되다", "summary": "일상적인 생각과 고민들을 여러 섹션으로 나누어 기록한 페이지로, 꿈과 희망, 그리고 현실적인 반성에 대한 내용으로 보인다.", "tags": ["일상", "고민", "감성", "일기"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p004.jpg", "processed_at": "2026-04-09T18:08:24.023448", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p004"}, {"date": null, "author": null, "content": "텍스트 없음", "summary": "비어있는 노트 페이지입니다.", "tags": [], "mood": "neutral", "decade": "unknown", "image_quality": "good", "filename": "1993년_열린마음_p005.jpg", "processed_at": "2026-04-09T18:08:25.401567", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p005"}, {"date": "null", "author": "M.W - 마지막 줄", "content": "인 얘기 늘 비가 내릴 때면 느껴지는 그런 설레임 같은 게 있는데? 처음엔 써글\n은동 그것도 같다. 까마귀는 자을됴다. 다시 시작한 4 깊은데머.\n내 전부는 다다다 같은 게 아니다. 같이 빈 욧한 깊은음으로\n그 나는어버 아래 닫혀 요다. 까마귀는 깐다\n잊은 테머더
