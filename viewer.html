ull, "content": "우리하는 삶는 쉬어졌 갓차는 서로가 지향하던가 어니면 그 진은 장 우 있음을 맞드는 못된인자에 의해 서로 다른 길은 가게 덮다. 딸 모드는 열심이 살겠다는 효치되서 못았든 탕혜 나가는 있다.\n그런데 요즘 와서 느끼는 건데 어쩌던 못두는 삶에서 너붕 따은 것을 우하지 않나 하는 새삶이 된다. 블로 맞은 것을 이용하야껏는 가능한 우러하지 않은 삶은 선야야껏, 하지면 넘우 요질은 부의면 은희언 확자 더기 안음하.\n\n친구가 쓴 글이 계속 떠리는 맨도다\n\"미앎의 쉼이 즐음으로 왕성된다\"\n\n왓 파교한 culture.\n\n92출금\n\n쉽습더네를 아직, 간접이키 M.T.중 떠날 마음의 쉰트를 했다.\n90.back jump 게이엄으로 무엇한 것섯이를 아마마든 민응이 베면 두이.\n<음악에> 에 가서 러여으로 너이를 말나. 춤가능 × 사도은 청서서 정에 못 두이.\n거철 피크의 옮것, 채배른더는 [불명확] 회세이지 너어 둘 92도 괜찮한 기사함았나,\n서금의 정냥 도어여, 비차영이 법의 여주움났는 기내는 자자기승을 탁이한 수 옥있었.\n볼에 덮싶서나 아나. 비나 모새 책은 게나. 그기는 첫기 시재닫. 됨. 졸 도\n게이 너나 그기는 것죠, 우리은 다 바빠집다. 그기는 봉 먹 은옾는 진봉착는.\n그러나 어차 9기가 됨여 이띠은 M여정한 수 있는 맘았나. 우리는 미앎여께 겨라는\n봅 겨겪다. 으뭄, 씨각, \"네유나\"... 그런데 그기은 봉 여앎 미옮는 비키. 비등\n쉬기 암한은 졸의 험다.\n\n존년 여은 톨, 넷게정! 게엄이? 좋의 법여미금(·생 영여). 90.back jump. 우상겻.\n본음 game of 게네숨펴겠. 새에 둘 시 법. 이정 게잔을 림한. 정우도 했겠. 우거성 몸겨는", "summary": "대학생활 중 삶의 방향성과 가치관에 대한 고민을 담은 일상 기록. 친구의 글귀를 통해 영감을 받으며 MT, 92년도 생활 등을 언급하고 있습니다.", "tags": ["고민", "철학", "일상", "대학생활", "MT", "1990s"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p008.jpg", "processed_at": "2026-04-09T18:09:11.604428", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p008"}, {"date": null, "author": null, "content": "명랑하 깊새움\n\n내가어떤- 중년센 시대 못했겠다.\n나 없어 곤충에 여죽어는 사람이나/나 하태면 바꿔라.\n며칠 중 있이 싯겠다. 그 첫장집는 몸 나뀌킨다.\n앗다다 6시간 나에게 히찬 있마를 솜가?\n'팜 이 미움이 빠뭄다. 잔턱 내 삶테는 삶움다.\n내가 처는 인본는네 경혼 바런송어시 곡는 깐이 아니음 굼아나봤다.\n\n——짱네! ——\n\n[스케치: 연결된 말풍선 3개 그림]\n\n[원 안의 스케치]\n\n음음고 여중 되어 음 삶서 깨엔을 빠서 앗은 비음 다른 되\n까선서 파멸어는 깊이 됨짜다. [불명확] 새벨 네 식 뭔, 하던어는\n불과 쏟, 가럼, 다... 이 하나 모테사 더 이해 잦은 쏘는 이이이다\n해본에서, 노중 됨어, 깨어 [불명확] 깨이어 여팀에 버번과 대해.\n놈이 각는 생의 여여 쎘습, 꼻이, 나침. 처염서 깨다서 이이나\n시중 @@는 벼라. 깨내 나겨어 괴뭐는 긱설, 거세이 벼사서 (닫과?)\n깨단 이이나 대함서 톤이... 더 이해 깨뭉 깨텨러 좋 꽃치.\n뽀 더 자서 느즕 봇이 똑숀나. 뫼 꼬라는 톱받다 이이 like 돌에요.\n자므이 깏는 ###에 처서 나공자 촉실, 긱슨, 스욕주어 깨든 또껜\n많은 짝켜나 긋연 께왓나다.\n버이 고깨 깨켜여. 동내는, 자서 곳없이 M.T로 다칠시켜 깊는 —>를 젛해", "summary": "개인적인 고민과 감정을 표현한 일상 노트. 삶의 의미와 관계에 대한 깊이 있는 생각을 담고 있으며, 중간에 말풍선 스케치가 있다.", "tags": ["일상", "고민", "감정", "철학적사유"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p009.jpg", "processed_at": "2026-04-09T18:09:24.419519", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p009"}, {"date": null, "author": "신범", "content": "어떤 선배가 나한테 '열린마음'이라는 뜻으로 자기이름을 낱글로 써줬다. 그건 좋았다. 근데 지금이 이 '열린마음'이 정말일까?\n\n* 별명 받은 거 계획을 잘된다. 재정학씨들까. 2 받은건.\n한 사람들! 나레기런 별명들을 여 사람이게 정했다면, 2 사람은 2 담이네 댄을은게\n떠로 단단한 영 사람이게 자신을라... 어떻게 버터 어디이고는 저벙인\n단다가 2 사람의 새로운 별명이 따는 것이다.\n\n미론! 정다라고. cutline이 하나로도 여 이다 어사로는 다니가 자\n벚나다로. 자는로... 자여는... 어떻게 버터 비명있음시 사사 아들\n미 걸이다.\n\n■ 그. 걸었?\n걸아다 살든 '털'을 앞장로. 사른이가 '개'? 손더 '삼도' 어졻아\n'왕정', 하되 '자명'. 씨이아 정다따라로 새경되 '이운더' 칭철어아\n'너' 등. 여들되가 '마멈'. 정설이아 'Holiday in Seoul' 살변아다\n'Night [밤]'으로 받되이아 '밤이'. 칼실가 '난설이' 깅어이아 '자멋이'\n말이어나 어던다 '자실다'. 저선이다 '잡상센'. 다하어이아 '실엽정' 및\n마성서 높낟네는 더 이상 '털'이 아니다. '공영정' 이다.\n\n자여이것에 섯으다 넌 더 자버이 앞이인 걸 깊다.\n스더다 자타한다. 어언 다마아싣다.\n\n신범\n\n\\[불명확\\] 준우장네 골을 보나 10 개월 진자 긍을 M.T는 실미적을\n아니었다 거 가다. 악 아대의 여민이깃지(?)\n\\[불명확\\] 너 굳든 간작'너(1) 자해네, 아니 정베가 조버이\n자춥 사숨너려 꺼긴 거 긴어 봉었 다.", "summary": "저자가 '열린마음'이라는 별명에 대해 생각하며, 사람들의 별명 짓기 문화와 그 의미의 변화에 대해 고찰하고 있습니다. 처음의 진정성 있던 별명이 시간이 지나며 어떻게 변모되는지 관찰하고 있습니다.", "tags": ["일상", "고민", "별명", "관계", "MT"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p010.jpg", "processed_at": "2026-04-09T18:09:41.507577", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p010"}, {"date": null, "author": null, "content": "{\n  \"date\": null,\n  \"author\": \"GWN\",\n  \"content\": \"391대로 218상담 정릉아악 화고 단서종비는 페테하노 자현다또 잔기이 서적이란 게인정은 오 GI다옻 바뿐 지지랏 그이다. 나즈 느랭은 나까 이 바뿐 지지[G] 너JT를 충진했던 것 못 이왔는 앗았다. 고처영이 되었서 난 옆둘을에게 서 또다즈거 써깐 모응등속 붕우 앗았오 중기을에 대한 사항이 좋뿐 앗즈 것 [불명확]을로와 마응을 놀 우 앗었다. 이련 것을을 네 그을 웋채 중역 자켠승럽게 나라네는 것이 즉쳤다. 새창이었다. 그햐 반 우송 싣이 잉[G]즈 사자시기잖다. 싶강에서 충집했] 네 싱강미 여원여미니 싱완징이었조 것 같다. 손을 서컬가며 을바 괘즐 앞으메서 게입아 차처 관두마러해 됨긔는 깐 중기을의 징은 느껏 우앗었다. 할! 깐 전다을에게 징망은 곳와읽을 느껏미 깟이 옷깐 전다을에게 네의 봉자있광에 대한 잧깐은 느겨다. 여껴걸 못을 우둘을에게 마응은 느껏다. 그리즈 대학/상잣이어 나어에 또올나의 즈옷이 빨 껴 싹앙 기쁜다. 따앙 三.三.ㄴ.ㄷ새르 다며화서 즈 어 [불명확]잣다. - GWN -\n\n우릎 궁백해 왔서 공범은 과노 인정자단 찬 신버왕의 다끼메서 지금깎지 고은 톡이싸였던 등정의 왜경셧을 풍금자 있었다. 역시 서버는 서버여다. 요즈 좋어 네가 여러하는 것을 자즈 느껏다. 어저 쪼이뻔 나의 정에는는 뭐옷까? 서민기지이 여여여 서버어 미쌈 이있는 - GWN -\",\n  \"summary\": \"저자가 일상적인 고민과 대학 생활, 타인과의 관계에 대한 생각을 담은 개인 노트 기록. 자신의 감정과 타인과의 상호작용에 대해 깊이 있게 성찰하고 있습니다.\",\n  \"tags\": [\"일상\", \"고민\", \"대학생활\", \"감정\", \"관계\", \"성찰\"],\n  \"mood\": \"neutral\",\n  \"decade\": \"1990s\",\n  \"image_quality\": \"fair\"\n}", "summary": "파싱 오류 - 원문 보존", "tags": ["파싱오류"], "mood": "neutral", "decade": "unknown", "image_quality": "unknown", "filename": "1993년_열린마음_p011.jpg", "processed_at": "2026-04-09T18:09:56.486704", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p011"}, {"date": null, "author": "우진", "content": "조촌에서 몬순철다\n숲마음...-GUN-\n\n[검은색 굵은 글씨로 쓰인 제목]\n\n안다가(느낌 여행도, 그 원지 모르겠지만) 자쿠 넓음은 더 중의 상냐가\n우것 한가격 위옛 쌓하는 것이다. key board을 쳐봤 다항묵의 로움은\n다침옷의 여기중-금에서 자잔 넓았김은 데 왔다. 깐 그런 여여 더니더와\n놀 죽다 몬쳐 지터 무침이니는 직창전 그 덧말 오능은 저왔 앎있다\n쓱바방 족여 톺탄은 고연 피짐어여 오능은 가겟 한산이다\n몬 의 한거런 닥침서 있게 되기 것지 그 삻엽 토 한 느싯음 앓고 있\n기 여묵왔고 말다   화한다   몬 잃완지는 권한는 제 그런에 씨지도\n입나다 [빨간색 선 그음]\n몬 여나기를 외바 깆 앎음 있았은 데야 없다  우것 의 찬거른\n쳣 걸다다  깐 메싯도이 터죄황어던 몽음은 법는 오빠지인 여성의 하는\n반 거겨겨 있었다   저여 도어   직작 인언도 여성의 하언 넓음다\n쓰/메서 직엣 탁터을 와터여 네언기가 런엽 잉싶다된, 몬기지늘뤼며서,\n더몬 비비 훈겨서, 긴/가저지 지료 먼시 데침인 비콕 극더야노 그\n시강의 모금음 짛었다\n\n자기 앞을 쌰다 우쳐는 난 충진 핸다   어떠에 착묵이기 어\n왔서 기도   맞 있아든 여싱의 왔야것다", "summary": "GUN이라는 사람에 대한 개인적 감정과 생각을 표현한 내용. 누군가와의 관계 속에서 느껴지는 복잡한 감정들을 서툰 필체로 담아낸 글.", "tags": ["연애", "고민", "감정", "개인일상"], "mood": "negative", "decade": "unknown", "image_quality": "fair", "filename": "1993년_열린마음_p012.jpg", "processed_at": "2026-04-09T18:10:14.042751", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p012"}, {"date": null, "author": null, "content": "내가 하고 싶은 말은\n-why?- ... -왜 이러는가?", "summary": "작성자가 '왜?'라는 질문을 반복하며 무언가에 대한 의문과 답답함을 표현하고 있습니다.", "tags": ["고민", "일상"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p013.jpg", "processed_at": "2026-04-09T18:10:16.162338", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p013"}, {"date": null, "author": null, "content": "9/14전 07:21 너를 떡 먹는다고 했다. 서로의 새롭게 자는 것처서 멀어다. 쌓아가고있는데 이제 시기전에 가서 [불명확] 닫자되는 꼴 좋았다 자신감에으에 켯점이 됫지만 잘 되겠지. 자꿈 동아가는 길은 꼴 참깨기고 꼴 켜다 다기하나 컨서 뭐메이끼면 개도는 다되눈과은 잘했다. 다바에 쩨헤서 곤웃에서 담배즉 피다 돌아갔다. 반강이 교처햇다 그게 저정은 달못드데 그즐 당낭데 먼다 나는 'c때뿐에 삼두아이 하즈야 에 와종 고민은 젤 ㅅ 봣네 있다 그 내가 그것에 동굴하기는 나라켜라 나는 c자애 쪽조장 주시하고 움좋세서 깨지멀다. 제싶에 대한 확심다 또 그것에 데로 나시 8쌍과 여응봉이 난 호하쌕게 러기데멈려다 그런겯이 여저걸 어디하 난 과복하봤더 자신 하는 꼴 무가지 있는 그런 꼿이 아놈에서 짙었이 버릴깨 0 우련거 하마마 하메야 작정도 같은 이면? 앞다라 다셔드는 예송 아미받 선님도 미쎗에 일거되자는 그린 모른은 마은 뭐은? 그러저서 쌕야야 짤 것 같다 나쌔 14.9개친 신인가, 0이 시싶은 아도고 쿼큼 정려턱궁 않은뜨데 쥭지마 내게까 것이 아커셔 싳데나는 몯몽 좋가의 자정기사로 정리헤꿀이 앍잣다. 잇이 박긴 받됴이서 그어여어내가아닐까장에 우덥어가 겨게같 써더는 씨드 쌓는다 생소느네 이게 싶 지기= 그럿은 깐겨멀궁 아아다. 예생각이 낫 고 [불명확]", "summary": "9월 14일 새벽에 작성한 개인적인 고민과 감정에 관한 일상 기록으로, 관계와 자신감, 미래에 대한 불안감과 결정에 관한 내용으로 보입니다.", "tags": ["일상", "고민", "감정", "관계", "자신감"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "1993년_열린마음_p014.jpg", "processed_at": "2026-04-09T18:10:30.909355", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p014"}, {"date": "1993-03-22", "author": null, "content": "냉라히 앗아다. 전인 고거련데게 데버려운 기어즈 욧으 데다다\n내가 느끼는 강정은 아마 도인무걸쓰에서 [불명확]의 억사상 공걸것은\n붓데인 정아것 ⊗ Herman (공라명/Immus) 휘터이 공아항 기즈마를)\n켈다헬데써즈 욧고 몸잉인돗이 느끼는 강정과⊗ 톡깐은 컬어다\n정아겡 몱겅겡 [불명확]이다. @GERMAN은 더잭과거린[불명확]롯것이 다니다.\n[불명확]러더 여써네 구처옷너 문희민짓은 기즈하린 [불명확]는 어떣른가?\n\n民\n\n'깎어여0조아처겡 뭇서겡, 젯진것이고, 댐포이자\n항것은 끙어 샤 뫼것.0\n\n93-3-22.\n병\n\n우려는 아쳐이다.\n우리누누는 젯써롄는 교로웅다다 상점네 싱장하는 서장닷.\n하! 그나 하!\n그너, 빠 옷는 교로웅다다 그것네 싱장하게 느껴기기\n앗았다.\n그 이웃은 중앙이 앗 앗써야.\n\n- 도데온 -\n\n'인깐' 이렁 왔 이장하 동몬다.\n'기어, '이 비우 나 종싣 깐 입세는 있다는 싱장이 든다.\n때롱 인깐는 기어,상실하가 되는 것 필요한 것 넓다.\n너은 이해했다는 것 서을 깥 알아야 왓다 왔다\n그러나. 이것에도 우수는 있다. 깥 안한는 새강하면 다른\n이써가 칠은 걸으는 중증겠다. 아다랓 것 여윤여 미찬셩의", "summary": "개인적인 감정과 인간관계에 대한 성찰을 담은 일상 노트. 특정 인물(Herman)과의 관계에서 느끼는 감정들과 이해, 오해의 차이에 대해 고민하고 있습니다.", "tags": ["고민", "감정", "인간관계", "성찰"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p015.jpg", "processed_at": "2026-04-09T18:10:48.861506", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p015"}, {"date": null, "author": null, "content": "손해이고 싶은 하는 종재이러나,\n노력은 하지 않으면서 서로 속태우는 샘들을. 육배들이\n보는 옥거서 不信의 렁둥이 93을 에게 열마다\n우움겠 봇잔 ?\n나는 이렇겠 두렵다.\n'나'와 비존정의 그림 아주 부충한 종재의 여향이\n육배둥에게 미칠너면 그리고 거기서 육배둥이 나쳐현\n되는 것이 너무 깝나고 우려정 것이다.\n나는 '나'라는 종재나 너무나 싫음데마 많다.\n그렇게, 나는 육배. 둥이들과 어쩌며 나에게도 아주 어려운(?)\n애기둥을 찍기가 여려다.\n나는 그것서 人間性을 가장 충돌하면서 싫고덜다.\n바곤 문자하게.\n나는 갈면 이땅데뭉 밤이 외롭았다. 물론 다른 사람들도\n다 그렇겠지.\n우리의 경험은 우리의 생얼에 보댈이 되져 결고 신.충배에게는\n그 봇댈이 되지 않는 지도 모른다는 생갓이 든다\n육함 이것은 나의 댈문이겠지만.\n미안합 다\n차건의 종재가 나쳐현 우승겨 노력싶저\nIzilimanjaro의 눈백 (처자가 등광 같은) 아는\n가자를 우이 해 본는것을 좋을즘다.\n90. 93 비의둘에게 난 충기, 신배로서 너뭐나 밤음했다.\n다시 하번 나 지친을 박성하고 미안하다.\n여제나 다다롱한 가는로 뭔나고 싶다.\n무자한 인간의 붓섯으로\n북이 채봤하세요. 영린희\n~ 90. 샅 ~.", "summary": "작성자가 자신과 다른 사람들 사이의 관계와 인간성에 대해 고민하며, 주변 사람들에게 미안함과 우려의 마음을 표현하고 있다. 남산, 이질리만자로 등의 경험을 통해 인생과 관계를 성찰하고 있다.", "tags": ["고민", "인간관계", "자아성찰", "미안함", "우려"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p016.jpg", "processed_at": "2026-04-09T18:11:01.644929", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p016"}, {"date": null, "author": null, "content": "첫 번째 섹션 (검은색 펜):\n[불명확한 필기]\n\n두 번째 섹션 (파란색/초록색 펜):\n보통방학 때\n수능여행 괴로움이 뭐였? 풀왕된 악몽레동이\n마짓 M.7.3T 서로 우지된 지 악은[불명확]\n꼬니 →깏은 내가 믹혹은 내 누지이\n괴중이 되집다. (내가 뜯 별곡 것은. > 0~[불명확]\n바임 빗이 불 것 있 다른 것은 되미 하지.)\nM.T. 못든 씨온 꺼써서 간 것이 뭔기네.\n공기기은 아침 처지하는 앞중 씬다. (초록 동그라미 표시)\n꼬니 그 저자함나 많충함 옰에서 새로운 선서는 안심야\n예프옹 앎음 깨이. 랜테[불명확]\n더 꼭솔 당신의 변은\n빡요 어졸 앎은 것이다. 나는 우나이다.\n생성 내가 조나서 가서. 오즈응되 꽂한줄 운짝으로\n번생. > 빨지 여는 기\n오니기 꼴들이다.\n< 강대기 자자으 등 사영 >\nLast line의 '빨엄'을 떠 먼서나니, '누하나'는, 꼬조엔아\n'지 의구' 뛰빠쇠 되자꼬된 아등 311네 '느곡이의옹', 궁꽉서\n'뛰없나', 'K서' 'MBc' 'KBS p022"}, {"date": "1993-03-29", "author": null, "content": "사이가떨어 정말 숨겨진 곳 떠나 밤이 깊시면, 너머 우리진 쓸쓸 못어네 뜨꺼 너기 간택촉 수 있곤 마음의 추거라 여기기네 겨더려? 칠심켤 하나. 떠꺼 정말 저녀이 어열을 떠쑤 천장가 버틀눅 있는 창은 너머 우려과 밈으면서 은는 어것으로 여청아툼으러의 나의 것같음 어쨌가 하나.\n\n1993. 3. 29. 월\n\n(P.S) 촌자 예쁜 잔여서 쪼지 앙으면 쩨녀데 다한 몯과 곡천의 촌자 표로 용기를 려겨을.\n\n응해!!\n문인결서 삼기보데···\n-정서-\n\n나 귀내지 이귀쓰 거 아 나 자버세에 슬걷얀는 곤 \n누불되나 수 나 따쓰도 아내 다. [불명확] 은듯 [불명확]은에 담극\n정자 정을 나뭉되나 어자 죽으 바떼야 쩨 수 닮 다\n그 봐떼정여나 니 어진싯다 그러나 [불명확] 닫다.\n겨제나 [불명확]\n\n어는 지른 주거되 쩨면 이미기 젓다 용행 가능 구겨아 \n쩨떼 해이 쪼져 여늘 다. 나쌔나 수겨의 쩨떼 셔울 삭 수\n풀다.\n처찌. 쬘쩌여. 나어싯찌.\n그겨기 작었나 나노 어적에 때떼기야 우거저\n('.'.'.',) 1쏨 도떼.", "summary": "1993년 3월 29일 작성된 개인적인 감정과 생각을 담은 일상 노트. 밤의 고요함과 외로움, 그리고 자신의 감정 상태에 대한 성찰적인 글들이 담겨있습니다.", "tags": ["일상", "감정", "고민", "성찰"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p023.jpg", "processed_at": "2026-04-09T18:12:45.069120", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p023"}, {"date": null, "author": null, "content": "- 1 -\n2자/4! 15야찬, 여제는 11시찬 짓다.\n그동의 우는 자서글 버었는지 싶기한 따를이다\n\n- 2 -\n담사가 왁아지로 취항을 떠 쏘 해서 여기저기에서 정려의 말, 있사질을 들었다.\n표함진 현처한 나어젯 당적 앙은 왈등이여서 여적치기한 했다\n그련 왈든을 든어야 왈 사랍은 내가 아니다.\n안잔으로 같이기한 쉬던 기장들을 걸닝 누 있았던 것을 9오년에 약한한\n흔 여려 혀든들에게 정던 밤을 깔든다는 싱질으로 쏘어다넷지 때문이다.\n다른, 사랍이 나이에게 전해줬던 것들을 또다른 누군이에게 전한다는 것.\n그것산 나의 쇼방이여 음시에 내가 잔당해야 할 최쇼한의 의무이였으하다.\n\n여제 잣정을 자는데, 쏘에 정창이 혈이 나다쳤었다.\n정정 과려으로, 임에 진의 모든 그래로.\n듯시정인 의사한 하더니 왕속 어리른과 사라저 버했다. 왜했을까?\n\n- 3 -\n그것과 같은 사라들에게 서로운 빛을 젯다.\n읍읍이 이읍 몬이 힘을다. 앞 안해도 왈젯지, 싱련 모로고 있다해도\n당한 된다. 아아러 사소한 것들이라도 있이 어저겨러니까.\n\n- 4 -\n고대 서라과 다는 자부성을 잔고 살자.\n젯 젯 사라들의 성의없음과 자신없어원이 정에 있든 사랍들을\n피나 칫든이 젯다.\n자선의 선댁에 자해서는 책임저야 한다. 자끼 자선이게, 그리고\n자선과 관계를 앞고 있는 다이들에게, 그것이 자신하는 사랍이라고", "summary": "작성자가 삶의 의미, 책임감, 그리고 다른 사람들과의 관계에 대해 깊이 있게 성찰하고 있습니다. 자신의 과거 경험과 현재의 깨달음을 바탕으로 앞으로의 삶에서 지켜야 할 가치들을 정리하고 있습니다.", "tags": ["고민", "성찰", "관계", "일상", "깨달음"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1993년_열린마음_p024.jpg", "processed_at": "2026-04-09T18:12:59.610101", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p024"}, {"date": "3월 29일", "author": null, "content": "지금은 늦지는 않았나 서로운 공장으로 자신을 버덕질 기획는 아격 구여저 있다. 네인지인 쌈재이기를 거부하기에 인장은 자우응은 것 아닌가?\n\n-5-\n\n93년도 봄 답서는 대충 바뀌어졌다. 한 휴이 넘어갔다. 층해도 ⅓이 지났다. 아징 가벼는 앞았지만 시장 앞이는 지달려지멍여운 것이다. 새로운 강이 곤 지작인 것이다 도다시 부멍치고 깨졀 운비을 하여 용능을 받아야 갖다. 그각 한쩨 부댕끼 벤 교성했던 친구들에게 깏사와 풍정한 사람을...\n\n[불명확] 폭다서 박는 멱(?)서는 창짝한 bbmi 양다.\n놀되부 존 써 기달켠 여정 간이는 짧다-\n도다다짠 본고인 샤 자뭉이 온다\n여 여ㅂ는 좌냅 샷 _ 깎정서...\n빳자 께 한팬카 겟껴자 호던 언 사실에 다른 변량을.\n곽은 깔든 에이든 하는 삼깎는 뭭이았는데 - 션때 나는 속 죽혜\n노고짠 - 나는 사느는 생각은 안 찬 깩 다다한 경장으로-\n머는 사느능 빠깟은 싸\n멋싶네 드강으네\n위는 - 우근연 - 을 딴자 멍가치는 운네하는 파은으 (사 푸기하는 거문자 - 미저갸갸 우깟이 자삭 멈잔! 가비합은어:-\n셜데 깜시 근비산 운위에써 바지 우는깢피 윤롱이 와는 싶켄른 비결자는 앞았다.\n욯강 하면? 윙휴옷은 횟으나...\n곽는 어쌍하다 니아까인.", "summary": "1993년 봄에 대한 개인적인 성찰과 고민을 담은 일상 노트. 시간의 흐름 속에서 자신과 주변 사람들의 변화, 그리고 미래에 대한 불안감과 생각들을 표현하고 있습니다.", "tags": ["일상", "고민", "자기성찰", "시간"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p025.jpg", "processed_at": "2026-04-09T18:13:17.623171", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p025"}, {"date": "1993년 봄, 3월 29일", "author": "승래", "content": "처음~게속 이렇게되면 거슬리더라도 앞둬 - 그 한국수 린정되는 것\n머는 우리 짓 앞게 한국수울 사랑하는 것은 나아가? )\n\nP.S. 시간이 ~ 종종되서 제비게 오서둔 ...\n\n매저 그너이기 떠 이음 새인삼을 봤잖 LCAPPA 소중서게 ~ ~\n\n※ ※ ※ ※ ※ ※ ※\n충모차 킷(?) 깎은내 우수을 깍 보서우\nP2 짚 꺼데 짓 상송 콱향이 싶,싶 삽정한다 합니다.\n그응안 짓 잠은 한형의 종을를 보고하 드리겠습니다.\n1.11 정회 완나증언소 조징. 녀중라의 꼬와 울련 쎄떠\n뒤오. 이후 앙화 가와 쳐서 종련온비에 높초가 찻.\n3.13 삼심. 앞우 우2을 안앙 그을 지반 3.26\n꽃씨기 깎 한 닥미 쳐고 따와있을 지막\n하우 읽와: 정화 반, 커껀깡이키, 오서이우스 메현이\n· 팍 꽌져를 완진 차줬신 다다와서)\n363별 차의 앙화기는 긍내0 답을 맏2해를이온\n매경따저지요 숨우하게 되었음.\n녀족향기 앞쌈; 4.4 깡 우2증 앞이 본공 상차하앗\n읍밤 심3 을뜨데너 여학우중든 깍 보2다앗\n3거원자 머고 노는 꽈제므 중삶이 소중 3떠3음\n늘았으니 앎아서을 하하란 찬나다.\n어저 완나군 바써이 돼화를 그데로 진앎서다.\n\n3.29. -승래-", "summary": "1993년 봄 대학 일상 중 느낀 감정과 일들을 기록한 페이지로, 시간이 빨리 흐르는 속에서 소중한 순간들과 고민들을 되짚어보고 있습니다.", "tags": ["일상", "고민", "1990년대", "신입생", "감정"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p026.jpg", "processed_at": "2026-04-09T18:13:31.301724", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p026"}, {"date": null, "author": null, "content": "{\n  \"date\": null,\n  \"author\": \"gim\",\n  \"content\": \"선은 자신이 어떠지 자신을 모르겠다. 모토 같이 쉽산다. 화려와 같은 사람들 보는 같도 그렇다고 자기라는 미워하는 같은 것이야 아니다. 오즈 쌓쌓할는 느낄 쌓여다. 자말 선은 즉로 사야기 깃 같다. 환경정강은 못 것이 이도즈 괴로을 깃인정을을 못 것다. 어제 콘넘는내코 즉 봤다. 안전과 자땀 예보다. 자씩 인창하즈은 느껴가 셈상 난다. 내 자존심으로 못기하고 서 가슴 끝 그여은 된다 아 쌓다. 저자 어제 바는 정거강미서 / 시간은 이나 기다였은이 그러바다다지 창없다. 시이 조은심다명 인정가는 인장 보이 쌓것기지. 까맺은 갖자.같자\n\n- gim -\n\n우은 현린하은 어나다한 깃 않겠다.\n\nSlaves?\nHebrews born to serve to [불명확] pharaoh?\n\nHeed?\nto his every word, live in fear?\n\n? ?\nof the unknown one, the deliverer?\n\nWait?\nSomething must be done. [불명확] two hundred years?\n\nSo let it be written.\nSo let it done.\nI'm sent here by the chosen one\",\n  \"summary\": \"심리적 혼란과 자아 정체성에 대한 고민을 다룬 글. 자신을 모르고 괴로움을 느끼며, 인정받고 싶은 마음과 현실의 괴리를 표현하고 있으며, 뒷부분에는 성서적 모티프와 해방의 염원이 드러난다.\",\n  \"tags\": [\"고민\", \"자아정체성\", \"심리\", \"철학\"],\n  \"mood\": \"negative\",\n  \"decade\": \"1990s\",\n  \"image_quality\": \"fair\"\n}", "summary": "파싱 오류 - 원문 보존", "tags": ["파싱오류"], "mood": "neutral", "decade": "unknown", "image_quality": "unknown", "filename": "1993년_열린마음_p027.jpg", "processed_at": "2026-04-09T18:13:44.744891", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p027"}, {"date": null, "author": null, "content": "So let it be written.\nSo let it be done.\n@ 이 kill the first born pharaoh's son\n\nI'm creeping death O.\n\nNow\nletting people go. Land of goshen.\n\nU.\n23/12 PIKE?. Word fails me cheo\n\n나의 창은 사랑 그것도\n속은 사랑이 옆에 있어야.\n이곳 이곳의 밤 그것을 그리워하나하는.\n\n[그림/낙서]\n'나하옵다.\n\n다가 get\n\n가장 그렇게 어떻게 남의 문지 못하고 가장 깊은데를 수리\n옆에도 들려줄게.\n옆 옆 내가 어떤 입지 이해서 그것가 봐.\n\n중로.\n\n내 벗시 하하이 이하하고 히 말은 쉬리 이길 따우\n흔돌 여영이 어찍고 되는 입음을 꼼 우쉬디 앓으나\n다미 좌이게 이것네 기껏 시길 이것소 삶이 소의러내", "summary": "다양한 언어(영어, 한국어)가 섞인 감정적인 글들이 수록되어 있으며, 종교적 표현과 개인의 성찰적 메시지들로 구성되어 있습니다. 사랑, 이별, 삶에 대한 고민이 드러나 있습니다.", "tags": ["고민", "감정", "사랑", "성찰", "혼재"], "mood": "negative", "decade": "unknown", "image_quality": "fair", "filename": "1993년_열린마음_p028.jpg", "processed_at": "2026-04-09T18:13:52.376867", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p028"}, {"date": "3.90", "author": null, "content": "종신\n\n자세지기 쉬운 것이야 박궁 그래 하마터기가 묻혀지동이었기\n그리나 온 냄새은 그 거지 애기일랑 그맛닥고\n지 가술 을 제심 김은 그성/성까지 스마는 그런 어기들들려쉐서\n인돈이었든 겟지된 실은 나벤 둑뭬기 뭐지여이\n지 가찬 디하고 승 을 듬샤져돈\n늘잔이 것이 그래 눈방옆이 더욱 연공하여이.\n\n솔표 림의\n\n다가 앞의 가장 그은한 어기---\n쌘이서.\n\n나면 리었뭬이 여진 마음을 들리 않았이야 했다,\n오해도? hu ha ha.\n여긴까공 껴분씨까벡벼 브지금 깡까리는 써가이 든다\n로공봔다 뭔것 것이 있었구.", "summary": "1990년 3월에 작성된 일상적인 생각과 감정을 다루는 개인 노트. 관계와 감정에 대한 자신의 혼란스러운 마음이 표현되어 있으며, 약간의 유머도 포함되어 있다.", "tags": ["일상", "고민", "감정", "관계"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p029.jpg", "processed_at": "2026-04-09T18:14:00.137302", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p029"}, {"date": null, "author": null, "content": "{\n  \"date\": null,\n  \"author\": null,\n  \"content\": \"남 여정 같은 대한민국이 되었다 처남이 죽었어. 늘 게으름이 되었고 내 두 딸의 곁이 새삼났다. 아게 다시 의 혀럴 곳에 봉 자서의 맑은 공은 칙기쌤 곱다쌤는 몸의 숨들이 납는 쓸겟 있다났다. 하네 어머면 왜 맞에시 반장되지 뭔 동네 뭔빅 떼떨 든는것 깜 반젯다. 칙냥 여점초나가 고장이 안되는 하는데 떼 어렘 늠 강 사는데는 종는다는 숨 비젯자?\n\n눈 사는는 \\\"증은 돌이 [불명확] 자질 시정겨는 나메 더없더에 못한것이!\n넌 자들은 여제 움갔다.\n\n온전에 닫니져에 빼꼴은 도맣다.\n\n대아 닝산한 내신세야\n궂떼에 이써 왕?\n떠때빌 방상고, 힘을의 항은 。\n사세둔 나저련 게명다고 안든데 \\\"\\\" 나는 긁자선 \\\"남형에는\n힌젯 칙숨응 있겨?\n드느 - !!\n\n-경장시-\n\n교났다 자지다 찰놓다. 지몬 곤뤼다\n예겨의 나고 뚜곰 아잔구 싫은 깊갈 - 자격한 예감않는다\n가카닝, 육가야 내기 간다\n- 을씬-\n\nP.S : 야깆 자시는 잇댄 , 지기\",\n  \"summary\": \"여러 개인적 감정과 일상의 고민들을 기록한 개인 일기로, 죽음, 가족, 일상의 답답함 등에 대한 성찰이 담겨있습니다.\",\n  \"tags\": [\"일상\", \"고민\", \"감정\", \"가족\"],\n  \"mood\": \"negative\",\n  \"decade\": \"unknown\",\n  \"image_quality\": \"fair\"\n}", "summary": "파싱 오류 - 원문 보존", "tags": ["파싱오류"], "mood": "neutral", "decade": "unknown", "image_quality": " \n닷 4빈 너의 깎에 지하를 했있다.", "summary": "1992년 9월 21일 작성된 개인적인 생각과 꿈에 관한 글. 불타오르는 횃불 같은 꿈과 자신의 길을 걸어가며 겪는 고민과 성장에 대해 쓰여있음.", "tags": ["고민", "꿈", "일상", "성찰"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p036.jpg", "processed_at": "2026-04-09T18:15:28.816654", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p036"}, {"date": "1993-04-03", "author": null, "content": "1) 이번 이별 그것이 님께 닿은래?\n그것을 받으면서 나는 네가 진이 있을 것 같아 두려웠다.\n\n그런데\n\n다같은 정려하였여서간에 꼭겨린 기슬\n채운 윤혼손다.\nㅇ스럼 어 곽서하\\\\ 사라궁 거겸라.\n1993. 4.3\n7/22/\n\nNow let my people go, lord of golden.\nGo\nI shall be with thee bush of fire.\n\nAm I evil? [불명확]\n\nMy mother was a witch.\nGo was burnt alive.\n\nFor the tears I cried.\n\ntake it down now,\nDon't wanna see his face.\nI'm blotted and burned.\n\n1993 태을 표.", "summary": "1993년 4월 3일 작성된 노트로, 이별과 관련된 감정적 고민을 한국어와 영어로 표현하고 있습니다. 신앙적 표현과 함께 슬픔과 분노의 감정이 담겨 있습니다.", "tags": ["고민", "이별", "감정", "신앙"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p037.jpg", "processed_at": "2026-04-09T18:15:34.799396", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p037"}, {"date": "1993-04-03", "author": "씨유", "content": "자신 싶까희 넌 내가 좋아하는 음악의 가수를 🎤\n제대로 위해서 깃이 별로 없다\n핫디찰다.\n\n음악이 문화예술에서 자연짐이 돋어주는 New nells와 PE때문이\n굳든 놀린 깃이 아가나다\n그래데면 이지째 Osamu Osamu의 곡은\n놀 둥장 싶 있어다 'There will be time'은 이게곡이는\n미르포러커커는 곡얍 깃 깜다.\n우 자내의 점판진 느낌은 [불명확] 깃때이 [불명확]가아킥 다\n1993 4-3\n씨유\n\n혼의 물론 넌 자전거려 이미 저건 깃의 밤윤은 완환한 문올을\n받걸껏 다. 여시 공방은 느는 주은 사걸 옮다. 내 국도를\n종서로 모를 사장에게 칠천다 받 이제도 부창했다.\n\n- qjem -\n\n4싶도처 사전\n[불명확] 아싶도사 싶싶핸 느견 깃은 ...\n놀마다 사전핸\n#[불명확] 사시 주핸 깃 깃 깃은 싶싶다는 꺼시\n주주핸 깃 느낌다.\n\nI. 넌 향장 깻린석이고 굳찬 싶걸서 신신건 싶시 남훈\n나게잭다 싶다\n그래기면 되나면 '닐 싶하거나 아침거진 싶게 깃 깜다.\n또 자기 못할 깃을 재또 사제가 깃 깜다\n시겹까시 이렇게 사전고 노던싼시 괜찮다.", "summary": "음악과 예술에 대한 개인적인 감상과 일상적인 고민을 기록한 방명록. 특정 아티스트의 음악을 좋아하며, 자신의 감정과 생각을 솔직하게 표현하고 있다.", "tags": ["일상", "음악", "감상", "고민", "개인일기"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p038.jpg", "processed_at": "2026-04-09T18:15:46.004006", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p038"}, {"date": null, "author": null, "content": "우리나. 곁에 되지 않다\n\nⅡ. 자유 나 는 무엇이고 있어지?\n그릉 반대로 잠 반시 않다\n내 스스로를 많잖다, 그꼴 [불명확] 나 [불명확]의\n[불명확](바다자체)\n자유의 존재는 바께 될 것이고,\n우릉 버리면 잠 받지 않는..\n그러자 자ㅣ 한되면 청성처인 [불명확] 받한 주어 받아\n깐한 창 머낍다.\n청자? 솔의, 잡한는 자꾼을 사이가 되고 솔의.\n나 가 마음을 됴처 왜 주어전--\n\n[서명]\n\n영 접 들들    저솔에    살채가 빠다.\n세황공 검과 대황 읽과 [불명확]의 있은 읽음.\n여적자    우더에게 생각자 [불명확]의 있지오 있기에\n걸릉 섯을 킹태게 나강수 읽는 제 이닝차 !\n기도 쯤 9393은 밤에 꼬여서 구우여\n스우들 종 이기는 읽음     결이다  자거 읽ㅁㅇ다\n샤장한 다    창적여현  고되는  앞은  요는 좋기즈\n한 게  했년   roll장 paper?  새강나까   띠움도\n2건  뭴쳐붕 때           호솔항이 나꼴진 다.\n나, 나  호차  차시 30분  순여.", "summary": "우리의 자유와 마음에 대한 철학적 사색과 일상의 소감을 담은 필기. 존재와 정체성에 대한 고민이 담겨 있으며, 다양한 생각과 느낌이 자유로운 형식으로 표현되어 있다.", "tags": ["철학", "고민", "일상", "자유", "정체성"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p039.jpg", "processed_at": "2026-04-09T18:15:56.640810", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p039"}, {"date": null, "author": null, "content": "{\n  \"date\": \"1993년 4월\",\n  \"author\": \"T.M.D.\",\n  \"content\": \"되었던 농협으로 간 사람들, 아쿠초이낸 대문 입던 입다\" 가족없 메이헤 꼴이다. 인자니 복종성, 한준, 농영... 이렇게 꽈과라 박물침 믿음다 깎지, 꼴이음 종앙 잆 본느거 빠능 파다하게 떠리고, 그런게 말고, 메이헤 경선 꿀정하므 궁춘의 소식 일과, 당욕하 나아아이 놓쳐빈다? 어려우 원앙야 내해 욕 좋이 하려해 지미라고 파다다- 그 다길 꽃 찰깨 씩 온 것이다. 고도학고mm 한선선성 이) 이럼궁숭을 하나가 다. 서기술미옷 자기 국 깎 꿀느니 우고, 의공정 꼭 순리) 론 시뉴이) 대평용 발음 라는... 그래네 그냥 다 꽃 지훔, 지흑 서깍채 보너 왜니가 삶은 것 근난. 앎은 주는 자기) 극깟음 뼈이드. 실깍 하려) 싱이야테 꿀꽃 꼭 다. 우종 듭 다 그럼채) 느느 긍앙야또 고쇠하누 이시데이) 좋하면원 운니가다.\",\n  \"summary\": \"1993년 4월 T.M.D.가 작성한 일상 기록으로, 농협 방문 등의 일상적 경험과 주변 사람들에 대한 생각을 담고 있습니다. 손글씨가 흐릿하고 일부 내용이 불명확합니다.\",\n  \"tags\": [\"일상\", \"1990s\"],\n  \"mood\": \"neutral\",\n  \"decade\": \"1990s\",\n  \"image_quality\": \"fair\"\n}", "summary": "파싱 오류 - 원문 보존", "tags": ["파싱오류"], "mood": "neutral", "decade": "unknown", "image_quality": "unknown", "filename": "1993년_열린마음_p040.jpg", "processed_at": "2026-04-09T18:16:10.819094", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p040"}, {"date": null, "author": null, "content": "단전여 어둥은 나껴나,\n내 사느의 당정은.......\n먀어는 숨으로잔 지육하게 병심해 들어가여\n솔충한 정칠할 수 밤에 없는 내 자의 목싸할 쌤이다.\n\n눈둥은 궁물이 씬차을 위한 핫 발음 깟 수원이 닷 수 밤에 없으\n솔충 내 사느 에 송환손자자 아셔사키는 산정일 수 밤에.\n\n고려나,\n내체가 닐창 '초련'은 비렀 나운은 시간은 아너껏이낟,\n웨어 자정하는 아자하는 시간은 아너껏이낟\n사정하다.\n4는 쌤[불명확] 곡창의 넘계 몬로해, 공창의 씨깆을 뼘하여\n떼야즈 타는 돌야은 깃이다.\n\n正.\n\n누는자가 않힘더다 - T.S.엔너젯 《공육쪽》에서 -\n4곡는 깃럿은 닷이나른......\n곡은의 그잉자가 도머충쳐 깓는.\n\n완년 도 추에 앎아서 족럽는\n마팀속돈 깅 떠는 흘환에 앎아여 육여다.\n그러는.\n느글가도......", "summary": "깊이 있는 사색과 인생에 대한 성찰을 담은 글. T.S. 엘리엇의 인용문을 활용하여 시간, 변화, 그리고 개인의 여정에 대해 묵상하고 있습니다.", "tags": ["고민", "철학", "성찰", "일상"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1993년_열린마음_p041.jpg", "processed_at": "2026-04-09T18:16:20.864527", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p041"}, {"date": "1993년 4월 6일", "author": "김2.", "content": "너는 뭐라 그러워하자는 것? 나에게는 참으로 좋 못난 짓이다.\n그 그렇듯 기어찬을 하나의 마음으로란, 쎄찮 하나의\n마음에게 쓸쓸 숨차시고 싱어서 아저은 아자하는 앗다.\n그러나 그 아픔이 나홀에 커다란 기쁨으로 돌아오겠지?\n1993. 4. 6. PM 3:44.\n김2.\n\n(P.S) 서선 싣인 예콘에 될 악곡이 되옻음.\n\nM.T.\n내중 손우이 안전이라면 나에게는 귀다한 의미가 기쁨도 주겠다\n—정시—\n\n[여러 줄의 검은색 마킹/수정선]\n\n—M.T.—\n다는 답깎한 불기 옳오나\n역서 못된 분데가 싫고.\n\n—정차—", "summary": "1993년 4월 작성된 일상 노트로, 누군가에 대한 고민과 마음의 아픔, 그리고 MT(동아리 행사) 관련 내용이 담겨있습니다. 작성자는 현재의 어려움이 미래에 기쁨으로 돌아올 것이라는 희망을 표현하고 있습니다.", "tags": ["고민", "일상", "MT", "감정", "희망"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p042.jpg", "processed_at": "2026-04-09T18:16:28.145550", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p042"}, {"date": null, "author": null, "content": "텍스트 없음", "summary": "이 페이지는 손글씨 내용이 검은색 줄무늬로 덮여있어 읽을 수 없습니다.", "tags": [], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1993년_열린마음_p043.jpg", "processed_at": "2026-04-09T18:16:30.264415", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p043"}, {"date": null, "author": null, "content": "이러기 하나\n\n깻잎 징에 깨 살터 쏨까김\n덕산 선덕데 도되를 저아다\n즐 자하쌤 까거고 살았지요.\n구진 찬깨 떨어 깻 래\n까깥은 완나 싶자도 나왔거잔\n신자나 도되를 까기 깔매사잔 살았지요.\n어느날 두 아래의 도깨기\n살더 곡은 연정햇기도.\n시상이 닷더깐여요.\n서를가 까진 세상을\n우리 했었지 래붑이지요.\n사항도 적아나\n시상을 하나씩 까거고 상나다.\n에 닷는 세상을 이락는\n같은 세상 하나 가능에 없지요\n그대와 내가 앉방은\n세상을 하나씩 닷는 것같더니다.\n들리와 내가 앗방은\n세상을 하나씩 닷되는 것앗나다.\n더 곧 세상을 앗드는 것이지요.\n\n正.", "summary": "세상과 인생에 대한 명상적인 내용으로, 반복되는 표현을 통해 사람들과의 관계 속에서 세상을 바라보는 관점을 표현한 글입니다.", "tags": ["일상", "고민", "철학", "감성"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1993년_열린마음_p044.jpg", "processed_at": "2026-04-09T18:16:41.427105", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p044"}, {"date": null, "author": null, "content": "입시\n\n이 다른 것을 알고 싶게 되면\n자기 것이 아닌것 인\n나는 것 하나 깨달았다.\n\n아버지 팔짝하는 마다\n손가락 말아하는 [불명확] 비몬치험\n\"너는 반드로메[?] 찾아\n있자 반는 사랑이 되어라!\"\n\n[불명확] 뜨-은재\n- 이젠 뭐든 괜찮다\n초인것 바꿔 도 아버지 눈 뜨에서\n...\n\n묵경기 사아-왔을 어떻든\n내게 잘-? 빛 깊이하 왠겨\n모로-- 우겹은 왠들 왠는 시정\n이었다.\n\n이것 나는 너팬에게 깊은-곤 있\n모르겄 빠.\n...동- 이 우였다.\n\n경규 암에서 자자 용-을 완 황자 목든은\n미쳤 내게 느-뮤에 느 의의 뺴다\n\"앙족\" \"족 내 깊깊에서\n태아므 뺴렸다.", "summary": "부모님, 특히 아버지의 가르침과 영향에 대한 깊은 성찰의 글. 자기중심적 생각을 버리고 부모의 사랑과 가르침의 의미를 깨닫는 내용.", "tags": ["고민", "가족", "부모", "깨달음", "성찰"], "mood": "positive", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p045.jpg", "processed_at": "2026-04-09T18:16:48.885502", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p045"}, {"date": null, "author": null, "content": "잘 지내요? 기쁨\n\n빛을 주신 그분께 감사드립니다\n정의는 지도자이며\n나에게는 빛을 주고 소중하게\n\n내 삶이 흐르면서 설레임이 있을\n이곳에 또 다시 인)\n\n아직도 내게 꽃은 새로운 추억으로\n느껴진 것 같아\n가슴 안 숨에 건강함 → 때 하나\n있었나 새원 것\n\n시간이 시간에서 옮겨도 싶은\n소요 빛나 삶의 이야기는 시작됨\n나는 낡아 흐로 불렀던 사람\n\n선집 변영이야 \"이젯 이\" 다가 오고\n있었나야?\n또 제개를 받 곤장 고민 젖나\n\n제곱정에 차영 우수 옆 배시는\n지 더  가신  싱잘 아니  쎗져서가  기쌕이므로  짭불이\n왕싱도이 .... 그떠나  까봣젯    저이  쌀도 든  떨릿도\n넓 서팽  우겨셔  싶자여  중 싱짓고  느원제다 떨다\n싶잇저저꾸다  의미있고  껸면다  저런 칠을  싶자한\n가지왓도  싶자고  싯깨.  아싢 끼저도. 징도  이좋가저도  새진이 듣닫다\n아네  at  kasf.  기쌕지도  싶다                 -gun-", "summary": "삶과 사랑, 행복에 대한 깊은 고민과 성찰이 담긴 글. 인생의 의미와 인간관계에 대한 철학적 생각을 표현하고 있습니다.", "tags": ["고민", "철학", "삶", "행복", "인생"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1993년_열린마음_p050.jpg", "processed_at": "2026-04-09T18:17:54.459297", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p050"}, {"date": "4월 9일 PM 또는 4/9", "author": null, "content": "있었어? 그랬단. 있었더라도 있었나.\n시른음 이해해주고 싶은 그런 인간들\n받나고 했다. → 이해하기는 싶은데 그게 되겠소?\n역시 적힌 받나는 잊는다.\n\n— 3/생 —\n\n고민하는 9초동안 뭐 했었어서. 아 많은 갈등?\n고민한 처음이 최초였나나서 내눈이 보이지 —\n그래나 글을 먼저 쓰려는데 알은 것으로 보면 가는\n것이 눈을 받는다. → 14명이 아매 3명 먹는 것\n지우고 낸 것 바뀌었나니 시자기다. 찬성\n내가 페이는 것을 개원해 이어하다. 조금—\n\n√\n3인의 위대한 이야기는 /9330. 4. 3\n고지 해때서 한을못는 (수/대원 ①)\n\n수많은 말들 그 많은 학기가 있나보네.\n누군가 싸워있고, 그 싸움의 학기가 새항나는, 또 다른 누군가는\n그 많은 말들이 너머진다.\n어떠이음도 아름이 패해졌다. 아, 패해진 정조하기 덛나는 지뽀서\n어떻게 강자혜에 등했는지 모르겠다.\n요즈 의지되는 사람들이 새겨진다. 너였나 하느님께 한자 드린다.\n내가 그들에게 의지한 마음 나 또한 그들에게 의지 또 했는\n조재되 바뀐다. 또, 그들이 나는 과장 심각을 초재. 초중한 초제는\n여전 수 있고로 나 씨중은 그게 그게 커워지시 !\n쌓아가는 것이 참 핸합하다.\n\n4월 9일. PM 다섯", "summary": "삶의 많은 순간들과 인간관계, 갈등에 대한 성찰적 기록. 서로를 의지하고 지탱하는 사람들 사이의 관계와 그 의미에 대해 깊이 있게 고찰하고 있다.", "tags": ["고민", "인간관계", "철학적 사유", "감정", "성찰"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p051.jpg", "processed_at": "2026-04-09T18:18:06.625080", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p051"}, {"date": "9월 2일 (연도 미상)", "author": null, "content": "와중은 언니와의 즐 쌓기되었다.\n그런데, 찬희의 꼭 써야 된 건가?\n어제도 솔직하게말했었다. 응급 자살을 지키고 판국이을 혀고,\n느껴은 왕은데, 나 심이 쌰계 쌰데, 자신같이 버리고 덤장다\n여긴 한 철들과 지어있다. 찻밤을 자지는 것을 촛치 왔고\n누군가는 우리았었다. 심온이다.\n더저은 않아 왔은 수 앍어서 쉬를 추와을 것 내배\n마음 된 구정이 물키왔다. 따깨다. [불명확] 아!\n종선의 한겨을 물나마 서강앞에.\n\n9.2. 오.오. 쉬9.오은 생각에 서초 쉬하는 명.", "summary": "언니와의 관계와 친구 찬희에 대한 고민을 적은 일상 기록. 복잡한 감정과 인간관계에 대해 고민하고 있는 모습.", "tags": ["일상", "고민", "인간관계", "감정"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p052.jpg", "processed_at": "2026-04-09T18:18:13.439068", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p052"}, {"date": null, "author": null, "content": "여아, 반갑습니다.\n왜 어디 반구성은 잔업까? / 놀까 우리 둘이!!\n난 요즘 집에서 일찍 자이다합다.\n우리 둘이 놀러 놀아놀 기다리는 맘풍 찾이다.\n여아 둘이가 놀나 빠싸까?/ 옆마. 응!!\n♦ 나대네 BLACK DAY센 아때를 마나까로 했다.\n아. 리대했다.\n\n-공석-\n\n내게 새로운 꿈을 꿈속\n꼭차찬 나꺼 !\n뭔데 가너 궁쿵쿵 땅/…\n\n[이하 여러 줄의 파란색 볼펜으로 그은 가로선들 - 불명확한 낙서 또는 삭제 표시]", "summary": "친구와의 일상적인 만남을 제안하고 있으며, BLACK DAY 관련 내용이 언급되어 있습니다. 대부분의 하단부는 파란 펜으로 그은 선들로 덮여 있습니다.", "tags": ["일상", "친구", "만남", "연애", "농담"], "mood": "positive", "decade": "2000s", "image_quality": "fair", "filename": "1993년_열린마음_p053.jpg", "processed_at": "2026-04-09T18:18:19.799573", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p053"}, {"date": "1993-04-10", "author": null, "content": "지는 여름아침, 3월은 아침내 깊 달아났다.\n남편과 무섭게 싸여 외로와 자폐, 시험들.\n지친 객어서면 내이인 바뀌었다. 그런데, 늘 여름처럼 있을까... 괴롭다.\n아제, 다음해여의 마시마 3월을 거나 넘쳤다.\n몸으로하다 새로게나 사람 것이 있는 나였다 사랑.\n젊았던 중경, 슬했던, 놓았던, 자생... 아침 나쁘이 여났다.\n'지는' 이라는 것은 것았 흐은 강졸을 붙여 앞으려다.\n03초들이 여파나 뼈여였... 아바 03초은 싶였던 아현 못중싶이.\n\n내헌다리에는 것은, 여싶여 배써 정싶여 자싱을 잡으려여 정나의 마음을\n어슷은 하려다 아픈 보다싶은 벗타싶 나의 삶을 싶으는 사랑다.\n자신 3싶단 깊쌍였던 몸은 것이 다며 하렵다리에 해받속이다면\n못싶단 어싶있은 마던 것이 다망 알묻을 다른 더 자정정기 정싶다하여다 젓다.\n정싶여진 웃무싶하게 또하는 시내이 막 앞여 싶다 있다.\n아비, 나 깊며 앞이 다싶고 보싶했던 나는 돌아싶 싶여를 정싶다다하나나.\n여기가 여뭉 가싶는 용 여싶의 정싶은 마므 2 여싶속싶이다 나다싶을\n다싶싶싶이 시대는 거어나나?\n나가 사항하는 명음, 자정하며 삼을 상여있다.\n또, 반여는 명 받싶려지.\n\n93. 4. 10.\n\n[불명확한 부분이 많음]", "summary": "1993년 4월 10일 작성된 글로, 봄날의 감정과 관계의 복잡함, 자신의 삶과 사랑에 대한 깊은 고민을 담고 있다.", "tags": ["고민", "감정", "사랑", "자아", "일상", "성찰"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p054.jpg", "processed_at": "2026-04-09T18:18:35.195178", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p054"}, {"date": "null", "author": "jean", "content": "첫 수를 [불명확]\n\n어제 자몬0 싶니까 아냥 비추비는 그짝에) 바궁시는\n궁마는 어둥 혜빤지 아냥 서쪽 보든 오수쏨읍 [불명확]\n묻느 웃 자아셜 게때 어쓸 저항옹 처것 입응 웃여\n저것 [불명확] 시셜 빠사다 보드잔 사잘삭\n(저사셔 저쳥옹 느느 정성 속메사 뭔묭숨 억든므챠\n손 아기자) 처 놈 제빨 웃 는)는 비-왕나\n응아나 해든 렌응옹 설 병시 앗옹 젖디냐, [불명확] 는 서삭옹\n터는 그 웃)는 잔옹 빌 깟 깟 깟 [불명확]\n또 정사몬 종 째픈 것 한빠 어다, 한 것댄 자강 사정\n빨귀 게 종겨 못)ㅇ 잡서 [불명표], 경어 사셜 싸수옹\n중멍옹 빠아야 쳐다/중지의 중강 자 념접되 웃옹 웃 놈\n연댕 어냥 아냐, /아 정범 119 5기 써 [불명확] 는 그\n하치 서응옹 어냉 섯다 컴젇\n\n[하단부 - 더 명확한 글씨]\n\n정정쩨째 종더 깟! 얘룬 싣겟는 뭐네 싶네.\n느느의 각 차자이 차자이가 족여 되여 조예도다.\n깜 자거의 각 체꼬 속저죄 어쌤요맘 롬저하고 삼자맊,\n너멍 자는 감젯이 앞선다.\n'싶껫깎걸'이 쓸저나 나메도 그 속켯이다.\n그 속켯의 쩨럿을 돌에서맘 좋 어 그 '나'로 가는 친굼 돌랑 숨\n싸은 며어다.\n나의 앞이 팟하고 줄녀기 바뀌 바라지는 앞느다.\n닥처 내게 주어진 상층 천착 닥은, 종환 내 삼응 뭐에를\n조선한 네 림으로 지긔 삼다.\n지정 여서서 정착하거나 도쟉 되는 싶서 앗다.\n젯어도 내 사창하는 사람들이 차사우랭 여진만들 총 제온\n\n[서명] jean", "summary": "복잡한 필적으로 쓰인 일상적 고민과 생각들을 담은 개인적인 노트로, 하단부에서는 정신적 성장과 자기 정체성에 대한 성찰을 보여주고 있습니다.", "tags": ["일상", "고민", "성찰", "자아"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p055.jpg", "processed_at": "2026-04-09T18:18:50.542716", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p055"}, {"date": "1994-04-12", "author": "AK", "content": "밤새해야 한다.\n세훈은 잔 국룰 버렸게 보내야 깨닫\n.... 순잔 에르가 아젠 도우 의 '어머쌤 길' 잔 시가 짱구노다.\n나 왜지로 쌤과처는 그 사장도 쌤과 나르....\n\n1994. 4. 12. 월. AK: 준.\n\n기숨비즈더미니에서 11/30봄 끌즈 타고 죽을죽게내리는\n빙상으 들고 몽로로 왕했다\n비싯 볼바다의 구숨은 옷을워로 싶값장에서\n터섯이흥과 창 쌔 몽무기 너에 몬 만장다.\n중금의 까깨이 같 뭐 아개지 지 바다마 카너며....... \n닷뭉여에서 정갓못[원]산귀정과 장궁이여로 살행하다\n[원원] 똑는 내 값긴 덕이마 곡로의 비점장에서\n칙점포 왕정태적정의 이는 여시위에게 극피즈 더전아\n몽기와있어 더이아 징징하지 몬하고 솅소하어 했다\n ⊙ 여우이든켕러 몬전 밤이의 이는 헷데에서 우리는 꼬끼기는\n낫거와 아너곡 노무강정에 직싸기기 위해 뵈러했다\n찾아우길이는 놀의 다기로 윈 묶에서 정정건 썬어 삽긍듐에 입속에서[원]까지\n꼬까지 지헛다던 놈에게 윤어는 몽질코고 솧중 듯이컬다\n⊙ 휴비씨 밤극 안에서 낭비는 피던 [원] 안가에 싶인\n어 같아 마도이 솟으 런도다\n잔 앗지라 몽로여/ 그머 댓싸이 싶뤼정으 홓기여라여/\n우리데명에 돈팀이 계기기 저렁아 미온하다.\n그내 잔한곡 곡잔한다. 그내 너이 대재몽아 꼬 적용행리즈 ----\n\n가-5이 아질에\n  게 /깢", "summary": "1994년 4월 12일 작성된 일상 기록으로, 밤샘 공부나 과제에 대한 내용과 함께 친구들과의 만남, 여행, 일상의 소회를 담고 있는 개인적인 메모입니다.", "tags": ["일상", "1994년", "친구", "여행"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p056.jpg", "processed_at": "2026-04-09T18:19:09.341713", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p056"}, {"date": null, "author": "깊시어", "content": "성난 하면 이 세상은\n여럿도록 삶 속도 못지며\n톨렛메 붙인 친 이음,\n물에 기른 닮보다 아르차여야.\n근속에 못 올더 열화는\n못서 기저 못 틀는 비람에 이움러다.\n안소 인상년 휴렴(淳淳)슬 쉬더데\n풀 아나면 최여이옷.\n철버 삶을 받는자\n별밤 앓는자 또 있으라.\n\n- 나, 더이상 자한심적이로다.\n- 나 고풀 종종게기 닻데 그 사랑이. 더여 낑......\n궁을 깟다.\n내가 기는 그 여네 것여는. 2 사발,) 결해는 궁궁\n것네 내가 보게면 싸도게 여려나-----\n여걸이돈 칭 중갈(?) 돌라정다. 나 이검머지 구종증롱밧(((\n여봉댸....\n네 것럼이 있는 못 이슬을 싱게에 까혼데, 나 붙머?\n\n그 사람, 사항는 내기 거항 어배니 네 데영을 아다깟 그 사랑,\n것,(비) 네 밪훤, 아다너이.\n나 나빠니다.\n네 나래메 네라 네 여솨, 그리고 네 듯지-가져 여다기데라리지\n비 자 깉슷(내영 , 네 아적, 딩어돈 상도슷,\n종웨여 그 여슷. 깍여다.", "summary": "작성자가 인생의 갈등과 관계에 대한 깊은 고민을 표현하고 있으며, 자신의 감정과 타인에 대한 복잡한 심리 상태를 시적으로 서술하고 있습니다.", "tags": ["고민", "철학", "감정", "관계", "자성"], "mood": "negative", "decade": "unknown", "image_quality": "fair", "filename": "1993년_열린마음_p057.jpg", "processed_at": "2026-04-09T18:19:20.313087", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p057"}, {"date": null, "author": null, "content": "{\n  \"date\": null,\n  \"author\": null,\n  \"content\": \"첫 번째 섹션 (검은색 펜):\\n[불명확한 상단 텍스트]\\n\\n두 번째 섹션 (파란색 펜):\\n수정해 수정해야겠어 미장해 자중하지 속기기잔 삶아도 우리봅네 수돕마\\n화장을 없이도 것같다 것같다 자처지않 의렇지않았 [불명확] 것같다\\n곡짜지 중움은 여침하다 했다 것도 기정해 섯겟응정에 것 어기저지 밤을 멈\\n몸흠자 등 짓느 것도 어려다 것같은 밤 밤을 것을 것같 찾은 시것같이\\n것같이 밤을 나 싯음을 것같았다 것같 천마음는 나 한다거 이때 떠있지않은 나만\\n있고 있는 것하며 것를 것같 창 않는것같다\\n\\n것들 중금문 기 것들 밤이든 걸 밤 것했있했다 잃어지 맘안 느넓다\\n확자 없던 남몽재 것같 날 받으면 느너자 심각 것은 고통적 있었\\n아되지않을 맘시 없는 바뀌었던 것. 늦 능 받은 했으 [불명확] 나아은\\n것같 나았었다 받을 내건 것같 지키 재미는 재건 섯됨다\\n것같 [불명확] 것은 찾을 있었다 지나도 무엇 것같 찾아도 도망했지나\\n찾 변했다\\n\\n속기자기에 것들 해야한다\\n\\n그랜리 것할 내 것했인 여자를 것나는 추천였던 기봤어져\\n것같 것같다 우창자 맘 난 것했진 내를 찾 것같 누구하지 것같\\n우리는은 보호했던 나 ㅇ 내맘도 층되 여졌 것이 것을 것을\"을\\n\",\n  \"summary\": \"불명확한 필적으로 인해 정확한 내용 파악이 어렵지만, 반복되는 '것같다', content": "음악 장르론 'Kerrang', 'Avore', 'Music Life', 'Bwrm', 'Circus', 'Hex Paroder', 'Metal Edge', 'Musik' 등들책.\n\n강남 Heavy Metal과 Hard Rock 구분들책.\n아이는 뮤직지만과 계 작신 클래호을 잘 받고 한국는 사랑 중심\n곡여은? 컬조의 눈 어둠들을 Heavy Sound을 우치 지정했다고 계도\n곡전의 아픈 것앎 니다.\n50년대 이 받전한 Rock & Roll을 이어 모텔 까쵸 맞은 Heavy Servnd\n곡전의 음향을은 60년사 잘받우 Hard Rock이든 한 정중들 까까!\n되었으며 이우 Blue Oyster Cult 라는 궁금 왔헤 Heavy Metal 이든\n이들을 가지껴 되였고 그 이후 기별 문투 Stage Momrier.가사 중에\n도다 Thrash, Hard core, Skateboard, L.A., Shock, Baroque,\nAlternative, Progressive Metal 등 수많은 쌍호을 나머지기!\n되였습네다.\n\n뭘 시작에 욕리켜 새로운 minor chord 의 감됨으 우려하는 쩨청중는\n내모하고 있는 것이 즐김이다 까쩨귀다.\n\n◎ Micheal Scherker Group 의 \"Tales of Mystery\" ◎ UFO의 \"Belladorna\"\n③ Ulrich Roth 의 \"The Night the Master Comes\"\n④ Led Zeppelin 의 \"Babe, I'm gonna leave you\"\n⑤ White Wolf 의 \"What the war will bring\"\n⑥ Badfinger 의 \"Worthest you\" ⑦ W.A.S.P 의 \"Sleeping\"\n⑧ Mötley Crüe 의 \"Home Sweet Home\" ⑨ Magnum 의 \"How far Jerusalem\"\n⑩ Orion 의 \"Jeanne\", ⑪ Gary Moore 의 \"Empty Rooms\"\n⑫ Thin Lizzy 의 \"still to love with you\"\n⑬ Gray Moore 의 \"Parisienne Walkways\" ⑭ Gravy Moore 의 \"Sunset\"\n⑮ Quiet Riot 의 \"Thunderbird\" ⑯ Steeler 의 \"Serenade\"\n⑰ Meatrazz 의 \"Suffer Me\", ⑱ Europe 의 \"Dreamer\"", "summary": "다양한 음악 장르(특히 헤비메탈과 하드록)에 대한 분석과 선호하는 음악 곡들의 목록. 1980-90년대 록/메탈 뮤지션들의 대표곡들을 언급하고 있습니다.", "tags": ["음악", "헤비메탈", "하드록", "음악평론", "곡추천"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p060.jpg", "processed_at": "2026-04-09T18:20:03.622015", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p060"}, {"date": null, "author": null, "content": "1. Ursa Major 의 'Back to the level'\n2. Paying Mantis 의 'lovers to the Grave'\n3. Metallica 의 'Master of Puppets'\n4. Metallica 의 'Orion' / Joshua 의 'November is going away'\n5. Tony Macalpine 의 'the taker & Chopin Prelude 16, ops 28'\n6. Steve Vai 의 'Attitude Song'\n7. Metallica 의 'Fade to Black'\n8. Crimson Glory 의 'Lost Reflection' / Whitesnake 의 993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p067"}, {"date": "1993-04-06 (상단), 1998-04-16 (하단)", "author": null, "content": "윤은 시험이 허덕대이 존재에게 했다.\n아직시되다. 다른 자신이다.\n그러면 맨든 한문이 져해졌고 충다.\n어는 우화된 한다이 차신은 어느게 말서 스킨 것의 자신에게 깐 우 찍다—\n란 맞이 사랑다.\n그러나 모든 것은 나 맞든이 쌓돼더면 그럼 더욱높게 아닌가?\n문 교사는 닳담한 하는 것등이 되어병존는 곳된 높놀이?\n신서된 놀이는 --점이 잖다, 느 것에서 맨든 것을 맞을 수 있었다.\n어거있든 됩/상에서 '나다라는...\n정(수)로 다한 낮았다..., 이번엔 쩨는 단들하는 것이 우리아하는.\n여짓이 그럼 것들을 넓 수 있다면 느것과 다른이 발명병 것이다... - 맞이 되다?\n\n머이 본치 사나든 교새 그 새것과 새파작.\n너자신의 쏘이면도 롤 수 있는... 롤 수 있겠?.\n'새롱이다 너텍이 고죠된 충하는 나다\n'삶을 어렴되었'\n너와 신내가 깟 맞이 샤가난다\n'새새을이 깟 맞을 는 70% 느 방사으이고 또% 느 바천하랴'는 앍!\n둘이 깟시 난 영영의 그럼 수 있으리곽 새깟 앎보데,\n전자 실 새한이 저욕하리 어렴다.\n\n이기 제에로 가지저거기 전접처지 욕한 '새네기로' 어떻 한물 or 맞는\n한 다는 것이 '욕질 우현다.", "summary": "이 페이지는 두 개의 서로 다른 시기에 작성된 텍스트를 포함하고 있습니다. 상단은 1993년 4월 6일, 하단은 1998년 4월 16일 작성되었으며, 개인적인 고민과 인간관계, 삶의 의미에 대한 성찰이 담겨 있습니다.", "tags": ["고민", "인간관계", "성찰", "일상", "사랑"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p068.jpg", "processed_at": "2026-04-09T18:21:53.881325", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p068"}, {"date": null, "author": null, "content": "요즘 미드(MIST CIA4) (드라마시아) '샤홍'이라는 drama를 봤는데, 극도의 도덕 있는 '독립 공화국'나라 같다. 별도 다하는 것도 같고. 조금나지는 요샤... 그렇다 그 나와 다른 것이 하나웠다. 그는 병참전인 대해서는 다 알고 있었다. 안에서 앗챘 나의 '젓진 달라은' 에서 앗첫 한 가지있었다는 따하는 남자는 엘짜엇다. 별국의에 반해 어떠하는 그게 젓있었고 그 것을 입혀. 여자는 존경했. 그렇 나는 우영있어 자처하게 있었어 여자를 자겨야 조회됐네.\n나는 왜를 여자를 궁시지? 검차됐다.\n\n짝순에 설려첬다. 조금 터 세팅의에 내된 아정음 여버나가 저 주껸 따무칠 밤은 못수 이있음 되었다. 중엠에 있음 찰우듯이 검정도 되고 보고 것다. 이 닫힘 과정에서 촉자 000을 띠교 있다. 저금 시간이 9시 30분 이다.\n깜의 덮으로고 상 개더 윤자 다 띠었다. 바까 터지려 찼자. 저것도 더저 못찮고, 추를 곱해서 설뭔 부위기에서 교정잘 9?뭔 도앙게 무정장 미하찬다.\n남들이 남석 7점이 헤정어가 귀사 시간에 맞게 기쓰세 든거기림 띠렴다. 음~그리고 40/0 구국거정체에 많은 채등들이 웰칠잖 가정치 가정치 가위(?)\n찼다.\n\n- 하자/곤서 외정머 실뭔했는 -\n\n나의 부모 찾은 세때 더리 투잔을 가혀차게 저저 했야겠다.\n\n10/4 10/9 김선서 야쿠 욜이 요기 했다.\n김써 직았. 마저기도 99 까음은 서저우세메 정하 왔나 받다.\n휴대에 바재 야나들 정의 벼상용 칭 되잖자, 띠어나 박충은 날꼼 작뭔정 희정맞 앗아 있는 네타 나능 거허자거 거거거자거. 거머자도 진상 호믹 찌웨 것렛 로롱는\n내 안나..", "summary": "작성자가 드라마 '샤홍'을 보며 도덕적이고 순수한 캐릭터와 현실의 자신을 비교하며 고민을 나누고 있습니다. 개인적인 일상 사건들과 시간 관리, 관계에 대한 성찰이 담겨있습니다.", "tags": ["고민", "드라마감상", "일상", "자기성찰", "관계"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "1993년_열린마음_p069.jpg", "processed_at": "2026-04-09T18:22:14.242963", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p069"}, {"date": null, "author": "정자이", "content": "넘 당황스럽다 되었는데 여기서 이루어 '뭘은 도다\n돌려봤 동료의 것이 뭐야 떨께 뭔지는 것이 뭐에 떨린다?\n다둔 것도 지내눈다 ·지것을 것을 지내다\n\n-용짓이가 불러서 함께면 왔다가\n용짓이를 못봤나 가는 하는 사람 -\n\n운데서 ' 연락이을 여 봤.\n돈 ' 연락이에 대한 어느세배나 어떻게 똑같다.\n좋은 않아다. 미심한데 그것 -지선이 것을 한 앗을지도 연락이은 받았더라-\n이 다음 쫓았더다. 남자한데이.\n내옆은 \\n·18 데닌거 아다.\n(완전)\n\n가는 벗자다. 홧음에 이런 도전거들을 느껴지 쌓으로다.\n홧 나가에 뭘더나 봤다.\n-정자이 -\n\n괴합한 봐 괴깡할게에 나떼에 뭉당할 직는, 우겻이나 롯\n나돋가 있다.\n미지 봐, 것을 거역다 보며 ᄋ 남각에 ᄂ으용나가 에어져\n바칠에 나깨이은 있었다.\n\n나봐고 족 에앗다 쿠리간은 선서?\n정.", "summary": "일상 속 인간관계에서 겪은 혼란스러움과 답답함을 표현한 글. 누군가와의 관계에서 오해와 답답함을 느끼는 심경을 기록하고 있습니다.", "tags": ["일상", "감정", "고민", "인간관계"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p070.jpg", "processed_at": "2026-04-09T18:22:24.668126", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p070"}, {"date": null, "author": null, "content": "기선이 바뀌로 떨쳐 먹자 아중 발림 / 오야기 구름 종원\n제시 시야 구구러 빔 - 왜 이게 앗 나면 이거 - 구멍\n짐 이거 앞으니까 종이에 삼마가는 깎지. 손지시 등어여 앞하\n나다너서 깐 나다면 깎이 종까쳔음). 어긋 농르로 아면 는노총 깐요\n야자앙. 오야기 우느축 씨강 처이앗 어씩 시정 얍면 그 간궁 수멍온\n종니다. 어떠긴 시정뼘 버기뼘 사멈한 농농강가 -청느으로 깐 넓\n깝자. 는준 처에 내격 안 쌈) 영마 아 방하가는 최망각가는 답긍 있자\n명나 근치 잠어 흥응 입마 아 머어 어껴 앗흠이 싸 갓궁 아시\n웃어으둘깐. 깡면 구 다끈 찍가뼘 앗 깭 샤어기올 흥이 앗눙 깡룬\n처더한은 녀놓까려 그냥 어어 놓벙거자. 그거 어거 목 듯의\n흑으(?) 들= 앗다겠= 그서녀 가기 좋어 데한 샤버 몬똥의 능앙어\n그땀땀열 쌍강의 정야느 덟양모겨. 언젖 머춘 처잔 메아까다\n앗놀 종어겨 어나머 샤며 멍 아거는 방다구 배다가는 그 서나씀 박에\n응 씨 알 능 앗음 공마이찰 깯씬 추진정에 서충 그정기 서든찬깜지?\n다크째 종결다. 그거다 기족 씨나까깜. 오가씩 그기 우로 증 강나무\n깐 고얼 나선 묻 딩 나되벵니 나 베. 벨 농강옴 광거에\n웅씨씬 계느 도기며 제 충정기죄. 늘이마 - 그핵싱냥 넘음 자금 냉째\n저는 해으로 좋은 는 넣온 - 나중하다 같은 능의 깡좋.\n못얌졍 은메 기논자 기나다 자은 메멍은 꼬 거정이 타징\n농다 올 기논자 웡거는 이다. 그 이의 잔 가지들이 좋 수 있는 시간은 아직 많이 있은 걸 같다. 다떼 사랑에 눈쳐, 좋은 쉬게 더움 었는 수 렘들이 있았 제시 좋은 이미 다움 여꾸랜 다들손해서 이 육적을 좋은해지는 않 딱 꺼 같다. (가지) 좋일이 깊이 들의 온 걱겨는 좋은 여름이여 했다 나중이 들어 나서 싶지. 쏫 나. P.ei.\n\n기억 별을 본 그걸을 그외자. 짤 기는 기 같하기의 뵈켜다고 있추다 쟁 기다 괴스을 쳐 공정. 뵈춘이 않은 앗이 기변 쬐는 띠 한 인솜리을 좋자다 쟁을 쳐 공정이 본다 그싶 쳐 있음은 기의 활장이편다. 있으다, 다리곤 인솜되기집 쬐기 기저. 다쨩 줄초, 에떼 뵈켜었다, 다쨩 인솜기집 봉것 다이자찾 봉것 기상은 가다.\",\n  \"summary\": \"추억과 그리움, 그리고 시간의 흐름 속에서 느끼는 감정들을 표현한 내용. 과거의 기억들이 남겨놓은 의미와 현재의 감정 상태를 성찰하고 있습니다.\",\n  \"tags\": [\"추억\", \"감정\", \"성찰\", \"일상\"],\n  \"mood\": \"neutral\",\n  \"decade\": \"1990s\",\n  \"image_quality\": \"fair\"\n}", "summary": "파싱 오류 - 원문 보존", "tags": ["파싱오류"], "mood": "neutral", "decade": "unknown", "image_quality": "unknown", "filename": "1993년_열린마음_p082.jpg", "processed_at": "2026-04-09T18:25:47.551505", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p082"}, {"date": null, "author": null, "content": "나 4의 오늘에는 자존감과 도덕과 왜냐면다.\nAngel·Dirk '궁의 타운'며.\n\n그 자존감은 내가 읽다 곳 뒤덩 쓰러지장에서\n너머리이 사떼을 깍 앎공양이야 같은 놀이다\n나온점 내가 자젯이라기 쓰떠기 같 엄 쑥덕에서\n내강레를 해광쿠데 놀 이 사떼중=느하가\n처제 건풀먹고 뭐이 나왔다.\n내가 좋아가는 몸 하차 놈으 떠어짐 다옷 떠어옳다나)\n나생고 뭐떠욧으 숨어내러다. 이제 놀외(응)거라는\n샤리 둘리지 앞틀파. 족정냐 봤다-\n서떼를 있은 어미가 떠어짐 궁글로 맺도다.\n궁을 맺도다\n\n웃어정 면냥에 저걸 셔에 어는 Remark 샤질을 맺났다.\n의어리 칭시한 겸혁여야다. 머시자 허필은 겉정을 화기다.\nDame law'를 맺져 직앗떠 왓하춘 긋 강앗다.\n궁자를 이라든 것을 놀어다빞며서 내가너기 걷은\n아궁자도 왔다. 앗가이 지정기걸을 느끄을 받--.\n그 샤에에 불쌕 북쌕 거쌕는 겉은 가능이 자존감다\n묻돌노데메더 그김 샤기머 생정 싶켓 앗다는 새자을 하다.\n그 뭐너기기 . 싶지어 그너에기 깨지.\n그림 그 가식이야는 걷에 거정며미기 난다.\n깡덤/싶다.\n궁어정이 난다.\n까까까\n내이 긍거에 기직으 넘리 OOO같으 놀든이)\n[불명확] 자저봐기 싶지고 데니는 가설맺이다.\n내강에 [불명확]섯 놀이 있는 거시을 깨멧어 즉이고 따깟기 디\n자떠더", "summary": "개인적인 고민과 감정에 대해 자존감, 도덕, 관계 등 여러 주제를 다루고 있는 일상적인 기록입니다. 내적 갈등과 자신의 위치에 대한 고민이 드러나 있습니다.", "tags": ["일상", "고민", "감정", "자존감"], "mood": "negative", "decade": "unknown", "image_quality": "poor", "filename": "1993년_열린마음_p083.jpg", "processed_at": "2026-04-09T18:26:03.587223", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p083"}, {"date": "1993-04-26", "author": null, "content": "하늘 헌다. 고려궁전에서, 이제 오시 이용하는 농수야하다-짬짓\n\n곽 연꽃이 곱 나섰나네?. C.\n-짜깡-\n\n하쳐 촛길 과정을 돌려봤다 가어떠 닭 보봤 따움지 앞점적 정이 곽 자각 마음이 잔사 앞다 있썬 사쪽하찬 ㅁㅁ 자자공찬 와다다 더 더 쫗 축 가본 나뿐 푸정으로 인사도 에이 나다 뼈짐다.\n'찮는 열정에 칭 밟으랴' 이런 쭈정이 있지만 [불명확] 쭈는 열정에 잡은 뿐도 그건 장려하고 더러란 것정등을 가까씩 하겨 찬다.\n나다 바쁜가?\n(농심 <숨.가쉴)\n조사 쎤좋겨로 묻든 받몯 하려면[불명확]조는 열인우음을 이겨 것중늣다.\n앞도 묻은 곳 고찬여 쫗 쫗응은 2 사경에 대해여 앞은 좋은 쭈불워하는 마음한 거어뜨하를 놓이게 한 뼈이다.\n그래, 나다 이런 밟을 할 같깃이 않것꼐 보중것다.\n그러다 가끝씩 '어가 닭혀정이다' 왓곤 생각된 떠, 쎤 나뿜에 대한 과정이 앞어나지 앞을 떠아 암다하음 띠쫗된다. 내 팝이 곡가먼\n\n1993. 4. 26. 떠남\n\n사람은 왔 바깥 밖 문도 단 손더/ 그길3 고켈하는 사람 등이 앞 롤 깎 인\n모 거나 떤 모 거나 는 C[불명확] 산 그자\n- 분 -\n\n→정여를 괭뱅커짐 런다 그 엔든 꽈하찬다\n그별 고자은 자묻는 고[불명확]다. 그나다\n뭉싸따다 사감 욕숨 빤정이 밀것도 가다\n(우궁시, 낙뮤자다!", "summary": "1993년 4월 26일에 작성된 일상의 고민과 생각을 담은 글. 열정과 삶의 방향성, 주변 사람들에 대한 깊은 성찰을 담고 있으며, 자신의 마음과 행동에 대해 고민하는 모습을 보여준다.", "tags": ["일상", "고민", "자기반성", "감정"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p084.jpg", "processed_at": "2026-04-09T18:26:21.450621", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p084"}, {"date": "4.27", "author": "1990년대 서명 (불명확)", "content": "현101 오픈마음을 찾아서 는 느껴은 나쁜 야관더는 것이다.\n까는 옛이를을 깎이서 조 왜까이, 더누우를 등 싸은깅을 하는 것지 것것다.\n나중을 못 와이있는 싸는 것장나나, 5더이 정가 못 좋이서 못 싸이 와다.\n고더여 더정 싸것이다.\n쪼이, 쪼가 ~ 을 명이 것씨 좋이 야야 그 사기것다.\n싹 것 (싸어이족) 왔종서 더러구의 시기을 맞음 가 있그, 싱허이것다.\n\nP.S: 네 것 싸은 봣이서 싣있이를 시기 ???\n\n\"귀요하즈  \"쌍이  닻다.\n내즉  주게제  고  서김으  닻이 침머다  좋  있  ... \n싸제  기거이  싶봉 감장을   닻들  서증   싸가  포이\n좋  저귀가  닻너닻다  내  덧전  싱병은  꿈기먹네다 - 고더월 신뿐\n더  나젤로  데이기  그 숨은  닻치거블  고이으든  뚱져  네  싸여시단다\n첫미  같열에  쩌야  꼭카\n싸제  매국즈  싱겼  미샤  써므  쭈 껴대는 /  좋다, 매국즈  뛰이\n싱  가즁  웃을 /  매국  메껴내  내을를  저젯  야기단다  꾸미아.\n미샤여  싶세  좋잔  그섯을  것이야  느느여더다-\n싶을 뜻강  까기  것이다 -- [불명확]\n\n  주가, 여기버즈  비미 /", "summary": "4월 27일에 작성된 일상 노트로, 현101 오픈마음에 대한 감정과 생각을 표현하고 있으며, 후반부에는 일상의 복잡한 심정과 고민이 담긴 내용입니다.", "tags": ["일상", "고민", "감정", "동아리"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p085.jpg", "processed_at": "2026-04-09T18:26:33.155512", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p085"}, {"date": null, "author": null, "content": "윗부분(읽기 어려움):\n[불명확한 텍스트들]\n\n중간부분:\nO[신세] 여전히 기쁜 일이가 가깝이 '탁' 들이는데 어너나.\n나신이 카더떻었나.\n2대는 당동금을 [불명확]에 삼아다다지.\n곤디1R 여겨온 '나니를 붛겠나까? 나니를 머머쳤나까?'\n가깝 떈는, 핟경심은 이 '93을 켜없서 제삭을 인나우상서나.\n-쩌시 -\n(제나 능졸는 다 어디지?)\n\n아래부분(더 선명함):\n요새 어이에로 옷하지 옷하는 나를 느낀다.\n나 차신의 선명이 더한게로 까다로왔시 없져이다.\n사랑은 옷긴 것 같다. 그와 가지고 있는 이족선에 의해\n같전 내면 어저지도 옷하니 ...\n그것 나 자신찰하여 [불명확] 견과?\n(-해깋 화성-)\n내가 가지는 그 이족선이 너무 힐똑다. 또 최오혀다\n요음 싸 차신의 반향이 앗이 어떠고 충포로 비관한다\n이 밤에로 내가 거 같도 있는 하여의 중극 (과정이)\n요고 싶었지 ...\n\n4. 20.\nJ2", "summary": "삶의 의미와 사랑, 자기 성찰에 관한 개인적 고민을 기록한 글. 현재의 자신의 태도와 선택에 대한 불안감과 성찰이 드러난다.", "tags": ["고민", "자기성찰", "연애", "철학적 사유"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p086.jpg", "processed_at": "2026-04-09T18:26:43.388781", "volume_id": "1993년_열린마음", "volume_title": "1993년 열린마음", "year": 1993, "page_label": "p086"}, {"date": null, "author": null, "content": "꼬마버 꼬꼬잔 나는 과잔이 귀지채 받어 오롯!\n어제 궁에 여릿 족에 아련러지안, 잔상 내 과잔족새는 궁잔하이\n외상을 강로창있던 여겨가 나타났다.\n오늘은 누굴 샤 사가 없었다.\n5도 어쩔 BUS 안래서야 경중은 새과해 내게 되었었다, 내 썰이빠진\n꼬촌썬인 어려울 윗또해 할왕인.\n내는 국만로 나 왕먼때의 요설이었다.\n거는끝은 여어가 닥자은 배발을 더께되었은, 그 쭉촉하나 포근한,\n저먀거은 꺼진와 념을 바싸게 했는 고롹.\n내 곳속에 까지 나타나 내 경징을 해 거고, 나에게 옥찬한 거대감은\n버터가 곱했던 그 냄은 시절 내 것에서이 응에서 그 미얀 어다보지\n가정 흔은 외처음 처지하고 있었던 것이다.\n꼭같 프래머지 앙남이 게츠 되였던 그 곳새인 —.\n암강이라도 찰다버야 잇다. 앞나버이 잇다.\n스께서 떨즌 첫을 하는, 미 첫은 옛숨을 너어 드려은 곤헌\n뽐기는 닫다.\n기은은 그 뭔게서 나는 새과하는 야름과 잔청난 게어가 옷촌촉가?\n어징한 곡집이 나는 어.우로다.\n하겨잔, 그 봉은 깨맛 내가 반산 이 세상이 어차중이여 의머는\n게더항은 외저삼음 느께 한 옷인한 뭇이다.\n\n시생첫, 빠 괴살하 그 지응하나다. 앗너난 중원있이 느껴중아게.\n\n새낙 도령\n\n어매 화컨 린표도 뜨기하나는 겨어 3장더.\n맙은 귀아은 뼈꺼지 앞은 것이여 (ㅅ녀 이네이MT 우.ㅇ [불명확]야야분),\n앙은 턴 수매는 다바어 하이함 곤 하적 시기든 깋먼다는 짓다.\n그려, 우켓 '앞싯아우' 하는 구제썬의 쉬시다 — 여러 못둘이", "summary": "학창시절의 일상적인 감정과 추억을 기록한 글. 버스 여행, 학교 생활, 그리고 특별한 누군가와의 추억에 대해 서정적으로 담아낸 내용.", "tags": ["일상", "감정", "추억", "고민", "학창시절"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1993년_열린마음_p087.jp  "volume_id": "1994년_여름_농활특집_열린마음", "volume_title": "1994년 여름 농활특집 열린마음", "year": 1994, "page_label": "p001"}, {"date": null, "author": null, "content": "참회서 (과아비딱서)\n저는 7월 3일 창덕궁 바위로 동아야 내 ~~[불명확]~~ 우쩨의 첫우머\n곳이마도 제 수심에 논활더의 잉것이 놀나지 어 바깥어 터저\n저는 추하는 연구했습니다. 그병 다너와 과호전 처저고\n곡 ~~[불명확]~~ 지란의 태숨조 부상하포아 방새을 합[불명확]네\n곡 과엄 빨달는 해의여다는 샹간이 솜머 인저는\n메미 활째늘의 유·우형자 딴암 (ex.+종의 처아\n메스정의 건면법 정조 늘이 우형자 곧하다는 >네)\n한국사 응활래 전훼 앉에 깅이 찾하학나다. 저 때면\n바차 유울우강인껴 튼히나 처는스타증 마는 진차어\n보강해 우시기 바랍니다.      동훈여서 9·산번", "summary": "작성자가 7월 3일 창덕궁 방문과 관련된 자신의 행동에 대해 참회하는 내용의 편지. 자신의 잘못을 인정하고 앞으로 바로잡겠다는 의지를 표현하고 있습니다.", "tags": ["고민", "참회", "반성", "일상"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1994년_여름_농활특집_열린마음_p002.jpg", "processed_at": "2026-04-09T18:30:08.011517", "volume_id": "1994년_여름_농활특집_열린마음", "volume_title": "1994년 여름 농활특집 열린마음", "year": 1994, "page_label": "p002"}, {"date": null, "author": null, "content": "인지 마음이 큰 분과 받게 쓰 어디지지 앗았다.\n데미까\n지은 자는 사람들을 꼭 잔 마느는 찾껑을 하고 싶은데\n다른 도리 있에다. 피냥 봉지고 듯이 또한 지캭\n여한 놀환이 너는 아작다. 짝한스 떨것으로 리게\n데거 묻지 데서 소스에 헌들하기도 한다 그 넘다 묻네\n나의 친젂이 상당히 헌 작아 견 다. 아는 게 헌이 야---\n우등로 공환은 낑 데다\n허는 모든 핸사가 낑 나 건장 바다 느끼는 현데\n놀장도 마지 [불명확] 서는 메지 같은 (29살) 산 활을 하면\n든 변활 것에 펀 다가 팹 다시 아롱있 앗는 듯 없 상셜 착\n도 마갔 것 강 다.\n한 그 걸 러고 해쓴고 있는데 서용 가게 그 건 오음이 보야적\n앗 이 걸 다 헤 긱 서 용.\n놀용도 지 ㅣ도 향상회도 에 삮 ㅁ다는 깓은 오슬 으로\n바르울이 깐울적 싯 여마리.\n나 조몬\nrs .지금 민 8ㅁ나 자 아아지", "summary": "개인의 마음의 상태와 주변 사람들과의 관계, 그리고 자신의 성장에 대한 고민을 담은 일상 노트. 친구나 지인과의 관계 속에서 느끼는 감정과 깨달음을 표현하고 있습니다.", "tags": ["일상", "고민", "감정", "인간관계"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1994년_여름_농활특집_열린마음_p003.jpg", "processed_at": "2026-04-09T18:30:18.796140", "volume_id": "1994년_여름_농활특집_열린마음", "volume_title": "1994년 여름 농활특집 열린마음", "year": 1994, "page_label": "p003"}, {"date": null, "author": null, "content": "농활 그 림 잔치\n\n인간 관식\n⊙ ⊙ , ?\n\n지식 태우\n⊙ ⊙\n\n지속\n⊙\n\n든팠은\n\n걸운 앗 도리 : [megaphone drawing]", "summary": "농활(농촌활동)과 관련된 그림 잔치에 참여한 기록으로, 인간관계, 지식, 지속성 등의 주제가 있으며 마지막에 재미있는 메모와 함께 메가 , "content": "11월 1일 이야기\n\n친도이 졸업 (95년 11월 20일)\n친돌이 졸업장 (95년 1월 0000 어)\n축제행사/동아리까 (95년 11월 30일)\n우망 합과 (95년 20일 0000) 어)\n보미누는 결혼정산 졸업장의 (95년 1010어4)\n금호공 결혼여 졸업차 (95년 10월 00)\n최왕절자는 최적옥 핏으면 졸지다 (95년 1월 0000)\n로현이는 다들을 받게 이성헷으면 졸것다 (95년 107 0000)\n(것인 날: 이야다 샘보면 졸것다) (95년 8월400)\n하성자항출차는 빠아 걸어어는 익성은 강하고\n나는 나 함에 새로 사사 나쓴 것사하자! (넉 강년 0000)\n95년 1월2 축제 쌀 봄은 쌀\n차차에 차여\n\n밀 지년은 영친 안는 보 쩨하는 처성은 자족하다 (95년 1월 1어 9)\n\n[불명확] 내 삶이 [검은 박스로 가림]\n\n[불명확] 싣이 고이 더기 옶만 중층 이제덩\n그저 다[불명확]다 - 셜머이\n\n[불명확]이 누그 기더 [불명확]\n\n98년 1월 [불명확] 0바여기라!", "summary": "1994년 11월 1일에 작성된 일상 노트로, 친구들의 졸업 시기, 축제 행사, 개인적인 감정과 고민들을 기록하고 있습니다. 자신의 삶에 대한 성찰과 희망적인 마음가짐을 표현하고 있습니다.", "tags": ["일상", "졸업", "축제", "고민", "감정"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p002.jpg", "processed_at": "2026-04-09T18:30:45.297630", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p002"}, {"date": "1995년경", "author": null, "content": "12/06/90, 2/14/02[년도?] 바깥 사랑놀이 았다.\n도리, 정길 22대 앞곡 빼로 것 앉니다.\n사랑중입니다. 하느사랑 사랑이\n\n1995년, 첫토 벗할 김서정 씀\n\n과심은 여동 정리하는데 쓰 정컸다. 곡맥 선정선에 과심은 쩨쌍째길 수 잇는데....\n쪼긴 붓를 있는 깻때 -다정씨 샛바 한 새 깻때-가 각자씨 쪼긴 돋 있컸다.\n불서면 여머여고. 가른 로정합시다.\n\nE쌤 나에게 '너희 벗을 로자 다정하다' 고래 돼가 잇길테이\n쌤 다셔도 헤지앗 돼를 샬구한다고 합구면 홀적다.\n\n고래고. 로 홀자 다네메서 이 샬가 지 샬가 잇는데, E쌤 선벗을은 쏘은 앗자 같다.\n이혜(?)는 고룬 뒤. 넷 2 자랑놀이 내 샬메지졌 홀곡하고.     것    =\n\n로. 벗 눈사씨 수돠에 다른 깝 샤된삳다. 정근 서더다고 옷은 버씨 떤고.", "summary": "1995년경 작성된 일상 노트로, 학과 관련 활동과 선배(E쌤)와의 관계에 대해 적고 있습니다. 선배의 관심에 대해 다소 복잡한 감정을 표현하고 있습니다.", "tags": ["일상", "학과", "선후배", "고민"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p003.jpg", "processed_at": "2026-04-09T18:30:55.066089", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p003"}, {"date": null, "author": null, "content": "< 신문 · 신문의 영향에 관해 생각해 >\n\n어쨌든 논지 있어야자, 자시 버, 뭔가이 뭔가다?\nlove 관계는 나의 관계정체——\n관계는 저쪽이 누뻐 외곡자? 이거는 관 외새는\n정따을로의 외자로도 적용으로 능하다, 정정적으로\nB자 설껨상사! 쌓실한 저언새 - 거치느\n재 녹다 빠다 공자 뿐만 시답준도 눈준다, 관근 왔어지가\n닙에써면 만 먼지 청접 경이 됨여 여머지 있는지\n자입메도든 - 거치느.\n목망 - 완자.\n114초칙(내 나영대 정성정잡정이 미친마디며 레베메서\n넘잔도 꼐지, 어냈도 넘성나게 자강, 고에네 충되가 여터도 상강\n164칙(\")\") \"보에 목로종이가 나여정메에 야려지 터놀로\n쨤 내거! 는 바족에 되며 쌘 뭔츄 놀고 앗나? 충족\n카정시느 어숨시게 쩨혼저다. 공공도 쪽 여기 흘나용지가\n나 않다 ? 옳은 관라가 앗다 씨조서네 때주 둥어왔는 깝도 나왓다\n괴정 싶고내면 만지을 여처음 거놀이 여련공자 똑 더멋이가\n삽수 처좀 바져\n\" 외정 버족 내에 싶는여면 적념종 맏지 \"- 바져여겨\n꼐따도 놔 , 거여가 정자도 놔.\n\" 나머지 맍다자, 내 묶거여야, 모 공고에 자나건자!\n거 등봉여자. 가 깉 봣어 버였서비 \"\n솔 쎄도 나대 결자기 정쌨들이가기가 숨이정갔다.\n년무극성에서 묻어느느? 여떘 정도？\n[불명확] 내러나 저미속 다롬 고매나 롬다 미는 강하민\nCRIMSON TIDE - Now playing 주깨 강 받을\n닶자 야찬을 정조？ 강 공나네 땋다새, 기런게 노노네\n웨데네지 까지 내나 너나 사강롱[을 정 중거지 니거는 됨다.", "summary": "신문과 신문의 영향에 대한 생각을 정리한 글로, 관계와 정체성에 대한 개인적 고민과 철학적 성찰이 담겨있습니다. CRIMSON TIDE 영화에 대한 언급도 포함되어 있습니다.", "tags": ["고민", "철학", "영화", "일상"], "mood": "neutral", "decade": "2000s", "image_quality": "fair", "filename": "1995년_열린마음_p004.jpg", "processed_at": "2026-04-09T18:31:14.606442", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p004"}, {"date": null, "author": null, "content": "싶은 50기여니라 궁리지 못을 봤던 여자네요다.\n이게 그냥 마쿠마다나 남은 방한 자지싱서 끼버놓을\n자공되면 여저지 바뀌 쏜 넣었고, 그소먼, 뿐 이버던.\n사되자서 세 봄승도를 쉬넌어 뽕자젼 샘이서 여김졌지\n자원자은 와느 잉왓다. 중의 여럼이다나 공궈가?\n럼요면 여남하은 찰고 궁궈 난더로 궁자씨서 비터호나\n딩멱다, 가승을 냐젓려다도 거 냐던 얌젋 싱싶.\n(밤구저 궁멱,네 궁정 떠하도 왓 고핸 거 마호나 느 아지뻑)\n봄저던 뿐 궁여젼 온자씨 나그버나나 그긍 - 온어합쌌보 -\n궁구느저 기젠 받구충 뽕는거 찻래다 싱겁 정좀덴\n게기핸 봄, 지싯싱은 왈다.\n게기머에 도싶궁 떠 웅, 한 온씨나뻘네 거지이 이싱이\n지웃 순빫누 기궁 비봉다느 비훼싶은 왓궁고 냐 럼올\n자나씨다. 어래기 [불명확] 저 있도\n왓하다 럼들까 ?\n고럽데 자씨뻔 내 여범다지를\n여씨 이머 씨[불명확] 왓 정깟 웅머 가는 뭇셔던\n고것이 아녀였다. 싸뻔 마은, 다거 (병싱샹\n냐나 > 것 노호다면 도정더 > 웅 받아지나 봅꾸나\n바웅글 뽕. 그댈 냐던 왓움으로 뵈기킨 이 받온하더\n내덜 자싱울 껀공해 싶되라 바뭉냥 > 거처가\n내던 초에서 강임 내왔다.\n궁, 51궁, 두 51궁, > 거지느 냐기데도 렘 깼도을\n거더 거더 벙에 놈던 여못데 냐승호 째 웨디즈 나거져\n울씨서 노므므씬 긃씨가 싣임 지때 변 가나 왓지앗\n꼬잉머 냐 너던 나킹궁. 지나가 중머 우댕 오씻다.\n어어나 노다깨 외씨서 \"씨코콤\"에 구듕 읎도 밤추 그궁꾸은\n욯오 데기 쳣봄을 담왕는 - 뭉디광이 지써기 고너면\n왓정어 봄사받초 바릅궁으는 것어다. - 여싱매서", "summary": "1990년대 또는 2000년대에 작성된 것으로 보이는 손글씨 노트 페이지. 글씨가 급하고 읽기 어려워 정확한 내용 파악이 어렵습니다.", "tags": ["일상", "노트"], "mood": "neutral", "decade": "1990s", "image_qual "}, {"date": null, "author": null, "content": "온지 얼마 안 돼 괴로움이 이제는 익숙해진다", "summary": "새로운 환경에 적응하면서 처음에는 힘들었던 일들이 이제는 일상이 되어가는 심정을 표현하고 있다.", "tags": ["일상", "신입생", "적응", "고민"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1995년_열린마음_p011.jpg", "processed_at": "2026-04-09T18:33:10.295733", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p011"}, {"date": null, "author": "김조현", "content": "＜공식 비이슈＞ ＜뛰는 논 깊게 이루는 꽃이다\n\n왜 왠날에는 [불명확]아는것, 모르는것 깊이 있고, 중 재화는 깊 라\n문재하지 않는것, 에 대한 생각이 요울 씌운 사울\n당칭을 더이다 아야로 아는것 조 재하는 것이\n은 재하지 앗는 것은 못느는 것이었이가 깊다.\n\n이런 시대가 계속 되나가 사태는\n\"응기다 모르는 것 중에 중 재하는 것 있어 있더라, 따라서\n중 재하는 것들에 우리가 모르는 것도 장 많히 없더라\"\n이런 방향으로 좋 전 되기이, 이로 인다. 그리고 우리는\n선화 속 에서 사태를 이렇게 좋 정 시 인 멀금 이나 왠손을\n한 나게 된 것이다.\n＜한국 사학＞, ＜능음가지＞, ＜능음 양현＞\n닦아서 먼 쌍, 먼 바나즈 깊을 딛나는 사중들은\n남 아 있는 사 중 둘은 그 둘을 먼 맘으로 내모는 이것가\n그 런 괴롭 있 것이 나오 되리 기 다인다.\n\n멍김은 나서는 이둘은 보르는 땅, 따르는 땅은\n나고 촉을 깡으로 샘지 위해 따르는 것\n\n예 정 사는 우미디움 스는 이런게 받았다.\n\n그 앗 요표 똑한\n손에 넓는 수고롭에 비 하면\n하 화론 것은", "summary": "삶의 깊이와 의미에 대한 철학적 성찰과 함께 한국 사학, 능음가지, 능음 양현 등에 대한 개인적 생각을 기록한 글입니다.", "tags": ["철학", "성찰", "일상", "고민", "문화"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1995년_열린마음_p012.jpg", "processed_at": "2026-04-09T18:33:21.304405", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p012"}, {"date": null, "author": null, "content": "1995년 11월 4일 토요일\n\n매우 내게만 아픈 쓸쓸 좋아하는 쓸 쓴 한번 쓸다.\n\n자기 어딘 천 고민 기억에 만들어가 되 쓸 , 여겨도 국내에 가결을들은 쓸 오는데.\n\n올큼 수습 내가 정성껏는 서도씨 됨.\n\n도는답네 [불명확] 다 질 거든이 쓸 뭣, 돌을은...\n\n다야는 댄 왜냥해다.\n\n저서 뭔을 되 짤을은 수 쓸 한다\n\n먹용주는 좋 수가 여겨겨. 건? 믿은 쓸, 내려감겨는 그 믹음 앞은 쓸 어어나, 족껏 오줌되.\n\n친을네 서우하나?? 돌띵이어나? 왜우우도... 그 어떻 서듯 뭔죽 돌어써.\n\n자는 꼭었다. 꾸가 짤를? 오몬, 받 각육을들어... 어쩔 겨, 한나도 얇다. 국세\n\n왜종된 겨어는 기 드어 궁원의. 내쓸 뜻 우거가 우든 접뭗에서 잘쳐는쳐\n\n도저해 이왜가 아탔다. 나뻘신 나쌘는 차는 깃 나뻘간가?\n\n우거가 바라는, 국이들이 바라는 깜이 이우리껏 으면 족깜 다.\n\n속자 1만 다니는 학교가 있었다. 그런데 이느낌 속자 2가 학교에 달다. 속자 1 학생라장이 2족 고등에서 못들어게 하고, 웃다 2가 하는말' 저 까아 싶어", "summary": "1995년 11월의 개인적 감정과 고민을 기록한 일상 노트. 학교생활과 인간관계에 대한 혼란과 고민을 표현하고 있습니다.", "tags": ["일상", "고민", "학교생활", "인간관계"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p013.jpg", "processed_at": "2026-04-09T18:33:35.743896", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p013"}, {"date": "95.11.4. 95년 11월", "author": null, "content": "다음 삶과 기이 창공이 떨다. 또 한새라곡이 이층 막사 삶과 기이 화도록 \"저 왔머 내렷이다\" 때로엔 나먼 비앞해요. 95.11.4. 95설구.\n\n삼해는 서쓰는 3.1운동과 [불명확] 도 뭐... 한다. 북한 것 같다. 지방 광자 아침네들 저떠도 버서 꽃한 잠쓴이 같은 [불명확]\n\n황음호이 아침네들에서 곧 장창한 사람은 이머기장 수 잔는 설혼서도 띠다\n\n논혼 간문화 반추는 등써다. 우리 야흔 창흔이 이차이 쌓는이\n가자비 있는 수 있었어? 터 있는 것 같으면 한 처음 성거와 흐일께. 이북 숨겨 문서가 저시제 저것은 최더로 꾸히 햇씨는 듯 ......;\n\nㄴ든 받아타 하나 받아야 하나 받았었다. 가져야 받는 수 봉, 달다. 그 저녁\n\n여서 그봉의 사삶는 거창창는 같 어디가 씌나있이 ......\n\n루름 사삶은 이 반아져 왔이 된까 없았다. 창져야 ㄴ든 버무 것은 넷 수\n있었다. 잔 한새이 지방도 [불명확] 읽었도 ......\n\n이외도 황장도를 꾸더시된 받는 서삶는 도흔. 황새들 봉 묵설써 싶은 때\n\n익화지학 (멋씨) 투흰이 창아시된 사씨두는 도흔. 이하는 상흔, 내는\n우겸에 띠다\n\n정림이는 강 데서 11월 파저렷이 사씨였다 첫다. 8년 6월 1년 장흔은 다!\n\n까든의 수 있는 번는 과씨는 웅이 도장된 저리기. 우리 주나아 수종정\n\n으로 내외은 것이 4다 수서 받어 너아 한 켜아아. 콴응의 응당속에도\n\n뭣선이 렬렸이 서시 영청이 우헹 하셨더 우러어 서화는 느혼. 깃깃\n\n이든이 푸 농동 통사 단선 것다. 우정이 다아 잎깅쁨 커지아아\n\n첫 서이다. 창서기는 칭 영상 정최는 인금은 함은한 윤처지 처는지 수\n\n꽈다. 그태도이 우포운은 거해아리?  약나 우저는 지해야리?\n\n文 11.5 꽈씨 한 네롱이\n황렬 수정 해어 / 뭔주 ----\n저사뭔 아씨 딴는", "summary": "1995년 11월 작성된 개인적인 일상 기록과 고민들을 담은 노트. 여러 사람들과의 관계, 감정적인 생각들, 그리고 삶에 대한 성찰이 담겨 있습니다.", "tags": ["일상", "고민", "1990s", "감정", "관계"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p014.jpg", "processed_at": "2026-04-09T18:33:53.986342", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p014"}, {"date": null, "author": null, "content": "상단: 왜있거? 왜있거? 왜있거? 왜? 왜? 왜? 왜? 왜? 왜? 왜? 왜? [반복되는 패턴]\n\n중단(분홍색 필기):\n[불명확] 때 뭘하었다\n지금 혼란 중 뭘하고 있 놀 철제\n이럴일은 손 오자 뭘했다. 지금 믹은 요 [불명확]\n[불명확] 나좋아하고, 왜내를[불명확] 뭘하는지... 그 어째 새롭게 긍정할 싶어? 뭘하였?\n자신 끝갑다. 누 자충심 [불명확], 뭐 자충충했다... 어른 짜! 트레르 몰았다. 고마지\n뭘하였다 자신저서 쭉 지업 뭘했다. 너라 [불명확] 어띤 비총등은 살어지지...\n왜내가 트닌전기[불명확]. 싶어이상 쭉 토어싶어지...\n\n하단(검은색 필기, 본문):\n이제 선생과 대학은 이써 삶을 인 결서 되었다. 라교에서 선전집하은 걸저서 시 더이 갔다. 수사가 거던 까 뵈 짐되가 시작됐잖 나는 어이히 앍는 관례로 거던 시원를 가기 전에 했다.\n\n식음 성더이 도활용손에 사강이 너닥 있이 앗다 식 앚으려했다 찬충걸 닫었이 양 새도레게 뜻 수는 싶 이상 시가지 돈다.\n\n돈 있었서 기본이 쭉되 알았다 너는 왜 우겨가 우 곳볼해서 잠서가는 이 토처 이시가 안된다 나쎈 나떼다는 자는 것이 나쎈 건가?\n\n우겨가 바다는, 국인들이 바다는 잊지 이못어껏으며 충겠다.\n\n숨자 | 맑 다는 찬교가 있었다. 그런데 어느 숨자 2와 학교에 닥다. 숨자 2와 하는못. 저 까아 셋이 [불명확]", "summary": "작성자의 혼란스러운 마음 상태와 일상의 고민들을 반복적으로 기록한 페이지. 학교생활과 인간관계에 대한 고민이 드러난다.", "tags": ["고민", "일상", "학교생활", "혼란", "자기성찰"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p015.jpg", "processed_at": "2026-04-09T18:34:10.392001", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p015"}, {"date": "null", "author": "null", "content": "응 밤시간은 💙 소다라! 분명론 접기싶 자존소중 나한테 칭찬해 화면서 파괴락 강미하는 칭칭' 손각이 죽는 서툴이 아까지 강당저항 아부조도 보며 단어. 여자터 수위 너희는 가져를 못시켜떠 싸싸 정원터 않는 칭중 깼었다 자존은. 자더 삶음 여기는 뜨뜨터 가거, 칭점타라 쏟이 냉움있 가거' 가로 맛첫도 병종 상장 싰 날금가더 여자중 서울은 분산돼 꺼겼다. 서꿀 서울싸 3.1동 깨 칭중를 닫켜했또 칭다. 묻헤칭 것 칸다. 직뺌 것 아까나뭉' 자떠도 버지 꺼다 칭산터 칭돼 보 칭생이기, 아까나뭉거서 꼭 꺼커했 서다는 이려기 누 있는 싸뭉미도 꺼다 느는 강답보 만중을 돌이뻬다. 우건 아픈 쏭중이 이뭔이 쌔우는 싸우돼 가까이 있는 누 있겠어? 터 있는 것 칙보면 한 최 생각과 층겨끼. 이뭐는 숭겨 💙싸기가 자시짜 정는 외려를 최 씨싸는 돈장... 나는 봐야 칭나 봐야야 칭나 별음했다. 거지본 밤돈 누 붙이 닫었다. 그 첫 아저 그돈의 자존 가싸장는 것 미디가 아니있기... [불명확] 홈 자축은 닫아져 앙이 맞지 앙았다. 칭지본 나는 버무 것종 는딘 누 있었자. 잘 칭산터 강말을 싸싹과 꺼겸되... 이외도 칭성중을 꺼러져짐 밤은 서잠들 느밤. 칭산터 닮 로항는 씬럼 버 안다자한 앙심자한 서씨들 똥. 이하락 쌍돌아 나는 우깨졌이 뻬다 것종 피깅이 웅터움 라에써 린임 짓다. 이돈 아누 칭심쳐 중기여떠 왔 서기다. 항겨짜는, 짓 무싼 정껴는 일품의 님론만 옮씨 친는-종 이다. 그래도이 우문은 칭 것겠? 아누 우문을 칭해야나? Pg. 11.5 쌍비 쓸 [불명확] 칭정 수정 해초. 청 청 — 정선비. 어썸 닫는", "summary": "손글씨로 작성된 개인적인 감정과 일상 기록. 내용이 읽기 어려워 정확한 의미 파악이 제한적입니다.", "tags": ["일상", "감정", "고민"], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1995년_열린마음_p016.jpg", "processed_at": "2026-04-09T18:34:27.255705", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p016"}, {"date": null, "author": null, "content": "자기다운 독창성 나다 나 비결정자다\n너무 욕심한 싸움빨 싸움정겨 욕도르겠 너\n잃지가 곤증이나바 넘어 씨음이 샤한된다\n그래서 테움한때 두깨의 깊앞이 이룬이다\n'이도 치샤된 러샤임이 서뭏가본은 열에\n깨고 돌을 깨따 봉음은 나에게\n그네 던나왔다\n깨식 영아켸바 것던다 96.11.5\n064\np.s. 도움 의사이겠 환심 악우이 니상언더\n늣거 던터버 어느도 옮된 너떠등 어기게\n버버로 정도 증듬은 던 멈고\n기더여야네 뭐\n\n뭣턴은 왔 곱쉬아다 왜켸사 사종잔군 수진 사촌목의\n횡걸이 또 촉전과 싶은 최수. 그어이어어 구처은 솜쉬한\n꽃은 꼴다 그여야 횡길은 거터 안깔 왔다 솜쉬한 왔은\n그 이음의 횡은 우체 듯 빛데다\n차꿀 거청의 문용이 이잔 것은 아깨지\n아즈은 깨꼴아는 한 앗건으로 우켸옛와 멤으\n직 까과 깨은 아버지\n황 구째의 깨네 샘킬산다\n지척 쌔겨기떼 장 사로. 그망거기는 뭐너다\n왜구쌍 다서 왕어겨는 홍어다 하자완 다서\n왕여여앗 반서으\n'the power of me, 이것은 왕침다 왔다\n왔 (덜영의 왔'\n그러고 왕왕'\n뭉국 거럼의기 깨요한 쨍철이 깨요한 깨나 시영는 것 다", "summary": "개인의 독창성과 자기다움에 대한 고민과 성찰이 담긴 글. 감정적인 갈등과 대인관계에 대한 깊은 사색이 드러나며, 자아의 가치와 관계의 의미를 탐색하는 내용.", "tags": ["고민", "성찰", "자아", "관계", "철학적"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p017.jpg", "processed_at": "2026-04-09T18:34:45.562726", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p017"}, {"date": null, "author": "법칠의 우소취 책", "content": "내 혼자라고 사지 않았는데, 서 바꿈 자는 못 떠서 어떠 왔는 온 써쌈을 자 받다든다다 한 번 층중쌈시였 비는 하셨 온 써쌈을 자 받다든다다 한 번 올이 아니다 고러자 고쟁의 써 바꿈이다여 고 우구도 아런 나 자신이 향몽할 수 있어야 한 것이다 자 나는 고 롯것 후이서 빠다쳐여 회쭉테 콩장을 써야껴진, 그뭐로 장쳐 롱이치 인삼처인 설전이 왔이다 한 것이다.\n그러자 바꿈의 떠르져 받 바꿈의 우진이 되되\n옖 사삶은은 받은 것일다.\n\n우인 나숨대는 나무몬 공삼다 그증 나꽃 도는( 된한다)\n독죡( 된한다) 생것이는 나너더듣이 된다.\n우의의 끼꾸이기 있았것으른 독망 한 나꾼된이\n된한다 충터다 어던것 한계이다 되는 듯장다.\n오네 인자 서앎 서인기 묵충하기 괴무옆\n것이다 샐갓하다 `신임` `댓움`으 구깡 냐고\n샘흔 줄이여 [불명확] 육인해 나나다 작 것이다\n우가되여서 머웅기 던것이 깔려려 야꾸마시\nb론 옷 줄기 못질는 나 머려다시. [불명확] 그러\n같이 회혹빔 저더 않이 머시나. 자이 잉은 자현에기\n떨으 것게나 것 보되지 너샘는다시 샘인시다 깔라?\n생장싸다.", "summary": "개인의 내적 고민과 성찰에 관한 내용으로, 자기 신뢰와 성장에 대한 깊은 사유가 담겨있습니다. 여러 단어와 개념이 반복적으로 나타나며 철학적 성찰의 흔적이 보입니다.", "tags": ["고민", "자기성찰", "철학", "신앙"], "mood": "neutral", "decade": "unknown", "image_quality": "poor", "filename": "1995년_열린마음_p018.jpg", "processed_at": "2026-04-09T18:35:00.306736", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p018"}, {"date": null, "author": null, "content": "{\n  \"date\": \"11월 10일\",\n  \"author\": null,\n  \"content\": \"4학기 우쩍 좋고 비는 오끼 캠프. 그렇데 은 저밖 제는 샘핑 2-1 자유서 청야을 라는 청공자 있다. 확실한 궤는 기댈 나지 알곤만, 자즈럽만 있으면 우리나라의 도로 씨민 문제는 해결할 수 있다는 애기들 톡는 짓이 잔다. 노래우가 곤쳐 면 5전과(면 5젠완원 자차 잔 이 입곡 자에야 !! 씨한.\n\n흥 반시에서 싯싸제 톡해뒤면 곡차다. 사잘 하는 춘게 듣, 담 자차즈 웃지 마면 앙는 거 느껴 톡차뒤면 곡짓다.\n그뭬 머음 걷이 알은 깉산 잇거다.\n\n저제껌 | 기 역삼롸 이었는 이깟다 (스컴 궁윰) 서허야 탈거\n획겟다. 저(소띠 씨차환 가차긍(1) 나 네즉 했다고 찰다.\n4번 씩택 노르걸이와 싹게 자차원 너는 저머 (자터푸 시계 과못 는)\n의 거걸은 앗느러은 하는 자려테 거너지 앗을다 !! 씨한.\n\n11월 10일 찰.\n\n[서명]\n\n싸씨 이는 좋랜 비버 간다\n5원깔의 짜더 신어터나 !!! 씨터게 5칸억 ●= 는깐민 시 역 어라나 !!!\n요흥 시세를 모으는 군 의싸고, 산 노도 붓침!! !\n뜨 앞나\n변민 씨 게 짝은 한저주는 거\n번제 깜져 쉬걸 이다나. !!!\n뜨 앞다\n노테우는 누칙억은 족친 직기 깨다\n아 ●(수)●\",\n  \"summary\": \"캠프와 도로 건설, 사회 문제에 대한 일상적 생각들을 기록한 글. 마지막에는 어떤 결정이나 다짐에 대한 중얼거림이 담겨있습니다.\",\n  \"tags\": [\"일상\", \"생각\", \"사회\", \"고민\"],\n  \"mood\": \"neutral\",\n  \"decade\": \"1990s\",\n  \"image_quality\": \"fair\"\n}", "summary": "파싱 오류 - 원문 보존", "tags": ["파싱오류"], "mood": "neutral", "decade": "unknown", "image_quality": "unknown", "filename": "1995년_열린마음_p019.jpg", "processed_at": "2026-04-09T18:35:14.038896", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p019"}, {"date": "1995-11-09", "author": "인호인", "content": "1995 11 9 목 4시\n\n친구자 좋은 인생의 기사에.\n인생이 좋아지 이차 못취고 가지 믿아줄내다.\n이상하 꿈 버파. 도득 몸 깨닫잖 밤여\n없잖 왔지다 깨똑 잔 겟자 느꽃도 나라.\n비터 느껴 구현 원은 깨때순 뽀 올싸싸자.\n뭐까맨 다시 킹싸도 나다.\n모중 인생처 가겟시도.\n\n인호인\n\n빠놓 소씨 종하의 확합 쎄가청 토로 왔다. 아챔 가족 요 씩용 자녀 가움이 너던 느끼 없다. 창상, 가먼 포짜 생써도 왔면 어떻 꿀품이 정씻다. 나도 정성한 자른 야러 정신 찻옛가?\n가족 공하고 가족 또 깨 배싸싸는 장한. 했상. 과정 단잡된 9시쯤 포싸가 잔저잔느 둘나다. 도잭현 우자잔는 뚜나다. 도잭현 우자잔는 뚜나다. 조기정현. 우차. 더 고 과잔우싸다. 싹 찾쌩\n정된 처더 고자 자상 칭쌔 옷꽈꾸는 싸쌤짼다. 니더 가족 써더, 느몫 싸쌔\n뭐든 다라는 사상 싸싸싸지.... 스면 아싸 l뤼 정롱 다싸 어싸쌩 로\n훈 훈 수 씨웨... ..\n\n고샤선) 과 가족은 앙뿌며 버싸 바솨 잔더, 넓써 숨 쎄 잭다.\n나더 벋 깨씨싸 자 창족 활다 정삭 샤송. 9싸도에 나는 그씨\n저생을 받 인생 꾸 뭐야쌔다. 폼씨도 그러 서 막쎄 더쌔으 쎄 깨싼\n사상 합써 퍼족 기숨 미꾸 서상 저생을 받 자 사씨쌔 깨로\n시자으 보쌔씨 (싸싸) 금씨는 깨남용 싸 없다. 씨 뭋이 싸쌔 단싯또 떶응\n\n가싸줄 우 있은 것 깨, 싸싸 싸평하 싸싸싸는 가싸줄 우 있다", "summary": "1995년 11월 9일 목요일에 작성된 일상 노트로, 친구와 인생에 대한 고민과 가족에 대한 성찰이 담겨있다. 인호인이라는 이름의 필자가 삶의 의미와 가족관계에 대해 깊이있게 기록했다.", "tags": ["일상", "고민", "가족", "인생", "성찰"], "mood": "negative", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p020.jpg", "processed_at": "2026-04-09T18:35:33.103741", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p020"}, {"date": null, "author": null, "content": "기적같은 환상자가 느껴봤던 싶기 새로움이 환상이며 딛기깊은 인수 왔다. 별자보 가슴은 서전나 조금자고 처운 많은 왔었다. 24 조금이 좋 세어졌다.\n\n大學 2年의 서정은 아침피켜 2年 가치지 2年의 묘한 묘자 그 2年은 바\n친요 곧 우 서정이 묘한 묘중 서서된 있다되려 다왔 속깔이 있는\n별자와 가응닌 그때미 앗다는 것은 본이 2는 성로이글은 최잔 왔다.\n묘려다 마정한 저의 최봉처 - - 기본을 어미 @ 것로 왔다. 뛰는\n좋나닌 먹멍함 되면 응려는 자기는 기주었되는 분별이 신못는 궁과 강이....\n\nP. 11.7 왔잔 싶을 물 중\n\n강고왕 자증려며 ' 기잔이 정잔 극라자 '\n- 이것은 기잔왕되 믈 싶있는? No /\n\n\nㅁ네같이못이 \"하롱다\" 여겨다.\n혼과 마지밀 악슨를 하는 떠는 성망\n수은 옳온자 앗었다.\n혼떠 너여며 쎤운 [불명확] 거꾸려는\n악은 못겨지샘 그앞다는 맞지는 네\n제머는 뛰챗다. 혼짐 앎 뛰여나고셔\n수은 곁돌이 몬님온 익지 뵈융 것이다.\n혼이 우리 9중이거게 급 사같는\n꾼 앗이낚댈은 하다. 혼잔서여 명혜에\n묶제는 중 못겨지샘 혼된 마음은 앗다싸\n여처함 수 뭇은 것이다.\n응되여게 잔 잔다는속 맞음 [불명확] 넓기르\n횡를 하고 싼것하셔 잠은 싶었다.\n\nP.S. 중의 ㅁ네같이것 뢰시싸에 께여있은 롷여싶었다\n배중 36간 쌈이샘 우려의 머운 그와했다.", "summary": "대학 2년생이 느끼는 자신의 성장과 변화에 대한 일상적인 성찰. 시간의 흐름 속에서 깨달음과 고민이 담긴 개인적인 기록.", "tags": ["일상", "고민", "성찰", "대학생활", "성장"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1995년_열린마음_p021.jpg", "processed_at": "2026-04-09T18:35:48.680814", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p021"}, {"date": "1995-11-9", "author": "윤나", "content": "거짓 하며 뭣본(밤). 늦게 따씬어 쓰자 읽어 앞기는 추움인가? 은혜인가?\n화판은 선거 반되다 나쁘 과산가가 제데는 끝내 웃산 상도에서\n문대에는 한잔기 붙은 단거의 선거에 떨어 뜻었다\n희면한 [불명확] 그저버인가. 과선거가 어떻게 돌아가는지 과학실험에서\n묻은 의존 하면 있는지 장 모르는 메메 있다 미안나게. 게육적인 인성\n은 다 같이 채웁 밤겨노데 옳 진실사업은 시간에 끝난은 하자데\n계가지 웃겠는데 선생님이 삭 시켜씌다 하하. 그 덱의 망당음의잔...\n회저맛 그렇게 정중히썼는는 선거는 듣지 한왔자 못을 이편 것 수선한\n자신의 옛은 소등이 되는 것이 잘한 것은 아니지만 내가 알어야 싶을\n사람은을 위한 의이나 삶같한다. 끝을 했어면 미한하게 생각되었을\n거다 어저 획처 더 뻔영 같즁. 원래 열림 미움 쓰 상강은 없었\n놀데 웃자 뭔산 시진은 찰차떠 이현 이응...\n옳 새우 경정을 했다 U.B.F 와 같은....\n조용히 bench 에서 있 있는 문대 정중들에게 다가가 애기를 하는 것이\n깎다 어떻게 말씨에 닥져 막막 하던 답장 했지만. 계속 하다가려면 늘것\n이것은 선판의 도정다 그렇더. 문제는 정상 마나야 할 우리 둥기 선배들은\n찾자거기가 어엽다 모르는 사심이 게 더 하지마 했으.\n우성자 저저맛 어제는 나이 삶헌. 나이없터 여선히 게 없인 왔다\n도 어여한 때 뵈다면 저자 족해산 많상 옷이 -[불명확] 곳든도가\n걸런 저자의 원저 덤는은 핌. 거여빠 우리 독기. 선배들.\n여심서 하계냥다 그렇. 더시 자진찬 많흐은 여여를 왕에 서는 많습니다\n에상한 때기면 했다 우리더기. 그녀. 이련저션 선각사는 데로 쓴것이\n내까... 내가 켜인산 있는 계까가 되었으면...\n라선거 여성이 한시다 그렇. 호른 라선거 윤네이는 우리 혈틀. 둥들.\n윤 싶도아는 여성이 아시시. 저는 입 닮는에서 ETA 드릭았습니다.", "summary": "1995년 11월 9일 작성된 개인적인 성찰의 글. 거짓과 진실, 선거와 관련된 주제들을 다루며, 인간관계와 삶의 의미에 대한 고민을 표현하고 있습니다.", "tags": ["고민", "일상", "성찰", "인간관계"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p022.jpg", "processed_at": "2026-04-09T18:36:10.808477", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p022"}, {"date": null, "author": null, "content": "구하자 나오이기 웃었다. 너 \"같은\" 주대설을 뛰나? 한 떠오 막았다. 스으으 공공의 샤와질나 나가 샤깍완 이웃가 충받았 어웃가 즈나? 않는 샤깍이 도왔다. \"그정정정인 것같 \"나네도 닭잡 것도 앞한거사 그긣 크깣인봤 것도 어낀 것 앗다. 나 어즈 비하도 닝잣이니가. \"있나이고 좋는 끼여이. 너나 짧여지, 받여다 \"좋려연\"... 적기다 좋여잔 상좋. 것앎. 대태. 내 놀긍. 남도더 서선...드 처여자 긍담해 하른 웃다 샤깍껴 \"좋는 것이나\" 먹었어 좋는 것여다. 본나 중육긴 긴 \"좋다방\" 긴잡 한 잘은 떠! 나 그여 먹은 잗은 좋하 좋은 떠! \"좋것다\" 나서 냑것도 긴 도 잘다, 그여바네 ㅅㅅ으도 나 닭이 있으이 언상기? \"좋는 것이나\" 먹었며 좋는 것 잘것다. 튼. [불명확] 사깝이 이렇여네. [불명확] 노긍.좋은 목둥이 어느 담다. 또 (사깝이나 담싶도) 나느지 깒은 기니가좋다. 기더 니가 주죽 좋걸그여이 낭는깨 먼좋다. P.S. 기는 뀨조기 긋붕기 첫정농 이다 깒웃거 비쌤 때 ㅇ 중 비깝 없다. 윱다 으옷나 끗네 이꽉 이냥 니 어레게 주처도", "summary": "손글씨 노트에 기록된 일상적인 감정과 생각들이 담겨있으나, 필기가 급하고 비교적 읽기 어려운 상태입니다. 주로 감정 표현과 일상적 순간들에 대한 기록으로 보입니다.", "tags": ["일상", "감정", "기록"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1995년_열린마음_p023.jpg", "processed_at": "2026-04-09T18:36:23.426629", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p023"}, {"date": null, "author": "문동미", "content": "정답 뭐구데다. (무아기?) 지금이 우리와 창생원과 선거기간이라고 읽히기가...\n\n남은은 어떻게 못했을까, 적어도 나는 그렇다. 분누기도 붕뭐지지만 \"우리 깐 구성원 (000명 중에 지금이 선거기관을 확장해, 우리가 뭐가 명확인지 봉명이나 뭐가?\n분도, 이런 생각이 듣자다...\n\n뭐, 여서이을 비누한 [불명확]가? 선거둘음은 명점이다.\n그둘을 깅이 뭐하거나 까칠해버려는 같은 아니다.\n\n...............................\n\n어떤이가 새로는 있과 보는 있을 돌서에 바꾸게 다르왔을 편,\n좋은 새, 좋은 보는 선택하게 되는 같은 어떤가? 아동가?\n어서이든 [불명확]기저 구찬저어이. 혀서거인 못 이렇가 앗깠시몬,\n그게 붕이서, 두어저[검은색으로 표기됨]의 박궁은 나을 수 있을것이다\n①어는 것이 더 좋효하가돼 [불명확]는 더 구찬저인 것.\n②어는 것이 더 하나 쌀닝.\n\n앗거저, 지금 선내는 것과 곡하는 것 둣거기중 다르져로 다닐시 한천면.\n\n[불명확]은 좋이서 앉이 어 좋디머나 좋이서 추은 마지거나.\n좋 \" 곡본 \" 가 여 \" \" 명추를 하나 도다.\n\n둘이서기 둔는 어떻로 이체던 새로운 수 있을것같다.\n나은은 어떻싱 또되 그둘에게서 원라고 바은 싳시는 어형다.\n[불명확]\n\n그려나, 간누서서 어거가 음 . . . . . . ( 그안 싵했다. 아앤! )", "summary": "정확히 읽기 어려운 부분이 많은 노트로, 선거나 단체 운영에 관련된 고민과 인간관계에 대한 성찰이 담겨 있습니다. 좋은 것과 나쁜 것의 선택, 그리고 타인과의 관계에 대해 궁금해하는 내용입니다.", "tags": ["고민", "일상", "관계", "선택", "성찰"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p024.jpg", "processed_at": "2026-04-09T18:36:40.921347", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p024"}, {"date": "1995-11-11", "author": "정혜", "content": "있던 마음 앞중 장점 뮤려 도려했다. 다라는 이미 봤 봐 이뭔지 아도고 뺐에는 놀러... 장마는 맞중 앞 맨도데 인고자적 우혜옴이식의 이것은 서장하네 공식 이었다. 신배로이 먼곤은 지곱마하는 서청 곳이 마앞는 이마처거 제년 뭣점데때 나는 고봤다 더 잔 깟 같다. 이런거 찰 속 봤 앗됨려 옆 인잠께짐 옆 인좌케처 ...(우)\n\n서정 자은 내 샘봠 인정같 서청 튼길 거든 뜻미다. 장수 으봤을 어넘다 획나가 등자게 하자잔 그 샘갓 하지 앗기게 뭔겠다. 나의 서영이 친봤의것은 완조하고 [불명확]\n\n우리 샤든봉 .자조 나는거 혜서 솓인 해다. 이음은 다 기여하깟 혜고자같 그래도 누리 편이 여던 헤각 상봉봉이 먼묻 더게 꼬뭇하고 새방협다. 악상 뭔든은 빼던 뭘 먹올 것것, 뭔경이 이마자마이 아니다. 쩌진 자여[불명확] 생은의 뭔을 그뜨 자신이 서청전 것-로 완조 것이였다. 확시집에 대한 판, 서영이 그롤 [불명확] 기 뜰이 이합가 섯다. 욕 와하이 힘던 뜬 것저지만, 인앎 나서처런 그롤 곱마다 했다. 저정이 있선혜은더 [불명확] 하짐더 싶다 냉에 뺐다 어기는 쩔 짜은메 (는 돌이판 싸기만) 그롤의 훈과 꼴터 그핸는 핸순의 핸도은, 자롱 신봉의 서다음을 하는 앞곡 뻔저 어하다 그게 돈 했다.\n\n봐든 찰우깟는 여기칠 꼐타깟지. 환은 괴타는 또는 장하다. 뜻 짓이 돌이게다 위려고 팔 지 ... 샘칠하기도 귀청다. 여메 쯔 엔강하게 기어하지.\n\n// /2\n95. 11. 11    정혜\n\n으는 환격도 쌀 충활다\n환는 글로도를 뜰로그 로봉을 소지도 바닫는 에산 도록 시걸다 환지고 브세 화혜가 게후기 가도의 처음 미 노토이 또온 데빵다 외 김와? 시응을 억시 우직이언 뜬 앞 드러네 봤이 삻다 가장 뭉징 사중에기 갔다...\n그건 지금 이 청솔은 또 옳아?\n\n에서\n500000000 00 [불명확]  써 뜯로 돈드리를 세어보 맞는지 나행심 하는- 어거가 아도다.\n으는는 못로 미서는 로므 기잔 못느 올자 씨엔 지꼬로 증삼왕이) 어 욱어 대오였다.", "summary": "일상의 감정과 고민을 담은 자유로운 글쓰기. 다양한 관계와 감정에 대한 성찰적 기록으로, 손으로 쓴 필체가 감정의 진솔함을 드 것다.\n\n쌔이 역삶 받 날것다. 지삶 쌔도 쌔게했것다.\n\n명심할이 대자쌤 미사은 자산은떤 쏭기 쌔고 베사을 궁 같느은 할것다.\n\n정것같이 먼저 기다을했다. 자 이것것다. 먹에 정것을 쌔에 뜨울했는가? 예뭔 정것어 궁\n\n것을 어나었다... 담심야은 예뭔 것이나 지어서 100만엔씨 쌔고 쌔했어 100만엔으로 온것네?\n\n산정놈 종네고 고아은에 옷 뼈정지... 22명 정자 자같했다.\n\n쌔것쌤 대은 바뻘네 냔 쌔했(지2 한금 한은 중천했것다.\n\n새사하은 쌔해써 잉더은 것 담심은 중기(응)있으면...\n\n냐면 먼지 성격 것닷봐어터 ... 쌔장이에 베자뻘 쌔자(자 거것다. 자금했다.\n\n하미나음 바밤... 미씨이 개흥 뜻이\n\n쌔 맡은( 않았는데 찬이 쌔련 정심가 봐 성긴 했어했것다.\n\n먼은 역심이 쌔은 것같은 쌔였다.\n\n95이 정을\n\nOTJ기 바쳐이은 하좋은 우뻘써 봤다. 봐 구음 강충좋이다. 족히 아직증\n우한 뻔남이이 다시뉴 'freedom'(냐게 쌔힌 그것 아쌤) 른 좋한\n가정에 자것다. 자새이 찰의 구리하는 봐 자정즐이 이 씨것은\n받는데 봤것다.\n냐은 굿 함배 봐 생각이다. 김이 넓서 뻘 맨\n하세용.\n\n은주", "summary": "95년 11월 14일 작성된 개인적인 생각과 고민을 기록한 일상 노트. 관계, 감정, 자유에 대한 성찰적 내용을 담고 있습니다.", "tags": ["일상", "고민", "감정", "성찰"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p028.jpg", "processed_at": "2026-04-09T18:37:36.561571", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p028"}, {"date": "1995-11-15", "author": "木情光", "content": "11월 13일. 8시 20분. 철 2201년4.\n누 이여여 아무로 없다.\n도려 과 씨가지다 했다. 씨이경정이 씨씨씨 것 같다. 씨지와 지즈 여이씨지 은 것은 보휴자 씬신지 찾지 떼궁아껴다. - 나는 지 이여하고.\nB준 씨 씨황은 있깝지 없앙이다. 찹 즈구앙씨 처충도로 지 서앙이 원인여 나은 것 없다. 논을 연상히 생활하되씨 씨료 네 모흥을 봉여저 왕이 씨씨했다. 사잔 어완에 다 거여 /씨이 다 씨도록 나은 나지 왕 잘 알옯으로 갔는 울위지다. 우옷것을 왕지 갓붕다.\n거 한 쓸 앙이 온다. 즉왼 씨씨앙껴다.\n찹. '95 씨씨 여러벗! 찹 씨씨 씨씨을 충앙이 찹 사일을 인종씨 와호씨다.\n\n1995. 11. 15. 자\n木情光\n\n지정차 구성씨 우는 거홀멸거처 집씨여 능함은 탈징되.\n욕 18 싶된찬.\n견박씨 서싼는 씨씨씨 씨었다. 손 씨처 것이...\n서차 으됨는 취를 것 경각이 씨여왔 -찬.\n은 고홀고어 것누을 으너미은 씨들, 목정기 김씨 떡너로 남정이 했는 ㄷ자.\n씨씨 [불명확] 고증씨 여어씨 구앙? 찬 싶씨 김에 위다.\n씨씨 씨씨씨 씨은 좋는 씨 좌띤 아는 내 도력... 추추추\n으는 본 신온씨 씨는 씨씨 셔 싶씨은 는 내 도어... 추추추\n이전 내 것씨에 여현 더를 시작? 나씨 손는 씨씨 서약는?\n박씨 깨을 보도 싶씨다.\n\n씨! 곤롸씨 능드에 은 서근 과칠씨는 남씨이 역 기호에 꽂는 그...\n\n'95. 11. 15\n'95 제씨", "summary": "1995년 11월 15일 작성된 개인 노트. 일상적인 고민과 감정을 담은 글이며, 여러 심정과 생각들이 기록되어 있습니다.", "tags": ["일상", "고민", "감정", "1990s"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p029.jpg", "processed_at": "2026-04-09T18:37:53.649489", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p029"}, {"date": null, "author": "Riq", "content": "口子헌건 ㅇㅅ중국의 의장님의 아게는 를 '터마니드'라는 영향족 보았다. 윤목이 짜꼼 나왔다. 방곡 상중이 ('묘의 -구제를 를 눈목이 짜꼼 나왔다. 아너대도 나바 하고 잉이 잉든 것 같다.\n\n안녕하세요?\n지금 내 열에는 두더의 고작난 라디오 (- XX형) 여서 노래(!)가 나읍니다. (여버는 유시되어 지슷헐다!)\n\n음피은 해야처나?\n목피은 핫 꺼나?\n목피은 [불명확]켜서 곧 꺼나?\n목피은 왜해서 사랴도 처버?\n\n어렷게 '사랴도 처버?\n\n음바바 눈었다.\n그때는 사랑을 눈머지게 '내'을 거섯짜다.\n이것 > 거렸도 '지러면' 읽가 '자러면' 읽가 되어면 ('방자고')\n떨용해서 솓다.\n\n떨못도 하섯어! 지금 매 놀게 너처됴다.\n아 ~ 줄러 - Riq", "summary": "일상 속 소소한 고민과 생각들을 자유롭게 기록한 개인 노트. 라디오 청취, 사랑에 대한 철학적 사색, 그리고 현재의 심정을 솔직하게 표현하고 있습니다.", "tags": ["일상", "고민", "감성", "개인노트"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p030.jpg", "processed_at": "2026-04-09T18:38:02.959331", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p030"}, {"date": "95년 11월 18일", "author": "정현", "content": "처음 봄을 나면서 너무나 설레고 가슴 철렁 내렸다. 자네 이렇게 모둠이 (가슴 저것) 지정자 이렇게 도움이 (추억함. [불명확] 한정된 문용 있으로 자신 [불명확]다. 나는 빠져게 받은 자신과 슬퍼했던 말은 취하지만 잠깐 잠깐 자신들 자신하지로 건넬에 찾하는 관찰 받아 [불명확]하는 막은 취했다. 나는 고통이 달신자서 기쁨지어 받아 고장 우회해 있어서 기쁨다. 점이 찾 세미가 '너는 명 트사로 이인 것 같네니? 샘아 지찾다온 앞 찾아봐. \"검시\", \"나는\" 고것 받 안 아다대. \"[불명확]다 (...)\n\n이렇게서 모더서자거 정서 속 사정했다. 서버를 놀해다가지지 되다가 마려 [불명확] 강다. 내수 수저 찾은 앎계 여터 정하다 앗았다는. 아아자...\n아 봅뿐 먀던 섯어 [불명확].", "summary": "학과 방명록에 남긴 일상적인 감정과 고민에 관한 기록. 설렘과 함께 복잡한 감정들을 표현하고 있습니다.", "tags": ["일상", "고민", "감정", "추억"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p031.jpg", "processed_at": "2026-04-09T18:38:11.350601", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p031"}, {"date": null, "author": null, "content": "즐거웠던 지나간 순간 느껴.\n그 즐거움이 지나갈, 그 환희했던 맞은 여명에 찬 것인가?\n\n나쁘지가 조금 쓸쓸해진다. 1998년 11월 19일 제명에 Big\n\n이정이 MT는 더혀맞다. 어쩌다 쪽눈슬이 MT와 찾아와버. 여러 사람들과 걱정없는 진숙한 대나는 하나아버 다시해버 이런 새것이 특역다. 모든 사람 케이 케이이 너무도 즉중한서.\n사장시장은 궁가여...\n\np.s. 은종은 우선'혼이 때우 보궆넌다 여토에 좀 쪽눈서며... 혼이 주거에게 너기롤 되것을 좌바네 자주 [불명확] 자주 생명 열되지.\n\n그림움에 즐거운 거대관에 자처공 입은닝다\n나바 한거지 전음을 흰로에 사랍나다\n도닝나. 그롭 남 하나하나 난 못은 못이었다\n영신 달름은 나 소슨 너바는 갚였다\n한멩사장과 영성 왕적 하마서 아정 억기을 봤나다 의도는 기억이 나리 앍지면 과거는 여럿적 산갱소 있지 맞나다. 크린 그롬 다엔 대해은 겪음 화고 쪽을 깐이야놓는\n생각 혼에서 멘죽서 나나하가 찬다 여렁다\n뭔금가 그림서 사랍의 시작은 아장고 그때다 도음이 될된 실와 이런는 [불명crawford]\n\n영시 동거국로 찬장여 흘버다\n\n그이다, 및 시작이다.", "summary": "1998년 11월 19일 MT 경험을 회상하며 지나간 즐거움과 현재의 감정에 대해 명상적으로 기록한 일상 노트. 여러 사람과의 만남에서 느낀 감정과 추억, 그리고 앞으로의 시간에 대한 성찰이 담겨있다.", "tags": ["일상", "MT", "추억", "감정", "성찰", "고민"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p032.jpg", "processed_at": "2026-04-09T18:38:26.964973", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p032"}, {"date": null, "author": null, "content": "혼자 나혼자 쏟으려다 빠져 빠 생각이 다 났다\n사람은 깊어서는 무한가능 해야지 강생각이 다 났다네\n음... 나이제 자살하지 쏟은 것 그때는 기다 잘이라는 게 됐다\n한 사람이 이나면 싶에게 되면 오롯이 되면 그럼서 컬렛다\n와지면 기다릴이 리려움직 실켓다 는 생각이 요욕 많 풀다\n기더리운 마다되라는 되짓이 잘켓여 마다서 받아도 [불명확]?\n누군가 어여 봤다는데?\n\n85.11.22 정철\n\nP.S 꿍작하는 육 깜은 나에게 여전 기다릴을 치심사음은\n마지 읽는 것같은! 나 사람은 기다려서 앞에 해야?\n기다려! 쏟아을 그러다네 답집치, 쏟아 먼 것달켓 어다\n\n그말이다!!\n구움일!!!\n\n라선여대  꺼봤어 도움이 아다다--/\n\n오! 홀렸사테 누엔극이 있어야 샘샘에게 깔한 것같 매가을 위했다. 물\n서가 라처에서 앞사의 의미 저게어 싶지 롱한다네 내요 있었거때 그\n여용을 자신은 모습과 외미 싶은 말엥 놀모은 찾 양이 과용이라고 하싸다\n그것 같다. 여해곤 어서켓면 (비나를 더어 라셔 어지는) 앞사 중에했\n샤딩도 즈어려고 리셔로 앞사에 대한 깊이나 풀음이 어여 앞우에게 때\n봐지 앙켓던 것 같다. 앗으로 여얀비 자 찬 모자간 상해 리젯 풀\n피워쌍나 호삼톄 왔 홀레어서에 종 여 있사야 한 것 같다.\n\n어다는 서신다는 이대네\n달나닭이싸는 것 봉이쌔네(어...)", "summary": "작성자는 혼자만의 생각과 감정, 다른 사람들의 관계와 의미에 대해 깊이 있게 성찰하고 있습니다. 자신과 타인을 이해하고자 하는 고민과 깨달음이 담긴 내용입니다.", "tags": ["고민", "성찰", "인간관계", "일상"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p033.jpg", "processed_at": "2026-04-09T18:38:40.851816", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p033"}, {"date": "1995-11-22", "author": "木情花", "content": "1995년 11월 22일\n\n[상단 부분 - 불명확한 필기]\n\n[중단 부분]\n겨울이 싸워 홀로여 처자거치는 씨 홀로도 못을 여열곡왠에서 시적 본다.\n아저 궤준- 않는 젤 것이다.\n\n곧 봄으면 곡이다. 어쩐 앓 내 동생을 봤어 돼 곡 '인중 것\n너 귀신봤이야. '나도 못 봤이다.\n\n겨숭이 홀로도 곳 봤괴 ...\n\n[하단 부분]\n흐음) 수줍서면 싸이다. 수은이 까까기쥐 젓지 느겨진다.\n아저가는 자존이 고집통, 새마김된 깊도 까까죽이 먼게 느껴질 핵이 못 깊이다.\n고복기이) 자존이 나이에 촉신붕 나한 깊이.\n그래나 그 느낌은 나이 씨장 자직한 궤장이 기빠해야 와 깊어.\n\n鳥・.足・鳥.", "summary": "1995년 11월의 개인적인 일상과 감정을 기록한 페이지. 겨울 계절감과 주변 사람들과의 상호작용, 그리고 내적 성찰이 담겨있다.", "tags": ["일상", "감정", "계절", "고민"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p034.jpg", "processed_at": "2026-04-09T18:38:48.652274", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p034"}, {"date": null, "author": null, "content": "다이어트네 네 옆에서 보궁중젖다다.\n주저헤 미안흉. 잔 기 라는 늘어메 꼴짝도 쿡하는 언간. 나.\n미쌰 이런 미안흉을 잔죽교 싣지 앞다.\n그 남 미 가져야 나다다. 어승.\n\n그 1024을 중는 나뭇데 수칙을 싹은 뭉'이\n가 늘은 간 바꾸니 그렁하다\n그리고 북쫓데는 사이흥 가잔보된 옷다!!\n그거하다국께", "summary": "다이어트와 관련된 고민, 누군가에게 미안함을 표현하는 내용의 일상 노트 기록입니다. 감정 표현과 생각의 흐름이 담겨있습니다.", "tags": ["일상", "고민", "다이어트"], "mood": "neutral", "decade": "unknown", "image_quality": "fair", "filename": "1995년_열린마음_p035.jpg", "processed_at": "2026-04-09T18:38:57.658748", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p035"}, {"date": "1996-11-23, 1996-11-27", "author": null, "content": "우창홍 오이\n\"자기를 죄장혜준 오로 사람에게 잔사하다\"\n고 진해 닭 닭니다.\n\nP.S 죄장라도 한 똑씩 때 린시다.\n\n오래가야에 완 보레맀이 앗 되회 윤 수 있으여나 핬는 4\n도 돈는 킷 강다. 초년궁 그 기 나 뿌 지는 앗는데..;\n완림. 죄영을 하짖여가?\n- 조전 -\n\nP4\" 괘확으로 녹장하라! 확승하라!\n어차피, 우리는 함상 쿨 받선에 서 있였던 것이다.\n\n96.11.23.\n\nb병이 여짜이 사여삳다 우기곡감의 내의 지식은 옛는 죽화다. 익짜 다 기짜\n죽는맘은 저데로 쉴져 홀화거... 흘하하려 삶! 완장하 저어 없다.\n- 정환 -\n\n94 11 27.\n\n을\n흘이온² (시간 느옵이에 없다.\n뇌머기을 구자이젱다. 씨산다.\n그케야아 ~~ 아듯오지 ?\n- [불명확] -\n\n다시는 완싸려 했는데\n배가 *집에서 나는 시린은 12시 50분쭈,\n확된 도심마는 2시 10분 쭈\n좌고기를 이더 나 시간 20여분 앞에 왔다.\n십더야 ~ 안 야도지.\n- 주 상 -", "summary": "1996년 11월의 일상 기록으로, 삶과 인간관계에 대한 성찰과 일상의 소소한 일들이 기록되어 있습니다. 자기 계발과 긍정적 태도에 대한 메모와 함께 친구들 간의 대화내용이 담겨있습니다.", "tags": ["일상", "고민", "성찰", "우정"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p036.jpg", "processed_at": "2026-04-09T18:39:09.356770", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p036"}, {"date": null, "author": "나유준", "content": "인생은 때론 과서 되었지는\n누네기동여서 여기가 바뀌 것같습니다.\n몸 낳뭔(?) 같습니다.\n찾려자 여연본 찾려합니다.\n\n버저 새 찬것을 끌었다. 왜든 요것은 비로 부꾸라이다. -차현-\n\n우침이 봉이 더시승서 배배빌\n젯다. 우리 문두 거정하라.\n안녕자하았다. 어제 어동님이\n더여구줄? 앗응.\n\n혼정하지도 여연본!\n어시간에 도가 것홍겨 싶되 순창정며 영시 야무은 했여 심섰으로.\n난서는 싸쌌정지고 마음도 그러하서는 긷 같아 정서 못하게 깅니다\n여연본\n그냥 합려 봉 받합니다\n감기등 걸섯제요.\n잘도 같도 구고요.\n되네.\n\nTe 꼽잔 기여 1094년!!\n\n나우준:", "summary": "작성자는 인생의 변화와 혼란스러운 감정을 표현하고 있으며, 친구들과의 관계, 감기 등 일상적인 근황을 담은 개인적인 노트입니다.", "tags": ["일상", "고민", "감정"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p037.jpg", "processed_at": "2026-04-09T18:39:19.952692", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p037"}, {"date": "1995-11-4", "author": "木情光", "content": "사랑.\n마실 찾 잊어 나가 찾. 2매 섯찾. 2매 찾.\n흐온에 더젓해서 끼응하지 정이했. 2매 찾 화하지. 즉은 즉 싳했.\n아우처 샤찾는 2진 비징양있. 그 켠과 나싣 이 이칠 깟이 줄함짧있\n내 찬는 깋켤성 뭔있다고 잘다. 응즈\n여서 깨우넣 나음과 옳주잘. 여시 누잘다.\n2매이 지은 여 좋다.\n진성. 푼경 깟는 지경 싣찰.\n마곱한 낟뜨 나치. 칠다.\n\n대씩 들어셔 뭔 헬이 손낀을 맞보적 윳다.\n태동적 떠 못봉샨 티토기 칣정.\n전경셍주 다너른곳\n신은내 민가절 집천 깟다 느뭔 건신새 찰미자가 식딴진 곳\n\n그런이 깟면섣의 '는입샛' 제점 완비고 댁난이 그런 기뭉이 들지 완하다.\nwhy ?\n우리은 정셔은 잔 민다뼈다 뭘 릿 감찰.", "summary": "사랑에 대한 깊은 고민과 감정을 표현한 일상 기록. 관계와 마음의 상태에 대해 성찰하는 내용.", "tags": ["연애", "고민", "감정", "일상"], "mood": "neutral", "decade": "1990s", "image_quality": "fair", "filename": "1995년_열린마음_p038.jpg", "processed_at": "2026-04-09T18:39:33.082448", "volume_id": "1995년_열린마음", "volume_title": "1995년 열린마음", "year": 1995, "page_label": "p038"}, {"date": null, "author": null, "content": "님께게 같은 옷차 게는 최근과 정 기구를 했는데 께 서함 2항나.\n그나 너는 기내여운 봄 서너는 확 잉 두댔.\n\n[불명확] - 기획 -\n[불명확]\n\n남음 새강중\n그것지 모습 해중의 방해물이 아닌가 하는 또 로아가의 새강이\n는은 \"사다\"\n여유온 옷높들이 맞다.\n그들이 없는 받다.\n\n쉬 이런데 언마가 봉 간전해 이런붕 댓 못하야 찬다 이제 봄\n하하하게 소주겨 과처셔 창긴 상징이나 공표 웠것다. 웻\n여중 때 달머가\n향상 아운셔 소부 거셔원 맑음 떠윤예 왔것다. 가옷 아핸다 날이가 도엄 기는\n우 봉이 봉이 아다해워고 지서으셔의 며떤 건배려 드드웃 해찬다.\n  데림게 왔어 비터나 나 각문
